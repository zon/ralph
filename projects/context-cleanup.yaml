slug: context-cleanup
title: Clean up internal/context — remove policy logic, derived strings, and redundant comments
maxIterations: 10
requirements:
    - slug: remove-should-notify
      description: Remove ShouldNotify() from Context; add NoNotify() getter; update notify/client.go to inline the notification policy
      items:
        - Remove the ShouldNotify() method from internal/context/context.go
        - Add a NoNotify() bool getter that returns c.noNotify
        - 'Update internal/notify/client.go: replace ctx.ShouldNotify() with the inlined expression (ctx.IsLocal() || ctx.ShouldFollow()) && !ctx.NoNotify()'
        - Delete TestShouldNotify from internal/context/context_test.go
      passing: true
    - slug: remove-repo-url-and-repo
      description: Remove RepoURL() and Repo() from Context; update call sites to use RepoOwnerAndName() directly
      items:
        - Remove the RepoURL() method from internal/context/context.go
        - Remove the Repo() method from internal/context/context.go
        - In internal/cmd/execute.go, replace the `ctx.Repo() != ""` guard with an owner check via ctx.RepoOwnerAndName()
        - In internal/cmd/workflow_client.go, replace both `a.ctx.Repo() != ""` checks with owner checks via ctx.RepoOwnerAndName()
        - Remove any imports from context.go that become unused after removing these methods
      passing: true
    - slug: remove-set-repo
      description: Remove SetRepo() from Context; update call sites to use SetRepoOwner + SetRepoName separately
      items:
        - Remove the SetRepo() method from internal/context/context.go
        - In internal/cmd/workflow.go, replace ctx.SetRepo(w.Repo) with splitting w.Repo on "/" and calling ctx.SetRepoOwner + ctx.SetRepoName
        - Remove the "strings" import from internal/context/context.go if it is no longer used
        - Remove any test cases in context_test.go that test SetRepo() directly
      passing: true
    - slug: remove-redundant-comments
      description: Strip "what" comments from exported methods in context.go that merely restate the method name
      items:
        - 'Remove doc comments from exported methods whose text only restates what the method name already expresses — for example: ''// Output returns the output client'', ''// IsVerbose returns true if verbose logging is enabled'', ''// GoContext returns the underlying standard context.Context.'', ''// ShouldNotify returns true if notifications should be sent'', ''// NoServices returns true if services should be skipped'', ''// IsLocal returns true if running locally instead of submitting to Argo Workflows'', ''// ShouldFollow returns true if workflow logs should be followed after submission'', ''// IsWorkflowExecution returns true if running inside a workflow container'', ''// AddNote adds a runtime note to be passed to the agent'', ''// HasNotes returns true if there are any notes'''
        - Preserve the struct-level comment only if it conveys something not already expressed by the type name
        - Preserve field-level comments that disambiguate non-obvious semantics — specifically the distinction between instructions (file path) and instructionsMD (inline content), and any comment whose removal loses information a reader cannot derive from the identifier name alone
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: true
