name: relocate-misplaced-code
description: Move misplaced functions and types to appropriate packages

requirements:
  - category: k8s
    description: GenerateSSHKeyPair is in an appropriate package
    items:
      - GenerateSSHKeyPair is no longer in internal/k8s since it is a crypto utility, not a Kubernetes operation
      - It lives in a package that reflects its purpose (e.g. internal/crypto or internal/ssh)
      - All callers import from the new location
    passing: false

  - category: cmd
    description: Test-only types are not exported from cmd
    items:
      - WebhookConfigResult and WebhookSecretsResult in internal/cmd/config_webhook.go are either unexported or moved to a test file, since they are only used in tests
    passing: false
