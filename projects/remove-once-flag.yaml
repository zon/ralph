name: remove-once-flag
description: Remove the --once CLI flag and its associated logic

requirements:
  - category: cli
    description: Remove the --once flag from the run command
    items:
      - The `--once` flag no longer exists on the `run` command
      - The `Once` field is removed from `RunCmd` and `RunFlags`
      - The `--local` / `--once` incompatibility check is removed
      - The `executeOnceMode` method and any code paths that branch on `Once` are removed
    passing: false

  - category: tests
    description: Remove all test coverage for the --once flag
    items:
      - All test cases referencing `--once` or `Once` are removed from cmd and run test files
    passing: false

  - category: versioning
    description: Version bump
    items:
      - Apply a semver major bump to internal/version/VERSION and a patch bump to charts/ralph-webhook/Chart.yaml
    passing: false
