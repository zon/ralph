slug: ai-cover-agent-execution-paths
title: Add unit tests for internal/ai's agent execution functions
maxIterations: 10
requirements:
    - slug: test-resolve-model-and-variant
      description: |
        Add table-driven unit tests for the unexported resolveModel and resolveVariant helpers in internal/ai/ai.go, covering context override, config fallback, and config-load-failure fallback.
      items:
        - |
          A test for resolveModel covers: ctx.Model() returns a non-empty value (used as-is, config never consulted in a way that changes the result); ctx.Model() is empty and config.LoadConfig succeeds (returns ralphConfig.Model); and ctx.Model() is empty and config.LoadConfig fails — for the failure case, change directory (t.Chdir or equivalent) into a t.TempDir() that is not a ralph config directory so config.LoadConfig naturally errors, and assert the fallback "deepseek/deepseek-chat" is returned.
        - |
          A test for resolveVariant covers the same three cases: ctx.Variant() non-empty, ctx.Variant() empty with successful config load (returns ralphConfig.Variant), and ctx.Variant() empty with config.LoadConfig failing (returns "").
        - |
          Tests use *execcontext.Context constructed directly (e.g. &execcontext.Context{} with SetModel/SetVariant setters, mirroring how internal/workflow/generate_test.go and other packages build contexts for tests) — no real ralph repository paths are touched.
        - |
          Tests use testify assert/require and t.Run() subtests in a table-driven structure consistent with the existing tests in internal/ai/prompt_test.go.
      passing: false
    - slug: test-run-agent-functions
      description: |
        Add unit tests for RunAgent and RunAgentWithModel in internal/ai/ai.go, verifying model/variant resolution, verbose prompt logging, and propagation of the underlying RunAgent call and its error.
      items:
        - |
          A test for RunAgent constructs &opencode.MockOC{RunAgentFunc: func(ctx context.Context, model, variant, prompt string) error {...}} (the documented function-field mock pattern from internal/opencode/opencode_mock.go, used the same way in internal/cmd/agent_client_test.go), captures the model, variant, and prompt it receives, and asserts they match the values resolved from the *execcontext.Context (via resolveModel / resolveVariant) and the prompt argument passed in.
        - |
          A test asserts RunAgent returns the error produced by oc.RunAgent unchanged (no wrapping).
        - |
          A test for RunAgentWithModel asserts the given model string is passed through to oc.RunAgent verbatim — not the value resolveModel would have produced — while variant is still resolved via resolveVariant, and that the underlying error is returned unchanged.
        - |
          A test covers the verbose-logging branch: when ctx.IsVerbose() is true, the prompt is written via ctx.Output().Debug before the agent runs (assert by capturing/inspecting output, e.g. using the same approach internal/output's tests use to capture debug output, or by asserting on a buffer/writer the Context's Output is configured with); when ctx.IsVerbose() is false, no debug output is produced.
        - |
          Tests use testify assert/require, t.Run() subtests, and the opencode.MockOC function-field override pattern — no real opencode CLI is invoked.
      passing: false
    - slug: test-run-opencode-and-read-result
      description: |
        Add unit tests for the unexported runOpenCodeAndReadResult helper in internal/ai/ai.go, covering successful result extraction and every error path it defines.
      items:
        - |
          A test covers the success path: oc.RunCommand (mocked via &opencode.MockOC{RunCommandFunc: ...}) writes content with leading/trailing whitespace to the outputFile path it's given (a path inside t.TempDir()), and the function returns the trimmed content with no error.
        - |
          A test covers the verbose-mode wiring: when ctx.IsVerbose() is true, RunCommandFunc receives non-nil stdout/stderr writers (asserted to be os.Stdout/os.Stderr or equivalent non-nil io.Writer values); when false, it receives nil writers — assert by capturing the writer arguments inside RunCommandFunc.
        - |
          A test covers oc.RunCommand returning an error: asserts the returned error is wrapped as "opencode execution failed: %w" and that errors.Unwrap (or errors.Is) reaches the original error.
        - |
          A test covers a missing output file (RunCommandFunc returns nil but never creates outputFile): asserts an error is returned from the os.ReadFile failure, with no panic.
        - |
          A test covers an output file containing only whitespace (or being empty): asserts the function returns an error with the exact message "summary file is empty".
        - |
          All file I/O in these tests targets paths inside t.TempDir() — no real repository files are read or written. Tests use testify assert/require and t.Run() subtests in a table-driven structure.
      passing: false
    - slug: test-create-temp-file
      description: |
        Add a unit test for the unexported createTempFile helper in internal/ai/ai.go, verifying it creates a file under the repository's tmp/ directory via git.TmpPath.
      items:
        - |
          The test runs inside an isolated temporary git repository: use t.TempDir(), run "git init" in it (and configure user.name / user.email as internal/git's existing tests do, e.g. internal/git/branch_test.go), and t.Chdir into it before calling createTempFile — never operate against the real ralph repository (a prior incident where a test ran git against the real repo caused a lost branch, so this isolation is mandatory).
        - |
          The test asserts createTempFile("example.md") returns an open *os.File whose path is "<repo-root>/tmp/example.md", that the tmp/ directory was created (mirroring git.TmpPath's os.MkdirAll), and that the file exists on disk and is writable.
        - |
          The test closes and removes the created file (or relies on t.TempDir() cleanup) so it leaves no residue.
        - |
          Test uses testify assert/require.
      passing: false
    - slug: test-generate-pr-summary-and-review-pr-body
      description: |
        Add unit tests for GeneratePRSummary and GenerateReviewPRBody in internal/ai/ai.go, covering the full temp-file-create, prompt-build, run, read-result, and cleanup lifecycle.
      items:
        - |
          Tests for both functions run inside an isolated temporary git repository (t.TempDir() + "git init" + identity config + t.Chdir, matching the pattern used in internal/git/branch_test.go) so that createTempFile's call to git.TmpPath succeeds against a real but disposable repo — never the actual ralph repository.
        - |
          A test for GeneratePRSummary constructs &opencode.MockOC{RunCommandFunc: func(...) error { write a known summary string to the outputFile path it receives; return nil }}, calls GeneratePRSummary with sample projectDesc/projectStatus/baseBranch/commitLog, and asserts the trimmed summary string is returned and the temporary "pr-summary.md" file no longer exists afterward (cleaned up by the deferred os.Remove).
        - |
          A test for GeneratePRSummary asserts that when oc.RunCommand returns an error, GeneratePRSummary propagates it (wrapped via runOpenCodeAndReadResult as "opencode execution failed: %w") and still removes the temporary file.
        - |
          A test for GenerateReviewPRBody mirrors the above: mocked RunCommand writes a known body to the output file, the function returns the trimmed body, the temporary "review-pr-body.md" file is cleaned up, and a RunCommand error is propagated.
        - |
          Tests assert that BuildPRSummaryPrompt / BuildReviewPRBodyPrompt are exercised with the correct inputs by checking the prompt string the mock receives contains the expected projectDesc/projectStatus/baseBranch/commitLog (for PR summary) or projectName/projectDesc/requirements (for review PR body) substrings.
        - |
          A test covers the verbose-logging branch for each function: when ctx.IsVerbose() is true, the built prompt is written via ctx.Output().Debug before the agent runs.
        - |
          Tests use testify assert/require, t.Run() subtests, and a table-driven structure consistent with internal/ai/prompt_test.go.
      passing: false
    - slug: test-generate-changelog
      description: |
        Add unit tests for GenerateChangelog in internal/ai/ai.go, covering its temp-file lifecycle including the rename to report.md that distinguishes it from GeneratePRSummary and GenerateReviewPRBody.
      items:
        - |
          The test runs inside an isolated temporary git repository (t.TempDir() + "git init" + identity config + t.Chdir, matching internal/git/branch_test.go) and additionally chdirs to a working directory where "report.md" can be created, since GenerateChangelog renames its temp file to "report.md" relative to the current directory.
        - |
          A success-path test mocks &opencode.MockOC{RunCommandFunc: ...} to write changelog content to the outputFile it receives, asserts GenerateChangelog returns nil, that "report.md" exists in the current directory afterward with the expected (trimmed) content, and that the original temporary "changelog.md" file no longer exists at its temp path (renamed away, so the deferred os.Remove is a no-op but causes no error).
        - |
          A test asserts that when oc.RunCommand returns an error, GenerateChangelog returns the wrapped "opencode execution failed: %w" error, no "report.md" is created, and the temporary file is removed by the deferred cleanup.
        - |
          A test asserts that when the summary file is empty (mocked RunCommand writes nothing or whitespace-only content), GenerateChangelog returns an error with message "summary file is empty", no "report.md" is created, and the temp file is cleaned up.
        - |
          A test covers the verbose-logging branch: when ctx.IsVerbose() is true, the built changelog prompt is written via ctx.Output().Debug before the agent runs.
        - |
          Tests use testify assert/require, t.Run() subtests, and a table-driven structure consistent with internal/ai/prompt_test.go.
      passing: false
