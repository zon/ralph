slug: opencode-interface
title: Introduce OCClient interface and MockOC for internal/opencode
maxIterations: 10
requirements:
    - slug: oc-struct-and-interface
      description: internal/opencode exposes a Client struct with methods and an OCClient interface, with a single unified private exec helper
      items:
        - internal/opencode exports a Client struct whose methods cover RunCommand, RunAgent, GetStats, and DisplayStats
        - internal/opencode exports a New() constructor that returns *Client
        - internal/opencode exports an OCClient interface listing all four methods of Client
        - A single private exec function handles CLI invocation; all public methods delegate to it
        - RingWriter creation is internal to the RunAgent method — the ring is not part of any exported type or function signature
        - RingWriter, NewRingWriter, and RunAgentWithRing are removed from the exported API; ring buffering is an internal implementation detail of RunAgent
      passing: true
    - slug: oc-mock
      description: internal/opencode provides an exported MockOC in opencode_mock.go that satisfies OCClient
      items:
        - internal/opencode contains a file named opencode_mock.go
        - opencode_mock.go exports a MockOC struct with function fields for each method in OCClient
        - Each method on MockOC invokes its function field if non-nil, otherwise returns a zero value
        - MockOC satisfies the OCClient interface
      passing: false
    - slug: ai-accepts-occlient
      description: internal/ai functions that invoke opencode accept an OCClient instead of calling package-level opencode functions directly
      items:
        - RunAgent and RunAgentWithModel in internal/ai accept an opencode.OCClient parameter and call it instead of calling opencode package-level functions
        - runOpenCodeAndReadResult and DisplayStats are updated to accept and use an opencode.OCClient parameter
        - The RALPH_MOCK_AI environment variable check and runMockAgent function are removed from internal/ai
        - All call sites of RunAgent, RunAgentWithModel, and DisplayStats throughout the codebase are updated to pass an OCClient
        - Where call sites are in entry modules (internal/cmd), a real *opencode.Client is passed; where call sites are in tests, a *opencode.MockOC is passed
      passing: false
    - slug: cmd-accepts-occlient
      description: AgentClient in internal/cmd holds an OCClient field and uses it instead of calling opencode package-level functions directly
      items:
        - AgentClient in internal/cmd holds an opencode.OCClient field
        - NewAgentClient accepts an opencode.OCClient parameter and stores it on the struct
        - AgentClient.PrintStats uses the stored OCClient to call GetStats rather than calling opencode.GetStats directly
        - The internal/cmd package no longer imports internal/opencode for package-level function calls
        - Call sites of NewAgentClient in entry modules pass opencode.New()
      passing: false
    - slug: trim-invocation-tests
      description: opencode_test.go contains at most two CLI invocation tests — one happy path and one failure
      items:
        - TestGetStatsError, TestGetStatsParseError, TestDisplayStats are removed from opencode_test.go
        - The remaining CLI invocation tests are TestRunCommand (happy path) and TestRunCommandFailure (failure)
        - The stats parsing unit tests (TestStatsParsing, TestStatsParsingZeroValues, TestStatsParsingKMValues, TestCaptureWriterTail) are kept unchanged
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
