slug: validate-model-config
title: Add validate-specific model config to ralph validate
feature: specs/features/ralph/validate
requirements:
    - slug: validate-config-struct
      description: Add ValidateConfig to the ralph config with a Model field
      items:
        - Add a ValidateConfig struct to internal/config with a Model string field tagged yaml:"model,omitempty"
        - Add a Validate ValidateConfig field to the Config struct tagged yaml:"validate,omitempty"
      passing: true
    - slug: validator-model-field
      description: Add a resolved model string to Validator and update AgentClient to accept it
      scenarios:
        - title: Validate-specific model used when configured
          items:
            - GIVEN validate.model is set in .ralph/config.yaml
            - WHEN the fix loop invokes the agent
            - THEN the validate-specific model is used
            - AND the user is not required to pass a model flag
        - title: Fallback to main model when validate model is unset
          items:
            - GIVEN validate.model is not set in .ralph/config.yaml
            - AND the top-level model field is set
            - WHEN the fix loop invokes the agent
            - THEN the top-level model is used as the fallback
      code:
        - name: Validator
          description: Validator struct with resolved model field
          module: internal/validate
          body: |
            type Validator struct {
                project ProjectClient
                agent   AgentClient
                model   string
            }
        - name: AgentClient
          description: AgentClient interface updated to accept model string
          module: internal/validate
          body: |
            type AgentClient interface {
                FixProject(path string, loadErr error, model string) error
            }
        - name: Validate
          description: Validate loop passing v.model to FixProject
          module: internal/validate
          body: |
            func (v *Validator) Validate(path string) (*project.Project, error) {
                for attempt := 1; attempt <= MaxAttempts; attempt++ {
                    proj, loadErr := v.project.Load(path)
                    if loadErr == nil {
                        if saveErr := v.project.Save(path, proj); saveErr != nil {
                            return nil, saveErr
                        }
                        return proj, nil
                    }
                    if attempt == MaxAttempts {
                        return nil, loadErr
                    }
                    before, err := v.project.ReadFile(path)
                    if err != nil {
                        return nil, err
                    }
                    if fixErr := v.agent.FixProject(path, loadErr, v.model); fixErr != nil {
                        return nil, fixErr
                    }
                    after, err := v.project.ReadFile(path)
                    if err != nil {
                        return nil, err
                    }
                    if bytes.Equal(before, after) {
                        return nil, fmt.Errorf("%w: %w", ErrNoChange, loadErr)
                    }
                }
                return nil, ErrUnreachable
            }
      tests:
        - name: TestValidateUsesValidateSpecificModel
          description: verifies that when withModel sets a model, FixProject receives that model
          module: internal/validate
          body: |
            func TestValidateUsesValidateSpecificModel(t *testing.T) {
                project.ResetLoadAttempts()
                ResetFixCalls()
                svc := withMocks(
                    withModel("validate-model"),
                    withProject(thatLoadsAfterFailures(1, project.Any())),
                )
                _, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, "validate-model", FixCalls()[0].model)
            }
        - name: TestValidateFallsBackToMainModel
          description: verifies that when withModel sets a fallback model, FixProject receives it
          module: internal/validate
          body: |
            func TestValidateFallsBackToMainModel(t *testing.T) {
                project.ResetLoadAttempts()
                ResetFixCalls()
                svc := withMocks(
                    withModel("main-model"),
                    withProject(thatLoadsAfterFailures(1, project.Any())),
                )
                _, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, "main-model", FixCalls()[0].model)
            }
      passing: false
    - slug: validate-adapter-model
      description: Update agentClient and New() to forward and resolve the model
      items:
        - Update agentClient.FixProject to accept model string and pass it to ai.RunAgent (add a RunAgentWithModel variant or update RunAgent to accept an explicit model parameter)
        - Update validate.New() to resolve the model using two-level precedence — validate.model from the ralph config takes priority, falling back to the top-level model field
      passing: false
    - slug: validate-test-helpers
      description: Update test infrastructure in validate_test.go to carry model through fix call records
      items:
        - Add a model string field to the agentFixCalls record struct
        - Update RecordFixCall and FixCalls to track and return the model
        - Update mockAgentClient.fixFunc signature to include model string
        - Add withModel(model string) option helper that sets the model field on the Validator
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
