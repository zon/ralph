slug: replace-logger-with-output
title: replace logger package with output.Client across the codebase
maxIterations: 15
requirements:
    - slug: output-success-methods
      description: Add Success and Successf methods to output.Client
      items:
        - Add `successColor = color.New(color.FgGreen)` to the var block in internal/output/client.go alongside the existing warnColor and errorColor
        - Add `func (c *Client) Success(msg string)` that writes `"✓ " + msg` to c.out using successColor, matching the logger.Success behaviour
        - Add `func (c *Client) Successf(format string, a ...any)` that writes `"✓ " + format` to c.out using successColor
        - Both methods always write unconditionally (not gated on c.debugging)
      passing: true
    - slug: context-output-field
      description: Add an output.Client field to context.Context and wire it at every cmd entry point
      items:
        - Add `out *output.Client` field to the Context struct in internal/context/context.go
        - Add `Output() *output.Client` getter that returns c.out
        - Add `SetOutput(out *output.Client)` setter
        - In each of the following Run() methods in internal/cmd/, after ctx.SetVerbose() is called, add `ctx.SetOutput(output.NewClient(os.Stdout, os.Stderr, <VerboseField>))` — the relevant files are run.go, command.go, comment.go, workflow.go, validate.go, and merge.go (already passes verbose via MergeFlags, so wire after ctx is built)
        - In cmd/ralph-webhook/main.go CLI.Run(), create `out := output.NewClient(os.Stdout, os.Stderr, c.Verbose)` immediately after setting verbose; use it to replace the two logger calls in that file
        - Do not set output.Client in NewContextFromEnv — that function does not know the writer
      passing: true
    - slug: add-output-to-structs
      description: Add out *output.Client to structs that do not receive a context.Context
      items:
        - Add `out *output.Client` field to webhook.Server in internal/webhook/server.go; update NewServer to accept `out *output.Client` as its second argument and store it
        - Add `out *output.Client` field to services.Manager in internal/services/services.go; update NewManager to accept `out *output.Client` and store it; also add `out *output.Client` as the first parameter of RunBefore (free function) so both the Manager methods and RunBefore have access
        - Add `out *output.Client` field to cleanup.Manager in internal/cleanup/cleanup.go; update NewManager to accept `out *output.Client` and store it
        - Add `out *output.Client` field to merge.MergeCmd in internal/orchestration/merge/cmd.go; update NewMergeCmd to accept `out *output.Client` as its last argument
        - Add `out *output.Client` field to comment.CommentCmd in internal/orchestration/comment/cmd.go; update NewCommentCmd to accept `out *output.Client` as its last argument
        - Update internal/cmd/cmd_adapters.go callers of NewMergeCmd and NewCommentCmd to pass `output.NewClient(os.Stdout, os.Stderr, false)` as the out argument (verbose is resolved later from flags)
        - Update internal/cmd/merge.go and internal/cmd/comment.go so that after the cmd is constructed they call a new method (e.g. cmd.SetOutput) — OR update NewMergeCmd/NewCommentCmd to accept flags directly, using flags.Verbose — whichever is simpler given the existing shape
        - Update cmd/ralph/main.go to pass `output.NewClient(os.Stdout, os.Stderr, false)` to cleanup.NewManager
        - Update cmd/ralph-webhook/main.go to pass the out client created in the CLI.Run() method to webhook.NewServer
        - Update every call site that creates a services.Manager or calls services.RunBefore to pass the output.Client from ctx.Output() or the appropriate out field
      passing: true
    - slug: replace-logger-in-cmd
      description: Replace all logger package calls in internal/cmd/*.go
      items:
        - In every file under internal/cmd/ that imports logger, replace all logger.Verbose/Verbosef calls with ctx.Output().Debug/Debugf
        - Replace logger.Info/Infof with ctx.Output().Info/Infof
        - Replace logger.Success/Successf with ctx.Output().Success/Successf
        - Replace logger.Warning/Warningf with ctx.Output().Warn/Warnf
        - Replace logger.Error/Errorf with ctx.Output().Error/Errorf
        - Remove all logger imports from internal/cmd/*.go
        - In internal/cmd/execute_test.go, replace `logger.SetVerbose(true)` with creating a debug output client and setting it on the context via ctx.SetOutput(output.NewClient(os.Stdout, os.Stderr, true)); remove the logger import
      passing: true
    - slug: replace-logger-in-orchestration
      description: Replace all logger package calls in orchestration modules
      items:
        - In internal/project/project.go, replace all logger.Verbose/Verbosef with ctx.Output().Debug/Debugf, logger.Info/Infof with ctx.Output().Info/Infof, logger.Success/Successf with ctx.Output().Success/Successf, logger.Warning/Warningf with ctx.Output().Warn/Warnf; remove the logger.SetVerbose(true) call (verbose is already baked into the output.Client at construction); remove the logger import
        - In internal/services/services.go, replace all logger calls with the stored out field (m.out for Manager methods, the out parameter for RunBefore); replace Verbose/Verbosef with Debug/Debugf, map Warning/Warningf to Warn/Warnf, Success/Successf to Success/Successf, Info/Infof to Info/Infof; remove the logger import
        - In internal/webhook/server.go, replace all logger.Verbose/Verbosef calls with s.out.Debug/Debugf; remove the logger import
        - In internal/workspace/workspace.go, add `out *output.Client` as the first parameter to SetupOpenCodeCredentials and PrepareWorkspace (Chdir has no logger calls so needs no change); replace logger.Info/Infof with out.Info/Infof; update callers in internal/cmd/workflow.go to pass ctx.Output()
        - In internal/provisioning/webhook.go, add `out *output.Client` as a parameter to BuildWebhookAppConfig; replace logger.Warningf with out.Warnf; update the caller in internal/cmd/config_webhook.go to pass ctx.Output()
        - Remove logger imports from all modified files
      passing: true
    - slug: replace-logger-in-orchestration-cmds
      description: Replace all logger package calls in orchestration/merge and orchestration/comment
      items:
        - In internal/orchestration/merge/cmd.go, replace all logger.Verbose/Verbosef with m.out.Debug/Debugf, logger.Success/Successf with m.out.Success/Successf, logger.Info/Infof with m.out.Info/Infof; remove the logger.SetVerbose(true) call (out.debugging is already set from flags.Verbose at construction); remove the logger import
        - In internal/orchestration/comment/cmd.go, replace all logger.Verbose/Verbosef with c.out.Debug/Debugf; remove the logger.SetVerbose(true) call; remove the logger import
      passing: true
    - slug: replace-logger-in-implementation
      description: Replace all logger package calls in implementation modules
      items:
        - In internal/git/branch.go, replace all logger.Verbosef calls with ctx.Output().Debugf (these functions already receive *context.Context); remove the logger import
        - In internal/git/remote.go, add `out *output.Client` as the first parameter to FetchBranch; replace logger.Infof with out.Infof; update the caller in internal/git/branch.go SwitchToProjectBranch to pass ctx.Output(); remove the logger import
        - In internal/github/client.go, replace logger.Verbose with a.ctx.Output().Debug and logger.Info with a.ctx.Output().Info; remove the logger import
        - In internal/github/github.go, add `out *output.Client` as the first parameter to both updateExistingPR and parsePRURL; replace logger.Verbosef with out.Debugf; update callers in internal/github/gh.go (GH struct) by adding `out *output.Client` field to GH, a `NewGH(out *output.Client) *GH` constructor, and threading g.out into the two helper calls; remove the logger import from both files
        - In internal/github/pr.go, add `out *output.Client` as the first parameter to CreatePullRequest; replace logger.Verbose with out.Debug; update the caller in internal/github/client.go to pass a.ctx.Output(); remove the logger import
        - Everywhere GH{} is instantiated as a struct literal, replace it with NewGH(out) where out is the appropriate output.Client available at that call site
        - In internal/ai/ai.go, replace all logger.Verbose calls with ctx.Output().Debug (these functions already receive *execcontext.Context); remove the logger import
        - In internal/cleanup/cleanup.go, replace logger.Info/Infof with m.out.Info/Infof in the handleSignal method; remove the logger import
        - In internal/notify/notify.go, add `out *output.Client` as the first parameter to both Success and Error; replace logger.Warningf with out.Warnf; update callers in internal/cmd/execute.go to pass ctx.Output() as the first argument; remove the logger import from notify.go
      passing: true
    - slug: remove-logger-package
      description: Delete the internal/logger package and remove it from specs/architecture.yaml
      items:
        - Verify that no file in the repository imports `"github.com/zon/ralph/internal/logger"` by running `grep -r '"github.com/zon/ralph/internal/logger"' --include='*.go' .` and confirming no output
        - Delete internal/logger/logger.go
        - Delete any other files in internal/logger/ (e.g. logger_test.go if present)
        - Remove the `internal/logger` module entry from specs/architecture.yaml
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: true
