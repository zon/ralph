slug: workflowrun-merge-conflict-ai-resolution
title: Wire AI merge-conflict resolution into workflow run and warn on fetch failure
feature: specs/features/ralph/workflow-run
maxIterations: 10
requirements:
    - slug: build-resolve-merge-conflicts-prompt
      description: internal/ai gains a prompt builder for AI-driven merge conflict resolution, following the existing BuildChangelogPrompt/BuildPRSummaryPrompt template pattern (embedded instructions file + executeTemplate)
      items:
        - 'Add a new embedded instructions file (e.g. internal/ai/resolve-merge-conflicts-instructions.md) containing the merge-conflict-resolution guidance currently dead-stored as a format string in internal/orchestration/workflowrun/workflow.go (steps: run ''git merge <baseBranch>'' to see conflicts, examine and resolve each conflicting file, run tests to ensure the merged code is correct, stage resolved files with ''git add <resolved-files>'' so the system can commit automatically, and a note to focus on accepting the correct changes from both branches and fixing any test failures after resolving)'
        - Add a corresponding *PromptData struct (e.g. ResolveMergeConflictsPromptData with BaseBranch and ProjectBranch fields) alongside the other *PromptData structs in internal/ai/ai.go
        - Add a function in internal/ai/ai.go, e.g. func BuildResolveMergeConflictsPrompt(baseBranch, projectBranch string) (string, error), that populates ResolveMergeConflictsPromptData and renders it via executeTemplate against the new embedded instructions file
      code:
        - name: BuildResolveMergeConflictsPrompt
          description: Renders the AI merge-conflict-resolution prompt for the given base and project branches using the embedded instructions template
          module: internal/ai
          body: |-
            func BuildResolveMergeConflictsPrompt(baseBranch, projectBranch string) (string, error) {
            	data := ResolveMergeConflictsPromptData{
            		BaseBranch:    baseBranch,
            		ProjectBranch: projectBranch,
            	}
            	return executeTemplate(resolveMergeConflictsInstructions, data)
            }
      tests:
        - name: TestBuildResolveMergeConflictsPrompt
          description: Verifies BuildResolveMergeConflictsPrompt renders a non-empty prompt containing the base branch and project branch names and the merge/test/stage instructions
          module: internal/ai
          body: |-
            func TestBuildResolveMergeConflictsPrompt(t *testing.T) {
            	prompt, err := BuildResolveMergeConflictsPrompt("main", "feature-branch")
            	require.NoError(t, err)
            	assert.Contains(t, prompt, "main")
            	assert.Contains(t, prompt, "feature-branch")
            	assert.Contains(t, prompt, "git merge main")
            }
      passing: true
    - slug: ai-client-resolves-conflicts-via-agent
      description: internal/orchestration/workflowrun.AIClient.ResolveMergeConflicts is implemented by an adapter that renders the AI prompt and runs the agent, instead of the dead orchestration-level free function
      items:
        - Remove the free function ResolveMergeConflicts and the dead `_ = fmt.Sprintf(...)` prompt construction, the unused `fmt` import, and the now-unused ConfigClient/ProjectClient/RunnerClient parameters of that function from internal/orchestration/workflowrun/workflow.go — the orchestration module must contain only interfaces and coordination, no string construction or format literals
        - Update aiAdapter.ResolveMergeConflicts in internal/cmd/workflow_run_adapters.go to call internal/ai.BuildResolveMergeConflictsPrompt(baseBranch, projectBranch) to render the prompt, then run the AI agent with that prompt via internal/ai.RunAgent (or RunAgentWithModel) using the opencode client, mirroring how workflowCommentAIClient.RunAgent in internal/cmd/workflow_comment.go calls ai.RunAgent(c.ctx, opencode.New(), prompt)
        - Ensure aiAdapter.ResolveMergeConflicts returns any error from prompt rendering or agent execution
        - internal/orchestration/workflowrun.AIClient interface signature (ResolveMergeConflicts(baseBranch, projectBranch string) error) stays the same — only its real implementation changes
      scenarios:
        - title: Merge conflicts resolved by AI
          items:
            - GIVEN a merge attempt produces conflicts
            - WHEN the merge fails
            - THEN the merge is aborted
            - AND an AI agent is invoked with instructions to resolve all conflicts, run tests, and stage the resolved files
            - AND execution continues after resolution
      passing: true
    - slug: log-warning-on-base-branch-fetch-failure
      description: syncBaseBranch logs a warning and continues when the base branch cannot be fetched, per the workflow-run spec's Base Branch Synchronization requirement
      items:
        - Add an Output dependency interface to internal/orchestration/workflowrun/workflow.go, e.g. type OutputClient interface { Warnf(format string, a ...any) }, and add an `output OutputClient` field to WorkflowRunCmd, set via the constructor NewWorkflowRunCmd
        - In syncBaseBranch, when w.git.FetchBranch(baseBranch) returns an error, call w.output.Warnf with a message describing the fetch failure and the base branch name, then continue (return nil) without attempting a merge, instead of silently swallowing the error
        - 'Wire the real adapter: in internal/cmd/workflow_run_adapters.go, pass an adapter backed by ctx.Output() (the *output.Client returned by execcontext.Context.Output()) as the OutputClient when constructing WorkflowRunCmd in newOrchestrationWorkflowRunCmd'
      scenarios:
        - title: Base branch fetch failure
          items:
            - GIVEN the base branch cannot be fetched (e.g., network error)
            - WHEN synchronization runs
            - THEN a warning is logged and execution continues without merging
      passing: true
    - slug: workflowrun-tests-cover-ai-resolution-and-warning
      description: Unit tests for internal/orchestration/workflowrun cover AI-driven conflict resolution invocation and the fetch-failure warning
      items:
        - In internal/orchestration/workflowrun/mock_test.go, add a mockOutputClient implementing OutputClient with a warnfFunc/warnfCalled pattern consistent with the other mocks in this file, and wire it into runHelper.withMocks/withOutput following the existing withX option pattern
        - Update TestSyncBaseBranchFetchFailureContinues in internal/orchestration/workflowrun/workflow_test.go to assert that the output mock's Warnf was called when git.FetchBranch fails, in addition to the existing assertion that runner.runLocalCalled() is true
        - Update TestSyncBaseBranchConflictsAbortAndInvokeAI in internal/orchestration/workflowrun/workflow_test.go (or add a new test) to assert ai.conflictsResolved() remains true after the AIClient.ResolveMergeConflicts signature/behavior change — the orchestration-level test continues to verify only that the interface method is called with the correct baseBranch and projectBranch arguments, not the prompt content (prompt rendering is now an internal/ai concern covered by its own test)
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to internal/version/VERSION and to charts/ralph-webhook/Chart.yaml (appVersion and a patch bump of version), per docs/code.md versioning rules
      passing: false
