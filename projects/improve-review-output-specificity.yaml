name: improve-review-output-specificity
description: Make ralph review produce implementation-specific requirements and detect cross-component patterns

requirements:
  - category: component-review-prompt
    description: Direct the review agent to write specific, actionable requirements
    items:
      - Update component-review-instructions.md to instruct the AI to read the actual source files in the component before writing requirements
      - Require the review agent to name exact files, functions, and interfaces in each requirement item rather than describing behavior generically
      - Add an example in the prompt showing the expected output style (e.g., "Add exported function Foo() to internal/bar/baz.go" vs "Consolidate bar operations")
    passing: true
  - category: project-doc
    description: Clarify specificity expectations for refactoring projects
    items:
      - Update docs/projects.md to distinguish feature requirements (behavioral/interface-level) from refactoring requirements (implementation-specific)
      - Move the current "Bad" examples to a note that they apply to feature work; add refactoring-appropriate "Good" examples with exact function names and file paths
    passing: true
  - category: cross-component-synthesis
    description: Detect refactoring themes that span multiple components
    items:
      - After all per-component reviews complete, run a synthesis agent that reads all project files written in this review run
      - The synthesis agent identifies requirements that share a common refactoring theme (e.g., "remove inline exec", "consolidate URL parsing") and consolidates them into a single cross-component project
      - If the synthesis agent consolidates findings into a new project, it deletes the per-component project files that were merged
    passing: true
  - category: version
    description: Apply version bump
    items:
      - Apply a semver minor bump to internal/version/VERSION and appVersion in charts/ralph-webhook/Chart.yaml (resetting patch to 0)
      - Apply a semver patch bump to version in charts/ralph-webhook/Chart.yaml
    passing: true
