slug: cli-command-tests
title: Add CLI command structure tests for all ralph and ralph-webhook subcommands
maxIterations: 10
requirements:
    - slug: ralph-top-level-commands
      description: Verify ralph top-level commands exist with expected structure
      items:
        - The 'ralph run' command exists and displays help text about executing ralph with a project file
        - The 'ralph command' command exists and displays help text about running a command in the ralph environment
        - The 'ralph merge' command exists and displays help text about submitting an Argo workflow to merge a completed PR
        - The 'ralph validate' command exists and displays help text about validating a project YAML file
        - The 'ralph list' command exists and displays help text about listing Argo workflows
        - The 'ralph stop' command exists and displays help text about stopping an Argo workflow
        - The 'ralph pass' command exists and displays help text about marking a project requirement as passing or failing
      passing: true
    - slug: ralph-set-commands
      description: Verify ralph set subcommands exist with expected structure
      items:
        - The 'ralph set skills' command exists and displays help text about managing ralph skill installation
        - The 'ralph set config' command exists and displays help text about configuring credentials for remote execution
      passing: true
    - slug: ralph-workflow-commands
      description: Verify ralph workflow subcommands exist with expected structure
      items:
        - The 'ralph workflow run' command exists and displays help text about running a project via the workflow engine
        - The 'ralph workflow comment' command exists and displays help text about running a comment-triggered workflow iteration
        - The 'ralph workflow merge' command exists and displays help text about merging a completed PR via workflow
        - The 'ralph workflow command' command exists and displays help text about running an arbitrary command via workflow
        - The 'ralph workflow token' command exists and displays help text about generating a GitHub App installation token
      passing: true
    - slug: ralph-webhook-commands
      description: Verify ralph-webhook commands exist with expected structure
      items:
        - The 'ralph-webhook serve' command exists and displays help text about starting the webhook server
        - The 'ralph-webhook set config' command exists and displays help text about setting webhook configuration and secrets
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to internal/version/VERSION
        - Apply a semver patch bump to charts/ralph-webhook/Chart.yaml appVersion field
        - Apply a semver patch bump to charts/ralph-webhook/Chart.yaml version field
      passing: true
