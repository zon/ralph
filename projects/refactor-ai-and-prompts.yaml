name: refactor-ai-and-prompts
description: Consolidate opencode interactions into internal/ai and make internal/prompt a pure rendering module

requirements:
  - category: ai-integration
    description: Merge internal/opencode into internal/ai
    items:
      - Delete the internal/opencode package
      - Move RunCommand logic into internal/ai, using it as the base for RunAgent and other exec calls
      - Remove duplicated exec.Command("opencode", ...) calls within internal/ai in favour of the consolidated helper
      - Update any callers that imported internal/opencode directly
    passing: false
  - category: ai-integration
    description: Consolidate all opencode CLI interactions through internal/ai
    items:
      - Add a public DisplayStats function to internal/ai that runs opencode stats
      - Remove direct exec.Command("opencode", ...) calls from internal/cmd/workflow.go and internal/cmd/review.go
      - Update callers to use ai.DisplayStats
    passing: false
  - category: prompt-management
    description: Make internal/prompt a pure rendering implementation module
    items:
      - Prompt building functions accept fully-resolved data structs and return rendered strings
      - Remove config loading, git calls, and branch resolution from internal/prompt — callers are responsible for gathering this data
      - Extract template parsing and execution into a private helper function shared by all builders
      - Remove logging from prompt building functions
      - All prompt building functions return errors rather than logging warnings on failure
    passing: false
