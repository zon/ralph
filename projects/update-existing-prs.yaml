name: update-existing-prs
description: Check for existing PRs before creating new ones

requirements:
  - category: backend
    description: PR creation checks for existing PRs
    items:
      - When creating a PR, ralph first checks if an open PR already exists for the project branch
      - If an existing PR is found, ralph updates its title and body instead of creating a new one
      - The existing PR's base branch is preserved regardless of what base branch ralph would use for a new PR
      - If no existing PR is found, ralph creates a new PR as usual
    passing: false

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: false
