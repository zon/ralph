name: flatten-nested-functions
description: Flatten deeply nested functions by extracting inner logic into helpers

requirements:
  - category: git
    description: git/git.go nested functions are flattened
    items:
      - generateCommitMessage in internal/git/git.go has no more than 2 levels of nesting
      - categorizeFiles in internal/git/git.go has no more than 2 levels of nesting
      - Per-file categorization logic lives in a helper like categorizeFile
    passing: true

  - category: workflow
    description: workflow/scripts.go nested and duplicated functions are flattened
    items:
      - buildVolumeMounts in internal/workflow/scripts.go has no more than 2 levels of nesting
      - buildVolumes in internal/workflow/scripts.go has no more than 2 levels of nesting
      - The duplicated ConfigMap/Secret loop logic in both functions is shared via a common helper
    passing: true

  - category: version
    description: Version patch bump
    items:
      - internal/version/VERSION is incremented by one patch version
      - charts/ralph-webhook/Chart.yaml appVersion matches the new VERSION value
      - charts/ralph-webhook/Chart.yaml version is incremented by one patch version
    passing: true
