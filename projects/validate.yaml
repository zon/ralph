slug: validate
title: Implement validate orchestration with bounded fix loop and no-change detection
feature: specs/features/ralph/validate
maxIterations: 10
requirements:
    - slug: validate-orchestration
      description: Implement the Validator struct, interfaces, and fix loop that detects when the agent makes no change
      items:
        - Define MaxAttempts = 10 constant, and ErrNoChange and ErrUnreachable sentinel errors
        - Define ProjectClient interface with Load, Save, and ReadFile methods
        - Define AgentClient interface with FixProject method
      code:
        - name: Validator
          description: orchestration struct that holds project and agent clients with a resolved model string
          module: internal/validate
          body: |
            type Validator struct {
                project ProjectClient
                agent   AgentClient
                model   string
            }
        - name: Validate
          description: fix loop that loads the project and retries after agent repair, halting on no-change or max attempts
          module: internal/validate
          body: |
            func (v *Validator) Validate(path string) (*project.Project, error) {
                for attempt := 1; attempt <= MaxAttempts; attempt++ {
                    proj, loadErr := v.project.Load(path)
                    if loadErr == nil {
                        return proj, v.project.Save(path, proj)
                    }
                    if attempt == MaxAttempts {
                        return nil, loadErr
                    }
                    before := v.project.ReadFile(path)
                    v.agent.FixProject(path, loadErr, v.model)
                    after := v.project.ReadFile(path)
                    if bytes.Equal(before, after) {
                        return nil, ErrNoChange
                    }
                }
                return nil, ErrUnreachable
            }
      tests:
        - name: TestValidateSucceedsOnFirstLoad
          description: verifies validate saves and returns the project when the first load succeeds
          module: internal/validate
          body: |
            func TestValidateSucceedsOnFirstLoad(t *testing.T) {
                proj := project.Any()
                svc := withMocks(
                    withProject(thatLoads(proj)),
                )
                result, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, proj, result)
                require.Equal(t, proj, project.LastSaved())
                require.Empty(t, FixCalls())
            }
        - name: TestValidateRepairsThenSucceeds
          description: verifies validate invokes the agent once and returns the project when load succeeds after one repair
          module: internal/validate
          body: |
            func TestValidateRepairsThenSucceeds(t *testing.T) {
                proj := project.Any()
                svc := withMocks(
                    withProject(thatLoadsAfterFailures(1, proj)),
                )
                result, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, proj, result)
                require.Len(t, FixCalls(), 1)
            }
        - name: TestValidateGivesUpAfterMaxAttempts
          description: verifies validate returns an error after MaxAttempts-1 agent fix attempts all fail
          module: internal/validate
          body: |
            func TestValidateGivesUpAfterMaxAttempts(t *testing.T) {
                svc := withMocks(
                    withProject(thatAlwaysFailsToLoad()),
                )
                _, err := svc.Validate(project.AnyPath())
                require.Error(t, err)
                require.Len(t, FixCalls(), MaxAttempts-1)
            }
        - name: TestValidateFailsFastWhenAgentMakesNoChange
          description: verifies validate returns ErrNoChange after the first agent fix attempt that leaves the file unchanged
          module: internal/validate
          body: |
            func TestValidateFailsFastWhenAgentMakesNoChange(t *testing.T) {
                svc := withMocks(
                    withProject(thatAlwaysFailsToLoadWithUnchangedFile()),
                )
                _, err := svc.Validate(project.AnyPath())
                require.ErrorIs(t, err, ErrNoChange)
                require.Len(t, FixCalls(), 1)
            }
        - name: TestValidatePropagatesAgentFailure
          description: verifies validate returns an error when the agent fix call fails
          module: internal/validate
          body: |
            func TestValidatePropagatesAgentFailure(t *testing.T) {
                svc := withMocks(
                    withProject(thatAlwaysFailsToLoad()),
                    withAgent(thatFailsToFix()),
                )
                _, err := svc.Validate(project.AnyPath())
                require.Error(t, err)
            }
        - name: TestValidatePropagatesSaveFailure
          description: verifies validate returns an error when save fails after a successful load
          module: internal/validate
          body: |
            func TestValidatePropagatesSaveFailure(t *testing.T) {
                svc := withMocks(
                    withProject(thatLoadsButFailsToSave(project.Any())),
                )
                _, err := svc.Validate(project.AnyPath())
                require.Error(t, err)
            }
        - name: TestValidateUsesValidateSpecificModel
          description: verifies validate passes the validate-specific model to the agent when it is configured
          module: internal/validate
          body: |
            func TestValidateUsesValidateSpecificModel(t *testing.T) {
                svc := withMocks(
                    withModel("validate-model"),
                    withProject(thatLoadsAfterFailures(1, project.Any())),
                )
                _, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, "validate-model", FixCalls()[0].model)
            }
        - name: TestValidateFallsBackToMainModel
          description: verifies validate passes the main model to the agent when no validate-specific model is configured
          module: internal/validate
          body: |
            func TestValidateFallsBackToMainModel(t *testing.T) {
                svc := withMocks(
                    withModel("main-model"),
                    withProject(thatLoadsAfterFailures(1, project.Any())),
                )
                _, err := svc.Validate(project.AnyPath())
                require.NoError(t, err)
                require.Equal(t, "main-model", FixCalls()[0].model)
            }
      passing: true
    - slug: validate-test-helpers
      description: Mock infrastructure and factory helpers for the validate orchestration tests
      items:
        - Implement withMocks(opts...) to construct a Validator with default mock implementations; accepts option helpers to override specific dependencies
        - Implement withProject(client), withAgent(client), and withModel(model) option helpers that set fields on the mocks struct
        - Implement thatLoads(proj) returning a project client whose Load returns proj and whose Save records the saved value via project.SetLastSaved
        - Implement thatLoadsAfterFailures(n, proj) returning a project client whose Load fails n times then returns proj
        - Implement thatAlwaysFailsToLoad() returning a project client whose Load always returns an error
        - Implement thatAlwaysFailsToLoadWithUnchangedFile() returning a project client whose Load always fails and whose ReadFile always returns the same bytes, simulating an agent that makes no change
        - Implement thatLoadsButFailsToSave(proj) returning a project client whose Load returns proj and whose Save returns an error
        - Implement thatFailsToFix() returning an agent client whose FixProject returns an error
        - Implement FixCalls() to return all (path, loadErr, model) records captured from FixProject calls during the test run
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver minor bump to the app version
      passing: true
