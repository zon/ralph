name: speed-up-container-build
description: Speed up the container build workflow by using standard Docker actions with layer caching

requirements:
  - category: ci
    description: The container build workflow uses standard Docker actions with registry-based layer caching
    items:
      - The workflow uses docker/setup-buildx-action to set up BuildKit
      - The workflow uses docker/login-action to authenticate to ghcr.io
      - The workflow uses docker/build-push-action to build and push the image
      - The build uses cache-from and cache-to with a registry cache manifest stored at ghcr.io/<repository>:buildcache
      - The image is tagged with `latest` and the app version read from `internal/version/VERSION` (e.g. `3.2.0`), not the short commit SHA
      - The workflow still triggers on push to main
      - The workflow still uses GITHUB_TOKEN for authentication (no external secrets)
      - The workflow still declares packages write permission
      - The podman login and podman build/push steps are removed
      - The short commit SHA tag is removed
    passing: false
