slug: consolidate-github-cli-calls
title: Consolidate gh CLI calls from provisioning into internal/github
maxIterations: 10
requirements:
    - slug: list-collaborators
      description: Add ListCollaborators to internal/github as a package-level function
      items:
        - Add `func ListCollaborators(ctx context.Context, owner, repo string) ([]string, error)` to `internal/github`
        - Shell out to `gh api repos/{owner}/{repo}/collaborators --jq ".[].login"` using `exec.CommandContext`
        - Split stdout on newlines, trim whitespace, and return the non-empty login strings
        - Return a wrapped error on non-zero exit that includes owner, repo, and stderr
        - Write a test that stubs the gh binary and verifies the returned logins
      passing: true
    - slug: register-webhook
      description: Add RegisterWebhook to internal/github as a package-level function
      items:
        - Add `func RegisterWebhook(ctx context.Context, owner, repo, webhookURL, secret string) error` to `internal/github`
        - List existing hooks with `gh api repos/{owner}/{repo}/hooks --jq` filtering by webhookURL to find an existing hook ID
        - If a hook ID is found, update it with `gh api repos/{owner}/{repo}/hooks/{id} --method PATCH --input -`
        - If no hook ID is found, create one with `gh api repos/{owner}/{repo}/hooks --method POST --input -`
        - 'The webhook payload must include `name: web`, `active: true`, events `push pull_request pull_request_review issue_comment`, and config fields `url`, `content_type: json`, and `secret`'
        - Pass the JSON payload via stdin using `cmd.Stdin`
        - Return a wrapped error on non-zero exit for each operation that includes owner, repo, and stderr
        - Write a test that stubs the gh binary and verifies create and update paths
      passing: true
    - slug: use-github-module-in-provisioning
      description: Replace direct gh CLI calls in internal/provisioning/webhook.go with internal/github functions
      items:
        - In `FetchRepoCollaborators`, replace the `exec.CommandContext` block with a call to `github.ListCollaborators`
        - In `RegisterGitHubWebhook`, replace all three `exec.CommandContext` blocks (list, update, create) with a call to `github.RegisterWebhook`
        - Remove the `os/exec` import from `internal/provisioning/webhook.go` if it is no longer used after the replacement
        - All existing tests for `FetchRepoCollaborators` and `RegisterGitHubWebhook` in `internal/provisioning` must continue to pass
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: true
