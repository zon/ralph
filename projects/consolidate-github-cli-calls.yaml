slug: consolidate-github-cli-calls
title: Consolidate gh CLI calls from provisioning into internal/github
maxIterations: 10
requirements:
    - slug: list-collaborators
      description: Add ListCollaborators to the GHClient interface with a real GH method implementation and MockGH support
      items:
        - Add `ListCollaborators(ctx context.Context, owner, repo string) ([]string, error)` to the `GHClient` interface in `internal/github/gh.go`
        - Implement `ListCollaborators` as a method on `*GH` in `internal/github/collaborators.go`, shelling out to `gh api repos/{owner}/{repo}/collaborators --jq ".[].login"` using `exec.CommandContext`
        - Split stdout on newlines, trim whitespace, and return the non-empty login strings
        - Return a wrapped error on non-zero exit that includes owner, repo, and stderr
        - Add `ListCollaboratorsFn func(ctx context.Context, owner, repo string) ([]string, error)` to `MockGH` in `internal/github/client_mock.go` and implement the `ListCollaborators` method using the same nil-safe function-field pattern as the existing mock methods
        - Remove any package-level `ListCollaborators` function; remove stub-binary tests and replace them with mock-based tests in `collaborators_test.go` using `MockGH`
      passing: true
    - slug: register-webhook
      description: Add RegisterWebhook to the GHClient interface with a real GH method implementation and MockGH support
      items:
        - Add `RegisterWebhook(ctx context.Context, owner, repo, webhookURL, secret string) error` to the `GHClient` interface in `internal/github/gh.go`
        - Implement `RegisterWebhook` as a method on `*GH` in `internal/github/webhook.go`
        - List existing hooks with `gh api repos/{owner}/{repo}/hooks --jq` filtering by webhookURL to find an existing hook ID
        - If a hook ID is found, update it with `gh api repos/{owner}/{repo}/hooks/{id} --method PATCH --input -`
        - If no hook ID is found, create one with `gh api repos/{owner}/{repo}/hooks --method POST --input -`
        - 'The webhook payload must include `name: web`, `active: true`, events `push pull_request pull_request_review issue_comment`, and config fields `url`, `content_type: json`, and `secret`'
        - Pass the JSON payload via stdin using `cmd.Stdin`
        - Return a wrapped error on non-zero exit for each operation that includes owner, repo, and stderr
        - Add `RegisterWebhookFn func(ctx context.Context, owner, repo, webhookURL, secret string) error` to `MockGH` in `internal/github/client_mock.go` and implement the `RegisterWebhook` method using the same nil-safe function-field pattern
        - Remove any package-level `RegisterWebhook` function; remove stub-binary tests and replace them with mock-based tests in `webhook_test.go` using `MockGH`
      passing: true
    - slug: use-github-module-in-provisioning
      description: Wire GHClient into provisioning functions and replace function-based collaborator fetching with interface-based calls
      items:
        - Change `FetchRepoCollaborators` in `internal/provisioning/webhook.go` to accept `github.GHClient` as its second parameter (after `ctx`) and call `gh.ListCollaborators(ctx, owner, repo)` on it; remove the function from the codebase if it is only a thin wrapper with no callers remaining after updating `BuildWebhookAppConfig`
        - Change `RegisterGitHubWebhook` in `internal/provisioning/webhook.go` to accept `github.GHClient` as its second parameter (after `ctx`) and call `gh.RegisterWebhook(ctx, owner, repo, webhookURL, secret)` on it
        - Change `BuildWebhookAppConfig` in `internal/provisioning/webhook.go` to accept `github.GHClient` in place of the `fetcher` function parameter, and derive the fetcher internally via `gh.ListCollaborators`
        - Update provisioning tests in `internal/provisioning/webhook_test.go` to replace the `noopFetcher` function and all function-literal fetcher test cases with a `*github.MockGH`; add tests for `RegisterGitHubWebhook` that verify the mock is called correctly
        - In `internal/cmd/config_webhook.go`, create `gh := &github.GH{}` and pass it to `BuildWebhookAppConfig` and `RegisterGitHubWebhook`
        - All existing tests must continue to pass
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
