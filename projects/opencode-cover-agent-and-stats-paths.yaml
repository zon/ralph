slug: opencode-cover-agent-and-stats-paths
title: Add missing test coverage and fix formatting in internal/opencode
maxIterations: 10
requirements:
    - slug: add-real-cli-dependency-test
      description: |
        Add the documented "dependency unit test" round-trip for the real opencode CLI, per the testing guidance that is specific to this module.
      items:
        - |
          internal/opencode/opencode_test.go gains exactly one new test (e.g. TestRunAgent_RealOpenCode or TestRunCommand_RealOpenCode) that constructs a *Client via New() and calls RunAgent or RunCommand against the real "opencode" binary on PATH — not a fake script — using the model "deepseek v4 flash" and the prompt "say hi", asserting only that the call completes without error. This follows docs/testing.md's "Dependency unit tests" guidance verbatim: "For opencode, hard-code an inexpensive model such as `deepseek v4 flash` and use a trivial prompt like `\"say hi\"`."
        - |
          The test stays to a single case — per docs/testing.md, "These tests must not accumulate: one or two cases per real dependency are enough" — and verifies only the lowest-level round-trip (the command runs and returns without error), not full workflow behavior.
        - |
          The test requires no PATH manipulation, fake binaries, or skip/availability gating — there is no existing precedent in the repository for conditionally skipping real-CLI dependency tests (internal/git's real-git tests, e.g. internal/git/branch_test.go, invoke the real git binary unconditionally), so this test follows the same assumption that the real binary is present in the test environment.
        - |
          The test uses testify require for its assertion and is named and structured consistently with the other tests in internal/opencode/opencode_test.go.
      passing: false
    - slug: test-is-fatal-error
      description: |
        Add table-driven coverage for the exported IsFatalError function, which checks an error's message against a fixed set of fatal-pattern substrings.
      items:
        - |
          internal/opencode/opencode_test.go gains TestIsFatalError, a table-driven test using t.Run() subtests, covering: a nil error (expect false); an error whose message contains each of the six patterns defined in fatalOpenCodePatterns — "Insufficient Balance", "insufficient balance", "billing", "account", "payment required", "quota exceeded" — each expected to return true; and an error whose message matches none of the patterns (expect false).
        - |
          The test uses testify assert for its boolean assertions and follows the table-driven structure already used by TestStatsParsingKMValues and TestCaptureWriterTail in the same file.
      passing: false
    - slug: test-run-agent
      description: |
        Add coverage for RunAgent's distinguishing behavior — wrapping stdout/stderr with a ringWriter tail buffer and formatting failures with the captured tail — using the same fake-binary substitution technique as the existing TestRunCommand tests.
      items:
        - |
          internal/opencode/opencode_test.go gains TestRunAgent, mirroring TestRunCommand's setup (write a fake "opencode" shell script to t.TempDir(), symlink it, prepend the directory to PATH via t.Setenv): the fake script echoes a known line to stdout and exits 0; the test asserts client.RunAgent returns nil and that the expected output appears (e.g. by also writing the script's output to a file the test can inspect, or asserting indirectly through the absence of an error and a reproducible script side-effect — choose whichever approach keeps the test focused on RunAgent's own contract rather than re-testing execOpenCode).
        - |
          internal/opencode/opencode_test.go gains TestRunAgentFailure, using the same fake-binary technique: the fake script prints more than 10 distinct lines to stdout and/or stderr and then exits non-zero. The test asserts the returned error contains both "opencode execution failed" and "Last 10 lines of output:", and that the tail portion of the error message contains only the last 10 of the lines the script printed (not the earlier ones) — directly verifying the ringWriter's 10-line bound and RunAgent's "%w\n\nLast 10 lines of output:\n%s" formatting from internal/opencode/opencode.go:66.
        - |
          Both tests use testify require/assert and follow the structure and PATH-substitution pattern already established by TestRunCommand and TestRunCommandFailure in internal/opencode/opencode_test.go — no real opencode CLI is invoked by these two tests.
      passing: false
    - slug: test-get-stats-and-display-stats
      description: |
        Add coverage for GetStats and DisplayStats, which currently have no test exercising the execOpenCode plumbing or the GetStats-to-parseStatsOutput integration.
      items:
        - |
          internal/opencode/opencode_test.go gains TestGetStats, using the fake-binary-on-PATH technique: the fake "opencode" script, invoked with the "stats" argument, prints a stats table to stdout in the same layout TestStatsParsing already exercises (lines containing "Input", "Output", and "Total Cost" each followed by a value and a "│" separator, e.g. " Input 3.5M │ / Output 542.0K │ / Total Cost $12.34 │") and exits 0. The test asserts client.GetStats() returns a Stats{} with the expected InputTokens, OutputTokens, and Cost fields matching what parseStatsOutput would produce for that table — verifying the real execOpenCode-to-parseStatsOutput integration, not just the parser in isolation.
        - |
          internal/opencode/opencode_test.go gains TestDisplayStats, covering both branches with the fake-binary technique: when the fake script exits 0, DisplayStats returns nil; when it exits non-zero, DisplayStats returns a non-nil error.
        - |
          Both tests use testify require/assert and follow the structure and PATH-substitution pattern already established by TestRunCommand and TestRunCommandFailure — no real opencode CLI is invoked by these two tests.
      passing: false
    - slug: format-mock-struct-fields
      description: |
        Fix gofmt struct field alignment in internal/opencode/opencode_mock.go, which gofmt -l currently flags.
      items:
        - |
          The MockOC struct fields in internal/opencode/opencode_mock.go (RunCommandFunc, RunAgentFunc, GetStatsFunc, DisplayStatsFunc) are realigned so the file matches gofmt's canonical output — run gofmt -w on the file (or apply the equivalent whitespace change by hand) so `gofmt -l internal/opencode/opencode_mock.go` reports no files needing formatting.
        - |
          No field names, types, comments, or any other content in internal/opencode/opencode_mock.go changes — this is a whitespace-only formatting fix.
      passing: true
