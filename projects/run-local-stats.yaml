slug: run-local-stats
title: Print token usage and cost after each remote workflow run
feature: specs/features/ralph/run-local
maxIterations: 10
requirements:
    - slug: env-client
      description: EnvClient interface detects workflow execution and is wired into Runner
      items:
        - Update NewRunner in internal/orchestration/run/runner.go to accept an EnvClient parameter and assign it to r.env
        - Implement SystemEnvClient in a new file internal/run/env_client.go — InWorkflow() returns true when os.Getenv("RALPH_WORKFLOW_EXECUTION") == "true"
        - Update NewLocalRunner in internal/run/local_runner.go to pass &SystemEnvClient{} as the env argument to NewRunner
      code:
        - name: EnvClient
          description: interface with InWorkflow method
          module: internal/orchestration/run
          body: |
            type EnvClient interface {
                InWorkflow() bool
            }
        - name: Runner
          description: Runner struct with env field added
          module: internal/orchestration/run
          body: |
            type Runner struct {
                project  ProjectClient
                ai       AIClient
                git      GitClient
                github   GitHubClient
                services ServicesClient
                notify   NotifyClient
                env      EnvClient
            }
      passing: true
    - slug: opencode-get-stats
      description: opencode package exposes GetStats to capture and parse opencode stats output
      items:
        - Define a Stats struct in internal/opencode/opencode.go with fields InputTokens int64, OutputTokens int64, and Cost float64
        - Add GetStats() (Stats, error) to internal/opencode/opencode.go that runs opencode stats, captures stdout, and parses the output
        - Parse the "Input" line for input token count, the "Output" line for output token count, and the "Total Cost" line for cost — each value appears between the last whitespace run and the trailing " │" on its line
        - Token values use K/M suffixes (e.g. 3.5M, 542.0K) — parse as float and multiply by the appropriate multiplier to produce an int64
        - Cost values are prefixed with $ — strip the prefix and parse as float64
      passing: true
    - slug: ai-client-print-stats
      description: AIClient interface exposes PrintStats and AgentClient implements it using GetStats
      items:
        - Implement PrintStats() on AgentClient in internal/run/agent_client.go — call opencode.GetStats(), and if successful log input tokens, output tokens, and cost using ralph's logger; ignore any error from GetStats (stats are best-effort)
      code:
        - name: AIClient
          description: AIClient interface with PrintStats method added
          module: internal/orchestration/run
          body: |
            type AIClient interface {
                RunPicker(proj *project.Project) (string, error)
                RunDeveloper(proj *project.Project, req string) error
                IsFatal(err error) bool
                GenerateChangelog(proj *project.Project) error
                FixServiceStartup(cfg *config.RalphConfig, err error) error
                PrintStats()
            }
      passing: true
    - slug: run-local-gated-stats
      description: RunLocal defers PrintStats only when running inside a workflow container
      code:
        - name: RunLocal
          description: RunLocal with stats gated on InWorkflow check
          module: internal/orchestration/run
          body: |
            func (r *Runner) RunLocal(proj *project.Project, cfg *config.RalphConfig) error {
                if r.env.InWorkflow() {
                    defer r.ai.PrintStats()
                }
                if err := r.services.RunBeforeCommands(cfg); err != nil {
                    return err
                }
                if err := r.git.SwitchToBranch(proj.Slug); err != nil {
                    return err
                }
                if err := r.iterate(proj, cfg); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.github.CreatePR(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
      passing: false
    - slug: mock-and-tests
      description: Mock EnvClient and AIClient.PrintStats; tests verify stats fire only inside a workflow
      items:
        - Add statsPrinted bool field to mockAIClient in internal/orchestration/run/mock_test.go
        - Add PrintStats() method on mockAIClient that sets statsPrinted = true
        - Add aiStatsPrinted(r *Runner) bool helper that casts r.ai to *mockAIClient and returns statsPrinted
        - Add mockEnvClient struct with inWorkflow bool field and InWorkflow() bool method
        - Add newEnvInWorkflow() and newEnvNotInWorkflow() constructors for mockEnvClient
        - Add withEnv(ec EnvClient) runnerOption helper
        - Update withMocks to initialise r.env to newEnvNotInWorkflow() as the default
      tests:
        - name: TestRunLocalStatsPrintedOnSuccess
          description: verifies PrintStats is called after a successful RunLocal when in a workflow
          module: internal/orchestration/run
          body: |
            func TestRunLocalStatsPrintedOnSuccess(t *testing.T) {
                runner := withMocks(
                    withEnv(newEnvInWorkflow()),
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(passingProject(), anyConfig())
                require.NoError(t, err)
                require.True(t, aiStatsPrinted(runner))
            }
        - name: TestRunLocalStatsPrintedOnFailure
          description: verifies PrintStats is called after a failing RunLocal when in a workflow
          module: internal/orchestration/run
          body: |
            func TestRunLocalStatsPrintedOnFailure(t *testing.T) {
                runner := withMocks(
                    withEnv(newEnvInWorkflow()),
                    withAI(newAIThatAlwaysFails()),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.Error(t, err)
                require.True(t, aiStatsPrinted(runner))
            }
        - name: TestRunLocalStatsNotPrintedWhenNotInWorkflow
          description: verifies PrintStats is not called when ralph is not running inside a workflow
          module: internal/orchestration/run
          body: |
            func TestRunLocalStatsNotPrintedWhenNotInWorkflow(t *testing.T) {
                runner := withMocks(
                    withEnv(newEnvNotInWorkflow()),
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(passingProject(), anyConfig())
                require.NoError(t, err)
                require.False(t, aiStatsPrinted(runner))
            }
      passing: false
    - slug: version-bump
      description: Bump the patch version
      items:
        - Apply a semver patch bump to the app version
      passing: false
