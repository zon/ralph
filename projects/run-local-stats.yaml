slug: run-local-stats
title: Print token usage and cost after each local run
feature: specs/features/ralph/run-local
maxIterations: 10
requirements:
    - slug: capture-session-id
      description: Capture the OpenCode session ID from each opencode run invocation
      items:
        - Add --format json to all opencode run invocations in internal/opencode/opencode.go (both RunAgentWithRing and RunCommand)
        - Parse each stdout line as a JSON object and extract the sessionID field; capture the first non-empty value seen
        - Define a SessionCollector type in internal/opencode/opencode.go — a thread-safe []string with Append(id string) and IDs() []string methods
        - Define context key helpers WithSessionCollector(ctx context.Context, c *SessionCollector) and SessionCollectorFrom(ctx context.Context) in internal/opencode/opencode.go
        - In RunAgentWithRing and RunCommand, if a SessionCollector is present in the Go context, append the captured session ID after a successful run
        - When stdoutWriter is nil in RunCommand (non-verbose callers), suppress the JSON output while still extracting the session ID
      passing: true
    - slug: export-session-stats
      description: Fetch per-session cost and token counts via opencode export
      items:
        - Define a SessionStats struct in internal/opencode/opencode.go with fields InputTokens int64, OutputTokens int64, Cost float64
        - Add ExportSession(sessionID string) (SessionStats, error) to internal/opencode/opencode.go that runs opencode export <sessionID>, parses the JSON response, and populates SessionStats from the session's cost and token fields
        - 'The opencode export JSON format: top-level object with an "info" key containing "cost" (float64, e.g. 0.0009612848), "tokens.input" (int), "tokens.output" (int), "tokens.reasoning" (int), and "tokens.cache.read"/"tokens.cache.write" (ints). Use info.cost, info.tokens.input, and info.tokens.output to populate SessionStats.'
      passing: true
    - slug: agent-client-print-stats
      description: AgentClient accumulates session IDs and prints stats after the run
      items:
        - Add a collector *opencode.SessionCollector field to AgentClient in internal/run/agent_client.go
        - In NewAgentClient, initialise the collector and store it in the exec context's Go context via opencode.WithSessionCollector so that all downstream opencode invocations record their session IDs automatically
        - Add PrintStats() to AgentClient that iterates over collector.IDs(), calls opencode.ExportSession for each, sums InputTokens, OutputTokens, and Cost across all sessions, and logs the totals
      passing: false
    - slug: ai-client-interface-and-defer
      description: AIClient interface exposes PrintStats and RunLocal defers it
      code:
        - name: AIClient
          description: add PrintStats method to the AIClient interface
          module: internal/orchestration/run
          body: |
            type AIClient interface {
                RunPicker(proj *project.Project) (string, error)
                RunDeveloper(proj *project.Project, req string) error
                IsFatal(err error) bool
                GenerateChangelog(proj *project.Project) error
                FixServiceStartup(cfg *config.RalphConfig, err error) error
                PrintStats()
            }
        - name: RunLocal
          description: prepend RunLocal with defer r.ai.PrintStats()
          module: internal/orchestration/run
          body: |
            func (r *Runner) RunLocal(proj *project.Project, cfg *config.RalphConfig) error {
                defer r.ai.PrintStats()
                if err := r.services.RunBeforeCommands(cfg); err != nil {
                    return err
                }
                if err := r.git.SwitchToBranch(proj.Slug); err != nil {
                    return err
                }
                if err := r.iterate(proj, cfg); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.github.CreatePR(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
      passing: false
    - slug: mock-and-tests
      description: Mock supports PrintStats and tests verify it fires on both success and failure
      code:
        - name: mockAIClient
          description: mockAIClient struct with statsPrinted field
          module: internal/orchestration/run
          body: |
            type mockAIClient struct {
                runPickerFunc    func() (string, error)
                runDeveloperFunc func(string) error
                isFatalFunc      func(err error) bool
                changelogFunc    func() error
                fixServiceFunc   func(*config.RalphConfig, error) error
                pickCalls        []*project.Project
                developCalls     []*project.Project
                changelogCalls   []*project.Project
                fixServiceCalled bool
                statsPrinted     bool
            }
        - name: PrintStats
          description: PrintStats method on mockAIClient
          module: internal/orchestration/run
          body: |
            func (m *mockAIClient) PrintStats() {
                m.statsPrinted = true
            }
        - name: aiStatsPrinted
          description: helper to check if PrintStats was called on the mock
          module: internal/orchestration/run
          body: |
            func aiStatsPrinted(r *Runner) bool {
                if m, ok := r.ai.(*mockAIClient); ok {
                    return m.statsPrinted
                }
                return false
            }
      tests:
        - name: TestRunLocalStatsPrintedOnSuccess
          description: verifies PrintStats is called after a successful RunLocal
          module: internal/orchestration/run
          body: |
            func TestRunLocalStatsPrintedOnSuccess(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsAllPassing()),
                )
                err := runner.RunLocal(project.withAllPassing(), config.any())
                require.NoError(t, err)
                require.True(t, ai.statsPrinted())
            }
        - name: TestRunLocalStatsPrintedOnFailure
          description: verifies PrintStats is called after a failing RunLocal
          module: internal/orchestration/run
          body: |
            func TestRunLocalStatsPrintedOnFailure(t *testing.T) {
                runner := run.withMocks(
                    run.withAI(ai.thatAlwaysFails()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.Error(t, err)
                require.True(t, ai.statsPrinted())
            }
      passing: false
    - slug: remove-old-stats-output
      description: Remove the old opencode stats display from workflow and review commands
      items:
        - Remove the w.displayStats() call and the displayStats() method from internal/cmd/workflow.go
        - Remove the printStats() call and printStats() method from internal/cmd/review.go
        - Remove DisplayStats() from internal/ai/ai.go
        - Remove DisplayStats() from internal/opencode/opencode.go
      passing: false
    - slug: version-bump
      description: Bump the patch version
      items:
        - Apply a semver patch bump to the app version
      passing: false
