slug: git-fix-formatting-and-merge-coverage
title: Fix formatting, dead code, test coverage, and ambient-config isolation in internal/git
maxIterations: 10
requirements:
    - slug: fix-gofmt-issues
      description: |
        Apply the two whitespace-only gofmt fixes that `gofmt -l internal/git/` currently flags.
      items:
        - |
          The MockClient struct fields in internal/git/client_mock.go (SwitchToBranchFunc, BlockedFileExistsFunc, WriteBlockedFileFunc, HasChangesFunc, ReportExistsFunc, CommitFromReportFunc, CurrentBranchFunc) are realigned so the "func" keyword starts in the same column as IsBranchSyncedWithRemoteFunc's, matching gofmt's canonical alignment — run gofmt -w on the file (or apply the equivalent whitespace change by hand).
        - |
          internal/git/reporoot_test.go gains a trailing newline at end of file (its final line is currently "}" with no newline after it) — run gofmt -w on the file (or append the missing newline by hand).
        - |
          No field names, types, test logic, comments, or any other content changes — these are whitespace-only fixes. After the change, `gofmt -l internal/git/` reports no files needing formatting.
      passing: true
    - slug: add-merge-and-abortmerge-tests
      description: |
        Add merge_test.go covering Merge and AbortMerge — the only two functions in internal/git/merge.go that remain after MergeBase is removed (see the remove-dead-mergebase requirement) — using the package's existing isolated-temp-repo helpers, mirroring the patterns already established in commit_test.go and branch_test.go.
      items:
        - |
          internal/git/merge_test.go is a new file in package git that gains TestMerge, which calls setupTestRepo(t) and t.Chdir(tempDir) (the same helper used throughout branch_test.go, commit_test.go, config_test.go, and git_test.go) to obtain an isolated repository, creates a feature branch via CheckoutOrCreateBranch, commits a change on it, switches back to the base branch, commits a non-conflicting change there, calls Merge(featureBranchName), and asserts it returns nil and that the feature branch's file is now present in the working tree (i.e. the merge actually happened).
        - |
          internal/git/merge_test.go gains TestMerge_Conflict (or similarly named), which sets up two branches with conflicting changes to the same file/lines in an isolated repo (via setupTestRepo(t) + t.Chdir), calls Merge on the conflicting branch, and asserts it returns a non-nil error wrapping "merge failed".
        - |
          internal/git/merge_test.go gains TestAbortMerge, which reproduces the conflict scenario above in an isolated repo, calls Merge to start a conflicted merge, then calls AbortMerge and asserts it returns nil and that the repository is no longer in a mid-merge state (e.g. by asserting HasUncommittedChanges() is false, or that a subsequent git status shows no merge in progress, or that MERGE_HEAD no longer exists via runGit("rev-parse", "--verify", "MERGE_HEAD") returning an error).
        - |
          internal/git/merge_test.go gains TestAbortMerge_NoMergeInProgress, asserting that calling AbortMerge when there is no merge in progress (a freshly created isolated repo from setupTestRepo(t)) returns a non-nil error wrapping "failed to abort merge".
        - |
          All four tests operate exclusively inside directories returned by setupTestRepo(t)/t.TempDir() with t.Chdir — never the real ralph repository (a prior incident where a test ran git against the real repo caused a lost branch, so this isolation is mandatory) — and use testify require/assert consistently with the rest of the package's tests.
        - |
          No test for MergeBase is added — it is being deleted as dead code by the remove-dead-mergebase requirement in this same project, so it must never gain test coverage.
      passing: false
    - slug: remove-dead-mergebase
      description: |
        Delete the unused MergeBase function from internal/git/merge.go.
      items:
        - |
          internal/git/merge.go no longer declares MergeBase — confirmed dead via `grep -rn "MergeBase" --include="*.go" .`, which (before this change) returns only the doc comment and function declaration in merge.go itself, with no callers anywhere in internal/, cmd/, or any test file.
        - |
          The "strings" import in internal/git/merge.go is removed if MergeBase's deletion makes it unused (Merge and AbortMerge do not reference the strings package; MergeBase was the only user of strings.TrimSpace in that file). Imports that remain in use are left untouched.
        - |
          No replacement or re-export of MergeBase is added — this is a clean removal of dead exported surface area, not a deprecation or compatibility shim.
        - |
          go vet ./internal/git/... and go test ./internal/git/... pass after the deletion, with no compile errors from dangling references or unused imports.
      passing: true
    - slug: isolate-global-config-test
      description: |
        Isolate TestConfigList's "lists global config" subtest in internal/git/config_test.go from the host machine's real global git configuration, so the test no longer depends on or reads ambient environment state.
      items:
        - |
          The "lists global config" subtest in internal/git/config_test.go (currently calling ConfigList(true) directly with no isolation) is rewritten to redirect global git config to a fresh location inside a t.TempDir() — for example by using t.Setenv("HOME", tempDir) on platforms where git reads ~/.gitconfig, or by using t.Setenv("GIT_CONFIG_GLOBAL", filepath.Join(tempDir, ".gitconfig")) (git's documented override for the global config file path) — before calling Config(true, ...) and ConfigList(true)/ConfigGet.
        - |
          The rewritten subtest first writes a known key via Config(true, "user.isolatedtest", "isolatedvalue") (or similar) into the isolated global config location, then calls ConfigList(true) and asserts the output contains that known key=value pair — verifying ConfigList(true) reads from the isolated location rather than merely asserting non-empty output (which the current version does and which would pass against any ambient config, masking the isolation gap).
        - |
          The subtest never reads from or writes to the real ambient ~/.gitconfig or any global config outside the test's t.TempDir() — mirroring the isolation already present in "lists local config" (which uses setupTestRepo(t) + t.Chdir(tempDir)) and the package-wide rule that git "may be invoked in unit tests, but only against an isolated temporary directory — never the real repository."
        - |
          Other subtests in TestConfigList and the rest of config_test.go are unchanged. testify require/assert usage remains consistent with the rest of the file.
      passing: false
