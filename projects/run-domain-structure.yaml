name: run-domain-structure
description: Move implementation logic out of the run package into appropriate packages

requirements:
  - category: git package
    description: Move git operations from internal/run into internal/git
    items:
      - Move SanitizeBranchName from internal/run/execute.go to internal/git — it is a branch naming utility with no run-domain logic
      - Move PullAndPush from internal/run/iteration.go to internal/git — it is a pure git pull-rebase and push with no run-domain logic
      - Move CommitFileAndPush and CommitAllAndPush from internal/run/commit.go to internal/git — they are general-purpose git helpers used by cmd/review.go, not run-specific logic
      - Delete internal/run/commit.go after moving its contents; update all callers in cmd/review.go and anywhere else that imports these from run
    passing: true

  - category: project package
    description: Move project lifecycle functions from internal/run into internal/project
    items:
      - Move FindCompleteProjects, isProjectComplete, and RemoveAndCommit from internal/run/complete.go to internal/project — they scan and manage project files, which is project-domain logic, not run-domain logic
      - Delete internal/run/complete.go after moving its contents; update all callers in cmd/merge.go
    passing: true

  - category: version
    description: Bump version for internal refactoring
    items:
      - Apply a patch bump to internal/version/VERSION
      - Apply a patch bump to charts/ralph-webhook/Chart.yaml (both version and appVersion fields)
    passing: true
