name: test-merge-command
description: Add tests for merge command in internal/cmd/merge.go

requirements:
  - category: testing
    description: runLocal dry-run tests
    items:
      - A test verifies runLocal in dry-run mode with a projects directory containing complete project files logs the cleanup info and returns nil without invoking gh pr merge
      - A test verifies runLocal in dry-run mode when the projects directory does not exist skips cleanup and returns nil
      - A test verifies runLocal in dry-run mode with no complete projects returns nil
    passing: false

  - category: testing
    description: runLocal complete project cleanup tests
    items:
      - A test verifies runLocal finds complete projects, calls RemoveAndCommit, and pushes changes before merging
      - A test verifies runLocal returns an error when FindCompleteProjects fails
      - A test verifies runLocal returns an error when RemoveAndCommit fails
    passing: false

  - category: testing
    description: waitForGitHubHead logic tests
    items:
      - A test verifies waitForGitHubHead returns nil when the GitHub API returns a headRefOid matching the local HEAD SHA
      - A test verifies waitForGitHubHead returns a timeout error after max attempts when the SHA never matches
      - A test verifies waitForGitHubHead returns an error when the gh pr view command fails
      - A test verifies waitForGitHubHead returns an error when the JSON response cannot be parsed
    passing: false
