name: test-github-cli
description: Add tests for GitHub CLI wrapper functions in internal/github/cli.go

requirements:
  - category: testing
    description: FindSSHKey output parsing tests
    items:
      - A test verifies FindSSHKey returns the key ID when the output contains a line where the first field matches the requested title, extracting the second-to-last field as the key ID
      - A test verifies FindSSHKey returns an empty string when no line in the output matches the requested title
      - A test verifies FindSSHKey skips lines that start with "warning:" and lines that are empty or whitespace-only
      - A test verifies FindSSHKey skips lines with fewer than 5 fields
      - Tests do not invoke the gh CLI; they test the parsing logic directly
    passing: true

  - category: testing
    description: ParseGitHubRemoteURL additional edge cases
    items:
      - A test verifies ParseGitHubRemoteURL handles HTTPS URLs with x-access-token credentials (e.g. https://x-access-token:TOKEN@github.com/owner/repo.git)
      - A test verifies ParseGitHubRemoteURL handles paths with extra segments beyond owner/repo
    passing: true
