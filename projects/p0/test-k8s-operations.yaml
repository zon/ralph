name: test-k8s-operations
description: Add tests for Kubernetes operations in internal/k8s/secrets.go

requirements:
  - category: testing
    description: CreateOrUpdateSecret argument construction tests
    items:
      - A test verifies CreateOrUpdateSecret builds the correct kubectl create secret generic command args including --from-literal flags for each data entry, the namespace flag, and --dry-run=client -o yaml
      - A test verifies CreateOrUpdateSecret includes the --context flag in both the create and apply commands when a kubeContext is provided
      - A test verifies CreateOrUpdateSecret uses "default" as the namespace when an empty namespace is passed
      - Tests do not invoke kubectl; they validate the argument construction logic
    passing: false

  - category: testing
    description: CreateOrUpdateConfigMap argument construction tests
    items:
      - A test verifies CreateOrUpdateConfigMap builds the correct kubectl create configmap command args including --from-literal flags for each data entry
      - A test verifies CreateOrUpdateConfigMap includes the --context flag when a kubeContext is provided
      - A test verifies CreateOrUpdateConfigMap uses "default" as the namespace when an empty namespace is passed
    passing: false
