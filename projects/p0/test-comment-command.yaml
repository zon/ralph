name: test-comment-command
description: Add tests for comment command in internal/cmd/comment.go

requirements:
  - category: testing
    description: renderInstructions tests
    items:
      - A test verifies renderInstructions replaces template variables CommentBody, PRNumber, PRBranch, RepoOwner, and RepoName with the provided values
      - A test verifies renderInstructions splits the repo string on "/" to populate RepoOwner and RepoName correctly
      - A test verifies renderInstructions returns the raw template text when the template contains invalid Go template syntax
      - A test verifies renderInstructions handles a repo string without a "/" by leaving RepoOwner and RepoName as empty strings
    passing: false

  - category: testing
    description: projectFileFromBranch tests in cmd package
    items:
      - A test verifies projectFileFromBranch converts "ralph/my-feature" to "projects/my-feature.yaml"
      - A test verifies projectFileFromBranch converts a branch without the "ralph/" prefix by replacing slashes with dashes (e.g. "feature/thing" becomes "projects/feature-thing.yaml")
      - A test verifies projectFileFromBranch handles a branch name with no slashes
    passing: false
