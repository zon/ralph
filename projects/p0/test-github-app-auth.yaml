name: test-github-app-auth
description: Add tests for GitHub App authentication functions in internal/github/app.go

requirements:
  - category: testing
    description: GetInstallationID tests using httptest
    items:
      - A test verifies GetInstallationID returns the installation ID when the API responds with 200 and a valid JSON body containing an id field
      - A test verifies GetInstallationID returns an error when the API responds with a non-200 status code, and the error message includes the status code and response body
      - A test verifies GetInstallationID returns an error when the response body contains invalid JSON
      - A test verifies GetInstallationID sends the correct Authorization header (Bearer + JWT), Accept header, and User-Agent header
    passing: false

  - category: testing
    description: GetInstallationToken tests using httptest
    items:
      - A test verifies GetInstallationToken returns the token string when the API responds with 201 and a valid JSON body containing a token field
      - A test verifies GetInstallationToken returns an error when the API responds with a non-201 status code
      - A test verifies GetInstallationToken returns an error when the response body contains an empty token string
      - A test verifies GetInstallationToken returns an error when the response body contains invalid JSON
    passing: false
