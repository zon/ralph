slug: pass-requirement
title: Add ralph pass command to mark requirements passing or failing

feature: specs/features/ralph/pass-requirement

requirements:
  - slug: project-test-helpers
    description: Add test helper functions to internal/project used by the pass command tests
    items:
      - Add FileWithRequirement(t, slug string, passing bool) string that writes a valid single-requirement project YAML to a temp file and returns the path
      - Add RequirementStatus(t, path, slug string) bool that loads the project at path and returns the passing value for the named requirement
      - Add NonExistentFile(t) string that returns a path inside t.TempDir() guaranteed not to exist
    passing: true

  - slug: pass-cmd
    description: Implement PassCmd in internal/cmd that marks a project requirement as passing or failing by slug
    scenarios:
      - title: Mark passing
        items:
          - GIVEN a project file with a requirement whose slug is my-req and passing false
          - WHEN the user runs ralph pass ./projects/my-project.yaml my-req
          - THEN the requirement's passing field is set to true in the project file
          - AND a confirmation message is printed
      - title: Already passing
        items:
          - GIVEN a requirement that already has passing true
          - WHEN the user runs ralph pass ./projects/my-project.yaml my-req
          - THEN the passing field remains true in the project file
          - AND a confirmation message is printed
      - title: Mark failing
        items:
          - GIVEN a project file with a requirement whose slug is my-req and passing true
          - WHEN the user runs ralph pass ./projects/my-project.yaml my-req --false
          - THEN the requirement's passing field is set to false in the project file
          - AND a confirmation message is printed
      - title: Project file not found
        items:
          - GIVEN a project file path that does not exist
          - WHEN the user runs ralph pass ./projects/missing.yaml my-req
          - THEN a non-zero exit code is returned
          - AND an error message indicates the file was not found
      - title: Slug not found
        items:
          - GIVEN a project file that does not contain a requirement with the given slug
          - WHEN the user runs ralph pass ./projects/my-project.yaml unknown-slug
          - THEN a non-zero exit code is returned
          - AND an error message indicates no requirement with that slug exists in the project
    code:
      - name: PassCmd
        description: Kong command struct and Run method that loads a project, updates a requirement's passing status, and saves the file
        module: internal/cmd
        body: |
          type PassCmd struct {
              ProjectFile string `arg:""`
              Slug        string `arg:""`
              False       bool   `name:"false"`
          }

          func (c *PassCmd) Run() error {
              proj, err := project.LoadProject(c.ProjectFile)
              if err != nil {
                  return err
              }

              if err := project.UpdateRequirementStatus(proj, c.Slug, !c.False); err != nil {
                  return err
              }

              return project.SaveProject(c.ProjectFile, proj)
          }
    tests:
      - name: TestPassCmd_MarkPassing
        description: verifies that running PassCmd without --false sets the requirement's passing field to true
        module: internal/cmd
        body: |
          func TestPassCmd_MarkPassing(t *testing.T) {
              path := project.FileWithRequirement(t, "my-req", false)
              cmd := &PassCmd{ProjectFile: path, Slug: "my-req"}
              require.NoError(t, cmd.Run())
              assert.True(t, project.RequirementStatus(t, path, "my-req"))
          }
      - name: TestPassCmd_MarkFailing
        description: verifies that running PassCmd with --false sets the requirement's passing field to false
        module: internal/cmd
        body: |
          func TestPassCmd_MarkFailing(t *testing.T) {
              path := project.FileWithRequirement(t, "my-req", true)
              cmd := &PassCmd{ProjectFile: path, Slug: "my-req", False: true}
              require.NoError(t, cmd.Run())
              assert.False(t, project.RequirementStatus(t, path, "my-req"))
          }
      - name: TestPassCmd_FileNotFound
        description: verifies that PassCmd returns an error when the project file does not exist
        module: internal/cmd
        body: |
          func TestPassCmd_FileNotFound(t *testing.T) {
              cmd := &PassCmd{ProjectFile: project.NonExistentFile(t), Slug: "my-req"}
              assert.Error(t, cmd.Run())
          }
      - name: TestPassCmd_SlugNotFound
        description: verifies that PassCmd returns an error when the requirement slug does not exist in the project
        module: internal/cmd
        body: |
          func TestPassCmd_SlugNotFound(t *testing.T) {
              path := project.FileWithRequirement(t, "my-req", false)
              cmd := &PassCmd{ProjectFile: path, Slug: "unknown-slug"}
              assert.Error(t, cmd.Run())
          }
    passing: false

  - slug: register-pass-cmd
    description: Register PassCmd in the root Cmd struct so ralph pass is available as a CLI command
    items:
      - Add a Pass PassCmd field to the Cmd struct in internal/cmd/cmd.go with a cmd tag and help text "Mark a project requirement as passing or failing"
    passing: false

  - slug: version-bump
    description: Version bump
    items:
      - Apply a semver minor bump to the app version
    passing: false
