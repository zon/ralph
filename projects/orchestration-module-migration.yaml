slug: orchestration-module-migration
title: Migrate all entry commands through orchestration modules
maxIterations: 10
requirements:
    - slug: update-architecture
      description: Register all new and moved orchestration modules in specs/architecture.yaml
      items:
        - Add entries for internal/orchestration/workflow, internal/orchestration/stop, internal/orchestration/list, internal/orchestration/validate, internal/orchestration/pass, internal/orchestration/setup_workspace, internal/orchestration/config/github, internal/orchestration/config/opencode, internal/orchestration/config/pulumi, internal/orchestration/config/webhook, and internal/orchestration/githubtoken with category orchestration
        - Update the path for internal/setup to internal/orchestration/setup in specs/architecture.yaml
      passing: true
    - slug: orchestrate-workflow
      description: Extract workflow command logic into internal/orchestration/workflow
      items:
        - All orchestration logic from internal/cmd/workflow.go (GitHub auth setup, workspace preparation, base branch sync, AI conflict resolution, and project execution) lives in internal/orchestration/workflow
        - internal/orchestration/workflow defines interfaces for each external dependency it coordinates
        - internal/cmd/workflow.go wires real implementations and delegates to internal/orchestration/workflow
        - internal/orchestration/workflow has unit tests covering each orchestration step with mocked dependencies
      passing: true
    - slug: orchestrate-stop
      description: Extract stop command logic into internal/orchestration/stop
      items:
        - All orchestration logic from internal/cmd/stop.go (kube context resolution and Argo workflow stopping) lives in internal/orchestration/stop
        - internal/orchestration/stop defines interfaces for config, Kubernetes, and Argo dependencies
        - internal/cmd/stop.go wires real implementations and delegates to internal/orchestration/stop
        - internal/orchestration/stop has unit tests with mocked dependencies
      passing: true
    - slug: orchestrate-list
      description: Extract list command logic into internal/orchestration/list
      items:
        - All orchestration logic from internal/cmd/list.go (kube context resolution and Argo workflow listing) lives in internal/orchestration/list
        - internal/orchestration/list defines interfaces for config, Kubernetes, and Argo dependencies
        - internal/cmd/list.go wires real implementations and delegates to internal/orchestration/list
        - internal/orchestration/list has unit tests with mocked dependencies
      passing: true
    - slug: orchestrate-validate
      description: Introduce internal/orchestration/validate as the command-level orchestration wrapper for validation
      items:
        - internal/orchestration/validate defines a ValidateCmd struct that accepts a validator interface and coordinates the validate command flow
        - internal/cmd/validate.go wires real implementations and delegates to internal/orchestration/validate
        - internal/orchestration/validate has unit tests with a mocked validator
      passing: true
    - slug: orchestrate-pass
      description: Extract pass command logic into internal/orchestration/pass
      items:
        - All orchestration logic from internal/cmd/pass.go (loading, updating, and saving project requirement status) lives in internal/orchestration/pass
        - internal/orchestration/pass defines interfaces for project loading and saving
        - internal/cmd/pass.go wires real implementations and delegates to internal/orchestration/pass
        - internal/orchestration/pass has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-setup-workspace
      description: Extract setup-workspace command logic into internal/orchestration/setup_workspace
      items:
        - All orchestration logic from internal/cmd/setup_workspace.go (loading config and creating workspace symlinks) lives in internal/orchestration/setup_workspace
        - internal/orchestration/setup_workspace defines interfaces for config loading and filesystem operations
        - internal/cmd/setup_workspace.go wires real implementations and delegates to internal/orchestration/setup_workspace
        - internal/orchestration/setup_workspace has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-config-github
      description: Extract config github command logic into internal/orchestration/config/github
      items:
        - All orchestration logic from internal/cmd/config_github.go (repo detection, credential validation, and K8s secret creation) lives in internal/orchestration/config/github
        - internal/orchestration/config/github defines interfaces for config, GitHub, and Kubernetes dependencies
        - internal/cmd/config_github.go wires real implementations and delegates to internal/orchestration/config/github
        - internal/orchestration/config/github has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-config-opencode
      description: Extract config opencode command logic into internal/orchestration/config/opencode
      items:
        - All orchestration logic from internal/cmd/config_opencode.go (reading OpenCode credentials and creating the K8s secret) lives in internal/orchestration/config/opencode
        - internal/orchestration/config/opencode defines interfaces for config, filesystem, and Kubernetes dependencies
        - internal/cmd/config_opencode.go wires real implementations and delegates to internal/orchestration/config/opencode
        - internal/orchestration/config/opencode has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-config-pulumi
      description: Extract config pulumi command logic into internal/orchestration/config/pulumi
      items:
        - All orchestration logic from internal/cmd/config_pulumi.go (resolving the Pulumi token and creating the K8s secret) lives in internal/orchestration/config/pulumi
        - internal/orchestration/config/pulumi defines interfaces for config, environment, and Kubernetes dependencies
        - internal/cmd/config_pulumi.go wires real implementations and delegates to internal/orchestration/config/pulumi
        - internal/orchestration/config/pulumi has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-config-webhook
      description: Extract config webhook command logic into internal/orchestration/config/webhook
      items:
        - All orchestration logic from internal/cmd/config_webhook.go (configmap building, secret generation, and webhook registration for both ConfigWebhookConfigCmd and ConfigWebhookSecretCmd) lives in internal/orchestration/config/webhook
        - internal/orchestration/config/webhook defines interfaces for config, GitHub, Kubernetes, and provisioning dependencies
        - internal/cmd/config_webhook.go wires real implementations and delegates to internal/orchestration/config/webhook
        - internal/orchestration/config/webhook has unit tests with mocked dependencies
      passing: false
    - slug: orchestrate-githubtoken
      description: Extract github-token command logic into internal/orchestration/githubtoken
      items:
        - All orchestration logic from internal/cmd/github_token.go lives in internal/orchestration/githubtoken
        - internal/orchestration/githubtoken defines an interface for GitHub authentication
        - internal/cmd/github_token.go wires real implementations and delegates to internal/orchestration/githubtoken
        - internal/orchestration/githubtoken has unit tests with a mocked dependency
      passing: false
    - slug: move-setup-to-orchestration
      description: Move internal/setup to internal/orchestration/setup
      items:
        - The package at internal/setup moves to internal/orchestration/setup with package name setup
        - All import paths referencing internal/setup are updated to internal/orchestration/setup
        - The package passes all existing tests at its new path
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
