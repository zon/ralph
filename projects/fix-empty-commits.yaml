name: fix-empty-commits
description: Delete report.md and end iteration instead of submitting an empty commit

requirements:
  - category: iteration
    description: Skip empty commits and clean up report.md
    items:
      - In performCommit(), when there are no staged changes, delete report.md and return ErrNoChanges instead of calling git.CommitAllowEmpty()
      - The log message for this path says "No file changes after iteration N; skipping empty commit"
    passing: true

  - category: tests
    description: Unit tests for the new behaviour
    items:
      - TestPerformCommit covers the no-staged-changes path and asserts report.md is deleted and ErrNoChanges is returned
      - TestCommitChanges covers the path where report.md exists but there are no uncommitted changes, asserting report.md is deleted and ErrNoChanges is returned
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
