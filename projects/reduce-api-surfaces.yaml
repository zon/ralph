name: reduce-api-surfaces
description: Reduce exported API surfaces to only what callers need

requirements:
  - category: config
    description: config package exports only what callers need
    items:
      - Default instruction strings (DefaultCommentInstructions, DefaultMergeInstructions, DefaultFixServiceInstructions) in internal/config are unexported and accessed through the loaded RalphConfig instead
    passing: false

  - category: git
    description: git package API is consolidated
    items:
      - PushBranch and PushCurrentBranch in internal/git/git.go are consolidated into a single push function
    passing: false

  - category: github
    description: github package API is consolidated
    items:
      - IsGHInstalled and IsGHCLIAvailable in internal/github are consolidated into a single function with a consistent signature
    passing: false

  - category: services
    description: services package exports only what callers need
    items:
      - CheckPort, WaitForPort, and WaitForPortRelease in internal/services/services.go are unexported since they are only used within the package
    passing: false
