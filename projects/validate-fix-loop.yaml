slug: validate-fix-loop
title: Add an agent-driven fix loop and canonical formatting to ralph validate
feature: specs/features/ralph/validate
requirements:
    - slug: validator-orchestration
      description: Add the Validator orchestration in internal/validate with a bounded fix loop and canonical rewrite on success
      scenarios:
        - title: Well-formed project
          items:
            - GIVEN a YAML file that parses and satisfies the project schema
            - WHEN ralph validate is run
            - THEN unmarshalling succeeds on the first attempt
            - AND no agent is invoked
        - title: Agent fixes a malformed file
          items:
            - GIVEN a file whose contents do not unmarshal into a valid project
            - WHEN ralph validate is run
            - THEN the command invokes the agent with the file path and the unmarshalling error
            - AND the agent rewrites the file
            - AND the command retries unmarshalling against the updated file
        - title: Project becomes valid within the limit
          items:
            - GIVEN a file that the agent successfully repairs within 10 attempts
            - WHEN ralph validate is run
            - THEN the loop exits as soon as unmarshalling succeeds
            - AND the command proceeds to canonical formatting
        - title: Limit exceeded
          items:
            - GIVEN a file that the agent cannot repair in 10 attempts
            - WHEN ralph validate is run
            - THEN the command exits with a non-zero status
            - AND the error message includes the final unmarshalling error
        - title: File rewritten in canonical format
          items:
            - GIVEN a project file that unmarshals successfully
            - WHEN ralph validate finishes validation
            - THEN the file is rewritten using the same marshalling routine as ralph pass
            - AND the on-disk content matches the canonical representation of the parsed project
      code:
        - name: Validator
          description: orchestration struct holding the injected project and agent clients
          module: internal/validate
          body: |
            const MaxAttempts = 10

            type Validator struct {
                project ProjectClient
                agent   AgentClient
            }

            func (v *Validator) Validate(path string) (*project.Project, error) {
                for attempt := 1; attempt <= MaxAttempts; attempt++ {
                    proj, loadErr := v.project.Load(path)
                    if loadErr == nil {
                        if saveErr := v.project.Save(path, proj); saveErr != nil {
                            return nil, saveErr
                        }
                        return proj, nil
                    }
                    if attempt == MaxAttempts {
                        return nil, loadErr
                    }
                    if fixErr := v.agent.FixProject(path, loadErr); fixErr != nil {
                        return nil, fixErr
                    }
                }
                return nil, ErrUnreachable
            }
        - name: ProjectClient
          description: interface for loading and saving project YAML files, consumed by the Validator
          module: internal/validate
          body: |
            type ProjectClient interface {
                Load(path string) (*project.Project, error)
                Save(path string, proj *project.Project) error
            }
        - name: AgentClient
          description: interface for invoking the local AI agent to repair a malformed project file
          module: internal/validate
          body: |
            type AgentClient interface {
                FixProject(path string, loadErr error) error
            }
      tests:
        - name: TestValidateSucceedsOnFirstLoad
          description: verifies the loop exits immediately when the project loads, saves canonically, and never calls the agent
          module: internal/validate
          body: |
            func TestValidateSucceedsOnFirstLoad(t *testing.T) {
                proj := project.any()
                svc := validate.withMocks(
                    validate.withProject(project.thatLoads(proj)),
                )
                result, err := svc.Validate(project.anyPath())
                require.NoError(t, err)
                require.Equal(t, proj, result)
                require.Equal(t, proj, project.lastSaved())
                require.Empty(t, agent.fixCalls())
            }
        - name: TestValidateRepairsThenSucceeds
          description: verifies the orchestration retries loading after the agent repairs the file
          module: internal/validate
          body: |
            func TestValidateRepairsThenSucceeds(t *testing.T) {
                proj := project.any()
                svc := validate.withMocks(
                    validate.withProject(project.thatLoadsAfterFailures(1, proj)),
                )
                result, err := svc.Validate(project.anyPath())
                require.NoError(t, err)
                require.Equal(t, proj, result)
                require.Len(t, agent.fixCalls(), 1)
            }
        - name: TestValidateGivesUpAfterMaxAttempts
          description: verifies the loop caps at MaxAttempts and returns the final load error
          module: internal/validate
          body: |
            func TestValidateGivesUpAfterMaxAttempts(t *testing.T) {
                svc := validate.withMocks(
                    validate.withProject(project.thatAlwaysFailsToLoad()),
                )
                _, err := svc.Validate(project.anyPath())
                require.Error(t, err)
                require.Len(t, agent.fixCalls(), validate.MaxAttempts-1)
            }
        - name: TestValidatePropagatesAgentFailure
          description: verifies a failed agent fix aborts the loop with the agent error
          module: internal/validate
          body: |
            func TestValidatePropagatesAgentFailure(t *testing.T) {
                svc := validate.withMocks(
                    validate.withProject(project.thatAlwaysFailsToLoad()),
                    validate.withAgent(agent.thatFailsToFix()),
                )
                _, err := svc.Validate(project.anyPath())
                require.Error(t, err)
            }
        - name: TestValidatePropagatesSaveFailure
          description: verifies a save failure after a successful load is returned as the orchestration error
          module: internal/validate
          body: |
            func TestValidatePropagatesSaveFailure(t *testing.T) {
                svc := validate.withMocks(
                    validate.withProject(project.thatLoadsButFailsToSave(project.any())),
                )
                _, err := svc.Validate(project.anyPath())
                require.Error(t, err)
            }
      passing: true
    - slug: project-client-adapter
      description: Add the ProjectClient adapter wiring project.LoadProject and project.SaveProject into the Validator
      code:
        - name: projectClient
          description: production adapter implementing validate.ProjectClient on top of internal/project
          module: internal/validate
          body: |
            type projectClient struct{}

            func (projectClient) Load(path string) (*project.Project, error) {
                return project.LoadProject(path)
            }

            func (projectClient) Save(path string, proj *project.Project) error {
                return project.SaveProject(path, proj)
            }
      passing: true
    - slug: project-test-fixtures
      description: Add project fixture builders in internal/project for use by validate orchestration tests
      items:
        - Add project.any() returning a valid *project.Project with a slug, title, and one passing requirement
        - Add project.anyPath() returning a deterministic path string suitable for use in orchestration tests
        - Each fixture lives alongside internal/project so it owns its own type fixtures
      passing: true
    - slug: project-client-mocks
      description: Add ProjectClient mock builders used by the orchestration tests
      items:
        - Mocks live in the validate package's test files since they satisfy validate.ProjectClient
        - Implement project.thatLoads(proj) returning a mock whose Load returns proj and whose Save records the value
        - Implement project.thatLoadsAfterFailures(n, proj) returning a mock that fails Load n times before returning proj
        - Implement project.thatAlwaysFailsToLoad() returning a mock whose Load always returns an error
        - Implement project.thatLoadsButFailsToSave(proj) returning a mock whose Load returns proj and whose Save returns an error
        - Implement project.lastSaved() returning the most recent project passed to Save during the test
      passing: false
    - slug: project-fix-prompt
      description: Add the project fix instruction template and prompt builder to internal/ai
      items:
        - Add an embedded instruction template named project-fix-instructions.md following the same shape as architecture-fix-instructions.md
        - The template MUST instruct the agent to rewrite the project YAML at the given path so it parses, given the most recent load error
      code:
        - name: BuildProjectFixPrompt
          description: builds the prompt used by the validate fix loop, parallel to BuildArchitectureFixPrompt
          module: internal/ai
          body: |
            func BuildProjectFixPrompt(projectFile string, loadErr error) (string, error)
      passing: true
    - slug: agent-client-adapter
      description: Add the AgentClient adapter that builds the fix prompt and runs the agent locally with the configured model
      scenarios:
        - title: Local execution
          items:
            - GIVEN any failed unmarshalling
            - WHEN the fix loop invokes the agent
            - THEN the agent runs on the local machine using the same path used by ralph run --local
            - AND no Argo workflow or remote runner is involved
        - title: Model selection from config
          items:
            - GIVEN a ralph config file with a model field
            - WHEN the fix loop invokes the agent
            - THEN that model is used
            - AND the user is not required to pass a model flag
      code:
        - name: agentClient
          description: production adapter implementing validate.AgentClient via internal/ai
          module: internal/validate
          body: |
            type agentClient struct {
                ctx *context.Context
            }

            func (a agentClient) FixProject(path string, loadErr error) error {
                prompt, err := ai.BuildProjectFixPrompt(path, loadErr)
                if err != nil {
                    return err
                }
                return ai.RunAgent(a.ctx, prompt)
            }
      passing: true
    - slug: agent-client-mocks
      description: Add AgentClient mock builders used by the orchestration tests
      items:
        - Mocks live in the validate package's test files
        - Implement agent.thatFailsToFix() returning a mock whose FixProject returns an error
        - Implement agent.fixCalls() returning the list of (path, error) pairs passed to FixProject during the test
        - The default mock used by validate.withMocks() must record FixProject calls without returning an error
      passing: true
    - slug: validate-cmd-wiring
      description: Refactor internal/cmd/validate.go so the Kong command wires up the Validator, runs it, and logs the success message
      items:
        - Remove the existing inline project.LoadProject call from ValidateCmd.Run and replace it with a constructed Validator
        - Wire the Validator with the production projectClient and an agentClient bound to the execution context produced by createExecutionContext
        - On success, log a confirmation message identifying the project slug and requirement count using logger.Successf
        - Update internal/cmd/validate_test.go to cover the new wiring at a high level; detailed schema-error cases now belong to internal/project's tests
      scenarios:
        - title: Valid project file
          items:
            - GIVEN a project file that ends up valid (with or without agent fixes)
            - WHEN ralph validate is run
            - THEN the command exits with status code 0
            - AND a message confirms the project is valid and reports its slug and requirement count
        - title: File path missing
          items:
            - GIVEN no positional argument
            - WHEN the user runs ralph validate
            - THEN the command exits with a non-zero status and reports that a project file path is required
      code:
        - name: ValidateCmd.Run
          description: Kong command entrypoint that constructs the Validator and reports the result
          module: internal/cmd
          body: |
            func (v *ValidateCmd) Run() error {
                ctx := createExecutionContext()
                validator := validate.New(ctx)
                proj, err := validator.Validate(v.ProjectFile)
                if err != nil {
                    return err
                }
                logger.Successf("Project '%s' is valid (%d requirements)", proj.Slug, len(proj.Requirements))
                return nil
            }
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver minor bump to the app version
      passing: false
