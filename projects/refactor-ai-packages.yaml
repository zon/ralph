name: refactor-ai-packages
description: Reorganize internal/ai, internal/prompt, and internal/run/ai_helpers.go into cleaner layers

requirements:
  - category: refactoring
    description: Create internal/opencode package with low-level CLI operations
    items:
      - Create internal/opencode/opencode.go with package opencode
      - Move runOpenCodeCommand, RunCommand, DisplayStats, runOpenCodeCommandWithRing, and ringWriter from internal/ai/ai.go into internal/opencode/opencode.go
      - Move the tests for RunCommand, DisplayStats, ringWriter, and TestRunAgentErrorIncludesTail from internal/ai/ai_test.go into internal/opencode/opencode_test.go (package opencode), updating the import path
      - internal/opencode must have no dependencies on internal/ai or internal/prompt
    passing: true

  - category: refactoring
    description: Consolidate prompt builders and helpers into internal/ai
    items:
      - Move all prompt builder functions and types (BuildFixServicePrompt, FixServicePromptData, BuildDevelopPrompt, DevelopPromptData, BuildPickPrompt, PickPromptData, BuildPRSummaryPrompt, PRSummaryPromptData, BuildChangelogPrompt, ChangelogPromptData, BuildReviewPRBodyPrompt, ReviewPRBodyPromptData, executeTemplate) from internal/prompt/prompt.go into internal/ai — keeping the embedded .md files accessible (they live in internal/prompt/ and must move to internal/ai/ alongside the Go file)
      - Move all .md template files (pr-summary-instructions.md, changelog-instructions.md, review-pr-body-instructions.md) from internal/prompt/ to internal/ai/ and update the go:embed directives
      - Move createTempFile, runOpenCodeAndReadResult, GeneratePRSummary, GenerateChangelog, and GenerateReviewPRBody from internal/run/ai_helpers.go into internal/ai/ai.go, replacing the duplicate resolveModel and runOpenCodeAndReadResult that already exist in ai.go with the single canonical copies
      - Move tests from internal/run/ai_helpers_test.go and internal/prompt/prompt_test.go into internal/ai/; update package declarations and imports accordingly
      - internal/ai must call internal/opencode (not exec opencode directly); update RunAgent and resolveModel to use opencode.RunCommand / opencode.RunAgentWithRing as appropriate
    passing: true

  - category: refactoring
    description: Update all callers and delete obsolete files
    items:
      - Update internal/project/project.go to import internal/ai instead of internal/prompt; replace prompt.Build* calls with ai.Build*
      - Update internal/run/execute.go to import internal/ai and call ai.GeneratePRSummary, ai.GenerateChangelog directly (these were previously in the same package via ai_helpers.go)
      - Update internal/cmd/review.go to call ai.GenerateReviewPRBody instead of run.GenerateReviewPRBody, and ai.DisplayStats instead of ai.DisplayStats (no change) — verify imports are correct
      - Update internal/cmd/workflow.go if it calls ai.DisplayStats — change to opencode.DisplayStats if DisplayStats was moved there, otherwise keep as ai.DisplayStats if a wrapper is retained
      - Delete internal/run/ai_helpers.go and internal/run/ai_helpers_test.go after their contents have been moved
      - Delete internal/prompt/prompt.go and internal/prompt/prompt_test.go and the internal/prompt/ directory after their contents have been moved
      - Remove the GeneratePRSummary, GenerateChangelog, and GenerateReviewPRBody entries from domain-functions.yaml (they referenced internal/run/ai_helpers.go and are no longer part of internal/run)
      - Run go build ./... and go test ./... to confirm no compile errors or test failures
    passing: true

  - category: version
    description: Bump version
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: false
