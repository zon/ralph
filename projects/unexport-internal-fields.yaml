name: unexport-internal-fields
description: Unexport struct fields and types that leak implementation details

requirements:
  - category: workflow
    description: Workflow and MergeWorkflow fields are unexported
    items:
      - All fields on the Workflow struct in internal/workflow/workflow.go are unexported
      - All fields on the MergeWorkflow struct in internal/workflow/merge_workflow.go are unexported
      - External callers that previously set fields directly (e.g. webhook/events.go setting PRNumber) pass values through constructor parameters instead
      - The Render and Submit methods continue to work via the unexported fields
    passing: true

  - category: services
    description: Process struct hides implementation details
    items:
      - The Cmd, PID, and Service fields on Process in internal/services/services.go are unexported
      - Only Name is exported on Process; callers use Stop() and IsRunning() for control
    passing: true

  - category: context
    description: Context struct uses a consistent access pattern
    items:
      - The Context struct in internal/context/context.go either uses unexported fields with getter methods, or exported fields without getter methods — not both
      - All callers are updated to use whichever pattern is chosen
    passing: true

  - category: webhook
    description: GithubPayload is unexported
    items:
      - The GithubPayload type in internal/webhook/payload.go is unexported since it is only used within the webhook package
    passing: false

  - category: version
    description: Version patch bump
    items:
      - internal/version/VERSION is incremented by one patch version
      - charts/ralph-webhook/Chart.yaml appVersion matches the new VERSION value
      - charts/ralph-webhook/Chart.yaml version is incremented by one patch version
    passing: false

