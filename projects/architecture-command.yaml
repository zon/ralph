name: architecture-command
description: Add a ralph architecture command that generates an architecture.yaml file summarizing the repo

requirements:
  - category: prompt
    description: Create the architecture instructions prompt template
    items:
      - "Create `internal/cmd/architecture-instructions.md` as a Go embed file. The prompt should instruct the AI to act as a software architect analyzing the repo. It must explain the architecture.yaml format (see below), define what a domain function is (business logic, no implementation details, simple flow control, readable), define major feature criteria (user-facing, domain-bounded, covered by one or a small set of domain functions, independently nameable), define module types (domain = encapsulates business rules with no infrastructure concerns; implementation = infrastructure concerns like HTTP, database, git, CLI). It must instruct the AI to: (1) discover all app entrypoints under cmd/ (each subdir is an app), for each app find its main function, identify major features and their domain functions; (2) discover all internal packages under internal/, classify each as domain or implementation and write a one-line description; (3) write the complete architecture.yaml to the path provided in the template variable {{.OutputFile}}. Include the full YAML format in the prompt as a reference example matching the structure: `apps` is a list where each entry has `name`, `description`, `main` (with `file` and `function` fields), and `features` (list of `name`, `description`, and `functions` list of `file`/`name` pairs); `modules` is a list where each entry has `path`, `description`, and `type`."
    passing: true

  - category: ai
    description: Add BuildArchitecturePrompt to the ai package
    items:
      - "Add `ArchitecturePromptData` struct and `BuildArchitecturePrompt(outputFile string) (string, error)` function to `internal/ai/ai.go`, following the same pattern as `BuildChangelogPrompt`. Embed `architecture-instructions.md` with `//go:embed architecture-instructions.md` and execute it against `ArchitecturePromptData{OutputFile: absPath}`."
    passing: true

  - category: cmd
    description: Implement ArchitectureCmd
    items:
      - "Create `internal/cmd/architecture.go` with `ArchitectureCmd` struct (fields: `Output string` with default `architecture.yaml`, `Verbose bool`, `Model string`, `Local bool`) and `Run() error` method. The Run method should: set verbose logging if requested; if `Local` is false (default), generate an Argo workflow via `workflow.GenerateArchitectureWorkflow(r.Output)` and submit it, logging success and returning; if `Local` is true, create an execution context via `createExecutionContext()` with verbose and model set, call `ai.BuildArchitecturePrompt(r.Output)` to get the prompt, call `ai.RunAgent(ctx, prompt)`, and log a success message. The `Local` field should have `help:\"Run on this machine instead of submitting to Argo Workflows\" default:\"false\"`."
      - "Register the new command in `internal/cmd/cmd.go`: add `Architecture ArchitectureCmd` field with `cmd:\"\"` tag and help text `\"Generate an architecture.yaml file summarizing the repo structure\"`."
    passing: true

  - category: architecture
    description: Add internal/architecture package with types and validation
    items:
      - "Create `internal/architecture/architecture.go` defining Go structs that match the architecture.yaml schema: `Architecture` (fields `Apps []App`, `Modules []Module`), `App` (fields `Name`, `Description`, `Main MainFunc`, `Features []Feature`), `MainFunc` (fields `File`, `Function`), `Feature` (fields `Name`, `Description`, `Functions []FuncRef`), `FuncRef` (fields `File`, `Name`), `Module` (fields `Path`, `Description`, `Type`). Add a `Validate() []string` method on `Architecture` that returns a list of human-readable error strings. Validation rules: every app must have a non-empty `Name`, `Description`, `Main.File`, and `Main.Function`; every app must have at least one feature; every feature must have a non-empty `Name` and `Description` and at least one function ref; every function ref must have a non-empty `File` and `Name`; every module must have a non-empty `Path`, `Description`, and `Type` (must be `domain` or `implementation`)."
      - "Add `Load(path string) (*Architecture, error)` to `internal/architecture/architecture.go` that reads a YAML file and unmarshals it into `*Architecture`."
    passing: true

  - category: ai
    description: Add BuildArchitectureFixPrompt to the ai package
    items:
      - "Add `ArchitectureFixPromptData` struct (fields `OutputFile string`, `Errors []string`) and `BuildArchitectureFixPrompt(outputFile string, errors []string) (string, error)` to `internal/ai/ai.go`. Embed `architecture-fix-instructions.md` with `//go:embed architecture-fix-instructions.md` and execute it against the data. Create `internal/ai/architecture-fix-instructions.md`: instruct the AI that the architecture.yaml at `{{.OutputFile}}` has validation errors listed under `## Errors`, and it must fix each error and rewrite the file. Include `{{range .Errors}}- {{.}}{{end}}` in the template."
    passing: false

  - category: cmd
    description: Add validation loop and remote commit/PR to ArchitectureCmd local run
    items:
      - "Update the local execution path in `internal/cmd/architecture.go` to validate the generated file after `ai.RunAgent` succeeds. After the agent runs: call `architecture.Load(r.Output)` to read the file; if loading fails or `arch.Validate()` returns errors, build a fix prompt via `ai.BuildArchitectureFixPrompt(r.Output, errors)` and call `ai.RunAgent` again with the fix prompt; repeat up to 3 times total (initial generation + up to 2 fix attempts); if validation still fails after all attempts, return an error listing the remaining validation errors."
      - "After successful generation and validation, if `ctx.IsWorkflowExecution()` is true and `git.IsFileModifiedOrNew(r.Output)` is true: (1) call `git.CheckoutOrCreateBranch(\"architecture\")` to switch to the architecture branch; (2) call `git.StageFile(r.Output)` to stage the output file; (3) build an auth config from `ctx.RepoOwnerAndName()` and commit + push using `git.CommitAllAndPush(auth, \"architecture\", \"architecture: generate architecture.yaml\")`; (4) call `github.CreatePullRequest` with a title of `\"Update architecture.yaml\"` and an appropriate body; log the PR URL on success. If the file has not changed, log that no changes were detected and skip the PR."
    passing: false

  - category: workflow
    description: Add GenerateArchitectureWorkflow
    items:
      - "Add `GenerateArchitectureWorkflow(output string) (*Workflow, error)` to the workflow package (following the pattern of existing workflow generators). The workflow should run `ralph architecture --local --output <output>` so that remote execution invokes the local path inside the workflow pod."
    passing: false

  - category: version
    description: Apply version bump
    items:
      - Apply a semver minor bump to `internal/version/VERSION` and a patch bump to `charts/ralph-webhook/Chart.yaml`
    passing: true
