slug: ralph-command
title: Add ralph command subcommand
feature: specs/features/ralph/command
requirements:
    - slug: command-cmd
      description: CommandCmd subcommand that validates args, loads config, builds the execution context, and delegates to run.ExecuteCommand
      scenarios:
        - title: Missing command returns error
          items:
            - GIVEN no command is provided after --
            - WHEN the user runs ralph command
            - THEN an error is returned with usage instructions
        - title: Incompatible flags
          items:
            - GIVEN both --follow and --local are set
            - WHEN ralph starts
            - THEN an error is returned
      code:
        - name: CommandCmd
          description: Kong subcommand struct and Run method for the command subcommand
          module: internal/cmd
          body: |
            type CommandCmd struct {
                WorkingDir string
                Command    []string
                NoNotify   bool
                NoServices bool
                Verbose    bool
                Local      bool
                Follow     bool
                Debug      string
                Context    string

                cleanupRegistrar func(func())
            }

            func (c *CommandCmd) Run() error {
                if err := c.changeWorkingDirectory(); err != nil {
                    return err
                }

                if err := c.validateArgs(); err != nil {
                    return err
                }

                if err := CommandFlags{Follow: c.Follow, Local: c.Local, Debug: c.Debug}.Validate(); err != nil {
                    return err
                }

                ralphConfig, err := config.LoadConfig()
                if err != nil {
                    return err
                }

                ctx := c.createExecutionContext()

                setup := &run.CommandSetup{
                    Command: c.Command,
                    Config:  ralphConfig,
                }

                return run.ExecuteCommand(ctx, c.cleanupRegistrar, setup)
            }
      tests:
        - name: TestCommandCmd_MissingCommand
          description: verifies that Run returns an error when no command tokens are provided
          module: internal/cmd
          body: |
            func TestCommandCmd_MissingCommand(t *testing.T) {
                cmd := &CommandCmd{}
                err := cmd.Run()
                assert.Error(t, err)
                assert.Contains(t, err.Error(), "command required")
            }
        - name: TestCommandFlags_FollowWithLocal
          description: verifies that Validate returns an error when both --follow and --local are set
          module: internal/cmd
          body: |
            func TestCommandFlags_FollowWithLocal(t *testing.T) {
                flags := CommandFlags{Follow: true, Local: true}
                err := flags.Validate()
                assert.Error(t, err)
                assert.Contains(t, err.Error(), "--follow")
            }
      passing: false
    - slug: command-flags
      description: CommandFlags type with Validate method rejecting incompatible flag combinations
      code:
        - name: CommandFlags
          description: holds the flag subset that needs cross-flag validation for the command subcommand
          module: internal/cmd
          body: |
            type CommandFlags struct {
                Follow bool
                Local  bool
                Debug  string
            }

            func (f CommandFlags) Validate() error
      passing: true
    - slug: execute-command
      description: ExecuteCommand and CommandSetup in internal/run — runs before-commands then the supplied command locally, or submits remotely
      scenarios:
        - title: Local execution
          items:
            - GIVEN a command is provided and the --local flag is set
            - WHEN the user runs ralph command --local -- <cmd>
            - THEN ralph runs the before-commands, starts any configured services, and executes the supplied command on the current branch
        - title: Before commands configured
          items:
            - GIVEN before commands are defined in .ralph/config.yaml
            - WHEN local execution begins
            - THEN all before commands run sequentially before the supplied command
            - AND a non-zero exit from a non-optional before command aborts execution
        - title: Command succeeds
          items:
            - GIVEN the supplied command exits with code 0
            - WHEN the command finishes
            - THEN execution is considered successful
        - title: Command fails
          items:
            - GIVEN the supplied command exits with a non-zero code
            - WHEN the command finishes
            - THEN execution is considered failed and the non-zero exit is reported
        - title: Success notification
          items:
            - GIVEN --no-notify is not set and the command succeeds
            - WHEN local execution finishes
            - THEN a success desktop notification is shown
        - title: Failure notification
          items:
            - GIVEN --no-notify is not set and the command fails
            - WHEN local execution fails
            - THEN an error desktop notification is shown
      code:
        - name: CommandSetup
          description: input struct carrying the command tokens and ralph config for ExecuteCommand
          module: internal/run
          body: |
            type CommandSetup struct {
                Command []string
                Config  *config.RalphConfig
            }
        - name: ExecuteCommand
          description: runs before-commands then the user-supplied command locally, or submits an Argo Workflow for remote execution
          module: internal/run
          body: |
            func ExecuteCommand(ctx *context.Context, cleanupRegistrar func(func()), setup *CommandSetup) error {
                if !ctx.IsLocal() {
                    return executeCommandRemote(ctx, setup)
                }

                if err := infrastructureRunBeforeCommands(setup.Config); err != nil {
                    return err
                }

                if err := runCommand(setup.Command); err != nil {
                    notify.Error("command", ctx.ShouldNotify())
                    return err
                }

                notify.Success("command", ctx.ShouldNotify())
                return nil
            }
      tests:
        - name: TestExecuteCommand_BeforeCommandFailure
          description: verifies that a failing before-command aborts execution before the main command runs
          module: internal/run
          body: |
            func TestExecuteCommand_BeforeCommandFailure(t *testing.T)
        - name: TestExecuteCommand_CommandFailure
          description: verifies that a non-zero command exit returns an error and sends an error notification
          module: internal/run
          body: |
            func TestExecuteCommand_CommandFailure(t *testing.T)
        - name: TestExecuteCommand_CommandSuccess
          description: verifies that a zero command exit returns nil and sends a success notification
          module: internal/run
          body: |
            func TestExecuteCommand_CommandSuccess(t *testing.T)
      passing: false
    - slug: run-command-helper
      description: runCommand helper in internal/run that executes command tokens as a subprocess, streaming output
      code:
        - name: runCommand
          description: executes command tokens in a subprocess with streaming output; returns error on non-zero exit
          module: internal/run
          body: |
            func runCommand(command []string) error
      passing: false
    - slug: execute-command-remote
      description: executeCommandRemote in internal/run that generates and submits an Argo Workflow embedding the command
      scenarios:
        - title: Remote submission
          items:
            - GIVEN a command is provided and the current branch is in sync with the remote
            - WHEN the user runs ralph command -- <cmd>
            - THEN an Argo Workflow is generated embedding the command
            - AND the workflow is submitted to the configured Kubernetes cluster
            - AND the user is shown a command to follow logs
        - title: Follow logs
          items:
            - GIVEN --follow (or -f) is set and --local is not set
            - WHEN the workflow is submitted
            - THEN ralph streams the workflow logs until the workflow completes
      code:
        - name: executeCommandRemote
          description: generates a command workflow and submits it to Argo; follows logs if --follow is set
          module: internal/run
          body: |
            func executeCommandRemote(ctx *context.Context, setup *CommandSetup) error
      passing: false
    - slug: generate-command-workflow
      description: GenerateCommandWorkflow in internal/workflow that builds a Workflow embedding the user command
      code:
        - name: GenerateCommandWorkflow
          description: builds a Workflow for remote command execution, cloning the current branch and running the supplied command
          module: internal/workflow
          body: |
            func GenerateCommandWorkflow(ctx *execcontext.Context, cloneBranch string) (*Workflow, error) {
                remoteURL, err := resolveRemoteURL(ctx)
                if err != nil {
                    return nil, err
                }

                ralphConfig, err := config.LoadConfig()
                if err != nil {
                    return nil, err
                }

                repo, err := githubpkg.ParseRemoteURL(remoteURL)
                if err != nil {
                    return nil, err
                }

                opts := workflowOptionsFromConfig(ralphConfig, ctx)

                return &Workflow{
                    ProjectName: "command",
                    Repo:        repo,
                    CloneBranch: cloneBranch,
                    Command:     ctx.Command(),
                    Verbose:     ctx.IsVerbose(),
                    DebugBranch: ctx.DebugBranch(),
                    NoServices:  ctx.NoServices(),
                    Model:       ctx.Model(),
                    Image:       opts.Image,
                    ConfigMaps:  opts.ConfigMaps,
                    Secrets:     opts.Secrets,
                    Env:         opts.Env,
                    KubeContext: opts.KubeContext,
                    Namespace:   opts.Namespace,
                    Labels:      opts.Labels,
                }, nil
            }
      passing: false
    - slug: workflow-command-support
      description: Add Command field to the Workflow struct and wire it into the container args and env vars
      items:
        - Add a Command []string field to the Workflow struct in internal/workflow
        - When Command is non-empty, buildMainTemplate must invoke ralph workflow --command -- <tokens> in the container args
        - ctx.Command() and ctx.SetCommand() must be added to internal/context
        - workflowOptionsFromConfig must be extracted as a shared helper in internal/workflow if it does not already exist
      passing: true
    - slug: register-command-subcommand
      description: Register CommandCmd with the Kong CLI in cmd/ralph so ralph command is a valid subcommand
      items:
        - Add a Command CommandCmd field to the CLI struct in cmd/ralph/main.go (or equivalent Kong root)
        - Wire cleanupRegistrar into CommandCmd the same way RunCmd receives it
      passing: false
    - slug: version-bump
      description: Version bump for the new command subcommand
      items:
        - Apply a semver minor bump to internal/version/VERSION
        - Apply a matching patch bump to charts/ralph-webhook/Chart.yaml (appVersion and version)
      passing: false
