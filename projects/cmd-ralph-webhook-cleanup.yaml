slug: cmd-ralph-webhook-cleanup
title: Push adapter logic from cmd/ralph-webhook into internal/provisioning
maxIterations: 15
requirements:
    - slug: build-webhook-app-config-from-k8s
      description: Extract the multi-step read-and-merge logic from setconfigCfgClient.Build into a new provisioning function and reduce the entry adapter to a one-line delegation.
      items:
        - 'In internal/provisioning/webhook.go add: func BuildWebhookAppConfigFromK8s(ctx context.Context, namespace, kubeContext, configPath string, configReader func(context.Context, string, string) (*webhookconfig.AppConfig, error), ghClient github.GHClient, out *output.Client) webhookconfig.AppConfig. The function calls configReader(ctx, namespace, kubeContext); on error it calls out.Warnf with the message "Could not read existing configmap ''%s'': %v (starting from scratch)" using provisioning.WebhookConfigMapName and the error, then sets base to nil. If configPath is non-empty it calls webhookconfig.LoadAppConfig(configPath); on error it calls out.Warnf with "Failed to load partial config: %v (ignoring)" and skips (updates stays nil); on success it sets updates to the loaded value. It then calls and returns BuildWebhookAppConfig(ctx, out, base, updates, "", "", "", ghClient). Handle nil out safely (check before calling methods on it, matching the existing pattern in BuildWebhookAppConfig).'
        - 'In internal/provisioning/webhook_test.go add TestBuildWebhookAppConfigFromK8s with table-driven subtests: (1) ''proceeds with defaults when configReader returns error'' — pass a configReader that returns an error, no configPath; assert result port is 8080 and RalphUser is the default; (2) ''loads partial config from configPath when configReader fails'' — pass a configReader that returns an error, write a temp file in t.TempDir() with ''port: 7070'', set configPath to that file; assert result port is 7070; (3) ''ignores partial config and uses defaults when configPath file does not exist'' — pass a configReader that returns an error, set configPath to a non-existent path in t.TempDir(); assert result port is 8080.'
        - 'In cmd/ralph-webhook/set_config.go replace the entire body of setconfigCfgClient.Build with a single return statement: return provisioning.BuildWebhookAppConfigFromK8s(c.ctx, k8sCtx.Namespace, k8sCtx.Name, configPath, provisioning.ReadWebhookConfigFromK8s, c.ghClient, c.out). Keep the out field on setconfigCfgClient — it is still needed to pass to BuildWebhookAppConfigFromK8s.'
      passing: true
    - slug: register-all-github-webhooks
      description: Extract the webhook registration loop and URL construction from setconfigGitHubClient.RegisterWebhooks into a new provisioning function and reduce the entry adapter to a one-line delegation.
      items:
        - 'In internal/provisioning/webhook.go add: func RegisterAllGitHubWebhooks(ctx context.Context, ghClient github.GHClient, out *output.Client, repos []webhookconfig.RepoSecret). The function derives webhookURL as fmt.Sprintf("https://%s/webhook", WebhookIngressHostname), calls out.Infof("Registering webhooks at %s...", webhookURL), then for each repo calls RegisterGitHubWebhook(ctx, ghClient, rs.Owner, rs.Name, webhookURL, rs.WebhookSecret); on success calls out.Successf("Webhook registered for %s/%s", rs.Owner, rs.Name); on error calls out.Warnf("Failed to register webhook for %s/%s: %v", rs.Owner, rs.Name, err). After the loop calls out.Info("").'
        - 'In internal/provisioning/webhook_test.go add TestRegisterAllGitHubWebhooks with subtests: (1) ''calls Successf for each successful registration'' — two repos, both succeed via MockGH; capture output via bytes.Buffer writers on output.NewClient; assert Successf messages appear for each repo; (2) ''calls Warnf for failed registration and continues'' — two repos, first fails, second succeeds; assert Warnf message for first repo and Successf message for second; (3) ''does nothing on empty repos slice'' — pass empty slice; assert no panic and no repo-level output lines.'
        - 'In cmd/ralph-webhook/set_config.go replace the entire body of setconfigGitHubClient.RegisterWebhooks with a single call: provisioning.RegisterAllGitHubWebhooks(c.ctx, c.ghClient, c.out, secrets.Repos). Keep the out field on setconfigGitHubClient. Remove the fmt import from set_config.go if it is no longer referenced by any other code in the file.'
      passing: true
    - slug: write-webhook-secrets-and-log
      description: Extract the post-write success output from setconfigSecretsClient.Write into a new provisioning function and reduce the entry adapter to a one-line delegation.
      items:
        - 'In internal/provisioning/webhook.go add: func WriteWebhookSecretsAndLog(ctx context.Context, client k8s.Client, kubeContext, namespace string, secrets *webhookconfig.Secrets, out *output.Client) error. The function calls WriteWebhookSecrets(ctx, client, kubeContext, namespace, secrets); on error it returns the error unchanged without logging. On success it calls out.Successf("Secret ''%s'' created/updated in namespace ''%s''", WebhookSecretsSecretName, namespace) and returns nil.'
        - 'In internal/provisioning/webhook_test.go add TestWriteWebhookSecretsAndLog with subtests: (1) ''calls Successf with secret name and namespace on success'' — use k8s.MockClient that succeeds; capture output via bytes.Buffer writers on output.NewClient; assert no error and that the Successf message contains WebhookSecretsSecretName and the namespace; (2) ''returns error and does not call Successf when write fails'' — use k8s.MockClient that returns an error; capture output; assert the error is returned and the output buffer contains no success message.'
        - 'In cmd/ralph-webhook/set_config.go update setconfigSecretsClient.Write: replace the two-line body (WriteWebhookSecrets call + out.Successf call) with a single call to provisioning.WriteWebhookSecretsAndLog(c.ctx, c.k8sClient, k8sCtx.Name, k8sCtx.Namespace, s, c.out). Keep the out field on setconfigSecretsClient — it is still needed to pass to WriteWebhookSecretsAndLog.'
      passing: false
