slug: workspace-cover-prepare-and-credentials-paths
title: Add missing test coverage for internal/workspace's setup and client functions
maxIterations: 10
requirements:
    - slug: test-prepare-workspace
      description: |
        Add unit test coverage for PrepareWorkspace in internal/workspace/workspace.go, which currently has zero test coverage anywhere in the repo.
      items:
        - |
          internal/workspace/workspace_test.go gains a test that sets up a local bare git remote inside a t.TempDir() (using `git init --bare` and pushing at least one commit on a named branch plus the default branch — mirroring setupBareRemoteRepo in internal/git/git_test.go), then calls PrepareWorkspace(out, repoURL, branch, workDir) with repoURL pointing at that local bare repo's filesystem path, branch set to the named branch, and workDir set to a fresh path inside a t.TempDir(). The test asserts PrepareWorkspace returns nil, that workDir now contains a checked-out working copy (e.g. asserting a known committed file exists at the expected path), and that the process's current working directory is now workDir (mirroring TestChdir's os.Getwd assertion).
        - |
          A second case (or subtest) exercises the fallback path at workspace.go:55-59: call PrepareWorkspace with a branch name that does not exist on the local bare remote, and assert it still succeeds by falling back to cloning the default branch (git.Clone(repoURL, "", workDir)) — asserting the clone succeeds and workDir contains the default branch's checked-out content.
        - |
          A third case asserts the error path: call PrepareWorkspace with a repoURL that does not point to any valid git repository (e.g. a nonexistent local path), and assert the returned error wraps "failed to clone repository".
        - |
          All git operations in these tests target only local bare repositories created inside t.TempDir() — never a real GitHub URL or the actual ralph repository (per the documented isolation rule that git "may be invoked in unit tests, but only against an isolated temporary directory — never the real repository," and the prior incident where a test running git against the real repo caused a lost branch). Tests use testify require/assert and t.Run() subtests, consistent with the table-driven structure used elsewhere in the package and in internal/git's test suite.
      passing: true
    - slug: test-setup-opencode-credentials
      description: |
        Add unit test coverage for SetupOpenCodeCredentials in internal/workspace/workspace.go, which currently has zero test coverage anywhere in the repo.
      items:
        - |
          internal/workspace/workspace_test.go gains a test that uses t.Setenv("HOME", t.TempDir()) to redirect the function's HOME-derived destination directory into an isolated location, then calls SetupOpenCodeCredentials(out) and asserts it returns nil and that the "<HOME>/.local/share/opencode" directory was created (verifying the os.MkdirAll side effect at workspace.go:21-24).
        - |
          The same test (or a subtest) asserts the "no credentials file present" no-op path: because DefaultOpenCodeSecretsDir ("/secrets/opencode") will not exist in the test environment, os.Stat(authFile) returns a not-exist error, and the function must return nil without creating any file at "<HOME>/.local/share/opencode/auth.json" — assert that no such file exists after the call.
        - |
          The test does not attempt to exercise the credential-copy branch (workspace.go:27-39), since that requires write access to the fixed, non-injectable DefaultOpenCodeSecretsDir constant outside the test's control — covering the directory-creation and no-op paths is sufficient given the function's current (non-parameterized) design.
        - |
          The test uses testify require/assert, follows the existing structure of internal/workspace/workspace_test.go (e.g. TestConstants, TestChdir), and performs no filesystem operations outside of t.TempDir() and the redirected HOME.
      passing: true
    - slug: test-client-change-directory
      description: |
        Add a direct unit test for Client.ChangeDirectory in internal/workspace/client.go, covering the empty-path short-circuit branch that is currently exercised only through orchestration-layer mocks (which never invoke the real implementation).
      items:
        - |
          internal/workspace/client_test.go (new file, package workspace) gains TestClientChangeDirectory with at least two cases: (1) calling (&Client{}).ChangeDirectory("") and asserting it returns nil while the process's current working directory is unchanged (capture os.Getwd() before and after and assert equality — verifying the `if path == "" { return nil }` short-circuit at client.go:6-8 never calls Chdir); (2) calling (&Client{}).ChangeDirectory(dir) with dir set to a fresh t.TempDir() path and asserting it returns nil and that os.Getwd() now equals dir (mirroring TestChdir's assertions, verifying the delegation to Chdir at client.go:9).
        - |
          The test uses testify require/assert and t.Run() subtests, matching the structure and naming conventions of the existing tests in internal/workspace/workspace_test.go (e.g. TestChdir, TestChdirNonexistent).
      passing: true
