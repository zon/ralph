slug: testutil-remove-dead-helpers
title: Remove dead E2E scaffolding and a needless wrapper from internal/testutil
maxIterations: 10
requirements:
    - slug: remove-unused-e2e-helpers
      description: |
        Delete the unused E2EConfig type, NewE2EConfig, and NewE2EContext from internal/testutil/testutil.go.
      items:
        - |
          internal/testutil/testutil.go no longer declares the E2EConfig struct (Repo, Branch, DebugBranch, Namespace, Timeout fields).
        - |
          internal/testutil/testutil.go no longer declares the NewE2EConfig function.
        - |
          internal/testutil/testutil.go no longer declares the NewE2EContext function.
        - |
          These are confirmed dead: grep the entire repository for "E2EConfig", "NewE2EConfig", and "NewE2EContext" — the only matches are their own declarations and doc comments inside internal/testutil/testutil.go; no test file or production code anywhere constructs an E2EConfig or calls NewE2EConfig/NewE2EContext, and no e2e test files exist in the working tree (only a stale remote-tracking ref in .git, which is not source code).
        - |
          After removing these declarations, the "time" import in internal/testutil/testutil.go is removed if it is no longer referenced anywhere else in the file (it was only used by E2EConfig.Timeout and the timeout-parsing logic in NewE2EConfig).
        - |
          go vet ./internal/testutil/... and go test ./internal/testutil/... pass after the deletion, with no compile errors from dangling references or unused imports.
      passing: true
    - slug: remove-contains-wrapper
      description: |
        Delete the Contains helper from internal/testutil/testutil.go — it is a one-line pass-through to strings.Contains that adds indirection without value — and update its only caller to call strings.Contains directly.
      items:
        - |
          internal/testutil/testutil.go no longer declares the Contains function (the wrapper around strings.Contains).
        - |
          After removing Contains, the "strings" import in internal/testutil/testutil.go is removed if nothing else in the file references the strings package.
        - |
          internal/docker/container_workflow_test.go no longer calls testutil.Contains anywhere; each of its six call sites (currently checking substrings like "podman login", "podman build", "podman push", "latest", "steps.version.outputs.VERSION", "GITHUB_SHA", "SHORT_SHA") instead calls strings.Contains directly with the same arguments and produces the same pass/fail behavior.
        - |
          internal/docker/container_workflow_test.go adds "strings" to its import block.
        - |
          internal/docker/container_workflow_test.go removes the "github.com/zon/ralph/internal/testutil" import, since Contains was its only use of the testutil package and grep confirms no other testutil.* reference remains in the file.
        - |
          go vet ./internal/testutil/... ./internal/docker/... and go test ./internal/testutil/... ./internal/docker/... pass after the change, with no compile errors from dangling references or unused imports.
      passing: true
    - slug: verify-dependents-still-pass
      description: |
        Confirm the repository still builds and the affected packages' tests pass after both deletions, since this change must be purely subtractive with no behavioral impact on any caller.
      items:
        - |
          go build ./... succeeds with no compile errors anywhere in the repository.
        - |
          go test ./internal/testutil/... passes, including TestNewContext, TestNewContext_WithOptions, and TestNewContext_MultipleOptions in testutil_test.go, which remain unchanged.
        - |
          go test ./internal/docker/... passes, including TestContainerBuildWorkflow in container_workflow_test.go with its substring assertions now performed via strings.Contains.
        - |
          go test ./internal/git/... and go test ./internal/cmd/... pass, confirming InitGitRepo, MakeInitialCommit, CreateRalphConfig, and NewContext (the helpers that remain in internal/testutil) are unaffected by this change.
      passing: false
