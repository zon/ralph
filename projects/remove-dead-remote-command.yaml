slug: remove-dead-remote-command
title: Remove dead ExecuteRemoteCommand and ExecuteCommand code paths
maxIterations: 10
requirements:
    - slug: remove-execute-remote-command
      description: internal/orchestration/command/remote.go contains ExecuteRemoteCommand, which performs direct I/O and calls implementation packages directly (git, github, notify, argo, internal/workflow) and uses fmt/format literals. This is not permitted in an orchestration module per docs/code.md, and argo must be mocked in tests per docs/testing.md, but ExecuteRemoteCommand has no tests. It is dead code with no production caller — the kong-wired CommandCmd.Run in internal/cmd/command.go already covers remote command submission via the WorkflowClient interface and commandWorkflowClient implementation.
      items:
        - Delete internal/orchestration/command/remote.go entirely, removing the ExecuteRemoteCommand function
        - Remove the now-unused imports (github.com/zon/ralph/internal/argo, github.com/zon/ralph/internal/context, github.com/zon/ralph/internal/git, github.com/zon/ralph/internal/github, github.com/zon/ralph/internal/notify, github.com/zon/ralph/internal/workflow) from the internal/orchestration/command package if no remaining file in the package references them
        - Run go build ./internal/orchestration/command/... to confirm the package still builds after removal
      passing: false
    - slug: remove-execute-command
      description: internal/cmd/execute.go contains ExecuteCommand and infrastructureRunBeforeCommands, which call orchestrationCommand.ExecuteRemoteCommand (being removed) and runCommand. ExecuteCommand has no production caller — it is invoked only from internal/cmd/command_scenario_test.go and internal/cmd/run_command_test.go, never from kong command wiring (the live path is CommandCmd.Run in internal/cmd/command.go).
      items:
        - Delete internal/cmd/execute.go entirely, removing the ExecuteCommand function and infrastructureRunBeforeCommands helper
        - Delete internal/cmd/command_scenario_test.go and internal/cmd/run_command_test.go, since these tests exercise only the dead ExecuteCommand path
        - Remove the CommandSetup type and runCommand function from internal/cmd/types.go, since after the above deletions they have no remaining callers
        - Remove any imports in internal/cmd/types.go that become unused after removing CommandSetup and runCommand (e.g. os, os/exec, fmt, github.com/zon/ralph/internal/config if unused elsewhere in that file)
        - Run go build ./... and go test ./... to confirm the build succeeds and the full test suite remains green, with no remaining references anywhere in the repo to ExecuteRemoteCommand, ExecuteCommand, CommandSetup, runCommand, or infrastructureRunBeforeCommands
      passing: false
