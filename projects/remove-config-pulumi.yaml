slug: remove-config-pulumi
title: Remove the config pulumi command and all pulumi references
maxIterations: 10
requirements:
    - slug: remove-cmd-files
      description: Delete the config pulumi command files from the cmd package
      items:
        - Delete internal/cmd/config_pulumi.go
        - Delete internal/cmd/config_pulumi_test.go
        - Remove the Pulumi field from the ConfigCmd struct in internal/cmd/cmd.go
      passing: true
    - slug: remove-k8s-constant
      description: Remove the PulumiSecretName constant from the k8s package
      items:
        - Delete the PulumiSecretName constant from internal/k8s/secrets.go
        - Confirm no other files in the repo reference PulumiSecretName after removal
      passing: true
    - slug: remove-workflow-injection
      description: Remove pulumi secret and volume injection from workflow generation
      items:
        - Remove the hasPulumiToken check and the PULUMI_ACCESS_TOKEN env var injection from internal/workflow/workflow.go
        - Remove the pulumi-credentials volume and volume mount entries from internal/workflow/scripts.go
      passing: true
    - slug: remove-spec-files
      description: Remove the config-pulumi spec and its index entry
      items:
        - Delete the file specs/features/ralph/config-pulumi/spec.md
        - Delete the directory specs/features/ralph/config-pulumi/
        - Remove the config-pulumi line from specs/README.md
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver major bump to the app version
      passing: false
