slug: fix-notify-tests-mock
title: Fix notify package tests to not invoke beeep directly
maxIterations: 10
requirements:
    - slug: remove-beeep-tests
      description: Remove tests that trigger real OS desktop notifications via beeep
      items:
        - Remove TestNotifyClientError_WithNotificationsEnabled from internal/notify/client_test.go
        - Remove TestNotifyClientSuccess_WithNotificationsEnabled from internal/notify/client_test.go
        - The remaining tests in client_test.go (TestNotifyClientNew, TestNotifyClientShouldNotifyFromContext, TestNotifyClientImplementsInterface, TestNotifyClientError_WithNotificationsDisabled, TestNotifyClientSuccess_WithNotificationsDisabled) must be preserved unchanged
      passing: true
    - slug: mock-client-tests
      description: Add tests for MockClient that verify its behavior without OS side effects
      items:
        - Create a new file internal/notify/client_mock_test.go in package notify
        - Test that MockClient.Error appends the slug to ErrorsSlice
        - Test that MockClient.Error calls ErrorFunc when it is set
        - Test that MockClient.Error does not panic when ErrorFunc is nil
        - Test that MockClient.Success appends the slug to SuccessesSlice
        - Test that MockClient.Success calls SuccessFunc when it is set
        - Test that MockClient.Success does not panic when SuccessFunc is nil
      tests:
        - name: TestMockClientError_AppendsToSlice
          description: verifies MockClient.Error appends the slug to ErrorsSlice
          module: internal/notify
          body: |
            func TestMockClientError_AppendsToSlice(t *testing.T) {
              m := &MockClient{}
              m.Error("test-slug")
              assert.Equal(t, []string{"test-slug"}, m.ErrorsSlice)
            }
        - name: TestMockClientError_CallsErrorFunc
          description: verifies MockClient.Error calls ErrorFunc when set
          module: internal/notify
          body: |
            func TestMockClientError_CallsErrorFunc(t *testing.T) {
              var called string
              m := &MockClient{
                ErrorFunc: func(slug string) { called = slug },
              }
              m.Error("test-slug")
              assert.Equal(t, "test-slug", called)
            }
        - name: TestMockClientError_NilErrorFunc
          description: verifies MockClient.Error does not panic when ErrorFunc is nil
          module: internal/notify
          body: |
            func TestMockClientError_NilErrorFunc(t *testing.T) {
              m := &MockClient{}
              assert.NotPanics(t, func() { m.Error("test-slug") })
            }
        - name: TestMockClientSuccess_AppendsToSlice
          description: verifies MockClient.Success appends the slug to SuccessesSlice
          module: internal/notify
          body: |
            func TestMockClientSuccess_AppendsToSlice(t *testing.T) {
              m := &MockClient{}
              m.Success("test-slug")
              assert.Equal(t, []string{"test-slug"}, m.SuccessesSlice)
            }
        - name: TestMockClientSuccess_CallsSuccessFunc
          description: verifies MockClient.Success calls SuccessFunc when set
          module: internal/notify
          body: |
            func TestMockClientSuccess_CallsSuccessFunc(t *testing.T) {
              var called string
              m := &MockClient{
                SuccessFunc: func(slug string) { called = slug },
              }
              m.Success("test-slug")
              assert.Equal(t, "test-slug", called)
            }
        - name: TestMockClientSuccess_NilSuccessFunc
          description: verifies MockClient.Success does not panic when SuccessFunc is nil
          module: internal/notify
          body: |
            func TestMockClientSuccess_NilSuccessFunc(t *testing.T) {
              m := &MockClient{}
              assert.NotPanics(t, func() { m.Success("test-slug") })
            }
      passing: false
