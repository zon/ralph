name: run-package-cleanup
description: Move infrastructure functions out of internal/run into appropriate packages

requirements:
  - category: git
    description: Move branch management functions to internal/git
    items:
      - Move ValidateGitStateAndSwitchBranch to internal/git/branch.go
      - Move SwitchToProjectBranch to internal/git/branch.go
      - Move validateBranchSync (private helper) alongside them, keeping it unexported
      - Update all callers in internal/run to reference the new locations
    passing: false

  - category: github
    description: Move CreatePullRequest to internal/github
    items:
      - Move CreatePullRequest to internal/github (cli.go or a new pr.go file)
      - Update all callers in internal/run to reference the new location
    passing: false

  - category: commit
    description: Move CommitChanges to internal/git by separating message generation from git operations
    items:
      - Add a message argument to CommitChanges so it no longer calls AI internally
      - Move CommitChanges and performCommit to internal/git (pure git operations only — stage, commit, pull/push)
      - Move PullAndPush to internal/git (it is already a thin wrapper around git.PullAndPush; consolidate the two)
      - Keep generateChangelogIfNeeded and getCommitMessage in internal/run; the caller in runSingleIteration generates the message then passes it to git.CommitChanges
      - Remove the duplicate ErrFatalPushError from internal/run/iteration.go; use git.ErrFatalPushError instead
      - Move ErrNoChanges to internal/git alongside CommitChanges
    passing: false

  - category: cleanup
    description: internal/run contains only domain logic after the moves
    items:
      - internal/run/execute.go and internal/run/iteration.go no longer define or call any of the moved functions directly
      - Remove the four functions from domain-functions.yaml
    passing: false

  - category: version
    description: Bump version for internal refactor
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: false
