name: test-github-pr-creation
description: Add tests for CreatePR logic in internal/github/github.go

requirements:
  - category: testing
    description: CreatePR dry-run behavior
    items:
      - A test verifies CreatePR returns a URL containing "dry-run" and no error in dry-run mode
      - A test verifies CreatePR does not invoke the gh CLI in dry-run mode
    passing: false

  - category: testing
    description: truncate edge cases
    items:
      - A test verifies truncate returns the original string when it is shorter than the max length
      - A test verifies truncate returns the original string when it is exactly the max length
      - A test verifies truncate returns a truncated string ending with "..." when it exceeds the max length
      - A test verifies truncate handles an empty string
    passing: false
