name: test-requirement-execution
description: Add tests for requirement execution in internal/requirement/execute.go

requirements:
  - category: testing
    description: blocked.md detection tests
    items:
      - A test verifies Execute returns an error mentioning blocked.md when a blocked.md file exists in the project file's directory
      - A test verifies Execute includes the contents of blocked.md in the error message when the file is readable
      - A test verifies Execute proceeds normally when blocked.md does not exist
    passing: false

  - category: testing
    description: Project file normalization tests
    items:
      - A test verifies Execute trims excess trailing newlines from the project file after the AI agent runs, leaving exactly one trailing newline
      - A test verifies Execute stages the project file via git when it has changes after the agent runs
      - A test verifies Execute does not stage the project file when it has no changes
    passing: false

  - category: testing
    description: Service startup and fix prompt tests
    items:
      - A test verifies Execute starts configured services when NoServices is false and services are defined in the config
      - A test verifies Execute in dry-run mode starts services in dry-run mode without invoking real processes
    passing: false
