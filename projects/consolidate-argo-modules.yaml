name: consolidate-argo-modules
description: Consolidate split Argo operations into deep module

requirements:
  - category: refactoring
    description: Consolidate Argo CLI operations currently split between internal/argo and internal/workflow
    items:
      - Move workflow/argo.go FollowLogs function to internal/argo/argo.go
      - Move workflow/generate.go submitYAML function to internal/argo/argo.go
      - Move workflow/generate.go extractWorkflowName function to internal/argo/argo.go
      - Update all import references from workflow to argo where applicable
      - Remove internal/workflow/argo.go after consolidation
    passing: true

  - category: version
    description: Bump version to reflect the refactoring changes
    items:
      - Apply a semver patch bump to internal/version/VERSION and the appVersion field in charts/ralph-webhook/Chart.yaml
      - Apply a semver patch bump to the version field in charts/ralph-webhook/Chart.yaml
    passing: true
