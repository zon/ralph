name: list-stop-commands
description: Add ralph list and ralph stop commands

requirements:
  - category: cli
    description: Add list and stop subcommands to the ralph CLI
    items:
      - "`ralph list` runs `argo list -n <namespace>` using the repo's configured namespace and streams output to stdout"
      - "`ralph stop <workflow-name>` runs `argo stop -n <namespace> <workflow-name>` using the repo's configured namespace and streams output to stdout"
      - "`ralph stop` requires a positional workflow name argument"
      - "Both commands accept an optional `--context` flag that is passed to argo as `--context`"
      - "Both commands resolve the namespace using the same priority as other ralph commands: `.ralph/config.yaml` workflow.namespace, then kubectl current context namespace, then `default`"
    passing: true

  - category: version
    description: Version bump for new features
    items:
      - Apply a semver minor bump to `internal/version/VERSION` and a semver patch bump to the `version` field in `charts/ralph-webhook/Chart.yaml`; also update `appVersion` in `charts/ralph-webhook/Chart.yaml` to match the new app version
    passing: true
