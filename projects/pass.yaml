slug: pass
title: Move pass orchestration from internal/cmd to internal/orchestration/pass
feature: specs/features/ralph/pass
maxIterations: 10
requirements:
    - slug: pass-orchestration
      description: Create internal/orchestration/pass with PassCmd and its tests
      code:
        - name: PassCmd
          description: command struct that marks a project requirement as passing or failing by loading, updating, and saving the project YAML
          module: internal/orchestration/pass
          body: |
            type PassCmd struct {
                ProjectFile string `arg:""`
                Slug        string `arg:""`
                False       bool   `name:"false"`
            }

            func (c *PassCmd) Run() error {
                proj, err := project.LoadProject(c.ProjectFile)
                if err != nil {
                    return err
                }

                if err := project.UpdateRequirementStatus(proj, c.Slug, !c.False); err != nil {
                    return err
                }

                return project.SaveProject(c.ProjectFile, proj)
            }
      tests:
        - name: TestPassCmd_MarkPassing
          description: verifies PassCmd sets the requirement's passing field to true
          module: internal/orchestration/pass
          body: |
            func TestPassCmd_MarkPassing(t *testing.T) {
                path := project.FileWithRequirement(t, "my-req", false)
                cmd := &PassCmd{ProjectFile: path, Slug: "my-req"}
                require.NoError(t, cmd.Run())
                assert.True(t, project.RequirementStatus(t, path, "my-req"))
            }
        - name: TestPassCmd_MarkFailing
          description: verifies PassCmd sets the requirement's passing field to false when --false is given
          module: internal/orchestration/pass
          body: |
            func TestPassCmd_MarkFailing(t *testing.T) {
                path := project.FileWithRequirement(t, "my-req", true)
                cmd := &PassCmd{ProjectFile: path, Slug: "my-req", False: true}
                require.NoError(t, cmd.Run())
                assert.False(t, project.RequirementStatus(t, path, "my-req"))
            }
        - name: TestPassCmd_FileNotFound
          description: verifies PassCmd returns an error when the project file does not exist
          module: internal/orchestration/pass
          body: |
            func TestPassCmd_FileNotFound(t *testing.T) {
                cmd := &PassCmd{ProjectFile: project.NonExistentFile(t), Slug: "my-req"}
                assert.Error(t, cmd.Run())
            }
        - name: TestPassCmd_SlugNotFound
          description: verifies PassCmd returns an error when no requirement with the given slug exists
          module: internal/orchestration/pass
          body: |
            func TestPassCmd_SlugNotFound(t *testing.T) {
                path := project.FileWithRequirement(t, "my-req", false)
                cmd := &PassCmd{ProjectFile: path, Slug: "unknown-slug"}
                assert.Error(t, cmd.Run())
            }
      passing: true
    - slug: remove-internal-cmd-pass
      description: Remove pass.go and pass_test.go from internal/cmd and update cmd.go to use pass.PassCmd
      items:
        - Delete internal/cmd/pass.go
        - Delete internal/cmd/pass_test.go
        - In internal/cmd/cmd.go import github.com/zon/ralph/internal/orchestration/pass and change the Pass field type from PassCmd to pass.PassCmd
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
