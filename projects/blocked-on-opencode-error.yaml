name: blocked-on-opencode-error
description: Write blocked.md when opencode exits non-zero during requirement iteration

requirements:
  - category: feature
    description: Write blocked.md when opencode exits non-zero during requirement iteration
    items:
      - When ralph iterates requirements and opencode exits with a non-zero status, ralph writes a `blocked.md` file in the working directory
      - The `blocked.md` file states that the last iteration failed and includes a relevant tail of the last opencode output to aid debugging
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver minor bump to `internal/version/VERSION` and the `appVersion` field in `charts/ralph-webhook/Chart.yaml`; apply a patch bump to the chart `version` field
    passing: true
