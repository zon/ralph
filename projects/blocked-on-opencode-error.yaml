name: blocked-on-opencode-error
description: Write blocked.md when opencode exits non-zero during requirement iteration

requirements:
  - category: feature
    description: ai.RunAgent relays opencode output and includes tail in errors; internal/requirement writes blocked.md on failure
    items:
      - ai.RunAgent always relays opencode's stdout and stderr to the terminal in real-time; there is no verbose mode
      - When opencode exits with a non-zero status, the error returned by ai.RunAgent includes the last 10 lines of opencode's stdout and stderr
      - Calls to ai.RunAgent in internal/requirement detect opencode exit errors and write a blocked.md file in the working directory using the error content
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to `internal/version/VERSION` and the `appVersion` field in `charts/ralph-webhook/Chart.yaml`; apply a patch bump to the chart `version` field
    passing: false
