name: fix-branch-naming
description: Fix branch naming to use project file name without extension instead of directory name

requirements:
  - category: branch naming
    description: Branch name derived from project file name, not directory
    items:
      - The branch name is derived from the project file's name field in the YAML (e.g. a file with "name: fix-pagination" produces branch "fix-pagination")
      - The file's name field is used rather than any component of the file path
    passing: false

  - category: versioning
    description: Version patch bump
    items:
      - internal/version/VERSION is bumped to 3.2.3
      - charts/ralph-webhook/Chart.yaml appVersion is updated to "3.2.3" and version is bumped to 0.2.54
    passing: false

  - category: testing
    description: Tests cover subdirectory project file cases
    items:
      - TestExtractBranchName includes cases where the project file lives in a subdirectory (e.g. projects/p2/fix-pagination.yaml) and asserts the branch name is "fix-pagination" — the file name without extension, not the directory component
      - TestExtractBranchName includes a case where the file name and its parent directory name differ, asserting the file name without extension wins
    passing: false
