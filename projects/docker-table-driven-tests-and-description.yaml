slug: docker-table-driven-tests-and-description
title: Convert internal/docker tests to table-driven subtests and fix architecture description
maxIterations: 8
requirements:
    - slug: subtest-required-components-check
      description: |
        Convert TestDockerfileContainsRequiredComponents in internal/docker/docker_test.go
        to use t.Run() subtests per component, per docs/testing.md's "Use table-driven
        tests with t.Run() subtests" convention.
      items:
        - |
          internal/docker/docker_test.go's TestDockerfileContainsRequiredComponents (currently
          lines 21-74) keeps its requiredComponents table but replaces the bare
          `for _, component := range requiredComponents { ... assert.True(...) }` loop body
          with `t.Run(component.name, func(t *testing.T) { ... })`, moving the existing
          search-term matching and `assert.True(t, found, "Containerfile should contain
          required component: %s", component.name)` assertion inside the subtest closure
          unchanged in behavior and message.
        - |
          Each of the seven existing component cases (Go toolchain, Bun runtime, Playwright,
          Ralph binary, Git, Pulumi, jq) still runs and asserts exactly as before — only the
          test's structure changes (bare loop -> t.Run subtests), not the cases, search terms,
          or assertions.
      passing: true
    - slug: subtest-push-script-contents-check
      description: |
        Convert TestPushScriptContentsValid in internal/docker/docker_test.go to use t.Run()
        subtests per required element, per docs/testing.md's table-driven convention.
      items:
        - |
          internal/docker/docker_test.go's TestPushScriptContentsValid (currently lines
          109-134) keeps its requiredElements table but replaces the bare
          `for _, element := range requiredElements { assert.Contains(...) }` loop body with
          `t.Run(element.name, func(t *testing.T) { assert.Contains(t, script, element.pattern,
          "Push script should contain: %s", element.name) })`, preserving the exact assertion
          and message from the current code.
        - |
          Each of the seven existing element cases (Shebang, Set error handling, Repository
          variable, Tag variable, Podman build command, Podman push command, Containerfile
          reference) still runs and asserts exactly as before — only the test's structure
          changes (bare loop -> t.Run subtests), not the cases, patterns, or assertions.
      passing: true
    - slug: subtest-push-script-env-vars-check
      description: |
        Convert TestPushScriptUsesEnvironmentVariables in internal/docker/docker_test.go to
        use t.Run() subtests per environment variable pattern, per docs/testing.md's
        table-driven convention.
      items:
        - |
          internal/docker/docker_test.go's TestPushScriptUsesEnvironmentVariables (currently
          lines 136-156) keeps its envVarPatterns slice but replaces the bare
          `for _, pattern := range envVarPatterns { assert.Contains(...) }` loop body with
          `t.Run(pattern, func(t *testing.T) { assert.Contains(t, script, pattern, "Push
          script should support %s environment variable", pattern) })`, preserving the exact
          assertion and message from the current code.
        - |
          Both existing patterns (RALPH_IMAGE_REPOSITORY, RALPH_IMAGE_TAG) still run and
          assert exactly as before — only the test's structure changes (bare loop -> t.Run
          subtests), not the patterns or assertions. The trailing
          `assert.Contains(t, script, "ghcr.io/zon/ralph", ...)` and
          `assert.Contains(t, script, "latest", ...)` checks (the script's default repository
          and tag, which are not part of the env-var table) remain as top-level assertions in
          TestPushScriptUsesEnvironmentVariables, exactly as they are today — they describe a
          different concern (defaults) than the per-variable table and are intentionally left
          out of the new subtests.
      passing: true
    - slug: fix-architecture-description
      description: |
        Correct the internal/docker description in specs/architecture.yaml so it reflects
        everything the module actually validates, not just the Containerfile.
      items:
        - |
          The internal/docker entry in specs/architecture.yaml has its `description` field
          changed from "Test-only package that validates the repository Containerfile" to a
          description that also names the image push script and the container build CI
          workflow — for example "Test-only package that validates the repository
          Containerfile, image push script, and container build CI workflow." The `path` and
          `category` fields are left unchanged.
        - |
          This correction reflects that internal/docker/docker_test.go validates both
          Containerfile (TestDockerfileExists, TestDockerfileContainsRequiredComponents,
          TestDockerfileUsesMultiStageBuilds) and scripts/push-image.sh (TestPushScriptExists,
          TestPushScriptIsExecutable, TestPushScriptContentsValid,
          TestPushScriptUsesEnvironmentVariables, TestDefaultImageMatchesWorkflowDefault),
          while internal/docker/container_workflow_test.go validates
          .github/workflows/container-build.yaml (TestContainerBuildWorkflow) — none of which
          the current "validates the repository Containerfile" description captures in full.
      passing: true
    - slug: verify-docker-tests-pass
      description: |
        Confirm the converted tests still pass and the package builds cleanly after the
        structural changes, since this work must be purely a test-structure and
        documentation correction with no behavioral impact.
      items:
        - |
          go vet ./internal/docker/... and go test ./internal/docker/... pass with no compile
          errors or test failures after the t.Run conversions.
        - |
          go build ./... succeeds, confirming the architecture.yaml description edit (a
          non-Go file) introduced no build breakage.
      passing: false
