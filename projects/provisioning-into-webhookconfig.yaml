slug: provisioning-into-webhookconfig
title: Fold internal/provisioning into internal/webhookconfig and internal/k8s
maxIterations: 10
requirements:
    - slug: k8s-get-configmap-data
      description: internal/k8s.Client gains a method to read a configmap key's data via kubectl, replacing the bespoke exec.CommandContext call in provisioning.ReadWebhookConfigFromK8s
      items:
        - internal/k8s.Client interface declares GetConfigMapData(ctx context.Context, name, namespace, kubeContext string) (string, error)
        - The real implementation in internal/k8s uses the existing runKubectl helper (see internal/k8s/kubectl.go) to run `kubectl get configmap <name> -n <namespace> [--context <kubeContext>] -o jsonpath={.data.config\.yaml}`, trims whitespace from stdout, and returns an error wrapping the command failure if the configmap or key cannot be read
        - internal/k8s.MockClient gains a GetConfigMapDataFunc field and a GetConfigMapData method that calls it (or returns a sensible zero-value default when nil), following the existing mock pattern in internal/k8s/client_mock.go
        - Add a focused unit test for the real GetConfigMapData implementation following the dependency unit test conventions (small, cheap, minimal surface) alongside the existing tests in internal/k8s/configmaps_test.go
      code:
        - name: GetConfigMapData
          description: Reads a single key from a Kubernetes configmap via kubectl and returns its raw string value
          module: internal/k8s
          body: |-
            type Client interface {
            	GetCurrentContext(ctx context.Context) (Context, error)
            	CreateOrUpdateConfigMap(ctx context.Context, name, namespace, kubeContext string, data map[string]string) error
            	CreateOrUpdateSecret(ctx context.Context, name, namespace, kubeContext string, data map[string]string) error
            	SecretExists(ctx context.Context, name, namespace, kubeContext string) (bool, error)
            	GetConfigMapData(ctx context.Context, name, namespace, kubeContext string) (string, error)
            }

            func (c *client) GetConfigMapData(ctx context.Context, name, namespace, kubeContext string) (string, error) {
            	args := []string{"get", "configmap", name, "-n", namespace, "-o", `jsonpath={.data.config\.yaml}`}
            	if kubeContext != "" {
            		args = append(args, "--context", kubeContext)
            	}

            	stdout, err := runKubectl(ctx, nil, args...)
            	if err != nil {
            		return "", fmt.Errorf("failed to read configmap '%s' from namespace '%s': %w", name, namespace, err)
            	}

            	raw := strings.TrimSpace(stdout.String())
            	if raw == "" {
            		return "", fmt.Errorf("configmap '%s' exists but config.yaml key is empty", name)
            	}

            	return raw, nil
            }
      passing: true
    - slug: webhookconfig-provisioning-functions
      description: Move all webhook configuration build/read/write/registration helpers from internal/provisioning into internal/webhookconfig, using the new k8s.Client.GetConfigMapData for reads
      items:
        - internal/webhookconfig gains the constants WebhookConfigMapName = "webhook-config", WebhookSecretsSecretName = "webhook-secrets", and WebhookIngressHostname = "ralph.haralovich.org" (moved verbatim from internal/provisioning/webhook.go)
        - internal/webhookconfig gains GenerateWebhookSecret() (string, error), unchanged from internal/provisioning, generating a 32-byte random base64 URL-encoded secret
        - internal/webhookconfig gains mergeRepo(repos []RepoConfig, incoming RepoConfig) []RepoConfig, unchanged from internal/provisioning, used internally by BuildWebhookAppConfig
        - internal/webhookconfig gains BuildWebhookAppConfig(ctx context.Context, out *output.Client, base, updates *AppConfig, repoOwner, repoName, repoNamespace string, gh github.GHClient) AppConfig, unchanged in behavior from internal/provisioning (merges base config, applies updates, fills defaults for Port and RalphUser, upserts the auto-detected repo, and populates AllowedUsers via gh.ListCollaborators when empty)
        - internal/webhookconfig gains ReadWebhookConfigFromK8s(ctx context.Context, client k8s.Client, namespace, kubeContext string) (*AppConfig, error), which calls client.GetConfigMapData(ctx, WebhookConfigMapName, namespace, kubeContext) and yaml.Unmarshal's the result into an AppConfig, returning a wrapped error on failure to read or parse
        - internal/webhookconfig gains BuildWebhookAppConfigFromK8s(ctx context.Context, namespace, kubeContext, configPath string, client k8s.Client, ghClient github.GHClient, out *output.Client) AppConfig, calling the new ReadWebhookConfigFromK8s for the base config and webhookconfig.LoadAppConfig for the optional partial config, then BuildWebhookAppConfig — matching the existing fallback/warning behavior from internal/provisioning.BuildWebhookAppConfigFromK8s
        - internal/webhookconfig gains BuildWebhookSecrets(appCfg *AppConfig, secretGenerator func() (string, error)) (*Secrets, error), unchanged from internal/provisioning, generating one secret per repo via secretGenerator
        - internal/webhookconfig gains WriteWebhookConfigMap(ctx context.Context, client k8s.Client, kubeContext, namespace string, appCfg AppConfig) error, unchanged from internal/provisioning, marshalling AppConfig to YAML and writing it via client.CreateOrUpdateConfigMap under the config.yaml key
        - internal/webhookconfig gains WriteWebhookSecrets(ctx context.Context, client k8s.Client, kubeContext, namespace string, secrets *Secrets) error and WriteWebhookSecretsAndLog(ctx context.Context, client k8s.Client, kubeContext, namespace string, secrets *Secrets, out *output.Client) error, unchanged from internal/provisioning
        - internal/webhookconfig gains RegisterGitHubWebhook(ctx context.Context, gh github.GHClient, owner, repo, webhookURL, secret string) error and RegisterAllGitHubWebhooks(ctx context.Context, ghClient github.GHClient, out *output.Client, repos []RepoSecret), unchanged from internal/provisioning, including the webhook URL construction using WebhookIngressHostname
        - internal/webhookconfig gains GetKubeContext(ctx context.Context, client k8s.Client, contextOverride string) (string, error), unchanged from internal/provisioning
        - internal/webhookconfig imports github.com/zon/ralph/internal/k8s, github.com/zon/ralph/internal/github, github.com/zon/ralph/internal/output, and github.com/zon/ralph/internal/config as needed for the moved code
        - All unit tests for the moved functions are migrated from internal/provisioning/webhook_test.go into internal/webhookconfig (e.g. a new internal/webhookconfig/provisioning_test.go), preserving the use of k8s.MockClient and github.MockGH and table-driven t.Run() structure; ReadWebhookConfigFromK8s tests are adapted to mock k8s.Client.GetConfigMapDataFunc instead of the prior configReader function parameter
      passing: true
    - slug: rewire-set-config-cmd
      description: cmd/ralph-webhook/set_config.go calls webhookconfig.* instead of provisioning.* for all webhooksetconfig interface implementations
      items:
        - cmd/ralph-webhook/set_config.go no longer imports github.com/zon/ralph/internal/provisioning
        - setconfigCtxClient.Resolve calls webhookconfig.GetKubeContext instead of provisioning.GetKubeContext
        - setconfigCfgClient.Build calls webhookconfig.BuildWebhookAppConfigFromK8s with the new signature (passing the k8s.Client instead of a configReader function)
        - setconfigCfgClient.Write calls webhookconfig.WriteWebhookConfigMap instead of provisioning.WriteWebhookConfigMap
        - setconfigCfgClient.Read calls webhookconfig.ReadWebhookConfigFromK8s with the new k8s.Client-based signature instead of provisioning.ReadWebhookConfigFromK8s
        - setconfigSecretsClient.Generate calls webhookconfig.BuildWebhookSecrets and webhookconfig.GenerateWebhookSecret instead of the provisioning equivalents
        - setconfigSecretsClient.Write calls webhookconfig.WriteWebhookSecretsAndLog instead of provisioning.WriteWebhookSecretsAndLog
        - setconfigGitHubClient.RegisterWebhooks calls webhookconfig.RegisterAllGitHubWebhooks instead of provisioning.RegisterAllGitHubWebhooks
        - Existing tests in internal/orchestration/webhooksetconfig continue to pass unchanged, since they only depend on the webhooksetconfig interfaces, not on internal/provisioning or internal/webhookconfig directly
      passing: false
    - slug: remove-provisioning-module
      description: Delete internal/provisioning entirely and update the architecture registry to reflect the new module boundaries
      items:
        - internal/provisioning/webhook.go and internal/provisioning/webhook_test.go are deleted, and the internal/provisioning directory no longer exists
        - specs/architecture.yaml no longer contains a module entry with path internal/provisioning
        - 'specs/architecture.yaml''s internal/webhookconfig entry description is updated to reflect its expanded scope: loading, validating, building, and provisioning the ralph-webhook service configuration and secrets, including Kubernetes configmap/secret read/write via internal/k8s and GitHub webhook registration via internal/github'
        - The full test suite (go build ./... and go test ./...) passes with no references to internal/provisioning remaining anywhere in the repository
      passing: false
    - slug: version-bump
      description: Version bump for the internal refactor
      items:
        - Apply a semver patch bump to internal/version/VERSION and to charts/ralph-webhook/Chart.yaml (appVersion and version, per the versioning convention in CLAUDE.md)
      passing: false
