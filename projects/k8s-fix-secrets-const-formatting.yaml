slug: k8s-fix-secrets-const-formatting
title: Fix gofmt alignment in internal/k8s/secrets.go const block
maxIterations: 10
requirements:
    - slug: gofmt-secrets-const-block
      description: |
        Reformat the GitHubSecretName/OpenCodeSecretName const block in internal/k8s/secrets.go so the file matches gofmt's canonical output, which gofmt -l currently flags.
      items:
        - |
          The const block in internal/k8s/secrets.go (currently "GitHubSecretName = \"github-credentials\"" and "OpenCodeSecretName = \"opencode-credentials\"" with mismatched spacing before the "=" signs) is reformatted so the "=" signs align, matching gofmt's canonical alignment: "GitHubSecretName   = \"github-credentials\"" and "OpenCodeSecretName = \"opencode-credentials\"".
        - |
          Apply this via gofmt -w internal/k8s/secrets.go (or an equivalent whitespace-only edit) — no constant names, string values, comments, or any other content in the file changes.
        - |
          After the change, `gofmt -l internal/k8s/` reports no files needing formatting.
        - |
          go vet ./internal/k8s/... and go test ./internal/k8s/... pass with no errors.
      passing: false
