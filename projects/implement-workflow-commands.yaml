    - slug: command-submit
      description: Add CommandCmd to internal/orchestration/command — client-side Argo workflow submission and log streaming for arbitrary commands
      code:
        - name: CommandCmd
          description: client-side command that submits an Argo workflow and optionally streams logs
          module: internal/orchestration/command
          body: |
            type CommandCmd struct {
                workflow WorkflowClient
            }

            type CommandFlags struct {
                Command  []string
                NoFollow bool
            }

            func (c *CommandCmd) Run(flags CommandFlags) error {
                if len(flags.Command) == 0 {
                    return ErrMissingCommand
                }
                workflowName, err := c.workflow.Submit(flags.Command)
                if err != nil {
                    return err
                }
                if flags.NoFollow {
                    return nil
                }
                return c.workflow.StreamLogs(workflowName)
            }
        - name: WorkflowClient
          description: interface for Argo workflow submission and log streaming
          module: internal/orchestration/command
          body: |
            type WorkflowClient interface {
                Submit(command []string) (string, error)
                StreamLogs(workflowName string) error
            }
      tests:
        - name: TestCommandRunMissingCommandReturnsError
          description: verifies missing command returns error without submitting
          module: internal/orchestration/command
          body: |
            func TestCommandRunMissingCommandReturnsError(t *testing.T) {
                cmd := command.withMocks()
                err := cmd.Run(flags.withNoCommand())
                require.Error(t, err)
                require.False(t, workflow.submitCalled())
            }
        - name: TestCommandRunSubmitsWorkflow
          description: verifies command is submitted as an Argo workflow
          module: internal/orchestration/command
          body: |
            func TestCommandRunSubmitsWorkflow(t *testing.T) {
                cmd := command.withMocks()
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, workflow.submitCalled())
            }
        - name: TestCommandRunStreamsLogsByDefault
          description: verifies logs are streamed by default after submission
          module: internal/orchestration/command
          body: |
            func TestCommandRunStreamsLogsByDefault(t *testing.T) {
                cmd := command.withMocks()
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, workflow.streamLogsCalled())
            }
        - name: TestCommandRunNoFollowSkipsLogStreaming
          description: verifies --no-follow skips log streaming
          module: internal/orchestration/command
          body: |
            func TestCommandRunNoFollowSkipsLogStreaming(t *testing.T) {
                cmd := command.withMocks()
                err := cmd.Run(flags.withNoFollow())
                require.NoError(t, err)
                require.True(t, workflow.submitCalled())
                require.False(t, workflow.streamLogsCalled())
            }
      passing: true
    - slug: run-remote-debug
      description: Update RemoteRunner in internal/orchestration/run to accept RunRemoteFlags with Debug and rename Run method; update WorkflowClient interface to include debug parameter in Submit
      items:
        - RemoteRunner.RunRemote is renamed to Run and takes RunRemoteFlags{Follow bool, Debug string} instead of a bare follow bool
        - WorkflowClient.Submit in internal/orchestration/run adds a third debug string parameter — Submit(proj, cloneBranch, debug string)
        - 'RemoteRunnerClient interface in internal/orchestration/run/cmd.go is updated: Run(proj *project.Project, flags RunRemoteFlags) error'
        - The call site in RunCmd.Run passes flags.Debug into RunRemoteFlags when dispatching to the remote runner
        - All existing remote runner tests are updated to use the new Run method and flags
      code:
        - name: RemoteRunner.Run
          description: checks branch sync, submits workflow (with optional debug branch), follows logs if requested
          module: internal/orchestration/run
          body: |
            type RunRemoteFlags struct {
                Follow bool
                Debug  string
            }

            func (r *RemoteRunner) Run(proj *project.Project, flags RunRemoteFlags) error {
                branch, err := r.git.CurrentBranch()
                if err != nil {
                    return err
                }
                if err := r.git.IsBranchSyncedWithRemote(branch); err != nil {
                    return err
                }
                workflowName, err := r.workflow.Submit(proj, branch, flags.Debug)
                if err != nil {
                    return err
                }
                if !flags.Follow {
                    r.workflow.PrintLogHint(workflowName)
                    return nil
                }
                if err := r.workflow.FollowLogs(workflowName); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
        - name: WorkflowClient
          description: updated interface with debug parameter in Submit
          module: internal/orchestration/run
          body: |
            type WorkflowClient interface {
                Submit(proj *project.Project, cloneBranch string, debug string) (string, error)
                PrintLogHint(workflowName string)
                FollowLogs(workflowName string) error
            }
      tests:
        - name: TestRunBranchNotPushedAbortsBeforeSubmit
          description: verifies untracked branch aborts before workflow submission
          module: internal/orchestration/run
          body: |
            func TestRunBranchNotPushedAbortsBeforeSubmit(t *testing.T) {
                runner := remote.withMocks(
                    remote.withGit(git.thatReportsBranchNotPushed()),
                )
                err := runner.Run(project.any(), flags.any())
                require.Error(t, err)
                require.False(t, workflow.submitCalled())
            }
        - name: TestRunNoFollowPrintsLogHint
          description: verifies no-follow prints the log hint instead of streaming
          module: internal/orchestration/run
          body: |
            func TestRunNoFollowPrintsLogHint(t *testing.T) {
                runner := remote.withMocks()
                err := runner.Run(project.any(), flags.withoutFollow())
                require.NoError(t, err)
                require.True(t, workflow.logHintPrinted())
                require.False(t, workflow.followLogsCalled())
            }
        - name: TestRunFollowStreamsLogsAndNotifiesSuccess
          description: verifies follow mode streams logs and sends success notification
          module: internal/orchestration/run
          body: |
            func TestRunFollowStreamsLogsAndNotifiesSuccess(t *testing.T) {
                runner := remote.withMocks()
                err := runner.Run(project.any(), flags.withFollow())
                require.NoError(t, err)
                require.True(t, workflow.followLogsCalled())
                require.True(t, notify.successSent())
            }
        - name: TestRunDebugBranchPassedToSubmit
          description: verifies debug branch is passed to workflow submission
          module: internal/orchestration/run
          body: |
            func TestRunDebugBranchPassedToSubmit(t *testing.T) {
                runner := remote.withMocks()
                err := runner.Run(project.any(), flags.withDebug("my-fix"))
                require.NoError(t, err)
                require.Equal(t, "my-fix", workflow.lastDebugBranch())
            }
      passing: true
