slug: implement-workflow-commands
title: Implement ralph workflow subcommands and remove old equivalent commands
requirements:
    - slug: workspace-setup
      description: Create internal/orchestration/workspace with WorkspaceSetup that bootstraps the container environment for all workflow subcommands
      code:
        - name: WorkspaceSetup
          description: orchestrates container bootstrap — GitHub auth, AI credentials, git identity, clone, branch checkout, symlinks
          module: internal/orchestration/workspace
          body: |
            type WorkspaceSetup struct {
                github    GitHubClient
                workspace WorkspaceClient
                git       GitClient
            }

            type WorkspaceFlags struct {
                Repo         string
                CloneBranch  string
                TargetBranch string
                CreateBranch bool
                BotName      string
                BotEmail     string
                Symlinks     bool
            }

            func (w *WorkspaceSetup) Setup(flags WorkspaceFlags) error {
                if err := w.github.ConfigureAuth(flags.Repo); err != nil {
                    return err
                }
                if err := w.workspace.SetupCredentials(); err != nil {
                    return err
                }
                w.git.ConfigureUser(flags.BotName, flags.BotEmail)
                if err := w.git.Clone(flags.CloneBranch); err != nil {
                    return err
                }
                if flags.TargetBranch != "" {
                    if err := w.checkoutBranch(flags.TargetBranch, flags.CreateBranch); err != nil {
                        return err
                    }
                }
                if flags.Symlinks {
                    return w.workspace.SetupSymlinks()
                }
                return nil
            }
        - name: checkoutBranch
          description: fetches and checks out an existing remote branch, or creates a new local branch
          module: internal/orchestration/workspace
          body: |
            func (w *WorkspaceSetup) checkoutBranch(branch string, create bool) error {
                exists, err := w.git.RemoteBranchExists(branch)
                if err != nil {
                    return err
                }
                if exists {
                    return w.git.FetchAndCheckout(branch)
                }
                if !create {
                    return ErrBranchNotFound
                }
                return w.git.CreateAndCheckout(branch)
            }
        - name: GitHubClient
          description: interface for GitHub authentication
          module: internal/orchestration/workspace
          body: |
            type GitHubClient interface {
                ConfigureAuth(repo string) error
            }
        - name: WorkspaceClient
          description: interface for credential and symlink setup
          module: internal/orchestration/workspace
          body: |
            type WorkspaceClient interface {
                SetupCredentials() error
                SetupSymlinks() error
            }
        - name: GitClient
          description: interface for git operations during workspace bootstrap
          module: internal/orchestration/workspace
          body: |
            type GitClient interface {
                ConfigureUser(name, email string)
                Clone(branch string) error
                RemoteBranchExists(branch string) (bool, error)
                FetchAndCheckout(branch string) error
                CreateAndCheckout(branch string) error
            }
      tests:
        - name: TestSetupGitHubAuthFailureAbortsEarly
          description: verifies GitHub auth failure stops setup before credentials
          module: internal/orchestration/workspace
          body: |
            func TestSetupGitHubAuthFailureAbortsEarly(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withGitHub(github.thatFailsAuth()),
                )
                err := cmd.Setup(flags.any())
                require.Error(t, err)
                require.False(t, workspace.credentialsSetUp())
            }
        - name: TestSetupCredentialsFailureAbortsEarly
          description: verifies credentials failure stops setup before clone
          module: internal/orchestration/workspace
          body: |
            func TestSetupCredentialsFailureAbortsEarly(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withWorkspace(workspace.thatFailsCredentials()),
                )
                err := cmd.Setup(flags.any())
                require.Error(t, err)
                require.False(t, git.cloned())
            }
        - name: TestSetupCloneFailureAbortsEarly
          description: verifies clone failure stops setup before checkout
          module: internal/orchestration/workspace
          body: |
            func TestSetupCloneFailureAbortsEarly(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withGit(git.thatFailsClone()),
                )
                err := cmd.Setup(flags.any())
                require.Error(t, err)
                require.False(t, git.checkoutCalled())
            }
        - name: TestSetupNoTargetBranchSkipsCheckout
          description: verifies no target branch means no checkout
          module: internal/orchestration/workspace
          body: |
            func TestSetupNoTargetBranchSkipsCheckout(t *testing.T) {
                cmd := workspace.withMocks()
                err := cmd.Setup(flags.withNoTargetBranch())
                require.NoError(t, err)
                require.False(t, git.checkoutCalled())
            }
        - name: TestSetupExistingTargetBranchFetchesAndChecksOut
          description: verifies existing remote branch is fetched and checked out
          module: internal/orchestration/workspace
          body: |
            func TestSetupExistingTargetBranchFetchesAndChecksOut(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withGit(git.thatReportsRemoteBranchExists()),
                )
                err := cmd.Setup(flags.withTargetBranch("ralph/my-feature"))
                require.NoError(t, err)
                require.True(t, git.fetchAndCheckoutCalled())
                require.False(t, git.createAndCheckoutCalled())
            }
        - name: TestSetupNonExistingBranchWithCreateChecksOut
          description: verifies absent remote branch is created when CreateBranch is true
          module: internal/orchestration/workspace
          body: |
            func TestSetupNonExistingBranchWithCreateChecksOut(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withGit(git.thatReportsRemoteBranchAbsent()),
                )
                err := cmd.Setup(flags.withTargetBranch("ralph/my-feature").withCreateBranch())
                require.NoError(t, err)
                require.True(t, git.createAndCheckoutCalled())
            }
        - name: TestSetupNonExistingBranchWithoutCreateReturnsError
          description: verifies absent remote branch returns error when CreateBranch is false
          module: internal/orchestration/workspace
          body: |
            func TestSetupNonExistingBranchWithoutCreateReturnsError(t *testing.T) {
                cmd := workspace.withMocks(
                    workspace.withGit(git.thatReportsRemoteBranchAbsent()),
                )
                err := cmd.Setup(flags.withTargetBranch("ralph/my-feature"))
                require.Error(t, err)
                require.False(t, git.createAndCheckoutCalled())
            }
        - name: TestSetupSymlinksDisabledSkipsSetup
          description: verifies symlinks are not set up when Symlinks is false
          module: internal/orchestration/workspace
          body: |
            func TestSetupSymlinksDisabledSkipsSetup(t *testing.T) {
                cmd := workspace.withMocks()
                err := cmd.Setup(flags.withSymlinksDisabled())
                require.NoError(t, err)
                require.False(t, workspace.symlinksSetUp())
            }
        - name: TestSetupSymlinksEnabledCallsSetup
          description: verifies symlinks are set up when Symlinks is true
          module: internal/orchestration/workspace
          body: |
            func TestSetupSymlinksEnabledCallsSetup(t *testing.T) {
                cmd := workspace.withMocks()
                err := cmd.Setup(flags.withSymlinksEnabled())
                require.NoError(t, err)
                require.True(t, workspace.symlinksSetUp())
            }
      passing: true
    - slug: workflow-run
      description: Create internal/orchestration/workflow with WorkflowRunCmd that sets up the workspace, validates inputs, syncs the base branch, and runs the project
      code:
        - name: WorkflowRunCmd
          description: orchestrates workspace setup, validation, base-branch sync, and project execution
          module: internal/orchestration/workflow
          body: |
            type WorkflowRunCmd struct {
                workspace WorkspaceSetupClient
                git       GitClient
                ai        AIClient
                runner    RunnerClient
                config    ConfigClient
                project   ProjectClient
                debug     DebugClient
            }

            type WorkflowRunFlags struct {
                Repo            string
                CloneBranch     string
                BaseBranch      string
                ProjectBranch   string
                BotName         string
                BotEmail        string
                ProjectPath     string
                InstructionsMd  string
                MaxIterations   int
                Model           string
                NoServices      bool
                Debug           string
            }

            func (w *WorkflowRunCmd) Run(flags WorkflowRunFlags) error {
                if flags.ProjectPath == "" {
                    return ErrMissingProjectPath
                }
                if err := w.workspace.Setup(flags.WorkspaceFlags()); err != nil {
                    return err
                }
                if flags.Debug != "" {
                    if err := w.debug.Setup(flags.Debug); err != nil {
                        return err
                    }
                }
                cfg, err := w.config.LoadOptional()
                if err != nil {
                    return err
                }
                proj, err := w.project.Load(flags.ProjectPath)
                if err != nil {
                    return err
                }
                w.applyFlags(proj, cfg, flags)
                if err := w.syncBaseBranch(flags.BaseBranch, flags.ProjectBranch); err != nil {
                    return err
                }
                return w.runner.RunLocal(proj, cfg)
            }
        - name: syncBaseBranch
          description: fetches and merges the base branch; uses AI to resolve conflicts
          module: internal/orchestration/workflow
          body: |
            func (w *WorkflowRunCmd) syncBaseBranch(baseBranch, projectBranch string) error {
                if err := w.git.FetchBranch(baseBranch); err != nil {
                    return nil
                }
                needsMerge, err := w.git.NeedsMerge(baseBranch)
                if err != nil {
                    return err
                }
                if !needsMerge {
                    return nil
                }
                if err := w.git.Merge(baseBranch); err != nil {
                    w.git.AbortMerge()
                    return w.ai.ResolveMergeConflicts(baseBranch, projectBranch)
                }
                return nil
            }
        - name: WorkspaceSetupClient
          description: interface for workspace setup used by WorkflowRunCmd
          module: internal/orchestration/workflow
          body: |
            type WorkspaceSetupClient interface {
                Setup(flags workspace.WorkspaceFlags) error
            }

            type GitClient interface {
                FetchBranch(branch string) error
                NeedsMerge(branch string) (bool, error)
                Merge(branch string) error
                AbortMerge()
            }

            type AIClient interface {
                ResolveMergeConflicts(baseBranch, projectBranch string) error
            }

            type RunnerClient interface {
                RunLocal(proj *project.Project, cfg *config.RalphConfig) error
            }

            type ConfigClient interface {
                LoadOptional() (*config.RalphConfig, error)
            }

            type ProjectClient interface {
                Load(path string) (*project.Project, error)
            }

            type DebugClient interface {
                Setup(branch string) error
            }
      tests:
        - name: TestRunMissingProjectPathAbortsBeforeWorkspace
          description: verifies missing ProjectPath returns error before workspace setup
          module: internal/orchestration/workflow
          body: |
            func TestRunMissingProjectPathAbortsBeforeWorkspace(t *testing.T) {
                cmd := run.withMocks()
                err := cmd.Run(flags.withNoProjectPath())
                require.Error(t, err)
                require.False(t, workspace.setupCalled())
            }
        - name: TestRunWorkspaceFailureAbortsEarly
          description: verifies workspace failure aborts before config load
          module: internal/orchestration/workflow
          body: |
            func TestRunWorkspaceFailureAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withWorkspace(workspace.thatFailsSetup()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, config.loadCalled())
            }
        - name: TestRunDebugSetupFailureAbortsEarly
          description: verifies debug setup failure aborts before config load
          module: internal/orchestration/workflow
          body: |
            func TestRunDebugSetupFailureAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withDebug(debug.thatFailsSetup()),
                )
                err := cmd.Run(flags.withDebugBranch("my-ralph-branch"))
                require.Error(t, err)
                require.False(t, config.loadCalled())
            }
        - name: TestRunMissingConfigProceedsWithDefaults
          description: verifies missing config does not abort execution
          module: internal/orchestration/workflow
          body: |
            func TestRunMissingConfigProceedsWithDefaults(t *testing.T) {
                cmd := run.withMocks(
                    run.withConfig(config.thatReportsMissing()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, runner.runLocalCalled())
            }
        - name: TestRunMalformedConfigAbortsBeforeSync
          description: verifies malformed config aborts before base-branch fetch
          module: internal/orchestration/workflow
          body: |
            func TestRunMalformedConfigAbortsBeforeSync(t *testing.T) {
                cmd := run.withMocks(
                    run.withConfig(config.thatFailsParsing()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, git.fetchCalled())
            }
        - name: TestRunProjectLoadFailureAbortsBeforeSync
          description: verifies project load failure aborts before sync
          module: internal/orchestration/workflow
          body: |
            func TestRunProjectLoadFailureAbortsBeforeSync(t *testing.T) {
                cmd := run.withMocks(
                    run.withProject(project.thatFailsLoad()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, git.fetchCalled())
            }
        - name: TestSyncBaseBranchFetchFailureContinues
          description: verifies fetch failure is treated as a warning and execution continues
          module: internal/orchestration/workflow
          body: |
            func TestSyncBaseBranchFetchFailureContinues(t *testing.T) {
                cmd := run.withMocks(
                    run.withGit(git.thatFailsFetch()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, runner.runLocalCalled())
            }
        - name: TestSyncBaseBranchUpToDateSkipsMerge
          description: verifies up-to-date branch skips merge
          module: internal/orchestration/workflow
          body: |
            func TestSyncBaseBranchUpToDateSkipsMerge(t *testing.T) {
                cmd := run.withMocks(
                    run.withGit(git.thatReportsUpToDate()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.False(t, git.mergeCalled())
            }
        - name: TestSyncBaseBranchConflictsAbortAndInvokeAI
          description: verifies merge conflicts abort the merge and invoke AI resolution
          module: internal/orchestration/workflow
          body: |
            func TestSyncBaseBranchConflictsAbortAndInvokeAI(t *testing.T) {
                cmd := run.withMocks(
                    run.withGit(git.thatNeedsMerge().thatProducesConflicts()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, git.mergeAborted())
                require.True(t, ai.conflictsResolved())
            }
        - name: TestRunDelegatesToLocalRunner
          description: verifies successful run delegates to the local runner
          module: internal/orchestration/workflow
          body: |
            func TestRunDelegatesToLocalRunner(t *testing.T) {
                cmd := run.withMocks()
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, runner.runLocalCalled())
            }
      passing: true
    - slug: workflow-comment
      description: Rewrite internal/orchestration/comment as WorkflowCommentCmd — workspace setup, AI agent with rendered prompt, commit, PR reply
      code:
        - name: WorkflowCommentCmd
          description: orchestrates workspace setup, AI agent invocation, commit, and PR reply
          module: internal/orchestration/comment
          body: |
            type WorkflowCommentCmd struct {
                workspace WorkspaceSetupClient
                config    ConfigClient
                ai        AIClient
                services  ServicesClient
                git       GitClient
                github    GitHubClient
            }

            type WorkflowCommentFlags struct {
                Repo             string
                CloneBranch      string
                ProjectBranch    string
                BotName          string
                BotEmail         string
                CommentBody      string
                PRNumber         int
                RepoOwner        string
                RepoName         string
                NoServices       bool
                InstructionsFile string
            }

            func (w *WorkflowCommentCmd) Run(flags WorkflowCommentFlags) error {
                if flags.CommentBody == "" {
                    return ErrMissingCommentBody
                }
                if err := w.workspace.Setup(flags.WorkspaceFlags()); err != nil {
                    return err
                }
                cfg, err := w.config.LoadOptional()
                if err != nil {
                    return err
                }
                if flags.NoServices {
                    cfg.Services = nil
                }
                prompt, err := w.ai.RenderCommentPrompt(flags.CommentContext(), flags.InstructionsFile)
                if err != nil {
                    return err
                }
                svc, err := w.services.Start(cfg)
                if err != nil {
                    return err
                }
                defer w.services.Stop(svc)
                if err := w.ai.RunAgent(prompt); err != nil {
                    return err
                }
                pushed, err := w.commitChanges()
                if err != nil {
                    return err
                }
                reply, err := w.ai.GenerateCommentReply(flags.CommentContext(), pushed)
                if err != nil {
                    return err
                }
                return w.github.PostComment(flags.PRNumber, reply)
            }
        - name: commitChanges
          description: commits and pushes agent changes; returns true when a commit was pushed
          module: internal/orchestration/comment
          body: |
            func (w *WorkflowCommentCmd) commitChanges() (bool, error) {
                if !w.git.HasChanges() {
                    return false, nil
                }
                if !w.git.ReportExists() {
                    if err := w.ai.GenerateChangelog(); err != nil {
                        return false, err
                    }
                }
                if err := w.git.CommitAndPushFromReport(); err != nil {
                    return false, err
                }
                return true, nil
            }
        - name: WorkspaceSetupClient
          description: interfaces used by WorkflowCommentCmd
          module: internal/orchestration/comment
          body: |
            type WorkspaceSetupClient interface {
                Setup(flags workspace.WorkspaceFlags) error
            }

            type ConfigClient interface {
                LoadOptional() (*config.RalphConfig, error)
            }

            type AIClient interface {
                RenderCommentPrompt(ctx CommentContext, instructionsFile string) (string, error)
                RunAgent(prompt string) error
                GenerateChangelog() error
                GenerateCommentReply(ctx CommentContext, pushed bool) (string, error)
            }

            type ServicesClient interface {
                Start(cfg *config.RalphConfig) (*services.Manager, error)
                Stop(svc *services.Manager)
            }

            type GitClient interface {
                HasChanges() bool
                ReportExists() bool
                CommitAndPushFromReport() error
            }

            type GitHubClient interface {
                PostComment(prNumber int, body string) error
            }

            type CommentContext struct {
                CommentBody string
                PRNumber    int
                PRBranch    string
                RepoOwner   string
                RepoName    string
            }
      tests:
        - name: TestRunMissingCommentBodyAbortsBeforeWorkspace
          description: verifies missing comment body returns error before workspace setup
          module: internal/orchestration/comment
          body: |
            func TestRunMissingCommentBodyAbortsBeforeWorkspace(t *testing.T) {
                cmd := comment.withMocks()
                err := cmd.Run(flags.withNoCommentBody())
                require.Error(t, err)
                require.False(t, workspace.setupCalled())
            }
        - name: TestRunWorkspaceFailureAbortsEarly
          description: verifies workspace failure aborts before config load
          module: internal/orchestration/comment
          body: |
            func TestRunWorkspaceFailureAbortsEarly(t *testing.T) {
                cmd := comment.withMocks(
                    comment.withWorkspace(workspace.thatFailsSetup()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, config.loadCalled())
            }
        - name: TestRunServicesStartedBeforeAgentAndStopped
          description: verifies services are started before the agent and stopped after
          module: internal/orchestration/comment
          body: |
            func TestRunServicesStartedBeforeAgentAndStopped(t *testing.T) {
                cmd := comment.withMocks()
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.Equal(t, 1, services.startCount())
                require.Equal(t, 1, services.stopCount())
                require.True(t, services.startedBeforeAgent())
            }
        - name: TestRunNoServicesFlagSkipsServiceStartup
          description: verifies --no-services prevents service startup
          module: internal/orchestration/comment
          body: |
            func TestRunNoServicesFlagSkipsServiceStartup(t *testing.T) {
                cmd := comment.withMocks()
                err := cmd.Run(flags.withNoServices())
                require.NoError(t, err)
                require.Equal(t, 0, services.startCount())
            }
        - name: TestRunChangesCommittedAndPushed
          description: verifies agent changes are committed and pushed
          module: internal/orchestration/comment
          body: |
            func TestRunChangesCommittedAndPushed(t *testing.T) {
                cmd := comment.withMocks(
                    comment.withGit(git.withChangesAndReport()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, git.committedAndPushed())
            }
        - name: TestRunNoChangesSkipsCommit
          description: verifies no changes skips commit
          module: internal/orchestration/comment
          body: |
            func TestRunNoChangesSkipsCommit(t *testing.T) {
                cmd := comment.withMocks(
                    comment.withGit(git.withNoChanges()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.False(t, git.committedAndPushed())
            }
        - name: TestRunReplyPostedAfterCommit
          description: verifies a reply is posted after changes are committed
          module: internal/orchestration/comment
          body: |
            func TestRunReplyPostedAfterCommit(t *testing.T) {
                cmd := comment.withMocks(
                    comment.withGit(git.withChangesAndReport()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, github.commentPosted())
            }
        - name: TestRunReplyPostedWhenNoChanges
          description: verifies a reply is posted even when there are no changes
          module: internal/orchestration/comment
          body: |
            func TestRunReplyPostedWhenNoChanges(t *testing.T) {
                cmd := comment.withMocks(
                    comment.withGit(git.withNoChanges()),
                )
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, github.commentPosted())
            }
      passing: true
    - slug: workflow-merge
      description: Rewrite internal/orchestration/merge as WorkflowMergeCmd — workspace setup, completed project cleanup, GitHub head sync, PR merge
      code:
        - name: WorkflowMergeCmd
          description: orchestrates workspace setup, project cleanup, head sync, and PR merge
          module: internal/orchestration/merge
          body: |
            type WorkflowMergeCmd struct {
                workspace WorkspaceSetupClient
                git       GitClient
                github    GitHubClient
                project   ProjectClient
            }

            type WorkflowMergeFlags struct {
                Repo        string
                CloneBranch string
                PRBranch    string
                PRNumber    int
                BotName     string
                BotEmail    string
            }

            func (w *WorkflowMergeCmd) Merge(flags WorkflowMergeFlags) error {
                if err := w.workspace.Setup(flags.WorkspaceFlags()); err != nil {
                    return err
                }
                pushed, err := w.cleanupCompletedProjects()
                if err != nil {
                    return err
                }
                if pushed {
                    if err := w.github.WaitForHeadSync(flags.PRBranch); err != nil {
                        return err
                    }
                }
                return w.github.MergePR(flags.PRNumber)
            }
        - name: cleanupCompletedProjects
          description: deletes passing project files, commits and pushes; returns true when a commit was pushed
          module: internal/orchestration/merge
          body: |
            func (w *WorkflowMergeCmd) cleanupCompletedProjects() (bool, error) {
                projects, err := w.project.LoadAll()
                if err != nil {
                    return false, err
                }
                completed := w.project.FilterPassing(projects)
                if len(completed) == 0 {
                    return false, nil
                }
                if err := w.project.DeleteAll(completed); err != nil {
                    return false, err
                }
                if err := w.git.CommitAndPush("chore: remove completed project files"); err != nil {
                    return false, err
                }
                return true, nil
            }
        - name: WorkspaceSetupClient
          description: interfaces used by WorkflowMergeCmd
          module: internal/orchestration/merge
          body: |
            type WorkspaceSetupClient interface {
                Setup(flags workspace.WorkspaceFlags) error
            }

            type GitClient interface {
                CommitAndPush(message string) error
            }

            type GitHubClient interface {
                WaitForHeadSync(prBranch string) error
                MergePR(prNumber int) error
            }

            type ProjectClient interface {
                LoadAll() ([]*project.Project, error)
                FilterPassing(projects []*project.Project) []*project.Project
                DeleteAll(projects []*project.Project) error
            }
      tests:
        - name: TestMergeWorkspaceFailureAbortsEarly
          description: verifies workspace failure aborts before project load
          module: internal/orchestration/merge
          body: |
            func TestMergeWorkspaceFailureAbortsEarly(t *testing.T) {
                cmd := merge.withMocks(
                    merge.withWorkspace(workspace.thatFailsSetup()),
                )
                err := cmd.Merge(flags.any())
                require.Error(t, err)
                require.False(t, project.loadAllCalled())
            }
        - name: TestMergeNoCompletedProjectsSkipsCleanupAndSync
          description: verifies no completed projects skips cleanup and head sync
          module: internal/orchestration/merge
          body: |
            func TestMergeNoCompletedProjectsSkipsCleanupAndSync(t *testing.T) {
                cmd := merge.withMocks(
                    merge.withProject(project.withNoCompletedProjects()),
                )
                err := cmd.Merge(flags.any())
                require.NoError(t, err)
                require.False(t, git.commitAndPushCalled())
                require.False(t, github.waitForHeadSyncCalled())
                require.True(t, github.mergePRCalled())
            }
        - name: TestMergeCompletedProjectsDeletedCommittedAndPushed
          description: verifies completed projects are deleted, committed, and pushed
          module: internal/orchestration/merge
          body: |
            func TestMergeCompletedProjectsDeletedCommittedAndPushed(t *testing.T) {
                cmd := merge.withMocks(
                    merge.withProject(project.withCompletedProjects()),
                )
                err := cmd.Merge(flags.any())
