    - slug: workflow-command
      description: Add WorkflowCommandCmd to internal/orchestration/command — workspace setup and exec for container-side arbitrary command execution
      code:
        - name: WorkflowCommandCmd
          description: 'container-side command: sets up workspace and runs the supplied command tokens'
          module: internal/orchestration/command
          body: |
            type WorkflowCommandCmd struct {
                workspace WorkspaceSetupClient
                exec      ExecClient
            }

            type WorkflowCommandFlags struct {
                Repo        string
                CloneBranch string
                BotName     string
                BotEmail    string
                Command     []string
            }

            func (w *WorkflowCommandCmd) Run(flags WorkflowCommandFlags) error {
                if len(flags.Command) == 0 {
                    return ErrMissingCommand
                }
                if err := w.workspace.Setup(flags.WorkspaceFlags()); err != nil {
                    return err
                }
                return w.exec.Run(flags.Command)
            }
        - name: WorkspaceSetupClient
          description: interfaces used by WorkflowCommandCmd
          module: internal/orchestration/command
          body: |
            type WorkspaceSetupClient interface {
                Setup(flags workspace.WorkspaceFlags) error
            }

            type ExecClient interface {
                Run(tokens []string) error
            }
      tests:
        - name: TestWorkflowCommandRunMissingCommandAbortsBeforeWorkspace
          description: verifies missing command returns error before workspace setup
          module: internal/orchestration/command
          body: |
