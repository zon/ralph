name: requirement-picker
description: Separate requirement picking from development into two AI steps

requirements:
  - category: prompt
    description: Add BuildPickPrompt to the prompt package
    items:
      - BuildPickPrompt accepts ctx, projectFile string, and returns (string, error)
      - Prompt includes the commit history of the current branch relative to the base branch, if any (same logic as BuildDevelopPrompt)
      - Prompt includes the full project file content
      - Prompt instructs the agent to review commit history and the project file, select the highest-priority failing requirement, and write its YAML to a file named picked-requirement.yaml
      - A default pick template is embedded from internal/config/default-pick-instructions.md
    passing: false

  - category: prompt
    description: Update BuildDevelopPrompt to work with a single selected requirement
    items:
      - BuildDevelopPrompt accepts an additional selectedRequirement string parameter (the YAML of the picked requirement)
      - The prompt includes the selected requirement YAML inline instead of the full project file content
      - The prompt includes a link/path to the full project file but does not require the agent to read it
    passing: false

  - category: execution
    description: Update requirement.Execute to run pick then develop
    items:
      - Execute runs BuildPickPrompt and calls ai.RunAgent with it first
      - Execute reads the requirement YAML from picked-requirement.yaml written by the picker agent
      - Execute passes the requirement YAML string directly to BuildDevelopPrompt
      - Execute calls ai.RunAgent with the develop prompt
      - picked-requirement.yaml is cleaned up after use
    passing: false

  - category: version
    description: Bump version
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: false
