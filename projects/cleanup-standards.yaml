slug: cleanup-standards
title: Bring internal/cleanup up to coding and testing standards
maxIterations: 10
requirements:
    - slug: remove-comments
      description: Remove all comments from cleanup.go
      items:
        - cleanup.go has no doc comment on the Manager struct
        - cleanup.go has no doc comment on NewManager
        - cleanup.go has no doc comment on RegisterCleanup
        - cleanup.go has no doc comment on Cleanup
        - cleanup.go has no doc comment on SetupSignalHandlers
        - The inline comment 'Execute cleanup functions in reverse order' inside Cleanup is removed
      passing: true
    - slug: table-driven-cleanup-tests
      description: Replace the three standalone Cleanup behavior tests with a single table-driven TestCleanup
      items:
        - TestRegisterCleanup is deleted
        - TestMultipleCleanupFunctions is deleted
        - TestCleanupIdempotent is deleted
        - A single TestCleanup test exists that uses t.Run() subtests
        - TestCleanup subtest 'single function called' registers one callback and verifies it is invoked by Cleanup
        - TestCleanup subtest 'multiple functions called in reverse order' registers three callbacks and verifies they execute in reverse registration order
        - TestCleanup subtest 'idempotent' calls Cleanup twice and verifies the callback is invoked exactly once
        - TestCleanup subtest 'empty manager' calls Cleanup on a manager with no registered callbacks and verifies no panic
      passing: false
    - slug: table-driven-signal-tests
      description: Replace the two standalone signal tests with a single table-driven TestHandleSignal
      items:
        - The existing TestHandleSignal function is deleted
        - The existing TestHandleSignal_SIGINT function is deleted
        - A single TestHandleSignal test exists that uses t.Run() subtests
        - TestHandleSignal has a subtest for syscall.SIGTERM and a subtest for os.Interrupt
        - Each subtest verifies that the registered cleanup callback was called
        - Each subtest verifies that exitFn was called with exit code 0
        - Each subtest uses assert.Eventually for the async signal dispatch
      passing: false
    - slug: fix-testnewmanager
      description: Rewrite TestNewManager to use the public API only and delete the vacuous TestManager_InjectableExitFn
      items:
        - TestNewManager no longer reads or asserts on the unexported fields m.cleanupFn or m.exitFn
        - 'TestNewManager verifies observable behavior: a newly constructed manager does not panic when Cleanup is called'
        - TestNewManager verifies that RegisterCleanup followed by Cleanup invokes the registered function
        - TestManager_InjectableExitFn is deleted entirely
      passing: true
