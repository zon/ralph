name: test-webhook-server
description: Add tests for webhook server handler paths in internal/webhook/server.go

requirements:
  - category: testing
    description: handleWebhook filtering and dispatch tests
    items:
      - A test verifies handleWebhook returns 200 when the payload is valid and signed correctly but IsAcceptable returns false (event is filtered out)
      - A test verifies handleWebhook returns 400 when the payload JSON has an empty repository owner or name
      - A test verifies handleWebhook returns 200 when IsAcceptable is true but ToWorkflow returns an error
    passing: false

  - category: testing
    description: validateSignature tests
    items:
      - A test verifies validateSignature returns true for a correctly computed HMAC-SHA256 signature with the sha256= prefix
      - A test verifies validateSignature returns false when the signature is missing
      - A test verifies validateSignature returns false when the signature uses the wrong prefix (e.g. sha1=)
      - A test verifies validateSignature returns false when the body has been tampered with
    passing: false
