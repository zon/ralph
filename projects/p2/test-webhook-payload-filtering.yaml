name: test-webhook-payload-filtering
description: Add tests for IsAcceptable filtering across all event types in internal/webhook/payload.go

requirements:
  - category: testing
    description: IsAcceptable user filtering for issue_comment events
    items:
      - A test verifies IsAcceptable returns false for an issue_comment event when the comment author is the ralph bot user
      - A test verifies IsAcceptable returns false for an issue_comment event when the comment author is not in the repo's allowed users list
      - A test verifies IsAcceptable returns true for an issue_comment event when the allowed users list is empty (all users allowed)
    passing: false

  - category: testing
    description: IsAcceptable user filtering for pull_request_review events
    items:
      - A test verifies IsAcceptable returns false for a pull_request_review approved event when the reviewer is the ralph bot user
      - A test verifies IsAcceptable returns false for a pull_request_review approved event when the reviewer is not in the repo's allowed users list
      - A test verifies IsAcceptable returns true for a pull_request_review approved event when the allowed users list is empty
    passing: false

  - category: testing
    description: ToEvent for unknown and edge-case event types
    items:
      - A test verifies ToEvent returns an empty Event with all zero-value fields when called with an unknown event type
      - A test verifies ToEvent for a pull_request_review with state "changes_requested" sets Approved to false
    passing: false
