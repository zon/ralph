name: test-workflow-generation
description: Add tests for workflow generation in internal/workflow/

requirements:
  - category: testing
    description: extractWorkflowName parsing tests
    items:
      - A test verifies extractWorkflowName correctly parses the workflow name from argo submit output containing a "Name:" field
      - A test verifies extractWorkflowName returns an empty string when the output does not contain a "Name:" field
      - A test verifies extractWorkflowName handles multi-line output and extracts the name from the correct line
    passing: true

  - category: testing
    description: Workflow.Render comment script branching
    items:
      - A test verifies Workflow.Render uses the comment script (buildCommentScript) when CommentBody is non-empty, and the rendered YAML contains the comment body and PR number
      - A test verifies Workflow.Render uses the run script (buildRunScript) when CommentBody is empty
    passing: true

  - category: testing
    description: MergeWorkflow.Render env var coverage
    items:
      - A test verifies MergeWorkflow.Render includes GITHUB_REPO_OWNER, GITHUB_REPO_NAME, and PR_NUMBER environment variables in the rendered YAML
      - A test verifies MergeWorkflow.Render includes the github-credentials volume mount at /secrets/github with readOnly set
    passing: true
