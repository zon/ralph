name: dynamic-base-branch
description: Implement dynamic base branch detection and automatic base branch merging

requirements:
  - category: configuration
    description: Update configuration properties and CLI flags
    items:
      - Remove `baseBranch` from `RalphConfig` struct and YAML tags
      - Add `defaultBranch` to `RalphConfig` struct and YAML tags (defaulting to "main")
      - Retain `--base` / `-B` flag in `ralph run` as an explicit override for the detected base branch
      - Add CLI flags to `ralph workflow` for bot configuration (name, email) and repository details
    passing: true

  - category: logic
    description: Implement dynamic base branch detection
    items:
      - Detect current branch before switching to project branch
      - If `--base` flag is provided, use it as the base branch
      - If `--base` is NOT provided and current branch is NOT the project branch, set current branch as the base branch
      - If `--base` is NOT provided and current branch IS the project branch, set base branch to `defaultBranch` from config
    passing: true

  - category: subcommand
    description: Implement `ralph workflow` command to replace `run.sh`
    items:
      - Create a `workflow` subcommand for the `ralph` CLI that encapsulates the logic currently in `internal/workflow/run.sh`
      - Support `--debug-branch` flag to allow Ralph to clone and run itself from a specific branch (replaces `run.sh` debug mode)
      - Implement automated GitHub authentication using the GitHub App token (equivalent to `ralph set-github-token`)
      - Configure Git user identity (name/email) within the workflow environment
      - Provision OpenCode credentials by copying from secret volumes to the expected local share path
      - Handle cloning of the target repository and management of the project branch (checkout existing or create new)
      - Execute `ralph setup-workspace` after cloning to prepare the repository for Ralph
      - "Implement base branch synchronization: fetch the base branch and merge it into the project branch if it's behind"
      - Integrate AI-driven merge conflict resolution if the initial merge fails, using a specialized instruction set
      - Execute the core `ralph run` logic on the specified project path within the prepared workspace
      - Display OpenCode statistics upon successful completion of the workflow
    passing: true

  - category: workflow
    description: Integrate `ralph workflow` into Argo Workflows
    items:
      - Update Argo Workflow templates to use the `ralph workflow` command instead of `run.sh`
      - Pass necessary inputs (repo URL, branch, project path) and secrets to the command
      - Ensure the workflow correctly handles the `base-branch` input parameter
    passing: true

  - category: versioning
    description: Apply version bumps for breaking configuration changes
    items:
      - Apply a semver major bump to `internal/version/VERSION` and `charts/ralph-webhook/Chart.yaml` (appVersion)
      - Apply a semver patch bump to the helm chart `version` field in `charts/ralph-webhook/Chart.yaml`
    passing: true

  - category: cleanup
    description: Update internal components and tests
    items:
      - Update AI PR summary generation to use the dynamically detected/overridden base branch
      - Update git log summaries to compare the project branch against the detected base branch
      - Update GitHub PR creation to use the dynamically detected/overridden base branch
      - Replace `internal/workflow/run.sh` script with the new `ralph workflow` command in all workflow generators
      - Delete the `internal/workflow/run.sh` file and any associated dead code
      - Update all existing tests to reflect the removal of `baseBranch` and addition of `defaultBranch`
    passing: true
