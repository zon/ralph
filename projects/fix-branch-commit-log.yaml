name: fix-branch-commit-log
description: Fix "Failed to get branch commits" warning when base branch is not a local branch

requirements:
  - category: bug fix
    description: fetchBaseBranch does not create a local tracking branch, causing git log to fail
    items:
      - In `internal/cmd/workflow.go`, `fetchBaseBranch` runs `git fetch origin <base>` which only updates `origin/<base>` but does not create a local `<base>` branch
      - When the repo was cloned with a project branch (not the base branch), `git log <base>..HEAD` fails with "unknown revision or path not in the working tree" because no local `<base>` branch exists
      - Fix `fetchBaseBranch` to use `git fetch origin <base>:<base>` so a local tracking branch is created after fetching
      - If the fetch with refspec fails (e.g. already on that branch), fall back to a plain `git fetch origin <base>` to avoid an error
    passing: false

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to `internal/version/VERSION` and `charts/ralph-webhook/Chart.yaml`
    passing: false
