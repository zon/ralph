name: review-subcommands
description: Refactor ralph review into a subcommand group with ralph review run as default

requirements:
  - category: cli
    description: Convert ralph review into a subcommand group
    items:
      - "`ralph review run` executes the same behavior as the current `ralph review` command, accepting all existing flags (--model, --base, --local, --verbose, --context, --seed, --follow, --filter, --one)"
      - "`ralph review` with no subcommand defaults to `ralph review run`, passing through any flags and arguments"
      - "`ralph review run` is implemented as `ReviewRunCmd` (renamed from `ReviewCmd`); the new `ReviewCmd` is a kong command group containing `Run ReviewRunCmd` with `default:\"withargs\"`"
      - "All existing tests in `internal/cmd/review_test.go` are updated to reference `ReviewRunCmd` instead of `ReviewCmd` where the type is used directly, and `cmd.Review.Run.*` instead of `cmd.Review.*` for field access in flag-parsing tests"
    passing: false

  - category: cli
    description: Move ralph architecture under ralph review
    items:
      - "`ralph review architecture` runs the same behavior as the current top-level `ralph architecture` command, accepting all existing flags (--output, --verbose, --model)"
      - "The top-level `ralph architecture` command and `ArchitectureCmd` are removed from `internal/cmd/cmd.go`; `ArchitectureCmd` is moved into the `ReviewCmd` group as `Architecture ArchitectureCmd`"
      - "`ralph architecture` no longer exists as a top-level command"
    passing: false

  - category: version
    description: Version bump
    items:
      - Apply a semver minor bump to `internal/version/VERSION` and a patch bump to `charts/ralph-webhook/Chart.yaml`
    passing: false
