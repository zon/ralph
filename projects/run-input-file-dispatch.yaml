slug: run-input-file-dispatch
title: Allow ralph run to accept orchestration and spec files as input
feature: specs/features/ralph/run
maxIterations: 10
requirements:
    - slug: input-file-type
      description: InputFile value type in internal/project for discriminating project, orchestration, and spec inputs
      items:
        - For project files (.yaml or .yml), the slug comes from the project YAML slug field and ResolveInputFile loads and validates the project
        - For orchestration.md and spec.md files, the slug is derived from the parent directory name using git.SanitizeBranchName
        - 'ResolveInputFile returns an error "input file not found: <absPath>" when the file does not exist on disk'
        - 'ResolveInputFile returns an error "unrecognized input file type: <absPath>" when the basename is not .yaml, .yml, orchestration.md, or spec.md'
        - Add ForProjectInput(p *Project) *InputFile, ForOrchestrationInput(path string) *InputFile, and ForSpecInput(path string) *InputFile exported test helpers in helpers.go so orchestration/run tests can construct InputFile values without accessing unexported fields
      scenarios:
        - title: Project file provided
          items:
            - GIVEN the user provides a path to a valid project YAML file
            - WHEN the command starts
            - THEN the project is loaded and execution proceeds
        - title: Orchestration file provided
          items:
            - GIVEN the user provides a path to a file named orchestration.md
            - WHEN the command starts
            - THEN the input is forwarded to the execution mode for just-in-time project generation
        - title: Spec file provided
          items:
            - GIVEN the user provides a path to a file named spec.md
            - WHEN the command starts
            - THEN the input is forwarded to the execution mode for just-in-time orchestration and project generation
        - title: Input file not found
          items:
            - GIVEN the user provides a path to a file that does not exist on disk
            - WHEN the command starts
            - THEN an error is returned containing "input file not found"
            - AND no execution begins
        - title: Unrecognized file type
          items:
            - GIVEN the user provides a path to a file that is not a .yaml/.yml file, orchestration.md, or spec.md
            - WHEN the command starts
            - THEN an error is returned containing "unrecognized input file type"
            - AND no execution begins
      code:
        - name: InputFile
          description: value type wrapping a project, orchestration path, or spec path; carries the slug and exposes type predicates
          module: internal/project
          body: |
            type InputFile struct {
                path    string
                kind    inputFileKind
                project *Project
            }

            type inputFileKind int

            const (
                inputProject      inputFileKind = iota
                inputOrchestration
                inputSpec
            )

            func (f *InputFile) IsProject() bool      { return f.kind == inputProject }
            func (f *InputFile) IsSpec() bool          { return f.kind == inputSpec }
            func (f *InputFile) IsOrchestration() bool { return f.kind == inputOrchestration }
            func (f *InputFile) Project() *Project     { return f.project }
            func (f *InputFile) Path() string          { return f.path }
            func (f *InputFile) Slug() string
        - name: ResolveInputFile
          description: constructs an InputFile by detecting the input type from the file basename and loading the project when it is a YAML file
          module: internal/project
          body: |
            func ResolveInputFile(path string) (*InputFile, error)
      passing: true
    - slug: run-cmd-input-resolution
      description: Update RunCmd to resolve an InputFile instead of validating then loading a project file, and update the LocalRunnerClient and RemoteRunnerClient interfaces to accept *project.InputFile
      items:
        - Rename RunFlags.ProjectFile to RunFlags.InputFile throughout cmd.go and its tests
        - Add ResolveInputFile(path string) (*project.InputFile, error) to the ProjectRepo interface; remove ValidateFile and Load from ProjectRepo as they are replaced by ResolveInputFile
        - Add ResolveInputFile to project.Client in internal/project/client.go delegating to project.ResolveInputFile
        - Update LocalRunnerClient interface to RunLocal(input *project.InputFile, cfg *config.RalphConfig) error
        - Update RemoteRunnerClient interface to Run(input *project.InputFile, flags RunRemoteFlags) error
        - Update prepareSetup to accept *project.InputFile as a second argument; derive the project branch slug via input.Slug(); for project inputs use input.Project() for base branch and max iterations resolution; for non-project inputs fall back to config defaults and an empty base branch (resolved at setup time from the current branch)
        - 'Update cmd_test.go: rename ProjectFile to InputFile in all flag helpers, update mockProjectRepo to implement ResolveInputFile instead of ValidateFile and Load, update mockLocalRunnerClient and mockRemoteRunnerClient to accept *project.InputFile'
        - Add test cases for orchestration and spec inputs dispatching correctly through RunCmd
      scenarios:
        - title: Working directory changed before input file resolved
          items:
            - GIVEN the user passes --working-dir /path/to/project
            - WHEN the command starts
            - THEN the working directory is changed before the input file is resolved
        - title: Input file not found aborts early
          items:
            - GIVEN the user provides a path to a file that does not exist on disk
            - WHEN the command starts
            - THEN an error is returned and flag validation and setup do not run
        - title: Incompatible flags rejected before setup
          items:
            - GIVEN the user passes --follow and --local
            - WHEN the command validates flag combinations
            - THEN an error is returned before the project is loaded
        - title: Dispatches to local runner with InputFile
          items:
            - GIVEN the user passes --local
            - WHEN the command runs
            - THEN RunLocal is called with the resolved InputFile and config
        - title: Dispatches to remote runner with InputFile
          items:
            - GIVEN no --local flag
            - WHEN the command runs
            - THEN the remote runner is called with the resolved InputFile
      code:
        - name: RunCmd.Run
          description: resolves the input file, validates flags, then dispatches to local or remote execution
          module: internal/orchestration/run
          body: |
            func (r *RunCmd) Run(flags RunFlags) error {
                if err := r.workspace.ChangeDirectory(flags.WorkingDir); err != nil {
                    return err
                }
                input, err := r.project.ResolveInputFile(flags.InputFile)
                if err != nil {
                    return err
                }
                if err := flags.Validate(); err != nil {
                    return err
                }
                setup, err := r.prepareSetup(flags, input)
                if err != nil {
                    return err
                }
                if flags.Local {
                    return r.local.RunLocal(input, setup.Config)
                }
                return r.remote.Run(input, RunRemoteFlags{Follow: flags.Follow, Debug: flags.Debug})
            }
      passing: true
    - slug: runner-run-local
      description: Update Runner.RunLocal to accept *project.InputFile, use input.Slug() for branch switching, and extend AIClient and GitClient interfaces with artifact generation methods
      items:
        - Add WriteOrchestration(input *project.InputFile) error to AIClient in runner.go
        - Add WriteProject(input *project.InputFile) (*project.Project, error) to AIClient in runner.go
        - Add CommitGeneratedArtifacts(proj *project.Project) error to GitClient in runner.go
        - Add writeOrchestrationFunc, writeProjectFunc fields and WriteOrchestration/WriteProject methods to mockAIClient in mock_test.go following the existing function-field mock pattern; track calls with writeOrchestrationCalled and writeProjectCalled bool fields
        - Update all existing run_local_test.go tests that pass *project.Project to RunLocal to instead pass project.ForProjectInput(proj) so they compile with the new signature
        - Update NewRunner and its call sites in internal/cmd/local_runner.go to match any constructor changes required by the new signature
      scenarios:
        - title: Before commands run first
          items:
            - GIVEN .ralph/config.yaml contains before commands
            - WHEN local execution begins
            - THEN each before command is run before the iteration loop starts
        - title: Branch switched before generation and iteration
          items:
            - GIVEN the input slug is my-feature and the current branch is main
            - WHEN local execution starts
            - THEN ralph switches to the branch my-feature before generating artifacts or running any iterations
        - title: Iteration failure sends error notification using project slug
          items:
            - GIVEN iteration fails after successful artifact generation
            - WHEN the error is returned
            - THEN an error notification is sent using proj.Slug (the generated project slug)
        - title: Artifact generation failure sends error notification using input slug
          items:
            - GIVEN artifact generation fails before the project is available
            - WHEN the error is returned
            - THEN an error notification is sent using input.Slug()
      code:
        - name: Runner.RunLocal
          description: runs the full development loop for any input type; switches branch, generates missing artifacts, then iterates
          module: internal/orchestration/run
          body: |
            func (r *Runner) RunLocal(input *project.InputFile, cfg *config.RalphConfig) error {
                if r.env.InWorkflow() {
                    defer r.ai.PrintStats()
                }
                if err := r.services.RunBeforeCommands(cfg); err != nil {
                    return err
                }
                if err := r.git.SwitchToBranch(input.Slug()); err != nil {
                    return err
                }
                proj, err := r.generateArtifacts(input)
                if err != nil {
                    r.notify.Error(input.Slug())
                    return err
                }
                if err := r.iterate(proj, cfg); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.removeOrchestration(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.github.CreatePR(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
      passing: false
    - slug: generate-artifacts
      description: Implement Runner.generateArtifacts which returns a *project.Project from any InputFile type, invoking AI generation for orchestration and spec inputs before committing the results
      scenarios:
        - title: Project input skips generation
          items:
            - GIVEN the input is a project YAML file
            - AND the command has switched to the project branch
            - WHEN generateArtifacts runs
            - THEN no AI generation is called and the existing project is returned unchanged
        - title: Orchestration input generates and commits project
          items:
            - GIVEN the input is an orchestration.md file
            - AND the command has switched to the project branch
            - WHEN just-in-time generation runs
            - THEN the AI agent generates a project YAML file in projects/ that implements the orchestration
            - AND the generated project file is committed to the project branch
            - AND execution proceeds using the generated project
        - title: Spec input generates orchestration then project
          items:
            - GIVEN the input is a spec.md file
            - AND the command has switched to the project branch
            - WHEN just-in-time generation runs
            - THEN the AI agent generates an orchestration.md file in the same directory as the spec
            - AND the AI agent generates a project YAML file in projects/
            - AND both generated files are committed to the project branch
            - AND execution proceeds using the generated project
        - title: Orchestration write-project failure aborts and sends notification
          items:
            - GIVEN the input is an orchestration.md file
            - AND the AI agent fails to generate a valid project
            - WHEN the generation step runs
            - THEN an error is returned and no further execution begins
            - AND an error notification is sent using the input slug
        - title: Spec write-orchestration failure aborts before write-project
          items:
            - GIVEN the input is a spec.md file
            - AND the AI agent fails to generate an orchestration
            - WHEN the orchestration generation step runs
            - THEN an error is returned and WriteProject is not called
            - AND an error notification is sent using the input slug
        - title: Generation happens after branch switch
          items:
            - GIVEN the input is an orchestration or spec file
            - WHEN local execution runs
            - THEN SwitchToBranch is called before CommitGeneratedArtifacts
      code:
        - name: Runner.generateArtifacts
          description: generates an orchestration and/or project from the input file when not already a project; commits the generated files and returns the project to run
          module: internal/orchestration/run
          body: |
            func (r *Runner) generateArtifacts(input *project.InputFile) (*project.Project, error) {
                if input.IsProject() {
                    return input.Project(), nil
                }
                if input.IsSpec() {
                    if err := r.ai.WriteOrchestration(input); err != nil {
                        return nil, err
                    }
                }
                proj, err := r.ai.WriteProject(input)
                if err != nil {
                    return nil, err
                }
                return proj, r.git.CommitGeneratedArtifacts(proj)
            }
      tests:
        - name: TestRunLocalProjectInputSkipsGeneration
          description: verifies project inputs bypass AI generation entirely
          module: internal/orchestration/run
          body: |
            func TestRunLocalProjectInputSkipsGeneration(t *testing.T) {
                runner := newRunnerWithMocks(
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(project.ForProjectInput(project.WithAllPassing()), config.Any())
                require.NoError(t, err)
                require.False(t, runner.ai.(*mockAIClient).writeProjectCalled)
                require.False(t, runner.git.(*git.MockClient).CommitGeneratedArtifactsCalled)
            }
        - name: TestRunLocalOrchestrationInputGeneratesAndCommitsProject
          description: verifies orchestration inputs trigger WriteProject and CommitGeneratedArtifacts but not WriteOrchestration
          module: internal/orchestration/run
          body: |
            func TestRunLocalOrchestrationInputGeneratesAndCommitsProject(t *testing.T) {
                runner := newRunnerWithMocks(
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(project.ForOrchestrationInput("specs/features/ralph/run/orchestration.md"), config.Any())
                require.NoError(t, err)
                require.False(t, runner.ai.(*mockAIClient).writeOrchestrationCalled)
                require.True(t, runner.ai.(*mockAIClient).writeProjectCalled)
                require.True(t, runner.git.(*git.MockClient).CommitGeneratedArtifactsCalled)
            }
        - name: TestRunLocalSpecInputGeneratesOrchestrationThenProject
          description: verifies spec inputs call WriteOrchestration then WriteProject then CommitGeneratedArtifacts
          module: internal/orchestration/run
          body: |
            func TestRunLocalSpecInputGeneratesOrchestrationThenProject(t *testing.T) {
                runner := newRunnerWithMocks(
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(project.ForSpecInput("specs/features/ralph/run/spec.md"), config.Any())
                require.NoError(t, err)
                require.True(t, runner.ai.(*mockAIClient).writeOrchestrationCalled)
                require.True(t, runner.ai.(*mockAIClient).writeProjectCalled)
                require.True(t, runner.git.(*git.MockClient).CommitGeneratedArtifactsCalled)
            }
        - name: TestRunLocalOrchestrationWriteProjectFailureSendsErrorNotification
          description: verifies WriteProject failure triggers error notification and aborts before iteration
          module: internal/orchestration/run
          body: |
            func TestRunLocalOrchestrationWriteProjectFailureSendsErrorNotification(t *testing.T) {
                ai := &mockAIClient{
                    writeProjectFunc: func(*project.InputFile) (*project.Project, error) {
                        return nil, errors.New("write project failed")
                    },
                }
                runner := newRunnerWithMocks(withAI(ai))
                err := runner.RunLocal(project.ForOrchestrationInput("specs/features/ralph/run/orchestration.md"), config.Any())
                require.Error(t, err)
                require.NotEmpty(t, runner.notify.(*mockNotifyClient).errors)
                require.Empty(t, ai.pickCalls)
            }
        - name: TestRunLocalSpecWriteOrchestrationFailureAbortsBeforeWriteProject
          description: verifies WriteOrchestration failure aborts before WriteProject and sends error notification
          module: internal/orchestration/run
          body: |
            func TestRunLocalSpecWriteOrchestrationFailureAbortsBeforeWriteProject(t *testing.T) {
                ai := &mockAIClient{
                    writeOrchestrationFunc: func(*project.InputFile) error {
                        return errors.New("write orchestration failed")
                    },
                }
                runner := newRunnerWithMocks(withAI(ai))
                err := runner.RunLocal(project.ForSpecInput("specs/features/ralph/run/spec.md"), config.Any())
                require.Error(t, err)
                require.NotEmpty(t, runner.notify.(*mockNotifyClient).errors)
                require.False(t, ai.writeProjectCalled)
                require.Empty(t, ai.pickCalls)
            }
        - name: TestRunLocalGenerationHappensAfterBranchSwitch
          description: verifies SwitchToBranch is called before CommitGeneratedArtifacts
          module: internal/orchestration/run
          body: |
            func TestRunLocalGenerationHappensAfterBranchSwitch(t *testing.T) {
                order := []string{}
                gitMock := &git.MockClient{
                    SwitchToBranchFunc: func(string) error {
                        order = append(order, "switch")
                        return nil
                    },
                    CommitGeneratedArtifactsFunc: func(*project.Project) error {
                        order = append(order, "commit")
                        return nil
                    },
                }
                runner := newRunnerWithMocks(
                    withGit(gitMock),
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(project.ForOrchestrationInput("specs/features/ralph/run/orchestration.md"), config.Any())
                require.NoError(t, err)
                require.Equal(t, []string{"switch", "commit"}, order)
            }
      passing: false
    - slug: ai-write-orchestration
      description: Implement AgentClient.WriteOrchestration in internal/cmd/agent_client.go to invoke the AI agent with a write-orchestration prompt for spec inputs
      items:
        - AgentClient.WriteOrchestration(input *project.InputFile) error invokes ai.RunAgent with a prompt instructing it to generate an orchestration.md file in the same directory as the spec at input.Path()
        - The prompt references the spec file path and instructs the agent to follow the orchestration format documented at docs/formats/orchestration.md
        - The method returns an error if the agent call fails
        - Add a write-orchestration-instructions.md embedded prompt template in internal/ai that the method uses; the template instructs the agent to read the spec at a given path and write an orchestration.md beside it following docs/formats/orchestration.md
      passing: true
    - slug: ai-write-project
      description: Implement AgentClient.WriteProject in internal/cmd/agent_client.go to invoke the AI agent with a write-project prompt and load the resulting project file
      items:
        - AgentClient.WriteProject(input *project.InputFile) (*project.Project, error) invokes ai.RunAgent with a prompt instructing it to generate a project YAML file in projects/
        - The prompt includes the input file path and instructs the agent to follow the project format at docs/formats/project.md and use the ralph-write-project skill
        - For spec inputs, the prompt also references the orchestration.md in the same directory as the spec
        - After the agent runs, the method scans projects/ for the newest .yaml file written during the run and loads it with project.LoadProject; it returns an error if no valid project file is found
        - Add a write-project-instructions.md embedded prompt template in internal/ai that both WriteOrchestration and WriteProject delegate to for prompt construction
      passing: true
    - slug: git-commit-generated-artifacts
      description: Add CommitGeneratedArtifacts to internal/git Client and MockClient that stages all changes and commits with a descriptive message
      items:
        - 'CommitGeneratedArtifacts stages all working tree changes then commits with the message "chore: generate project for <proj.Slug>"'
      code:
        - name: Client.CommitGeneratedArtifacts
          description: stages all working tree changes and commits them with a message identifying the generated project
          module: internal/git
          body: |
            func (a *Client) CommitGeneratedArtifacts(proj *project.Project) error
        - name: MockClient.CommitGeneratedArtifacts
          description: mock that tracks calls and delegates to CommitGeneratedArtifactsFunc when set
          module: internal/git
          body: |
            CommitGeneratedArtifactsFunc   func(proj *project.Project) error
            CommitGeneratedArtifactsCalled bool

            func (m *MockClient) CommitGeneratedArtifacts(proj *project.Project) error {
                m.CommitGeneratedArtifactsCalled = true
                if m.CommitGeneratedArtifactsFunc != nil {
                    return m.CommitGeneratedArtifactsFunc(proj)
                }
                return nil
            }
      passing: true
    - slug: remote-runner-input
      description: Update RemoteRunner and WorkflowClient to accept *project.InputFile instead of *project.Project so remote submission works for any input type
      items:
        - Update WorkflowClient interface Submit signature from (proj *project.Project, cloneBranch string, debug string) to (input *project.InputFile, cloneBranch string, debug string)
        - Update workflowClientAdapter.Submit in internal/cmd/workflow_client.go to use input.Slug() where it previously used proj.Slug, and input.Path() for the relative project path
        - Update workflow.MockClient.Submit signature in internal/workflow/client_mock.go accordingly
        - Update remote_runner_test.go mocks and test helpers to use *project.InputFile
      code:
        - name: RemoteRunner.Run
          description: submits an Argo Workflow using the input file slug for branch naming and notifications
          module: internal/orchestration/run
          body: |
            func (r *RemoteRunner) Run(input *project.InputFile, flags RunRemoteFlags) error {
                branch, err := r.git.CurrentBranch()
                if err != nil {
                    return err
                }
                if err := r.git.IsBranchSyncedWithRemote(branch); err != nil {
                    return err
                }
                workflowName, err := r.workflow.Submit(input, branch, flags.Debug)
                if err != nil {
                    return err
                }
                if !flags.Follow {
                    r.workflow.PrintLogHint(workflowName)
                    return nil
                }
                if err := r.workflow.FollowLogs(workflowName); err != nil {
                    r.notify.Error(input.Slug())
                    return err
                }
                r.notify.Success(input.Slug())
                return nil
            }
      passing: false
    - slug: version-bump
      description: Version bump for the new run command input file dispatch feature
      items:
        - Apply a semver minor bump to the app version
      passing: false
