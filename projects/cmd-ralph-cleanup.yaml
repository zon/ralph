slug: cmd-ralph-cleanup
title: Remove redundant comments from cmd/ralph entrypoint
maxIterations: 10
requirements:
    - slug: remove-redundant-comments
      description: Remove comments in cmd/ralph/main.go that describe WHAT the code does rather than WHY
      items:
        - Remove the comment '// Global cleanup manager instance' above the cleanupManager package-level var — the variable name already conveys this
        - Remove the comment '// Set up signal handlers for graceful shutdown' above the cleanupManager.SetupSignalHandlers() call
        - Remove the comment '// Ensure cleanup happens on normal exit' above the defer cleanupManager.Cleanup() call
        - Remove the comment '// Execute the selected command' above the ctx.Run() call
        - Keep the comment '// Date is set via ldflags during build' on the Date variable — the ldflag mechanism is non-obvious
      passing: true
