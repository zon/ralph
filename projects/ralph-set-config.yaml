slug: ralph-set-config
title: Add ralph set config command for one-shot remote execution credential setup
feature: specs/features/ralph/set-config
maxIterations: 10
requirements:
    - slug: setconfig-orchestration
      description: Implement the SetConfigCmd struct, interfaces, and Run method
      scenarios:
        - title: All credentials configured successfully
          items:
            - GIVEN a valid GitHub App private key .pem file and an OpenCode auth.json present on the local machine
            - WHEN the user runs ralph set config --github-key <key.pem>
            - THEN the GitHub App credentials are validated against the GitHub API
            - AND a Kubernetes Secret is written with app-id and private-key
            - AND the OpenCode auth.json is written as a Kubernetes Secret
            - AND the command exits with success
        - title: GitHub credential failure halts setup
          items:
            - GIVEN an invalid or empty GitHub App private key file
            - WHEN the user runs ralph set config --github-key <key.pem>
            - THEN an error is returned after the GitHub credential step
            - AND the OpenCode credential step is not attempted
      code:
        - name: SetConfigCmd
          description: orchestration struct with injected clients for context, GitHub credentials, and OpenCode credentials
          module: internal/orchestration/setconfig
          body: |
            type K8sContext struct {
              Name      string
              Namespace string
            }

            type ContextClient interface {
              Resolve(flagContext, flagNamespace string) (K8sContext, error)
            }

            type GitHubCredentialsClient interface {
              SecretExists(k8sCtx K8sContext) (bool, error)
              Validate(keyPath string) error
              Configure(k8sCtx K8sContext, keyPath string) error
            }

            type OpenCodeCredentialsClient interface {
              Configure(k8sCtx K8sContext) error
            }

            type SetConfigCmd struct {
              Ctx      ContextClient
              GitHub   GitHubCredentialsClient
              OpenCode OpenCodeCredentialsClient
            }

            type Flags struct {
              Context   string
              Namespace string
              GithubKey string
            }

            func (c *SetConfigCmd) Run(flags Flags) error {
              k8sCtx, err := c.Ctx.Resolve(flags.Context, flags.Namespace)
              if err != nil {
                return err
              }

              if err := c.configureGitHub(k8sCtx, flags.GithubKey); err != nil {
                return err
              }

              return c.OpenCode.Configure(k8sCtx)
            }
      passing: true
    - slug: configure-github
      description: Implement the configureGitHub sub-orchestration handling the key-present and key-absent branches
      scenarios:
        - title: Flag provided — secret written with new key
          items:
            - GIVEN --github-key <key.pem> is provided
            - WHEN the user runs ralph set config
            - THEN the key is validated against the GitHub API
            - AND the credentials secret is created or updated with the new key
        - title: Flag omitted — existing secret reused
          items:
            - GIVEN --github-key is not provided
            - AND the GitHub App credentials secret already exists in the target namespace
            - WHEN the user runs ralph set config
            - THEN the GitHub credential step succeeds without reading a local key file
        - title: Flag omitted — no existing secret
          items:
            - GIVEN --github-key is not provided
            - AND no GitHub App credentials secret exists in the target namespace
            - WHEN the user runs ralph set config
            - THEN an error is returned before any steps are attempted
      code:
        - name: configureGitHub
          description: sub-orchestration that validates and writes GitHub credentials or reuses the existing secret
          module: internal/orchestration/setconfig
          body: |
            var ErrNoGitHubKey = errors.New("--github-key is required when no existing GitHub credentials secret is found")

            func (c *SetConfigCmd) configureGitHub(k8sCtx K8sContext, keyPath string) error {
              if keyPath == "" {
                exists, err := c.GitHub.SecretExists(k8sCtx)
                if err != nil {
                  return err
                }
                if !exists {
                  return ErrNoGitHubKey
                }
                return nil
              }

              if err := c.GitHub.Validate(keyPath); err != nil {
                return err
              }

              return c.GitHub.Configure(k8sCtx, keyPath)
            }
      passing: true
    - slug: setconfig-tests
      description: Implement orchestration tests covering all domain outcomes
      tests:
        - name: TestRunConfiguresGitHubAndOpenCode
          description: verifies that with a key provided both GitHub and OpenCode Configure are called
          module: internal/orchestration/setconfig
          body: |
            func TestRunConfiguresGitHubAndOpenCode(t *testing.T) {
              cmd := setconfig.withMocks()
              err := cmd.Run(flags.withKey())
              require.NoError(t, err)
              require.True(t, github.validateCalled())
              require.True(t, github.configureCalled())
              require.True(t, opencode.configureCalled())
            }
        - name: TestRunHaltsOnGitHubValidationFailure
          description: verifies that a GitHub validation failure prevents OpenCode Configure from being called
          module: internal/orchestration/setconfig
          body: |
            func TestRunHaltsOnGitHubValidationFailure(t *testing.T) {
              cmd := setconfig.withMocks(
                setconfig.withGitHub(github.thatFailsValidation()),
              )
              err := cmd.Run(flags.withKey())
              require.Error(t, err)
              require.False(t, opencode.configureCalled())
            }
        - name: TestRunHaltsOnOpenCodeFailure
          description: verifies that an OpenCode failure is propagated
          module: internal/orchestration/setconfig
          body: |
            func TestRunHaltsOnOpenCodeFailure(t *testing.T) {
              cmd := setconfig.withMocks(
                setconfig.withOpenCode(opencode.thatFails()),
              )
              err := cmd.Run(flags.withKey())
              require.Error(t, err)
            }
        - name: TestRunReusesExistingSecretWhenNoKeyProvided
          description: verifies that omitting --github-key succeeds when the secret already exists
          module: internal/orchestration/setconfig
          body: |
            func TestRunReusesExistingSecretWhenNoKeyProvided(t *testing.T) {
              cmd := setconfig.withMocks(
                setconfig.withGitHub(github.withExistingSecret()),
              )
              err := cmd.Run(flags.withoutKey())
              require.NoError(t, err)
              require.False(t, github.validateCalled())
              require.False(t, github.configureCalled())
            }
        - name: TestRunErrorsWhenNoKeyAndNoExistingSecret
          description: verifies that omitting --github-key with no existing secret returns ErrNoGitHubKey
          module: internal/orchestration/setconfig
          body: |
            func TestRunErrorsWhenNoKeyAndNoExistingSecret(t *testing.T) {
              cmd := setconfig.withMocks(
                setconfig.withGitHub(github.withNoExistingSecret()),
              )
              err := cmd.Run(flags.withoutKey())
              require.ErrorIs(t, err, setconfig.ErrNoGitHubKey)
            }
        - name: TestRunPropagatesContextResolutionFailure
          description: verifies that a context resolution failure prevents any credential steps from running
          module: internal/orchestration/setconfig
          body: |
            func TestRunPropagatesContextResolutionFailure(t *testing.T) {
              cmd := setconfig.withMocks(
                setconfig.withContext(ctx.thatFails()),
              )
              err := cmd.Run(flags.withKey())
              require.Error(t, err)
              require.False(t, github.validateCalled())
            }
      passing: true
    - slug: wire-cmd
      description: Wire ralph set config into internal/cmd and remove config github and config opencode
      items:
        - Add a SetConfigCmd field to the SetCmd struct in internal/cmd/cmd.go under the existing Skills field
        - Create internal/cmd/set_config.go implementing SetConfigCmd that wires real k8s, github, and opencode clients into the orchestration and delegates to setconfig.SetConfigCmd.Run
        - Delete internal/cmd/config_github.go and internal/cmd/config_github_test.go
        - Delete internal/cmd/config_opencode.go and internal/cmd/config_opencode_test.go
        - Remove the Github and Opencode fields from the ConfigCmd struct in internal/cmd/cmd.go
        - Remove ConfigCmd entirely if it has no remaining fields after the above removals
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver major bump to the app version
      passing: false
