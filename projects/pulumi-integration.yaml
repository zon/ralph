name: pulumi-integration
description: Add Pulumi support to Ralph container and remote execution workflows

requirements:
  - category: container
    description: Pulumi CLI installation in Containerfile
    items:
      - Pulumi CLI is installed in the runtime stage of the Containerfile
      - Pulumi binary is available in the system PATH
    passing: true

  - category: backend
    description: Pulumi Cloud configuration and credentials
    items:
      - Add `PULUMI_ACCESS_TOKEN` support to Ralph's Kubernetes secret management
      - Update `ralph config` to include a `pulumi` subcommand for setting the access token
      - Update Argo Workflow generation to mount Pulumi credentials into the execution container
    passing: true

  - category: documentation
    description: Update documentation for Pulumi support
    items:
      - Update `docs/config.md` to document Pulumi credential configuration
      - Update `docs/cli.md` to include the `ralph config pulumi` command
    passing: false

  - category: versioning
    description: Apply a semver patch bump
    items:
      - Apply a semver patch bump to `internal/version/VERSION` and `charts/ralph-webhook/Chart.yaml`
    passing: false
