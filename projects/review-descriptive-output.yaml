name: review-descriptive-output
description: Name review projects after their work and list code modules in overview output

requirements:
  - category: overview-prompt
    description: Update the overview prompt to discover both code modules and apps
    items:
      - The overview prompt asks the AI to identify both code modules (packages, libraries, logical groupings) and apps (executables, services, entry points) separately, excluding documentation and planning files
      - The overview JSON schema includes a top-level "modules" list and a top-level "apps" list, each with name, path, and summary fields
      - The overview output prints both lists with clear headers
    passing: false

  - category: project-naming
    description: Name review project files after the specific work they contain rather than the current date
    items:
      - The component review instructions direct the AI to choose a descriptive, lowercase, hyphen-separated project name and write the project YAML directly to projects/<name>.yaml (e.g. projects/fix-ai-error-handling.yaml)
      - After the AI runs, ralph detects which file was modified or created under the projects/ directory
      - The detected project file's base name (without extension) is used as the Git branch name
      - The --project flag is removed from the review command
    passing: false

  - category: version
    description: Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: false
