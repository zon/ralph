slug: run-local-refactor
title: Refactor internal/run to the Runner orchestration pattern
feature: specs/features/ralph/run-local
requirements:
    - slug: project-max-iterations
      description: Add MaxIterations field to project.Project, populated from config when not set in the project file
      items:
        - Add MaxIterations int to the Project struct with yaml tag maxIterations,omitempty
        - When LoadProject finds MaxIterations is 0, load config.RalphConfig and populate MaxIterations from it (default 10)
      passing: true
    - slug: runner-interfaces
      description: Define the Runner struct and its six injectable client interfaces in internal/run
      code:
        - name: Runner
          description: Orchestration struct holding the six client dependencies for the local execution path
          module: internal/run
          body: |
            type Runner struct {
                project  ProjectClient
                ai       AgentClient
                git      GitClient
                github   GitHubClient
                services ServicesClient
                notify   NotifyClient
            }

            type ProjectClient interface {
                AllRequirementsPassing(proj *project.Project) bool
                MaxIterationsError(proj *project.Project) error
            }

            type AgentClient interface {
                Iterate(proj *project.Project) error
                IsFatal(err error) bool
                GenerateChangelog(proj *project.Project) error
            }

            type GitClient interface {
                SwitchToBranch(slug string) error
                BlockedFileExists() bool
                WriteBlockedFile(err error)
                HasChanges() bool
                ReportExists() bool
                CommitFromReport(slug string) error
            }

            type GitHubClient interface {
                CreatePR(proj *project.Project) error
            }

            type ServicesClient interface {
                RunBeforeCommands(cfg *config.RalphConfig) error
            }

            type NotifyClient interface {
                Error(slug string)
                Success(slug string)
            }
      passing: true
    - slug: run-local
      description: RunLocal method on Runner — runs before-commands, switches branch, iterates, creates PR, and notifies
      scenarios:
        - title: before commands run first
          items:
            - GIVEN .ralph/config.yaml contains before commands
            - WHEN local execution begins
            - THEN each before command is run before the iteration loop starts
        - title: Branch switched before iteration
          items:
            - GIVEN the project slug is my-feature and the current branch is main
            - WHEN local execution starts
            - THEN ralph switches to (or creates) the branch my-feature before running any iterations
        - title: All requirements pass after iterations — commits exist
          items:
            - GIVEN requirements become passing during the iteration loop
            - AND the project branch has commits not on the base branch
            - WHEN the PR creation step runs
            - THEN a pull request is created
            - AND the PR title matches the project title
        - title: All requirements already passing at start — commits exist
          items:
            - GIVEN all requirements are passing before any iteration runs
            - AND the project branch has commits not on the base branch
            - WHEN the PR creation step runs
            - THEN a pull request is created
        - title: No commits ahead of base branch
          items:
            - GIVEN all requirements are passing
            - AND no commits were added to the project branch
            - WHEN the PR creation step runs
            - THEN PR creation is skipped
            - AND the command exits successfully
        - title: Notification on success
          items:
            - GIVEN --no-notify is not set
            - WHEN the run completes successfully
            - THEN a success desktop notification is sent for the project slug
        - title: Notification on failure
          items:
            - GIVEN --no-notify is not set
            - WHEN the iteration loop fails
            - THEN an error desktop notification is sent for the project slug
      code:
        - name: RunLocal
          description: Runs before-commands, switches to project branch, iterates, creates PR, and notifies on completion
          module: internal/run
          body: |
            func (r *Runner) RunLocal(proj *project.Project, cfg *config.RalphConfig) error {
                if err := r.services.RunBeforeCommands(cfg); err != nil {
                    return err
                }
                if err := r.git.SwitchToBranch(proj.Slug); err != nil {
                    return err
                }
                if err := r.iterate(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.github.CreatePR(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
      tests:
        - name: TestRunLocalBeforeCommandFailureAbortsEarly
          description: verifies that a failing before-command aborts before branch switching
          module: internal/run
          body: |
            func TestRunLocalBeforeCommandFailureAbortsEarly(t *testing.T) {
                runner := run.withMocks(
                    run.withServices(services.thatFailBeforeCommands()),
                )
                err := runner.RunLocal(project.any(), config.any())
                require.Error(t, err)
                require.False(t, git.branchSwitched())
            }
        - name: TestRunLocalIterationFailureSendsErrorNotification
          description: verifies that an iteration error triggers an error notification
          module: internal/run
          body: |
            func TestRunLocalIterationFailureSendsErrorNotification(t *testing.T) {
                runner := run.withMocks(
                    run.withAI(ai.thatAlwaysFails()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.Error(t, err)
                require.NotEmpty(t, notify.errors())
            }
        - name: TestRunLocalAllRequirementsPassCreatesPR
          description: verifies that a successful run with commits ahead creates a PR and sends a success notification
          module: internal/run
          body: |
            func TestRunLocalAllRequirementsPassCreatesPR(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsAllPassing()),
                    run.withGit(git.withCommitsAhead()),
                )
                err := runner.RunLocal(project.withAllPassing(), config.any())
                require.NoError(t, err)
                require.True(t, github.prCreated())
                require.NotEmpty(t, notify.successes())
            }
        - name: TestRunLocalNoCommitsSkipsPR
          description: verifies that when no commits exist ahead of base, PR creation is skipped and run succeeds
          module: internal/run
          body: |
            func TestRunLocalNoCommitsSkipsPR(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsAllPassing()),
                )
                err := runner.RunLocal(project.withAllPassing(), config.any())
                require.NoError(t, err)
                require.False(t, github.prCreated())
                require.NotEmpty(t, notify.successes())
            }
      passing: false
    - slug: iterate
      description: iterate helper on Runner — loops the AI agent until requirements pass, max iterations, or blocked
      scenarios:
        - title: All requirements already passing — exits after one iteration
          items:
            - GIVEN a project where every requirement has passing true
            - WHEN the iteration loop runs
            - THEN the loop exits after exactly 1 iteration without invoking the AI
        - title: Requirements pass mid-loop — exits early
          items:
            - GIVEN a project with failing requirements and max iterations = 10
            - WHEN the AI marks all requirements as passing during iteration 3
            - THEN the loop exits after iteration 3
            - AND does not consume additional iterations
        - title: Max iterations reached with failures remaining
          items:
            - GIVEN max iterations is 1 and requirements are still failing after iteration 1
            - WHEN the iteration loop finishes
            - THEN an error is returned indicating max iterations were reached
            - AND the number of still-failing requirements is included in the error message
        - title: blocked.md detected at loop start
          items:
            - GIVEN blocked.md exists in the repository root at the start of an iteration
            - WHEN the loop checks for the blocked state
            - THEN the loop stops immediately with a blocked error
            - AND the AI is not invoked
        - title: Fatal AI error (billing/quota)
          items:
            - GIVEN the AI agent returns an error containing a billing or quota keyword
            - WHEN the iteration processes the error
            - THEN a fatal error is returned
            - AND the loop does not retry
        - title: Non-fatal AI error writes blocked.md
          items:
            - GIVEN the AI agent exits with a non-fatal error
            - WHEN the iteration processes the failure
            - THEN blocked.md is written to the repository root containing the failure reason
            - AND subsequent iterations detect it and stop
      code:
        - name: iterate
          description: drives the iteration loop; exits on all-passing, blocked, fatal AI error, or max iterations
          module: internal/run
          body: |
            func (r *Runner) iterate(proj *project.Project) error {
                for i := 0; i < proj.MaxIterations; i++ {
                    if r.project.AllRequirementsPassing(proj) {
                        return nil
                    }
                    if r.git.BlockedFileExists() {
                        return ErrBlocked
                    }
                    if err := r.ai.Iterate(proj); err != nil {
                        if r.ai.IsFatal(err) {
                            return err
                        }
                        r.git.WriteBlockedFile(err)
                        return err
                    }
                    if err := r.commitIteration(proj); err != nil {
                        return err
                    }
                }
                return r.project.MaxIterationsError(proj)
            }
      tests:
        - name: TestIterateExitsImmediatelyWhenAllPassing
          description: verifies the loop exits without invoking AI when all requirements are already passing
          module: internal/run
          body: |
            func TestIterateExitsImmediatelyWhenAllPassing(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsAllPassing()),
                )
                err := runner.RunLocal(project.withAllPassing(), config.any())
                require.NoError(t, err)
                require.Empty(t, ai.iterateCalls())
            }
        - name: TestIterateExitsEarlyWhenRequirementsPass
          description: verifies the loop exits after the iteration where requirements first become passing
          module: internal/run
          body: |
            func TestIterateExitsEarlyWhenRequirementsPass(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsPassingAfterIterations(2)),
                    run.withProject(project.withMaxIterations(10)),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.NoError(t, err)
                require.Len(t, ai.iterateCalls(), 2)
            }
        - name: TestIterateReturnsErrorAtMaxIterations
          description: verifies an error is returned when max iterations are exhausted with requirements still failing
          module: internal/run
          body: |
            func TestIterateReturnsErrorAtMaxIterations(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatAlwaysReportsFailures()),
                    run.withProject(project.withMaxIterations(3)),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.Error(t, err)
                require.Len(t, ai.iterateCalls(), 3)
            }
        - name: TestIterateStopsOnBlockedFile
          description: verifies the loop stops with ErrBlocked when blocked.md is present
          module: internal/run
          body: |
            func TestIterateStopsOnBlockedFile(t *testing.T) {
                runner := run.withMocks(
                    run.withGit(git.withBlockedFile()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.ErrorIs(t, err, run.ErrBlocked)
                require.Empty(t, ai.iterateCalls())
            }
        - name: TestIterateFatalAIErrorIsNotRetried
          description: verifies that a fatal AI error is returned immediately without writing blocked.md or retrying
          module: internal/run
          body: |
            func TestIterateFatalAIErrorIsNotRetried(t *testing.T) {
                runner := run.withMocks(
                    run.withAI(ai.thatReturnsFatalError()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.Error(t, err)
                require.Len(t, ai.iterateCalls(), 1)
                require.False(t, git.blockedFileWritten())
            }
        - name: TestIterateNonFatalAIErrorWritesBlockedFile
          description: verifies that a non-fatal AI error writes blocked.md before returning
          module: internal/run
          body: |
            func TestIterateNonFatalAIErrorWritesBlockedFile(t *testing.T) {
                runner := run.withMocks(
                    run.withAI(ai.thatReturnsNonFatalError()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.Error(t, err)
                require.True(t, git.blockedFileWritten())
            }
      passing: false
    - slug: commit-iteration
      description: commitIteration helper on Runner — commits AI changes using report.md or a generated changelog
      scenarios:
        - title: AI produces report.md
          items:
            - GIVEN the AI wrote report.md during the iteration
            - WHEN changes are committed
            - THEN report.md is used as the commit message
            - AND report.md is deleted after the commit
        - title: Changes without report.md
          items:
            - GIVEN the working tree has uncommitted changes and no report.md
            - WHEN changes are committed
            - THEN the AI is called to generate a changelog producing report.md
            - AND that content is used as the commit message
        - title: No changes and no report.md
          items:
            - GIVEN the working tree is clean and no report.md exists
            - WHEN the commit step runs
            - THEN no commit is created and no error is returned
      code:
        - name: commitIteration
          description: commits working tree changes using report.md as the commit message, generating it if absent
          module: internal/run
          body: |
            func (r *Runner) commitIteration(proj *project.Project) error {
                if !r.git.HasChanges() {
                    return nil
                }
                if !r.git.ReportExists() {
                    if err := r.ai.GenerateChangelog(proj); err != nil {
                        return err
                    }
                }
                return r.git.CommitFromReport(proj.Slug)
            }
      tests:
        - name: TestCommitIterationUsesReportWhenPresent
          description: verifies that when report.md exists, GenerateChangelog is not called and CommitFromReport is called
          module: internal/run
          body: |
            func TestCommitIterationUsesReportWhenPresent(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsPassingAfterIterations(1)),
                    run.withGit(git.withChangesAndReport()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.NoError(t, err)
                require.Empty(t, ai.changelogCalls())
                require.True(t, git.committedFromReport())
            }
        - name: TestCommitIterationGeneratesChangelogWhenNoReport
          description: verifies that when no report.md exists, GenerateChangelog is called before CommitFromReport
          module: internal/run
          body: |
            func TestCommitIterationGeneratesChangelogWhenNoReport(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsPassingAfterIterations(1)),
                    run.withGit(git.withChangesButNoReport()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.NoError(t, err)
                require.Len(t, ai.changelogCalls(), 1)
                require.True(t, git.committedFromReport())
            }
        - name: TestCommitIterationSkipsCommitWhenNoChanges
          description: verifies that when the working tree is clean, CommitFromReport is not called
          module: internal/run
          body: |
            func TestCommitIterationSkipsCommitWhenNoChanges(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatReportsPassingAfterIterations(1)),
                    run.withGit(git.withNoChanges()),
                )
                err := runner.RunLocal(project.withFailingRequirements(), config.any())
                require.NoError(t, err)
                require.False(t, git.committedFromReport())
            }
      passing: true
    - slug: concrete-adapters
      description: Concrete adapter implementations for all six Runner interfaces, binding to existing internal packages
      items:
        - ProjectClientAdapter wraps internal/project — AllRequirementsPassing calls project.CheckCompletion and returns allComplete; MaxIterationsError returns ErrMaxIterationsReached with the failing count
        - AgentClientAdapter wraps internal/ai and internal/project — Iterate calls project.ExecuteDevelopmentIteration with the stored context; IsFatal checks for billing/quota patterns matching the existing fatalOpenCodePatterns list; GenerateChangelog calls ai.GenerateChangelog
        - GitClientAdapter wraps internal/git — SwitchToBranch calls git.ValidateGitStateAndSwitchBranch with the stored context; BlockedFileExists checks for blocked.md in the repo root via git.FindRepoRoot; WriteBlockedFile writes blocked.md to the repo root; HasChanges calls git.HasUncommittedChanges; ReportExists stat-checks report.md in the working directory; CommitFromReport reads report.md, calls git.CommitChanges, and deletes report.md
        - GitHubClientAdapter wraps internal/github and internal/ai — CreatePR generates the AI PR summary via ai.GeneratePRSummary using the stored context, base branch, and project, then calls github.CreatePullRequest; when github.ErrNoCommitsBetweenBranches is returned it logs a message and returns nil
        - ServicesClientAdapter wraps internal/services — RunBeforeCommands calls services.RunBefore when cfg.Before is non-empty
        - NotifyClientAdapter wraps internal/notify — Error and Success call notify.Error and notify.Success with the shouldNotify flag stored at construction time
        - NewRunner(ctx *context.Context, baseBranch string) *Runner constructs a Runner wiring all six concrete adapters from the given context and base branch
      passing: true
    - slug: mock-test-fixtures
      description: Mock implementations for all six Runner interfaces and factory helpers used by the orchestration tests
      items:
        - run.withMocks(opts...) constructs a Runner backed by default no-op mock clients for all six interfaces; option funcs from run.withServices, run.withAI, run.withProject, and run.withGit replace specific clients
        - project.thatReportsAllPassing() returns a ProjectClient whose AllRequirementsPassing always returns true
        - project.thatReportsPassingAfterIterations(n) returns a ProjectClient whose AllRequirementsPassing returns false for the first n calls and true thereafter
        - project.thatAlwaysReportsFailures() returns a ProjectClient whose AllRequirementsPassing always returns false
        - project.any() returns a *project.Project with one failing requirement and MaxIterations = 1
        - project.withAllPassing() returns a *project.Project where every requirement has passing true
        - project.withFailingRequirements() returns a *project.Project with at least one failing requirement
        - project.withMaxIterations(n) returns a *project.Project with MaxIterations set to n
        - config.any() returns a valid *config.RalphConfig in a default state
        - services.thatFailBeforeCommands() returns a ServicesClient whose RunBeforeCommands returns an error
        - ai.thatAlwaysFails() returns an AgentClient whose Iterate always returns a non-fatal error
        - ai.thatReturnsFatalError() returns an AgentClient whose Iterate returns a billing or quota error detected by IsFatal
        - ai.thatReturnsNonFatalError() returns an AgentClient whose Iterate returns a plain error and IsFatal returns false
        - ai.iterateCalls() returns the slice of projects passed to Iterate during the test
        - ai.changelogCalls() returns the slice of projects passed to GenerateChangelog during the test
        - git.withCommitsAhead() returns a GitClient where CreatePR succeeds (no ErrNoCommitsBetweenBranches)
        - git.withBlockedFile() returns a GitClient whose BlockedFileExists always returns true
        - git.withChangesAndReport() returns a GitClient reporting uncommitted changes and a present report.md
        - git.withChangesButNoReport() returns a GitClient reporting uncommitted changes and no report.md
        - git.withNoChanges() returns a GitClient whose HasChanges returns false
        - git.branchSwitched() returns true when SwitchToBranch was called
        - git.blockedFileWritten() returns true when WriteBlockedFile was called
        - git.committedFromReport() returns true when CommitFromReport was called
        - github.prCreated() returns true when CreatePR was called and returned nil
        - notify.errors() returns the slice of slugs for which Error was called
        - notify.successes() returns the slice of slugs for which Success was called
      passing: false
    - slug: wire-execute-local
      description: Replace the inline local execution path in Execute with NewRunner(ctx, baseBranch).RunLocal(setup.Project, setup.Config)
      items:
        - Replace the local execution block inside Execute (from the infrastructureRunBeforeCommands call through the notify.Success call) with a single NewRunner(ctx, setup.BaseBranch).RunLocal(setup.Project, setup.Config) call
        - Delete functions made obsolete by Runner adapters — RunIterationLoop, runSingleIteration, iterateWhile, isBlocked, isFatalOpenCodeError, generateChangelogIfNeeded, getCommitMessage, commitIterationChanges, reportNewlyPassingRequirements, and infrastructureGetCommitLog — along with their tests; retain infrastructureRunBeforeCommands because ExecuteCommand still calls it
        - Retain PrepareExecution and executeRemote unchanged
      passing: false
    - slug: version-bump
      description: Patch version bump for the run-local Runner refactor
      items:
        - Apply a semver patch bump to internal/version/VERSION
        - Apply a matching patch bump to charts/ralph-webhook/Chart.yaml (appVersion and version)
      passing: false
