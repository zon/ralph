name: refactor-infrastructure
description: Extend Kubernetes integration, implement Docker utilities as deep modules, and narrow service management interface

requirements:
  - category: kubernetes-integration
    description: Extend Kubernetes integration module to support read operations and eliminate direct kubectl calls
    items:
      - Add GetConfigMap and GetSecret functions to internal/k8s package
      - Replace direct kubectl calls in config_webhook.go with internal/k8s package functions
    passing: false
  - category: docker-utilities
    description: Implement Docker utilities as a deep module with a simple public interface
    items:
      - Extract Docker image building and pushing logic into internal/docker package
      - Extract authentication logic for GitHub Container Registry into internal/registry package
      - Provide a simple public interface for building and pushing images
      - Update scripts and workflows to use the new packages
      - Update Makefile container-build target to use the same building logic, eliminating duplication
    passing: false
  - category: service-management
    description: Ensure service management module has a narrow public interface
    items:
      - Unexport WaitForHealth function as it's only used internally
      - Make Process.Name field private if not needed externally
    passing: false
  - category: service-management
    description: Separate domain logic from implementation details in service management component
    items:
      - Service management functions should not directly call low-level OS functions (os/exec, net, syscall, os); use internal abstractions
      - Service management functions should be concise and focus on orchestrating service lifecycle workflows
    passing: false
