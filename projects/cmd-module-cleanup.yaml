slug: cmd-module-cleanup
title: Clean up internal/cmd to pure entry wiring
maxIterations: 10
requirements:
    - slug: move-execute-command-remote
      description: Move executeCommandRemote and PrepareExecution out of internal/cmd/execute.go into their orchestration homes
      items:
        - Move executeCommandRemote (internal/cmd/execute.go lines 93-146) into internal/orchestration/command — it generates an Argo command workflow, submits it, and optionally follows logs; this is orchestration not entry wiring
        - Move PrepareExecution (internal/cmd/execute.go lines 36-73) into internal/orchestration/run — it loads the project file, config, and branch state; this setup belongs in the run orchestration layer
        - Update CommandCmd.Run in internal/cmd/command.go and any other callers to use the new orchestration-layer location
        - After both moves, internal/cmd/execute.go should contain only Execute, ExecuteCommand, and infrastructureRunBeforeCommands; delete dead code
      passing: true
    - slug: route-workspace-setup-through-orchestration
      description: Eliminate workspaceSetupAdapter.Setup inline logic by routing through internal/orchestration/workspace.WorkspaceSetup
      items:
        - Add a New(github GitHubClient, workspace WorkspaceClient, git GitClient) *WorkspaceSetup constructor to internal/orchestration/workspace
        - In internal/cmd/workflow_run_adapters.go, replace the 40-line inline implementation of workspaceSetupAdapter.Setup with a call to orchestration/workspace.New(...).Setup(flags) — wire real adapter implementations for GitHubClient (calling github.ConfigureGitAuth), WorkspaceClient (calling workspace.SetupOpenCodeCredentials and SetupSymlinks), and GitClient (delegating to internal/git)
        - Move setupWorkspaceSymlinks and link (workflow_run_adapters.go lines 306-365) into internal/workspace so they can serve as the SetupSymlinks implementation
        - Move repoCloneURL into internal/github if not already present; move parseRepo and split2 into internal/github or internal/git
        - Delete the inline setup logic and all moved helpers from internal/cmd once delegation is in place
      passing: true
    - slug: delegate-git-adapter
      description: Replace gitAdapter's raw runGit subprocess calls with internal/git function delegation
      items:
        - Add NeedsMerge(branch string) (bool, error) to internal/git/merge.go — it checks git merge-base and rev-parse to determine whether the current HEAD needs to merge a given branch
        - In internal/cmd/workflow_run_adapters.go, replace gitAdapter.FetchBranch, Merge, and AbortMerge with calls to git.FetchBranch, git.Merge, and git.AbortMerge from internal/git
        - Replace gitAdapter.NeedsMerge with a call to the new git.NeedsMerge function
        - Delete runGit, gitCheckout, gitCreateBranch, and remoteBranchExists from internal/cmd/workflow_run_adapters.go — they duplicate functions already in internal/git; update checkoutWorkflowBranch to delegate to internal/git instead
      passing: true
    - slug: extract-ai-merge-conflicts
      description: Move aiAdapter.ResolveMergeConflicts from internal/cmd/workflow_run_adapters.go into internal/orchestration/workflowrun
      items:
        - Move aiAdapter.ResolveMergeConflicts (internal/cmd/workflow_run_adapters.go lines 138-185) into internal/orchestration/workflowrun — it builds merge instructions, loads config, loads project, and calls the local runner; these are orchestration concerns not entry wiring
        - After the move, aiAdapter.ResolveMergeConflicts in internal/cmd/workflow_run_adapters.go delegates to the new orchestration function
        - The moved code must not contain raw subprocess calls or I/O formatting — any such logic must live in implementation modules
      passing: true
    - slug: move-setconfig-implementations
      description: Move setconfigGitHubClient and setconfigOpenCodeClient real implementations into internal/github, internal/k8s, and internal/workspace
      items:
        - Add SecretExists(ctx context.Context, name, namespace, kubeContext string) (bool, error) to internal/k8s.Client interface and its real implementation; move the kubectl-exec logic from setconfigGitHubClient.SecretExists (set_config.go lines 69-84) there; update the internal/k8s mock
        - Add ValidateAppCredentials(ctx context.Context, keyPath, appID string) error to internal/github; move the JWT-generation and installation-token validation from setconfigGitHubClient.Validate (set_config.go lines 86-119) there
        - Move the k8s secret creation from setconfigGitHubClient.Configure (set_config.go lines 122-143) into internal/k8s as a new method on the Client
        - Add ReadOpenCodeCredentials(authFilePath string) ([]byte, error) to internal/workspace; move the auth.json reading from setconfigOpenCodeClient.Configure (set_config.go lines 151-187) there; move the k8s secret creation to internal/k8s
        - After extraction, setconfigGitHubClient and setconfigOpenCodeClient in internal/cmd/set_config.go become thin delegators
      passing: true
    - slug: consolidate-workflow-token
      description: Eliminate duplicated token generation and git auth logic in internal/cmd/workflow_token.go by delegating to internal/github
      items:
        - Add GenerateInstallationToken(ctx context.Context, owner, repo, secretsDir string) (string, error) to internal/github — it wraps the existing unexported readAppCredentials and obtainInstallationToken functions
        - Add ConfigureTokenAuth(ctx context.Context, token string) error to internal/github — it wraps the existing unexported configureGitAuth and authenticateGHCLI functions
        - In internal/cmd/workflow_token.go, update workflowTokenGitHubClient.GenerateToken to call github.GenerateInstallationToken instead of duplicating the JWT/token generation logic
        - Update workflowTokenGitClient.ConfigureAuth to call github.ConfigureTokenAuth instead of its own copies of cleanupStaleTokenRewrites and authenticateGHCLI
        - Delete cleanupStaleTokenRewrites and authenticateGHCLI from internal/cmd/workflow_token.go — they duplicate functions already in internal/github/app.go
      passing: true
    - slug: move-merge-implementations
      description: Move workflowMergeGitHubClient.WaitForHeadSync and workflowMergeProjectClient methods into internal/github and internal/project
      items:
        - Add WaitForHeadSync(prBranch string) error to internal/github (as a method on GH or a standalone function); move the polling loop from workflowMergeGitHubClient.WaitForHeadSync (workflow_merge.go lines 78-88) there
        - Add LoadAll(dir string) ([]*Project, error) to internal/project; move the filepath.WalkDir project-loading logic from workflowMergeProjectClient.LoadAll (workflow_merge.go lines 101-128)
        - Add FilterPassing(projects []*Project) []*Project to internal/project; move from workflowMergeProjectClient.FilterPassing (lines 130-137)
        - Add DeleteAll(projects []*Project) error to internal/project; move from workflowMergeProjectClient.DeleteAll (lines 139-147)
        - After extraction, workflowMergeGitHubClient and workflowMergeProjectClient in internal/cmd/workflow_merge.go become thin delegators
        - Add unit tests for LoadAll, FilterPassing, and DeleteAll in internal/project using t.TempDir()
      passing: true
    - slug: fix-command-workflow-client
      description: Replace the no-op commandWorkflowClient stub in internal/cmd/command.go with real Argo wiring
      items:
        - commandWorkflowClient.Submit and StreamLogs both return nil/zero, making CommandCmd.Run() silently do nothing for remote execution
        - Wire commandWorkflowClient.Submit to generate and submit an Argo command workflow using workflow.GenerateCommandWorkflow and argo.NewClient(), equivalent to executeCommandRemote in execute.go
        - Wire commandWorkflowClient.StreamLogs to call argo.Client.FollowLogs with the workflow namespace and kube context
        - Thread any required context (kube context, namespace) through CommandCmd or its wiring in internal/cmd/command.go
      passing: true
    - slug: cleanup-comments-and-stale-tests
      description: Remove the multi-line comment block in kube_context.go and the stale --once test in cmd_test.go
      items:
        - In internal/cmd/kube_context.go, remove the 14-line comment block on lines 12-25 — code standard prohibits multi-line comment blocks; the function name and parameter names already document the behavior
        - In internal/cmd/cmd_test.go, remove the stale test case 'default command - local with once should fail' (line 57) — the --once flag does not exist on RunCmd so the parser rejects it as unknown before validateRunFlags is ever reached, making the expected error message unreachable
      passing: true
    - slug: add-missing-tests
      description: 'Write tests in the four empty test files: workflow_test.go, comment_test.go, setup_workspace_test.go, and merge_test.go'
      items:
        - In internal/cmd/workflow_test.go (currently contains only a package declaration), write table-driven tests for WorkflowRunCmd.Run() covering flag propagation to the orchestration layer; use mocks for all orchestration dependencies
        - In internal/cmd/comment_test.go (currently empty), write table-driven tests for workflowCommentAIClient.RenderCommentPrompt (verify the prompt contains the comment body, PR number, PR branch, repo owner/name, and default instructions), GenerateCommentReply (verify pushed vs not-pushed messages), and workflowCommentGitClient methods (HasChanges, ReportExists, CommitAndPushFromReport) using t.TempDir()
        - In internal/cmd/setup_workspace_test.go (currently empty), write tests for workspaceSetupAdapter.Setup covering the happy path and error propagation when GitHub auth fails; use mocked dependencies — no real GitHub API, gh CLI, or kubectl invocations
        - In internal/cmd/merge_test.go (currently empty), write table-driven tests for WorkflowMergeCmd.Run() and for workflowMergeProjectClient.LoadAll, FilterPassing, and DeleteAll using t.TempDir()
        - All new tests must use testify assert/require, table-driven t.Run() patterns, and t.TempDir() for filesystem interaction; no real GitHub API, gh CLI, argo, or kubectl in any test
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: true
