slug: github-add-real-cli-tests-and-formatting
title: Add real-CLI test coverage for *GH and fix formatting in internal/github
maxIterations: 10
requirements:
    - slug: fix-gofmt-issues
      description: |
        Apply the three whitespace/import-ordering fixes that `gofmt -l internal/github/` currently flags.
      items:
        - |
          The MockGH struct fields in internal/github/client_mock.go (IsReadyFn, FindExistingPRFn, CreatePRFn, GetPRHeadRefOidFn, MergePRFn, ListCollaboratorsFn, RegisterWebhookFn) are realigned so "func" starts in the same column for every field, matching gofmt's canonical alignment (the alignment broke when ListCollaboratorsFn was added with extra leading spaces) — run gofmt -w on the file or apply the equivalent whitespace change by hand.
        - |
          The import block in internal/github/client_test.go is reordered so `orchestrationRun "github.com/zon/ralph/internal/orchestration/run"` is grouped alphabetically with the other `github.com/zon/ralph/internal/...` imports (currently listed last, after `"github.com/zon/ralph/internal/project"`) — matching gofmt's canonical import ordering.
        - |
          The two trailing blank lines after the closing brace of parsePRURL at the end of internal/github/github.go (lines 75-76) are removed — gofmt -d shows only those blank lines being deleted.
        - |
          No identifiers, logic, comments, or other content changes — these are whitespace/import-ordering-only fixes. After the change, `gofmt -l internal/github/` reports no files needing formatting.
        - |
          go vet ./internal/github/... and go test ./internal/github/... pass with no errors.
      passing: true
    - slug: add-real-gh-cli-tests
      description: |
        Add direct unit test coverage for the *GH struct in internal/github/gh.go — the implementation that shells out to the real "gh" CLI via os/exec — using the fake-binary-on-PATH substitution technique already established in this codebase (see internal/opencode's TestRunCommand/TestRunCommandFailure: write a fake executable script to t.TempDir(), prepend its directory to PATH via t.Setenv, and assert on *GH's behavior against the fake script's output). Currently none of *GH's methods are exercised by any test — only MockGH (the interface mock) and the higher-level Client wrapper are tested, never the real gh-CLI-shelling implementation, confirmed via `grep -n "^func Test" internal/github/*_test.go` showing no test that constructs a *GH and calls IsReady/FindExistingPR/CreatePR/GetPRHeadRefOid/MergePR/ListCollaborators/RegisterWebhook directly.
      items:
        - |
          The existing `shQuote` and `withFakeGH` helper functions in internal/github/collaborators_test.go — currently dead code, defined but never called anywhere (confirmed via `grep -rn "shQuote(\|withFakeGH(" internal/github/` matching only their own declarations) — are put to active use as the foundation for the new tests in this requirement (adapting their signatures/bodies as needed for the cases below), or, if they cannot be cleanly adapted, are deleted and replaced with fresh helpers that serve the same fake-binary-on-PATH purpose. Either way, the end state has no orphaned/unused test helper functions in the package.
        - |
          internal/github/gh_test.go (new file, package github) gains TestGH_IsReady, covering both outcomes: a fake "gh" script that succeeds on both "gh --version" and "gh auth status" (asserting IsReady returns true), and a fake script that fails on one of those invocations (asserting IsReady returns false). Distinguish the two `gh` subcommands inside the fake script by inspecting "$1"/"$2".
        - |
          internal/github/gh_test.go gains TestGH_FindExistingPR, covering: a fake script that, for "gh pr list --head ... --json url --limit 1", prints JSON containing a "url" field with an http(s) URL on its own line (asserting FindExistingPR returns that URL), and a fake script that prints output without a "url" field or without an http(s) line (asserting FindExistingPR returns "" with no error) — exercising the two branches at gh.go:72-85.
        - |
          internal/github/gh_test.go gains TestGH_ListCollaborators (or it is added to collaborators_test.go, replacing/adapting the dead withFakeGH/shQuote helpers there), covering: a fake "gh" script that, for the "gh api repos/<owner>/<repo>/collaborators --jq .[].login" invocation, prints newline-separated logins (asserting ListCollaborators returns the expected []string, with blank lines filtered as gh.go's collaborators.go:26-29 does), and a fake script that exits non-zero (asserting ListCollaborators returns an error wrapping "failed to list collaborators").
        - |
          internal/github/gh_test.go gains TestGH_RegisterWebhook (or it is added to webhook_test.go), covering at minimum two paths distinguished by what the fake "gh" script echoes for the initial "gh api repos/<owner>/<repo>/hooks --jq '.[] | select(...) | .id'" lookup: (a) the lookup prints nothing/empty/"null" and the script then handles a subsequent "--method POST" create call, asserting RegisterWebhook returns nil (the create-new-webhook path at webhook.go:58-71); (b) the lookup prints a numeric hook ID and the script then handles a subsequent "--method PATCH" update call, asserting RegisterWebhook returns nil (the update-existing-webhook path at webhook.go:42-56). A fake script that fails the create or update call should also be covered, asserting the returned error wraps "failed to create webhook" or "failed to update webhook" respectively.
        - |
          All new tests use t.TempDir() for the fake binary's directory and t.Setenv("PATH", ...) to prepend it — never invoking the real "gh" CLI (per docs/testing.md's rule that "the GitHub API, the gh CLI... must never be invoked with real implementations in any test. These must always be abstracted behind interfaces and replaced with mocks" — here *GH is itself the implementation being tested via a substituted fake binary, not the real CLI). Tests use testify require/assert and follow the structure and naming conventions established elsewhere in the package (e.g. TestParseRemoteURL's table-driven style, TestCreatePullRequest_*'s mock-construction style).
        - |
          go vet ./internal/github/... and go test ./internal/github/... pass with the new tests included.
      passing: true
