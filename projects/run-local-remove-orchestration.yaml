slug: run-local-remove-orchestration
title: Remove orchestration doc before PR submission
feature: specs/features/ralph/run-local
maxIterations: 10
requirements:
    - slug: remove-orchestration-step
      description: Add removeOrchestration step to RunLocal and implement the method
      scenarios:
        - title: Project has a spec with orchestration — orchestration removed
          items:
            - GIVEN the project references a spec that contains an orchestration document
            - WHEN all requirements are passing and the command is about to create a PR
            - THEN the orchestration document is deleted from the repository
            - AND the deletion is committed before the pull request is opened
        - title: Project has no spec — cleanup skipped
          items:
            - GIVEN the project does not reference a spec
            - WHEN the command is about to create a PR
            - THEN no orchestration cleanup is performed
        - title: Project spec has no orchestration — cleanup skipped
          items:
            - GIVEN the project references a spec that does not contain an orchestration document
            - WHEN the command is about to create a PR
            - THEN no orchestration cleanup is performed
      code:
        - name: RunLocal
          description: updated RunLocal to call removeOrchestration between iterate and CreatePR
          module: internal/orchestration/run
          body: |
            func (r *Runner) RunLocal(proj *project.Project, cfg *config.RalphConfig) error {
              if r.env.InWorkflow() {
                defer r.ai.PrintStats()
              }
              if err := r.services.RunBeforeCommands(cfg); err != nil {
                return err
              }
              if err := r.git.SwitchToBranch(proj.Slug); err != nil {
                return err
              }
              if err := r.iterate(proj, cfg); err != nil {
                r.notify.Error(proj.Slug)
                return err
              }
              if err := r.removeOrchestration(proj); err != nil {
                r.notify.Error(proj.Slug)
                return err
              }
              if err := r.github.CreatePR(proj); err != nil {
                r.notify.Error(proj.Slug)
                return err
              }
              r.notify.Success(proj.Slug)
              return nil
            }
        - name: removeOrchestration
          description: checks whether the project spec has an orchestration doc and, if so, deletes it and commits
          module: internal/orchestration/run
          body: |
            func (r *Runner) removeOrchestration(proj *project.Project) error {
              if !r.project.HasSpec(proj) {
                return nil
              }
              if !r.project.HasOrchestration(proj) {
                return nil
              }
              if err := r.project.RemoveOrchestration(proj); err != nil {
                return err
              }
              return r.git.CommitOrchestrationRemoval(proj.Slug)
            }
      tests:
        - name: TestRemoveOrchestrationSkipsWhenNoSpec
          description: verifies removeOrchestration is a no-op when the project has no spec
          module: internal/orchestration/run
          body: |
            func TestRemoveOrchestrationSkipsWhenNoSpec(t *testing.T) {
              runner := withMocks(
                withProject(newProjectThatReportsAllPassingWithNoSpec()),
              )
              err := runner.RunLocal(project.WithAllPassing(), config.Any())
              require.NoError(t, err)
              require.False(t, gitOrchestrationRemovalCommitted(runner))
            }
        - name: TestRemoveOrchestrationSkipsWhenNoOrchestration
          description: verifies removeOrchestration is a no-op when the spec has no orchestration doc
          module: internal/orchestration/run
          body: |
            func TestRemoveOrchestrationSkipsWhenNoOrchestration(t *testing.T) {
              runner := withMocks(
                withProject(newProjectThatReportsAllPassingWithSpecButNoOrchestration()),
              )
              err := runner.RunLocal(project.WithAllPassing(), config.Any())
              require.NoError(t, err)
              require.False(t, gitOrchestrationRemovalCommitted(runner))
            }
        - name: TestRemoveOrchestrationRemovesAndCommitsWhenPresent
          description: verifies that when the spec has an orchestration doc, it is removed and committed
          module: internal/orchestration/run
          body: |
            func TestRemoveOrchestrationRemovesAndCommitsWhenPresent(t *testing.T) {
              runner := withMocks(
                withProject(newProjectThatReportsAllPassingWithOrchestration()),
              )
              err := runner.RunLocal(project.WithAllPassing(), config.Any())
              require.NoError(t, err)
              require.True(t, projectOrchestrationRemoved(runner))
              require.True(t, gitOrchestrationRemovalCommitted(runner))
            }
        - name: TestRemoveOrchestrationFailureSendsErrorNotification
          description: verifies that a removeOrchestration failure sends an error notification and skips PR creation
          module: internal/orchestration/run
          body: |
            func TestRemoveOrchestrationFailureSendsErrorNotification(t *testing.T) {
              runner := withMocks(
                withProject(newProjectThatReportsAllPassingWithOrchestrationRemovalFailure()),
              )
              err := runner.RunLocal(project.WithAllPassing(), config.Any())
              require.Error(t, err)
              require.NotEmpty(t, notifyErrors(runner))
              require.False(t, githubPRCreated(runner))
            }
      passing: false
    - slug: project-client-has-spec
      description: HasSpec on ProjectClient interface and project.Client implementation
      items:
        - Add HasSpec(proj *project.Project) bool to the ProjectClient interface in internal/orchestration/run/runner.go
        - Add HasSpecFunc field and HasSpec method to project.MockClient in internal/project/client_mock.go; default returns false
        - Add the interface conformance check for HasSpec to internal/project/client_test.go
      code:
        - name: HasSpec
          description: returns true when the project references a spec directory
          module: internal/project
          body: |
            func (c *Client) HasSpec(proj *Project) bool {
              return proj.Feature != ""
            }
      passing: true
    - slug: project-client-has-orchestration
      description: HasOrchestration on ProjectClient interface and project.Client implementation
      items:
        - Add HasOrchestration(proj *project.Project) bool to the ProjectClient interface in internal/orchestration/run/runner.go
        - Add HasOrchestrationFunc field and HasOrchestration method to project.MockClient; default returns false
      code:
        - name: HasOrchestration
          description: returns true when an orchestration.md exists in the project's spec directory
          module: internal/project
          body: |
            func (c *Client) HasOrchestration(proj *Project) bool {
              if proj.Feature == "" {
                return false
              }
              repoRoot, err := git.FindRepoRoot()
              if err != nil {
                return false
              }
              _, err = os.Stat(filepath.Join(repoRoot, proj.Feature, "orchestration.md"))
              return err == nil
            }
      passing: true
    - slug: project-client-remove-orchestration
      description: RemoveOrchestration on ProjectClient interface and project.Client implementation
      items:
        - Add RemoveOrchestration(proj *project.Project) error to the ProjectClient interface in internal/orchestration/run/runner.go
        - Add RemoveOrchestrationFunc field, RemoveOrchestrationCalled bool, and RemoveOrchestration method to project.MockClient; default returns nil
      code:
        - name: RemoveOrchestration
          description: deletes the orchestration.md file from the project's spec directory and stages the deletion
          module: internal/project
          body: |
            func (c *Client) RemoveOrchestration(proj *Project) error {
              repoRoot, err := git.FindRepoRoot()
              if err != nil {
                return err
              }
              orchestrationPath := filepath.Join(repoRoot, proj.Feature, "orchestration.md")
              if err := os.Remove(orchestrationPath); err != nil {
                return err
              }
              return git.StageFile(orchestrationPath)
            }
      passing: false
    - slug: git-client-commit-orchestration-removal
      description: CommitOrchestrationRemoval on GitClient interface and git.Client implementation
      items:
        - Add CommitOrchestrationRemoval(slug string) error to the GitClient interface in internal/orchestration/run/runner.go
        - Add CommitOrchestrationRemovalFunc field, CommitOrchestrationRemovalCalled bool, and CommitOrchestrationRemoval method to git.MockClient in internal/git/client_mock.go; default returns nil
        - Add CommitOrchestrationRemovalCalled tracking to trackingGitClient in internal/orchestration/run/mock_test.go and a gitOrchestrationRemovalCommitted(runner) helper
      code:
        - name: CommitOrchestrationRemoval
          description: commits the staged orchestration doc deletion with a fixed message
          module: internal/git
          body: |
            func (a *Client) CommitOrchestrationRemoval(_ string) error {
              return Commit("chore: remove orchestration doc before PR")
            }
      passing: false
    - slug: run-orchestration-test-helpers
      description: New project mock factories in mock_test.go for the removeOrchestration test cases
      items:
        - Add newProjectThatReportsAllPassingWithNoSpec() returning project.MockClient with AllPassingFunc=true and HasSpecFunc=false
        - Add newProjectThatReportsAllPassingWithSpecButNoOrchestration() with HasSpecFunc=true and HasOrchestrationFunc=false
        - Add newProjectThatReportsAllPassingWithOrchestration() with HasSpecFunc=true, HasOrchestrationFunc=true
        - Add newProjectThatReportsAllPassingWithOrchestrationRemovalFailure() with the above plus RemoveOrchestrationFunc returning an error
        - Add projectOrchestrationRemoved(runner *Runner) bool that returns the project mock's RemoveOrchestrationCalled field
      passing: false
