name: simplify-review-command
description: Simplify ralph review to loop over items directly, remove overview command

requirements:
  - category: remove-overview
    description: Delete the overview command and all related code
    items:
      - Delete internal/cmd/overview.go
      - Delete internal/cmd/overview_test.go
      - Delete internal/cmd/overview-instructions.md
      - Delete internal/cmd/component-review-instructions.md
      - Remove the Overview field of type OverviewCmd from the Cmd struct in internal/cmd/cmd.go
    passing: false

  - category: rewrite-review
    description: Rewrite review.go to loop over items directly without the overview phase
    items:
      - Remove the runOverview() method from ReviewCmd in internal/cmd/review.go
      - Remove the shuffleComponents() function from internal/cmd/review.go
      - Remove the printDetectedComponents() method from ReviewCmd in internal/cmd/review.go
      - Remove the reviewPromptData struct and reviewPromptTemplate variable from internal/cmd/review.go
      - Remove the buildPrompt() method from ReviewCmd in internal/cmd/review.go
      - Rewrite Run() on ReviewCmd in internal/cmd/review.go to call the new runReview() after setup, then submit a PR only if runReview returns a non-empty branchName that differs from startingBranch
      - Add runReview(ctx, ralphConfig, projectDoc) (branchName, detectedProjectFile string, err error) method to ReviewCmd in internal/cmd/review.go; it shuffles items, loops over all of them, runs the AI with buildItemPrompt() for each, detects ./projects changes via git.DetectModifiedProjectFile("projects") after each agent call, commits and pushes each detected change with run.CommitFileAndPush(), sets branchName from the first detected project file name (sans extension) and reuses it for all subsequent commits
      - Add buildItemPrompt(content string) string method to ReviewCmd in internal/cmd/review.go that executes a template with a struct containing only ItemContent string
    passing: false

  - category: prompt-template
    description: Replace review-instructions.md with a simpler item-only template
    items:
      - Replace content of internal/cmd/review-instructions.md with a template that uses only {{.ItemContent}} and instructs the AI to create or edit a ralph project in projects/<name>.yaml if any standards are not met
    passing: false

  - category: version
    description: Bump version to reflect the breaking removal of the overview command
    items:
      - Apply a semver major bump to internal/version/VERSION and the appVersion field in charts/ralph-webhook/Chart.yaml
      - Apply a semver patch bump to the version field in charts/ralph-webhook/Chart.yaml
    passing: false

  - category: update-tests
    description: Update tests to match new behavior, remove tests for deleted code
    items:
      - Remove TestPrintDetectedComponents from internal/cmd/review_test.go
      - Remove TestShuffleComponents from internal/cmd/review_test.go
      - Remove TestReviewBuildCommitMessage from internal/cmd/review_test.go
      - Remove TestReviewCommitPrefixConsistency from internal/cmd/review_test.go
      - Remove TestReviewIterationPrefixFormat from internal/cmd/review_test.go
      - Update TestEmbeddedReviewInstructions in internal/cmd/review_test.go to verify {{.ItemContent}} is present and that {{.ConfigContent}} and {{.ReviewName}} are absent
      - Update TestReviewBuildPrompt in internal/cmd/review_test.go to call buildItemPrompt() with a content string and verify the output contains that content
      - Rewrite TestReviewLoopExitsAfterFirstCommit in internal/cmd/review_test.go as TestReviewLoopProcessesAllItems, calling the new runReview() signature (no overview parameter) and verifying that all items are processed without early exit
    passing: false
