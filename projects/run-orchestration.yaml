slug: run-orchestration
title: Add RunCmd orchestration to internal/orchestration/run
feature: specs/features/ralph/run
maxIterations: 10
requirements:
    - slug: run-cmd
      description: RunCmd struct with injected client interfaces and Run method that validates inputs and dispatches to the local or remote runner
      scenarios:
        - title: Working directory changed before project file loaded
          items:
            - GIVEN the user passes --working-dir /path/to/project
            - WHEN the command starts
            - THEN the working directory is changed to /path/to/project before the project file is loaded
        - title: Project file not found
          items:
            - GIVEN the user provides a path to a file that does not exist on disk
            - WHEN the command starts
            - THEN an error is returned containing "project file not found"
            - AND no execution begins
        - title: --follow with --local
          items:
            - GIVEN the user passes both --follow and --local
            - WHEN the command validates flag combinations
            - THEN an error is returned containing "--follow flag is not applicable with --local flag"
        - title: --debug with --local
          items:
            - GIVEN the user passes --debug <branch> and --local
            - WHEN the command validates flag combinations
            - THEN an error is returned containing "--debug flag is not applicable with --local flag"
      code:
        - name: RunCmd
          description: orchestration struct with injected clients, LocalRunnerClient and RemoteRunnerClient interfaces, and Run method
          module: internal/orchestration/run
          body: |
            type RunCmd struct {
                workspace WorkspaceClient
                project   ProjectClient
                git       GitClient
                config    ConfigClient
                local     LocalRunnerClient
                remote    RemoteRunnerClient
            }

            type LocalRunnerClient interface {
                RunLocal(proj *project.Project, cfg *config.RalphConfig) error
            }

            type RemoteRunnerClient interface {
                RunRemote(proj *project.Project, follow bool) error
            }

            func (r *RunCmd) Run(flags RunFlags) error {
                if err := r.workspace.ChangeDirectory(flags.WorkingDir); err != nil {
                    return err
                }
                if err := r.project.ValidateFile(flags.ProjectFile); err != nil {
                    return err
                }
                if err := flags.Validate(); err != nil {
                    return err
                }
                setup, err := r.prepareSetup(flags)
                if err != nil {
                    return err
                }
                if flags.Local {
                    return r.local.RunLocal(setup.Project, setup.Config)
                }
                return r.remote.RunRemote(setup.Project, flags.Follow)
            }
      tests:
        - name: TestRunWorkingDirectoryFailureAbortsEarly
          description: verifies a workspace change failure aborts before project file validation
          module: internal/orchestration/run
          body: |
            func TestRunWorkingDirectoryFailureAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withWorkspace(workspace.thatFailsChangeDirectory()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, project.fileValidated())
            }
        - name: TestRunProjectFileNotFoundAbortsEarly
          description: verifies a missing project file aborts before config is loaded
          module: internal/orchestration/run
          body: |
            func TestRunProjectFileNotFoundAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withProject(project.thatFailsValidation()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, config.loaded())
            }
        - name: TestRunIncompatibleFlagsAbortBeforeSetup
          description: verifies incompatible flags abort before config is loaded
          module: internal/orchestration/run
          body: |
            func TestRunIncompatibleFlagsAbortBeforeSetup(t *testing.T) {
                cmd := run.withMocks()
                err := cmd.Run(flags.withFollowAndLocal())
                require.Error(t, err)
                require.False(t, config.loaded())
            }
        - name: TestRunLocalDispatchesToLocalRunner
          description: verifies --local flag routes to the local runner and not the remote runner
          module: internal/orchestration/run
          body: |
            func TestRunLocalDispatchesToLocalRunner(t *testing.T) {
                cmd := run.withMocks()
                err := cmd.Run(flags.withLocal())
                require.NoError(t, err)
                require.True(t, local.runLocalCalled())
                require.False(t, remote.runRemoteCalled())
            }
        - name: TestRunRemoteDispatchesToRemoteRunner
          description: verifies default (no --local) routes to the remote runner and not the local runner
          module: internal/orchestration/run
          body: |
            func TestRunRemoteDispatchesToRemoteRunner(t *testing.T) {
                cmd := run.withMocks()
                err := cmd.Run(flags.any())
                require.NoError(t, err)
                require.True(t, remote.runRemoteCalled())
                require.False(t, local.runLocalCalled())
            }
      passing: true
    - slug: prepare-setup
      description: prepareSetup method that loads config and project, resolves project branch, base branch, and max iterations into an ExecutionSetup
      items:
        - Model and Context values from RunFlags must be included in ExecutionSetup so the runner can pass them to the local or remote runner
      scenarios:
        - title: Slug with spaces and capitals
          items:
            - GIVEN a project slug "My Feature Work"
            - WHEN the branch name is derived
            - THEN the branch name is my-feature-work
        - title: Slug with special characters
          items:
            - 'GIVEN a project slug "fix: auth/bug"'
            - WHEN the branch name is derived
            - THEN the branch name is fix-authbug
        - title: Empty or all-invalid slug
          items:
            - GIVEN a project slug that produces an empty string after sanitization
            - WHEN the branch name is derived
            - THEN the branch name is unnamed-project
        - title: Current branch differs from project branch
          items:
            - GIVEN the current branch is feature-x and the project branch would be my-project
            - AND no --base flag is provided
            - WHEN the base branch is resolved
            - THEN feature-x is used as the base branch
        - title: Flag takes precedence over config for max iterations
          items:
            - 'GIVEN maxIterations: 5 in .ralph/config.yaml'
            - AND the user passes --max-iterations 2
            - WHEN the iteration limit is resolved
            - THEN the limit is 2
      code:
        - name: prepareSetup
          description: loads config, project, and current branch; resolves project branch name, base branch, and max iterations
          module: internal/orchestration/run
          body: |
            func (r *RunCmd) prepareSetup(flags RunFlags) (ExecutionSetup, error) {
                cfg, err := r.config.Load()
                if err != nil {
                    return ExecutionSetup{}, err
                }
                proj, err := r.project.Load(flags.ProjectFile)
                if err != nil {
                    return ExecutionSetup{}, err
                }
                currentBranch, err := r.git.CurrentBranch()
                if err != nil {
                    return ExecutionSetup{}, err
                }
                projectBranch := git.BranchName(proj.Slug)
                return ExecutionSetup{
                    Project:       proj,
                    Config:        cfg,
                    BranchName:    projectBranch,
                    CurrentBranch: currentBranch,
                    BaseBranch:    resolveBaseBranch(flags.Base, currentBranch, projectBranch, cfg.DefaultBranch),
                    MaxIterations: resolveMaxIterations(cfg.MaxIterations, flags.MaxIterations),
                }, nil
            }
      tests:
        - name: TestPrepareSetupConfigLoadFailureAbortsEarly
          description: verifies a config load failure aborts before the project is loaded
          module: internal/orchestration/run
          body: |
            func TestPrepareSetupConfigLoadFailureAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withConfig(config.thatFailsLoad()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, project.loaded())
            }
        - name: TestPrepareSetupProjectLoadFailureAbortsEarly
          description: verifies a project load failure aborts before the current branch is fetched
          module: internal/orchestration/run
          body: |
            func TestPrepareSetupProjectLoadFailureAbortsEarly(t *testing.T) {
                cmd := run.withMocks(
                    run.withProject(project.thatFailsLoad()),
                )
                err := cmd.Run(flags.any())
                require.Error(t, err)
                require.False(t, git.currentBranchCalled())
            }
        - name: TestPrepareSetupBaseBranchFromCurrentWhenDifferentFromProject
          description: verifies the current branch is used as base when it differs from the project branch
          module: internal/orchestration/run
          body: |
            func TestPrepareSetupBaseBranchFromCurrentWhenDifferentFromProject(t *testing.T) {
                cmd := run.withMocks(
                    run.withGit(git.onBranch("feature-x")),
                    run.withProject(project.withSlug("my-project")),
                )
                err := cmd.Run(flags.withNoBase())
                require.NoError(t, err)
                require.Equal(t, "feature-x", remote.lastProject().BaseBranch)
            }
        - name: TestPrepareSetupMaxIterationsFlagOverridesConfig
          description: verifies a non-zero --max-iterations flag overrides the config value
          module: internal/orchestration/run
          body: |
            func TestPrepareSetupMaxIterationsFlagOverridesConfig(t *testing.T) {
                cmd := run.withMocks(
                    run.withConfig(config.withMaxIterations(5)),
                )
                err := cmd.Run(flags.withMaxIterations(2))
                require.NoError(t, err)
                require.Equal(t, 2, remote.lastProject().MaxIterations)
            }
      passing: true
    - slug: resolve-base-branch
      description: resolveBaseBranch pure function that selects the base branch from flag, current branch, or config default
      scenarios:
        - title: Explicit --base flag
          items:
            - GIVEN the user passes --base develop
            - WHEN the base branch is resolved
            - THEN develop is used regardless of other state
        - title: Current branch differs from project branch
          items:
            - GIVEN the current branch is feature-x and the project branch would be my-project
            - AND no --base flag is provided
            - WHEN the base branch is resolved
            - THEN feature-x is used as the base branch
        - title: Already on the project branch
          items:
            - GIVEN the current branch is my-project and the project branch is also my-project
            - AND no --base flag is provided
            - WHEN the base branch is resolved
            - THEN the config default branch (e.g. main) is used
      code:
        - name: resolveBaseBranch
          description: returns base when non-empty; returns current when it differs from project; otherwise returns defaultBranch
          module: internal/orchestration/run
          body: |
            func resolveBaseBranch(base, current, project, defaultBranch string) string
      passing: true
    - slug: resolve-max-iterations
      description: resolveMaxIterations pure function that selects the iteration limit from flag or config
      scenarios:
        - title: Flag takes precedence over config
          items:
            - 'GIVEN maxIterations: 5 in .ralph/config.yaml'
            - AND the user passes --max-iterations 2
            - WHEN the iteration limit is resolved
            - THEN the limit is 2
        - title: Config default used when flag is absent
          items:
            - 'GIVEN maxIterations: 7 in .ralph/config.yaml'
            - AND no --max-iterations flag is passed
            - WHEN the iteration limit is resolved
            - THEN the limit is 7
      code:
        - name: resolveMaxIterations
          description: returns flagMax when non-zero; otherwise returns cfgMax
          module: internal/orchestration/run
          body: |
            func resolveMaxIterations(cfgMax, flagMax int) int
      passing: true
    - slug: wire-run-command
      description: Update internal/cmd RunCmd.Run to delegate to the new orchestration RunCmd instead of implementing the logic inline
      items:
        - The Kong RunCmd struct in internal/cmd keeps flag parsing but its Run method builds a RunFlags and calls orchestration.RunCmd.Run(flags)
        - All inline logic in internal/cmd/run.go (working dir change, project file validation, flag validation, config loading, project loading, branch resolution) moves to internal/orchestration/run
        - The orchestration RunCmd is constructed with real client adapters that wrap the existing packages (workspace, config, project, git, Runner, RemoteRunner)
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver minor bump to the app version
      passing: false
