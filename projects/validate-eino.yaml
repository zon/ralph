slug: validate-eino
title: Port ralph validate to the eino SDK
feature: specs/features/ralph/validate
maxIterations: 10
requirements:
    - slug: eino-package
      description: Create internal/eino with a Complete function for chat-model inference
      items:
        - Create `internal/eino/eino.go`
        - Implement `parseModel(model string) (provider, modelID string, err error)` â€” splits a "provider/model-id" string on the first "/" into provider and model ID; returns an error if the string contains no "/" or if the provider is not one of "anthropic", "google", "deepseek"
        - Implement `Complete(ctx context.Context, model, prompt string) (string, error)` â€” parses the model string, loads the provider API key from `.ralph/auth.yaml` via `internal/auth`, creates the appropriate eino ChatModel, sends the prompt as a single user message, and returns the model's response text
        - For "anthropic" use `github.com/cloudwego/eino-ext/components/model/claude` with `claude.NewChatModel`
        - For "google" use `github.com/cloudwego/eino-ext/components/model/gemini` with `gemini.NewChatModel`
        - For "deepseek" use `github.com/cloudwego/eino-ext/components/model/deepseek` with `deepseek.NewChatModel`
        - Return an error if the auth.yaml key for the provider is missing
      passing: true
    - slug: eino-parse-model-tests
      description: Tests for parseModel in internal/eino
      items:
        - Test that "anthropic/claude-sonnet-4-6" parses to provider="anthropic", modelID="claude-sonnet-4-6"
        - Test that "google/gemini-2.5-pro" parses to provider="google", modelID="gemini-2.5-pro"
        - Test that "deepseek/deepseek-chat" parses to provider="deepseek", modelID="deepseek-chat"
        - Test that a string with no "/" returns an error
        - Test that an unknown provider prefix returns an error
      passing: true
    - slug: project-fix-prompt-update
      description: Update the project-fix prompt template to be self-contained for chat model use
      items:
        - Update `internal/ai/project-fix-instructions.md` â€” remove the "Fetch the project format reference" instruction, which requires tool use not available to chat models
        - Add a `Content` field to `ProjectFixPromptData` in `internal/ai/ai.go`
        - Update `BuildProjectFixPrompt` to accept a `content []byte` parameter and populate `ProjectFixPromptData.Content` with the file content as a string
        - Update the template to include the file content under a "## Current File Content" section
        - Instruct the model to return ONLY the corrected YAML with no surrounding text or markdown fences
      passing: true
    - slug: validate-adapter-eino
      description: Update internal/validate/adapters.go to use eino.Complete instead of ai.RunAgentWithModel
      items:
        - Replace the `agentClient.FixProject` implementation to use eino directly
        - Read the file content with `os.ReadFile(path)` before calling the model
        - Call `ai.BuildProjectFixPrompt(path, content, loadErr)` to build the prompt
        - Call `eino.Complete(context.Background(), model, prompt)` to get the model response
        - Implement `extractYAML(response string) []byte` â€” strips a leading markdown YAML code fence (```yaml ... ```) or plain code fence (``` ... ```) from the response if present; otherwise trims whitespace and returns the raw response as bytes
        - Write the extracted YAML back to `path` with `os.WriteFile`
        - Remove the import of `internal/ai` for `RunAgentWithModel`; keep the import for `BuildProjectFixPrompt`
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
