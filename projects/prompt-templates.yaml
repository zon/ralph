name: prompt-templates
description: Replace repeated WriteString calls with text/template in ai.go

requirements:
  - category: refactor
    description: Replace repeated WriteString calls with text/template
    items:
      - buildChangelogPrompt in internal/ai/ai.go uses a text/template instead of 9 consecutive WriteString calls on a strings.Builder
      - buildPRSummaryPrompt in internal/ai/ai.go uses a text/template instead of 15 consecutive WriteString calls on a strings.Builder; dynamic values (projectDesc, projectStatus, baseBranch, commitLog, absPath) are passed as template data
      - The strings import is removed from ai.go if it is no longer needed after the refactor
    passing: false
  - category: version
    description: Bump version
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
