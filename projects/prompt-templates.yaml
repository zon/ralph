name: prompt-templates
description: Move overview and review prompts to embedded template files

requirements:
  - category: refactor
    description: Move hardcoded prompts in overview.go and review.go to embedded template files
    items:
      - The overview prompt in internal/cmd/overview.go is loaded from an embedded file internal/cmd/overview-instructions.md instead of a hardcoded backtick string
      - The component review prompt in internal/cmd/overview.go is loaded from an embedded file internal/cmd/component-review-instructions.md instead of a hardcoded backtick string
      - The review prompt in internal/cmd/review.go is loaded from an embedded file internal/cmd/review-instructions.md instead of a hardcoded backtick string
      - Each template file uses Go text/template syntax for variable substitution matching the existing template data structs
      - The //go:embed directive is used to embed the template files, consistent with how internal/config/ embeds its templates
    passing: true
  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
