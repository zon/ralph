name: extract-long-functions-core
description: Break up long core package functions into single-responsibility helpers

requirements:
  - category: project
    description: project/execute.go Execute is concise with single-responsibility helpers
    items:
      - Execute in internal/project/execute.go delegates to well-named helpers so no function exceeds ~30 lines
      - Git state validation (checking repo, branch, sync status) lives in its own helper
      - Branch switching logic lives in its own helper
      - PR creation (generating summary, refreshing credentials, calling GitHub, notifying) lives in its own helper
    passing: false

  - category: requirement
    description: requirement/execute.go Execute is concise with single-responsibility helpers
    items:
      - Execute in internal/requirement/execute.go delegates to well-named helpers so no function exceeds ~30 lines
      - Blocked-file detection lives in its own helper
      - Service startup and failure-recovery logic lives in its own helper
      - Post-agent cleanup (log removal, project file normalization, staging) lives in its own helper
    passing: false

  - category: project
    description: project/iteration.go functions are concise with single-responsibility helpers
    items:
      - RunIterationLoop in internal/project/iteration.go delegates to helpers so no function exceeds ~30 lines
      - A single iteration (execute, commit, check completion) lives in its own helper
      - Reporting newly passing requirements lives in its own helper
      - CommitChanges in internal/project/iteration.go delegates to helpers so no function exceeds ~30 lines
    passing: false

  - category: ai
    description: ai/ai.go GeneratePRSummary is concise with single-responsibility helpers
    items:
      - GeneratePRSummary in internal/ai/ai.go delegates to helpers so no function exceeds ~30 lines
      - Prompt construction lives in its own helper
      - Running opencode and reading the result file lives in its own helper
    passing: false

  - category: version
    description: Version patch bump
    items:
      - internal/version/VERSION is incremented by one patch version
      - charts/ralph-webhook/Chart.yaml appVersion matches the new VERSION value
      - charts/ralph-webhook/Chart.yaml version is incremented by one patch version
    passing: false
