slug: architecture-remove-dead-schema
title: Remove dead Architecture schema from internal/architecture
maxIterations: 10
requirements:
    - slug: remove-dead-architecture-schema
      description: 'internal/architecture/architecture.go defines an Architecture/App/MainFunc/Feature/FuncRef/Module schema with Validate() and Load(), using a `type: domain|implementation` field that does not match the real specs/architecture.yaml format (which uses `orchestration: bool` per SpecModule in internal/architecture/spec.go). A repo-wide grep confirms none of these symbols (architecture.Architecture, architecture.Load, architecture.App, architecture.Module, architecture.MainFunc, architecture.FuncRef, Validate) are referenced anywhere outside internal/architecture. internal/architecture/spec.go (LoadSpec/SaveSpec/MigrateImplementedModules) is the implementation actually used (by internal/project''s migrateFeatureArchitecture) and is self-contained.'
      items:
        - Delete internal/architecture/architecture.go entirely, removing the Architecture, App, MainFunc, Feature, FuncRef, and Module types along with Validate() and Load()
        - Delete internal/architecture/architecture_test.go entirely, since it tests only the dead code being removed
        - Run go build ./... and go test ./internal/architecture/... to confirm spec.go and spec_test.go still build and pass with no dependency on the removed file
        - Make no changes to specs/architecture.yaml or internal/project — they already use the correct SpecArchitecture/SpecModule types from spec.go
      passing: true
