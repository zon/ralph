slug: argo-remove-real-cli-test
title: Remove test that invokes the real argo CLI in internal/argo
maxIterations: 10
requirements:
    - slug: remove-real-argo-submit-test
      description: |
        Delete TestClientSubmitYAML_AcceptsContext from internal/argo/argo_test.go because it invokes the real argo client, violating the rule that argo must never be invoked with a real implementation in any test.
      items:
        - |
          internal/argo/argo_test.go no longer contains TestClientSubmitYAML_AcceptsContext (previously at lines 18-23), which constructed a real client via NewClient() and called c.SubmitYAML(context.Background(), "yaml", K8sContext{Name: "ctx", Namespace: "ns"}) — triggering exec.LookPath("argo") and depending on the ambient environment lacking the argo binary (per its own comment, "We don't expect success (argo CLI isn't available)"). docs/testing.md states explicitly that "argo... must never be invoked with real implementations in any test. These must always be abstracted behind interfaces and replaced with mocks" — in an environment where argo IS installed and configured, this test could attempt a real workflow submission against a real cluster.
        - |
          No replacement test of SubmitYAML's real behavior is added. SubmitYAML's only testable pure logic, extractWorkflowName, remains covered by the existing TestExtractWorkflowName; the rest of SubmitYAML (and ListWorkflows/StopWorkflow/FollowLogs) is thin exec.Command plumbing that must only be exercised through MockClient by consumers — mirroring the precedent in internal/k8s/client_test.go's TestNewClient, which asserts only that NewClient() returns a non-nil value satisfying the Client interface and never invokes a kubectl-backed method on the real client.
        - |
          TestNewClient and TestExtractWorkflowName in internal/argo/argo_test.go remain unchanged — TestNewClient already follows the correct construction-only pattern (constructs NewClient(), asserts it is non-nil and satisfies Client).
        - |
          The "context" import in internal/argo/argo_test.go is removed if it becomes unused as a result of the deletion (TestExtractWorkflowName and TestNewClient do not reference the context package); imports that remain in use are left untouched.
        - |
          go vet ./internal/argo/... and go test ./internal/argo/... pass after the deletion, with no compile errors from dangling references or unused imports.
      passing: true
