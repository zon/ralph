slug: set-skills
title: Add `ralph set skills` to install ralph skills into the target repository

feature: specs/features/ralph/set-skills

requirements:
  - slug: set-skills-orchestrator
    description: Orchestrate fetching and installing ralph skills into the target repository
    scenarios:
      - title: Only ralph-prefixed skills installed
        items:
          - GIVEN the source branch contains `.claude/skills/ralph-write-spec/` and `.claude/skills/internal-tool/`
          - WHEN the user runs `ralph set skills`
          - THEN only `ralph-write-spec` is installed into the target repository
          - AND `internal-tool` is ignored
      - title: Skills installed successfully
        items:
          - GIVEN a target repository with no existing `.claude/skills/` directory
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/` is created in the target repository
          - AND each discovered `ralph-` prefixed skill's `SKILL.md` is written to `.claude/skills/<skill>/SKILL.md`
      - title: Existing skills overwritten
        items:
          - GIVEN a target repository that already has one or more `ralph-` prefixed skills in `.claude/skills/`
          - WHEN the user runs `ralph set skills`
          - THEN all discovered skills are fetched and written, overwriting any with the same name
      - title: Removed skills deleted
        items:
          - GIVEN a target repository contains `.claude/skills/ralph-old-skill/` that is no longer present on the source branch
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/ralph-old-skill/` is removed from the target repository
      - title: Non-ralph skills untouched
        items:
          - GIVEN a target repository contains `.claude/skills/my-custom-skill/` without a `ralph-` prefix
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/my-custom-skill/` is left unchanged
      - title: Branch override
        items:
          - GIVEN the user passes `--branch v2`
          - WHEN the user runs `ralph set skills --branch v2`
          - THEN skills are discovered and fetched from `refs/heads/v2` instead of `refs/heads/main`
      - title: Discovery failure
        items:
          - GIVEN the GitHub Contents API URL is unreachable or returns an error
          - WHEN the user runs `ralph set skills`
          - THEN an error is returned and no files are written
      - title: Fetch failure
        items:
          - GIVEN a skill's raw content URL is unreachable or returns an error
          - WHEN the user runs `ralph set skills`
          - THEN an error is returned and no files are written
      - title: Current directory is inside a git repo
        items:
          - GIVEN the current working directory is inside a git repository
          - WHEN the user runs `ralph set skills`
          - THEN skills are installed at the root of that git repository
      - title: Current directory is not inside a git repo
        items:
          - GIVEN the current working directory is not inside any git repository
          - WHEN the user runs `ralph set skills`
          - THEN an error is returned and no files are written
    code:
      - name: SetSkills
        description: orchestrates discovery, fetching, pruning, and installation of ralph skills into the current target repository
        module: internal/setup
        body: |
          func SetSkills(branch string) error {
              root, err := git.RepoRoot()
              if err != nil {
                  return err
              }

              names, err := skills.Discover(branch)
              if err != nil {
                  return err
              }

              fetched, err := skills.FetchAll(branch, names)
              if err != nil {
                  return err
              }

              skills.PruneStale(root, fetched)
              return skills.InstallAll(root, fetched)
          }
    passing: false

  - slug: git-repo-root
    description: Resolve the root directory of the git repository containing the current working directory
    items:
      - Returns an error when the working directory is not inside any git repository
    code:
      - name: RepoRoot
        description: returns the root directory of the git repository containing the current working directory
        module: internal/git
        body: |
          func RepoRoot() (string, error)
    passing: false

  - slug: discover-skills
    description: Discover ralph-prefixed skill names available on a branch of the ralph repository
    scenarios:
      - title: Only ralph-prefixed skills installed
        items:
          - GIVEN the source branch contains `.claude/skills/ralph-write-spec/` and `.claude/skills/internal-tool/`
          - WHEN the user runs `ralph set skills`
          - THEN only `ralph-write-spec` is installed into the target repository
          - AND `internal-tool` is ignored
      - title: Discovery failure
        items:
          - GIVEN the GitHub Contents API URL is unreachable or returns an error
          - WHEN the user runs `ralph set skills`
          - THEN an error is returned and no files are written
    items:
      - Queries `https://api.github.com/repos/zon/ralph/contents/.claude/skills?ref=<branch>` for the given branch
      - Filters returned entries to directories whose name has the `ralph-` prefix
      - Returns an error when the request fails or returns a non-success status
    code:
      - name: Discover
        description: lists the ralph-prefixed skill names available on the given branch of the ralph repository
        module: internal/skills
        body: |
          func Discover(branch string) ([]string, error)
    passing: false

  - slug: fetch-skills
    description: Fetch each discovered skill's contents and rewrite its links to the resolved branch
    scenarios:
      - title: Fetch failure
        items:
          - GIVEN a skill's raw content URL is unreachable or returns an error
          - WHEN the user runs `ralph set skills`
          - THEN an error is returned and no files are written
      - title: Relative link rewritten
        items:
          - GIVEN a `SKILL.md` contains a relative link such as `docs/formats/specs.md`
          - AND the resolved branch is `main`
          - WHEN the skill is written to the target repository
          - THEN the link is rewritten to `https://raw.githubusercontent.com/zon/ralph/refs/heads/main/docs/formats/specs.md`
      - title: Existing ralph URL branch updated
        items:
          - GIVEN a `SKILL.md` contains `https://raw.githubusercontent.com/zon/ralph/refs/heads/main/docs/formats/specs.md`
          - AND the user passes `--branch v2`
          - WHEN the skill is written to the target repository
          - THEN the link is rewritten to `https://raw.githubusercontent.com/zon/ralph/refs/heads/v2/docs/formats/specs.md`
      - title: Non-ralph absolute URLs unchanged
        items:
          - GIVEN a `SKILL.md` contains an absolute URL pointing to a host other than the ralph repository
          - WHEN the skill is written to the target repository
          - THEN the link is written as-is
    items:
      - Fetches each skill's `SKILL.md` from `https://raw.githubusercontent.com/zon/ralph/refs/heads/<branch>/.claude/skills/<skill>/SKILL.md`
      - Any fetch failure aborts the batch and returns an error so no files are written
      - Returned skill contents have all relative links expanded to absolute raw URLs on the resolved branch
      - Returned skill contents have absolute ralph raw URLs rewritten so their branch segment matches the resolved branch
      - Absolute URLs pointing to hosts other than the ralph raw content URL are left unchanged
    code:
      - name: FetchAll
        description: fetches each named skill's contents from the given branch and returns them with links rewritten to the resolved branch
        module: internal/skills
        body: |
          func FetchAll(branch string, names []string) ([]Skill, error)
    passing: false

  - slug: prune-stale-skills
    description: Remove ralph-prefixed skill directories from the target repository that are not present in the fetched set
    scenarios:
      - title: Removed skills deleted
        items:
          - GIVEN a target repository contains `.claude/skills/ralph-old-skill/` that is no longer present on the source branch
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/ralph-old-skill/` is removed from the target repository
      - title: Non-ralph skills untouched
        items:
          - GIVEN a target repository contains `.claude/skills/my-custom-skill/` without a `ralph-` prefix
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/my-custom-skill/` is left unchanged
    items:
      - Only inspects directories under `<root>/.claude/skills/`
      - Only removes directories whose name has the `ralph-` prefix
      - Leaves directories without the `ralph-` prefix untouched
    code:
      - name: PruneStale
        description: removes ralph-prefixed skill directories from the target repository that are not present in the fetched set
        module: internal/skills
        body: |
          func PruneStale(root string, fetched []Skill)
    passing: false

  - slug: install-skills
    description: Write fetched skills into `.claude/skills/` under the target repository root
    scenarios:
      - title: Skills installed successfully
        items:
          - GIVEN a target repository with no existing `.claude/skills/` directory
          - WHEN the user runs `ralph set skills`
          - THEN `.claude/skills/` is created in the target repository
          - AND each discovered `ralph-` prefixed skill's `SKILL.md` is written to `.claude/skills/<skill>/SKILL.md`
      - title: Existing skills overwritten
        items:
          - GIVEN a target repository that already has one or more `ralph-` prefixed skills in `.claude/skills/`
          - WHEN the user runs `ralph set skills`
          - THEN all discovered skills are fetched and written, overwriting any with the same name
    items:
      - Creates `.claude/skills/` and skill subdirectories under the target repository root when missing
      - Overwrites any existing `SKILL.md` for a skill with the same name
    code:
      - name: InstallAll
        description: writes the fetched skills into `.claude/skills/` under the target repository root
        module: internal/skills
        body: |
          func InstallAll(root string, fetched []Skill) error
    passing: false

  - slug: cli-set-skills-command
    description: Expose `ralph set skills` via the CLI
    items:
      - Adds a `set` parent command with a `skills` subcommand under the root ralph CLI
      - The subcommand accepts an optional `--branch` flag that defaults to `main`
      - The subcommand invokes the `SetSkills` orchestration function with the resolved branch value
      - The subcommand reports the orchestration error to the user when it fails and exits non-zero
    passing: false

  - slug: version-bump
    description: Version bump
    items:
      - Apply a semver minor bump to the app version (CLI gains a new `set skills` command)
    passing: false
