name: set-skills
description: Add `ralph set skills` command to install ralph skills into a target repository

spec: specs/features/ralph/set-skills/spec.md
flow: specs/features/ralph/set-skills/flow.md

requirements:
  - description: "`ralph set skills` command is available with a `--branch` flag"
    items:
      - Running `ralph set skills` invokes the set-skills feature with the default branch `main`
      - Running `ralph set skills --branch v2` passes `v2` as the branch to all downstream operations
      - See [flow setSkills](../specs/features/ralph/set-skills/flow.md) for the top-level function shape
    passing: false

  - description: Target repository is detected from the current working directory
    items:
      - When the current working directory is inside a git repository, skills are installed at the root of that repository
      - When the current working directory is not inside any git repository, an error is returned and no files are written
    passing: false

  - description: Skills are discovered from the ralph GitHub repository
    items:
      - The system queries `https://api.github.com/repos/zon/ralph/contents/.claude/skills?ref=<branch>` to list available skills
      - Only skills whose directory name has a `ralph-` prefix are selected for installation; other entries are ignored
      - If the GitHub Contents API is unreachable or returns an error, an error is returned and no files are written
    passing: false

  - description: Skill files are fetched and written to the target repository
    items:
      - Each discovered `ralph-`-prefixed skill's `SKILL.md` is fetched from `https://raw.githubusercontent.com/zon/ralph/refs/heads/<branch>/.claude/skills/<skill>/SKILL.md`
      - If the target repository has no `.claude/skills/` directory, it is created before writing
      - Skills that already exist in the target repository are overwritten with the fetched content
      - Any `.claude/skills/ralph-*` directory in the target repository that is not present in the discovered skill list is deleted
      - Skills without a `ralph-` prefix in the target repository are left unchanged
      - If any skill's raw content URL is unreachable or returns an error, an error is returned and no files are written
    passing: false

  - description: Links inside fetched `SKILL.md` files are rewritten before writing
    items:
      - Relative links in a `SKILL.md` (e.g. `docs/planning/specs.md`) are expanded to absolute `https://raw.githubusercontent.com/zon/ralph/refs/heads/<branch>/` URLs using the resolved branch
      - Absolute links already pointing to `https://raw.githubusercontent.com/zon/ralph/refs/heads/` have their branch segment replaced with the resolved branch
      - Absolute links pointing to any other host are written as-is
    passing: false

  - description: Tests for the set-skills feature
    items:
      - Implement the tests from [flow ## Tests](../specs/features/ralph/set-skills/flow.md#tests) as written; each helper listed in `### Helpers` must be a real function encapsulating all infrastructure concerns
    passing: false

  - category: versioning
    description: Version bump
    items:
      - Apply a semver minor bump to the app version file and a semver patch bump to the chart version
    passing: false
