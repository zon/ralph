slug: config-provider
title: Implement ralph config provider and remove ralph config opencode
feature: specs/features/ralph/config-provider
maxIterations: 10
requirements:
    - slug: auth-module
      description: Create internal/auth for loading and writing .ralph/auth.yaml
      items:
        - Create `internal/auth/auth.go`
        - Implement `Load() (map[string]string, error)` — reads `.ralph/auth.yaml` as YAML into `map[string]string`; returns an empty map (not an error) if the file does not exist
        - Implement `Write(keys map[string]string) error` — marshals the map to YAML and writes it to `.ralph/auth.yaml`, creating the `.ralph/` directory if it does not exist
        - Use `gopkg.in/yaml.v3` for marshalling and unmarshalling
      passing: true
    - slug: auth-module-tests
      description: Tests for internal/auth Load and Write
      items:
        - Test that Load returns an empty map when .ralph/auth.yaml does not exist
        - Test that Write then Load round-trips a map of provider keys correctly
        - Test that Write preserves keys that were not passed in the current call (they are already in the file from a prior Write)
        - Use t.TempDir() and set the working directory so .ralph/auth.yaml resolves within the temp dir
      passing: false
    - slug: prompt-module
      description: Create internal/prompt for interactive API key collection
      items:
        - Create `internal/prompt/prompt.go`
        - 'Implement `ProviderKey(provider string) (string, error)` — prints `Enter API key for <provider>: ` to stdout and reads one line from stdin'
        - Return an error if the entered value is blank
      passing: false
    - slug: k8s-provider-secret
      description: Add provider secret support to internal/k8s
      items:
        - Add `ProviderSecretName = "provider-credentials"` constant to `internal/k8s/secrets.go`
        - Add `StoreProviderSecret(ctx context.Context, kubeContext, namespace string, keys map[string]string) error` to `internal/k8s/secrets.go` — calls `CreateOrUpdateSecret` with `ProviderSecretName`, passing each provider key as a named entry in the data map
      passing: false
    - slug: configprovider-orchestration
      description: Implement the configprovider Runner orchestration
      scenarios:
        - title: Key written and secret updated
          items:
            - GIVEN the user runs `ralph config provider anthropic`
            - AND enters a valid API key when prompted
            - THEN the key is written to `.ralph/auth.yaml` under `anthropic`
            - AND the full contents of `.ralph/auth.yaml` are stored as the `provider-credentials` Kubernetes Secret
        - title: Other providers preserved
          items:
            - GIVEN `.ralph/auth.yaml` already contains a `google` key
            - WHEN the user runs `ralph config provider anthropic` and enters a key
            - THEN the `anthropic` key is added and the existing `google` key is preserved in `.ralph/auth.yaml`
            - AND both keys are included in the Kubernetes Secret
        - title: Blank key rejected
          items:
            - GIVEN the user runs `ralph config provider anthropic`
            - AND leaves the prompt blank
            - THEN an error is returned and no changes are written
      code:
        - name: Runner
          description: orchestration struct with injected clients
          module: internal/orchestration/configprovider
          body: |
            type PromptClient interface {
                ProviderKey(provider string) (string, error)
            }

            type AuthClient interface {
                Load() (map[string]string, error)
                Write(keys map[string]string) error
            }

            type K8sClient interface {
                StoreProviderSecret(ctx context.Context, kubeContext, namespace string, keys map[string]string) error
            }

            type Runner struct {
                prompt PromptClient
                auth   AuthClient
                k8s    K8sClient
            }

            func (r *Runner) Run(ctx context.Context, provider, kubeContext, namespace string) error {
                key, err := r.prompt.ProviderKey(provider)
                if err != nil {
                    return err
                }
                existing, err := r.auth.Load()
                if err != nil {
                    return err
                }
                existing[provider] = key
                if err := r.auth.Write(existing); err != nil {
                    return err
                }
                return r.k8s.StoreProviderSecret(ctx, kubeContext, namespace, existing)
            }
      passing: false
    - slug: configprovider-tests
      description: Tests for the configprovider Runner
      tests:
        - name: TestRun_KeyWrittenAndSecretUpdated
          description: verifies that an entered key is written to auth and stored as a K8s secret
          module: internal/orchestration/configprovider
          body: |
            func TestRun_KeyWrittenAndSecretUpdated(t *testing.T) {
                r := runner.withMocks(prompt.returning("sk-ant-123"))
                r.Run(ctx, "anthropic", kubeContext, namespace)
                assert(auth.written()).equals(auth.keys("anthropic", "sk-ant-123"))
                assert(k8s.storedProviderSecret()).equals(auth.keys("anthropic", "sk-ant-123"))
            }
        - name: TestRun_ExistingProviderKeysPreserved
          description: verifies that keys for other providers in auth.yaml are not removed
          module: internal/orchestration/configprovider
          body: |
            func TestRun_ExistingProviderKeysPreserved(t *testing.T) {
                r := runner.withMocks(
                    auth.containing(auth.keys("google", "AIza-existing")),
                    prompt.returning("sk-ant-123"),
                )
                r.Run(ctx, "anthropic", kubeContext, namespace)
                assert(auth.written()).equals(auth.keys("anthropic", "sk-ant-123", "google", "AIza-existing"))
                assert(k8s.storedProviderSecret()).equals(auth.keys("anthropic", "sk-ant-123", "google", "AIza-existing"))
            }
        - name: TestRun_BlankKeyReturnsError
          description: verifies that a blank prompt entry returns an error and writes nothing
          module: internal/orchestration/configprovider
          body: |
            func TestRun_BlankKeyReturnsError(t *testing.T) {
                r := runner.withMocks(prompt.returningBlank())
                err := r.Run(ctx, "anthropic", kubeContext, namespace)
                assert(err).isNotNil()
                assert(auth.written()).isEmpty()
            }
      passing: false
    - slug: config-provider-cmd
      description: Add ConfigProviderCmd to internal/cmd and wire it into ConfigCmd
      items:
        - Create `internal/cmd/config_provider.go` with `ConfigProviderCmd` struct
        - '`ConfigProviderCmd` has a required positional `Provider string` arg and optional `Context` and `Namespace` string flags'
        - The `Run()` method constructs a `configprovider.Runner` with real implementations of `AuthClient` (from `internal/auth`), `PromptClient` (from `internal/prompt`), and `K8sClient` (from `internal/k8s`) and calls `runner.Run(ctx, c.Provider, kubeContext, namespace)`
        - 'Validate that `c.Provider` is one of `anthropic`, `google`, `deepseek` before calling the runner; return `fmt.Errorf("unknown provider: %s", c.Provider)` if not'
        - In `internal/cmd/cmd.go`, replace the `Opencode ConfigOpencodeCmd` field in `ConfigCmd` with a `Provider ConfigProviderCmd` field tagged with cmd and help text "Configure an AI provider API key"
      passing: false
    - slug: remove-config-opencode
      description: Delete the config opencode command and its tests
      items:
        - Delete `internal/cmd/config_opencode.go`
        - Delete `internal/cmd/config_opencode_test.go`
        - Delete the `OpenCodeSecretName` constant from `internal/k8s/secrets.go` if it is no longer referenced anywhere
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver minor bump to the app version
      passing: false
