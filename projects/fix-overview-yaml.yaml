name: fix-overview-yaml
description: Fix overview step failing when summary fields contain colons

requirements:
  - category: bug
    description: Overview YAML parse error when AI writes summary values containing colons
    items:
      - "Switch the overview format from YAML to JSON in internal/cmd/overview.go"
      - "Update loadOverview to parse JSON instead of YAML"
      - "Update the prompt template to request JSON output with a .json file extension"
      - "The overview file path passed to the agent must use a .json extension"
    passing: true

  - category: release
    description: Version bump for the bug fix
    items:
      - "Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml"
    passing: true
