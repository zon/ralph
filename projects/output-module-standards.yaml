slug: output-module-standards
title: Fix internal/output architecture description and rewrite tests as table-driven
maxIterations: 10
requirements:
    - slug: update-architecture-description
      description: Update the internal/output module description in specs/architecture.yaml to accurately reflect all message levels and stream routing.
      items:
        - In specs/architecture.yaml, change the description for path internal/output from "Prints warning and error messages to stdout with ANSI color." to "Routes debug, info, warn, error, and success messages to configurable output and error streams with ANSI color."
      passing: false
    - slug: table-driven-tests
      description: Rewrite the flat test functions in internal/output/client_test.go as table-driven subtests using t.Run(), grouped by method.
      items:
        - Replace all flat top-level test functions in internal/output/client_test.go with table-driven tests using t.Run() subtests.
        - 'Group tests by method: TestClientDebug, TestClientDebugf, TestClientInfo, TestClientInfof, TestClientWarn, TestClientWarnf, TestClientError, TestClientErrorf, TestClientSuccess, TestClientSuccessf.'
        - Each table row covers one scenario (e.g. suppressed when debugging=false, writes to out when debugging=true, writes to err). Use struct fields for inputs (msg or format+args, debugging bool) and expected outputs (outContains, errContains strings).
        - 'Preserve all existing coverage: Debug/Debugf suppress output when debugging=false and write to out when debugging=true; Info/Infof always write to out; Warn/Warnf always write to out; Error/Errorf always write to err with nothing to out; Success/Successf always write "✓ <msg>" to out with nothing to err.'
        - Remove TestNewClient — it only asserts that a constructor that always returns non-nil returns non-nil.
      passing: false
