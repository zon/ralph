name: review-item-loop
description: Add optional loop parameter to config review items for iterative prompting over architecture.yaml data

requirements:
  - category: config
    description: Add Loop field to ReviewItem and update validation
    items:
      - Add `loop` string field to `ReviewItem` struct in `internal/config/config.go`
      - loop is optional and independent of the source type — a loop item still requires exactly one of text, file, or url; existing validation for those fields is unchanged
      - Validate that when `loop` is set, its value is a known type; the only valid value is `domain-function`
    passing: true

  - category: review
    description: Add internal/review package with loop expansion logic
    items:
      - Create `internal/review/loop.go` with a `LoopIteration` struct containing `FunctionName` and `FunctionPath` string fields
      - Implement `ExpandLoop(loopType string, archPath string) ([]LoopIteration, error)` that dispatches on loop type
      - Implement `expandDomainFunctionLoop` that loads `architecture.yaml` via `internal/architecture`, iterates over all apps[].features[].functions, deduplicates by the composite key of both function name and file path, and returns an ordered slice of LoopIteration
      - Add unit tests in `internal/review/loop_test.go` covering deduplication (same name+file is one entry, same name with different file is two entries), empty architecture, and unknown loop type error
    passing: true

  - category: ai
    description: Add BuildLoopItemPrompt to internal/ai
    items:
      - Add `BuildLoopItemPrompt(content, functionName, functionPath string) (string, error)` to `internal/ai/ai.go` that renders the content string as a Go template with `.FunctionName` and `.FunctionPath` variables
      - Loop item content is the full prompt template — do not wrap it in `review-instructions.md` as non-loop items do
      - Add tests in `internal/ai/` covering successful template rendering and malformed template error
    passing: true

  - category: cmd
    description: Update ralph review to execute loop items iteratively with per-iteration commits
    items:
      - In `internal/cmd/review.go`, detect `item.Loop != ""` in `runReview` and delegate to a new `runLoopItem` method
      - runLoopItem loads the item content via the existing loadItemContent (source type is unchanged), calls review.ExpandLoop, then for each iteration renders the prompt via ai.BuildLoopItemPrompt, calls ai.RunAgent, detects a modified project file, and commits changes if any are found
      - Extend `itemLabel` to return `loop:<type>` for loop items
      - Extend `filterItems` to match against `item.Loop`
    passing: true

  - category: config-yaml
    description: Add domain-function loop review item to .ralph/config.yaml
    items:
      - "Add a new review item to .ralph/config.yaml with file: docs/review/domain-function.md and loop: domain-function"
    passing: false

  - category: version
    description: Bump version for new feature
    items:
      - Apply a semver minor bump to `internal/version/VERSION`
      - Apply a semver patch bump to `charts/ralph-webhook/Chart.yaml` (both `version` and `appVersion`)
    passing: false
