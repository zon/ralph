name: base-branch-flag
description: Add --base / -B option to ralph run to target a custom PR base branch

requirements:
  - category: cli
    description: Add --base flag to ralph run command
    items:
      - ralph run accepts --base <branch> and -B <branch> as equivalent short form
      - The flag defaults to empty string (not set)
      - The flag is documented in --help output
    passing: true

  - category: context
    description: Propagate base branch override through execution context
    items:
      - Context holds an optional base branch override field
      - RunCmd sets the base branch override on the context when the flag is provided
      - Context exposes a getter for the base branch override
    passing: true

  - category: local-execution
    description: Use --base flag when running locally
    items:
      - When --base is provided, it overrides the baseBranch from .ralph/config.yaml for PR creation
      - When --base is not provided, behaviour is unchanged (falls back to config then default "main")
    passing: true

  - category: remote-execution
    description: Pass --base flag through to the workflow container
    items:
      - When --base is provided, the BASE_BRANCH env var injected into the Argo Workflow container reflects the override
      - The container's ralph --local invocation receives the base branch so PR creation targets the correct branch
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
