slug: ai-module-compliance
title: Bring internal/ai up to module compliance standards
maxIterations: 10
requirements:
    - slug: move-isfatalerror
      description: Move IsFatalError out of internal/ai and into internal/opencode where it belongs
      items:
        - Move fatalOpenCodePatterns and IsFatalError from internal/ai/ai.go into internal/opencode/opencode.go
        - Update the caller in internal/cmd/agent_client.go to call opencode.IsFatalError(err) instead of ai.IsFatalError(err)
        - Delete fatalOpenCodePatterns and IsFatalError from internal/ai/ai.go
      passing: false
    - slug: delete-displaystats
      description: Remove the zero-value DisplayStats wrapper from internal/ai
      items:
        - Delete DisplayStats from internal/ai/ai.go — it has no callers, adds no logic, and wraps opencode.OCClient.DisplayStats with a one-liner that callers can invoke directly
      passing: false
    - slug: remove-what-comments
      description: Remove what-the-code-does comments from internal/ai/ai.go
      items:
        - Remove the comment block above RunAgent
        - Remove the comment block above RunAgentWithModel
        - Remove the comment above runOpenCodeAndReadResult
        - Remove the comment block above GeneratePRSummary
        - Remove the comment block above GenerateChangelog
        - Remove the comment block above GenerateReviewPRBody
        - Keep the comment above createTempFile — it explains a non-obvious constraint about workflow agent filesystem access
      passing: false
    - slug: table-driven-tests
      description: Consolidate prompt_test.go into table-driven tests with t.Run() subtests
      items:
        - Rewrite internal/ai/prompt_test.go so every group of related top-level test functions becomes a single table-driven test with t.Run() subtests
        - Merge TestBuildFixServicePrompt, TestBuildFixServicePrompt_NoPort, TestBuildFixServicePrompt_ReturnsError, TestBuildFixServicePrompt_ErrorNil into one TestBuildFixServicePrompt
        - Merge TestBuildDevelopPrompt, TestBuildDevelopPrompt_WithNotes, TestBuildDevelopPrompt_WithCommitLog, TestBuildDevelopPrompt_WithServices, TestBuildDevelopPrompt_WithCustomInstructions, TestBuildDevelopPrompt_ErrorOnInvalidTemplate, TestBuildDevelopPrompt_EmptyNotes into one TestBuildDevelopPrompt
        - Merge TestBuildPickPrompt, TestBuildPickPrompt_WithNotes, TestBuildPickPrompt_WithCommitLog, TestBuildPickPrompt_EmptyNotes into one TestBuildPickPrompt
        - Merge TestBuildPRSummaryPrompt and TestBuildPRSummaryPrompt_AbsolutePath into one TestBuildPRSummaryPrompt
        - Merge TestBuildChangelogPrompt and TestBuildChangelogPrompt_AbsolutePath into one TestBuildChangelogPrompt
        - Merge TestBuildReviewPRBodyPrompt, TestBuildReviewPRBodyPrompt_NoDescription, TestBuildReviewPRBodyPrompt_AbsolutePath into one TestBuildReviewPRBodyPrompt
        - Merge TestBuildArchitecturePrompt and TestBuildArchitecturePrompt_AbsolutePath into one TestBuildArchitecturePrompt
        - Merge TestBuildArchitectureFixPrompt, TestBuildArchitectureFixPrompt_AbsolutePath, TestBuildArchitectureFixPrompt_EmptyErrors into one TestBuildArchitectureFixPrompt
        - Merge TestBuildProjectFixPrompt and TestBuildProjectFixPrompt_AbsolutePath into one TestBuildProjectFixPrompt
        - Merge TestExecuteTemplate, TestExecuteTemplate_ParseError, TestExecuteTemplate_ExecuteError into one TestExecuteTemplate
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
