name: fix-double-opencode-output
description: Fix opencode output being printed twice

requirements:
  - category: bug fix
    description: Fix duplicate output from opencode
    items:
      - The captureWriter in internal/ai/ai.go writes all output to both os.Stdout and os.Stderr, causing every line to appear twice — use two separate capture writers, one backed by os.Stdout (assigned to cmd.Stdout) and one backed by os.Stderr (assigned to cmd.Stderr), so each stream is routed correctly
    passing: true

  - category: version
    description: Bump version
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
