slug: run-local-orchestration
title: Refactor Runner to own service lifecycle and post-agent cleanup
feature: specs/features/ralph/run-local
maxIterations: 10
requirements:
    - slug: update-runner-interfaces
      description: Rename AgentClient to AIClient with updated method names, extend ServicesClient with per-iteration lifecycle methods, and extend ProjectClient with cleanup methods
      items:
        - Rename the `AgentClient` interface to `AIClient` in `internal/orchestration/run/runner.go`
        - Rename `Pick` to `RunPicker` and `Develop` to `RunDeveloper` on `AIClient`
        - Add `FixServiceStartup(cfg *config.RalphConfig, err error) error` to `AIClient`
        - Add `Start(cfg *config.RalphConfig) (*services.Manager, error)` to `ServicesClient`
        - Add `Stop(svc *services.Manager)` to `ServicesClient`
        - Add `RemoveLogs(cfg *config.RalphConfig)` to `ServicesClient`
        - Add `HasChanges(proj *project.Project) bool` to `ProjectClient`
        - Add `NormalizeAndStage(proj *project.Project)` to `ProjectClient`
        - Update `Runner.ai` field type from `AgentClient` to `AIClient` and update `NewRunner` accordingly
      code:
        - name: Runner
          description: Runner struct with AIClient replacing AgentClient
          module: internal/orchestration/run
          body: |
            type Runner struct {
                project  ProjectClient
                ai       AIClient
                git      GitClient
                github   GitHubClient
                services ServicesClient
                notify   NotifyClient
            }
      passing: false
    - slug: update-run-local-and-iterate
      description: Pass cfg through RunLocal into iterate; have iterate delegate agent work to runIteration
      scenarios:
        - title: Before commands run first
          items:
            - GIVEN .ralph/config.yaml contains before commands
            - WHEN local execution begins
            - THEN each before command is run before the iteration loop starts
        - title: Branch switched before iteration
          items:
            - GIVEN the project slug is my-feature and the current branch is main
            - WHEN local execution starts
            - THEN ralph switches to or creates the branch my-feature before running any iterations
        - title: All requirements already passing exits after one iteration
          items:
            - GIVEN a project where every requirement has passing true
            - WHEN the iteration loop runs
            - THEN the loop exits without invoking the AI
        - title: blocked.md detected at loop start
          items:
            - GIVEN blocked.md exists in the repository root at the start of an iteration
            - WHEN the loop checks for the blocked state
            - THEN the loop stops immediately with a blocked error
            - AND the AI is not invoked
        - title: Fatal AI error
          items:
            - GIVEN the AI agent returns a billing or quota error
            - WHEN the iteration processes the error
            - THEN a fatal error is returned and the loop does not retry
      code:
        - name: RunLocal
          description: Entry point for local execution; passes cfg to iterate
          module: internal/orchestration/run
          body: |
            func (r *Runner) RunLocal(proj *project.Project, cfg *config.RalphConfig) error {
                if err := r.services.RunBeforeCommands(cfg); err != nil {
                    return err
                }
                if err := r.git.SwitchToBranch(proj.Slug); err != nil {
                    return err
                }
                if err := r.iterate(proj, cfg); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                if err := r.github.CreatePR(proj); err != nil {
                    r.notify.Error(proj.Slug)
                    return err
                }
                r.notify.Success(proj.Slug)
                return nil
            }
        - name: iterate
          description: Iteration loop that reloads the project, checks completion and blocked state, then delegates each iteration to runIteration
          module: internal/orchestration/run
          body: |
            func (r *Runner) iterate(proj *project.Project, cfg *config.RalphConfig) error {
                for i := 0; i < proj.MaxIterations; i++ {
                    proj = r.project.Load(proj)
                    if r.project.AllRequirementsPassing(proj) {
                        return nil
                    }
                    if r.git.BlockedFileExists() {
                        return ErrBlocked
                    }
                    if err := r.runIteration(proj, cfg); err != nil {
                        return err
                    }
                    if err := r.commitIteration(proj); err != nil {
                        return err
                    }
                }
                return r.project.MaxIterationsError(proj)
            }
        - name: blockAndReturn
          description: Writes blocked.md for non-fatal errors then returns the error
          module: internal/orchestration/run
          body: |
            func (r *Runner) blockAndReturn(err error) error {
                if !r.ai.IsFatal(err) {
                    r.git.WriteBlockedFile(err)
                }
                return err
            }
      tests:
        - name: TestRunLocalBeforeCommandFailureAbortsEarly
          description: before command failure aborts before branch switch
          module: internal/orchestration/run
          body: |
            func TestRunLocalBeforeCommandFailureAbortsEarly(t *testing.T) {
                runner := withMocks(
                    withServices(newServicesThatFailBeforeCommands()),
                )
                err := runner.RunLocal(anyProject(), anyConfig())
                require.Error(t, err)
                require.False(t, gitBranchSwitched(runner))
            }
        - name: TestIterateExitsImmediatelyWhenAllPassing
          description: iterate exits without invoking the AI when all requirements are already passing
          module: internal/orchestration/run
          body: |
            func TestIterateExitsImmediatelyWhenAllPassing(t *testing.T) {
                runner := withMocks(
                    withProject(newProjectThatReportsAllPassing()),
                )
                err := runner.RunLocal(passingProject(), anyConfig())
                require.NoError(t, err)
                require.Empty(t, aiPickCalls(runner))
            }
        - name: TestIterateStopsOnBlockedFile
          description: iterate returns ErrBlocked when blocked.md exists before the pick
          module: internal/orchestration/run
          body: |
            func TestIterateStopsOnBlockedFile(t *testing.T) {
                runner := withMocks(
                    withGit(newGitWithBlockedFile()),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.ErrorIs(t, err, ErrBlocked)
                require.Empty(t, aiPickCalls(runner))
            }
        - name: TestIterateFatalPickErrorIsNotRetried
          description: fatal picker error stops the loop without writing blocked.md
          module: internal/orchestration/run
          body: |
            func TestIterateFatalPickErrorIsNotRetried(t *testing.T) {
                runner := withMocks(
                    withAI(newAIThatReturnsFatalError()),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.Error(t, err)
                require.Len(t, aiPickCalls(runner), 1)
                require.Empty(t, aiDevelopCalls(runner))
                require.False(t, gitBlockedFileWritten(runner))
            }
        - name: TestIterateNonFatalPickErrorWritesBlockedFile
          description: non-fatal picker error writes blocked.md
          module: internal/orchestration/run
          body: |
            func TestIterateNonFatalPickErrorWritesBlockedFile(t *testing.T) {
                runner := withMocks(
                    withAI(newAIThatReturnsNonFatalError()),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.Error(t, err)
                require.True(t, gitBlockedFileWritten(runner))
            }
      passing: false
    - slug: run-iteration
      description: New runIteration method starts services, invokes picker and developer agents, and stops services after the iteration
      scenarios:
        - title: Services started before each iteration
          items:
            - GIVEN services are configured in .ralph/config.yaml
            - WHEN an iteration begins
            - THEN all services are started before the picker and development agents run
            - AND services are stopped and logs removed when the iteration completes
        - title: Service startup failure triggers AI fix
          items:
            - GIVEN a configured service fails to start at the start of an iteration
            - WHEN the failure is detected
            - THEN the development agent is invoked with a prompt to diagnose and fix the startup failure
            - AND the iteration proceeds after the fix attempt
        - title: Service fix failure returns error
          items:
            - GIVEN a configured service fails to start and the fix agent also fails
            - WHEN the fix agent returns an error
            - THEN runIteration returns the error without invoking the picker
      code:
        - name: runIteration
          description: Starts services, runs picker and developer, stops services and removes logs; delegates to cleanup after develop
          module: internal/orchestration/run
          body: |
            func (r *Runner) runIteration(proj *project.Project, cfg *config.RalphConfig) error {
                svc, err := r.services.Start(cfg)
                if err != nil {
                    if fixErr := r.ai.FixServiceStartup(cfg, err); fixErr != nil {
                        return fixErr
                    }
                    svc = nil
                }
                defer r.services.Stop(svc)
                defer r.services.RemoveLogs(cfg)
                req, err := r.ai.RunPicker(proj)
                if err != nil {
                    return r.blockAndReturn(err)
                }
                if err := r.ai.RunDeveloper(proj, req); err != nil {
                    return r.blockAndReturn(err)
                }
                return r.cleanup(proj)
            }
      tests:
        - name: TestRunIterationStartsAndStopsServicesEachIteration
          description: services are started, stopped, and logs removed once per iteration
          module: internal/orchestration/run
          body: |
            func TestRunIterationStartsAndStopsServicesEachIteration(t *testing.T) {
                svcMock := &mockServicesClient{}
                runner := withMocks(
                    withProject(newProjectThatReportsPassingAfterIterations(2)),
                    withServices(svcMock),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.NoError(t, err)
                require.Equal(t, 2, svcMock.startCount)
                require.Equal(t, 2, svcMock.stopCount)
                require.Equal(t, 2, svcMock.removeLogsCount)
            }
        - name: TestRunIterationServiceStartupFailureTriggersFix
          description: service startup failure invokes the AI fix agent and the picker still runs
          module: internal/orchestration/run
          body: |
            func TestRunIterationServiceStartupFailureTriggersFix(t *testing.T) {
                aiMock := &mockAIClient{}
                runner := withMocks(
                    withServices(newServicesThatFailToStart()),
                    withProject(newProjectThatReportsPassingAfterIterations(1)),
                    withAI(aiMock),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.NoError(t, err)
                require.True(t, aiMock.fixServiceCalled)
                require.Len(t, aiMock.pickCalls, 1)
            }
        - name: TestRunIterationServiceFixFailureReturnsError
          description: service fix failure aborts before the picker runs
          module: internal/orchestration/run
          body: |
            func TestRunIterationServiceFixFailureReturnsError(t *testing.T) {
                runner := withMocks(
                    withServices(newServicesThatFailToStart()),
                    withAI(newAIThatFailsServiceFix()),
                )
                err := runner.RunLocal(failingProject(), anyConfig())
                require.Error(t, err)
                require.Empty(t, aiPickCalls(runner))
            }
      passing: false
    - slug: cleanup
      description: New cleanup method normalizes trailing newlines in the project file and stages it if changed
      scenarios:
        - title: Project file normalized after agent run
          items:
            - GIVEN the agent may have added trailing newlines to the project file
            - WHEN the agent finishes
            - THEN excess trailing newlines are stripped from the project file
            - AND the project file is staged if it has changes
      code:
        - name: cleanup
          description: Normalizes trailing newlines in the project file and stages it when changed
          module: internal/orchestration/run
          body: |
            func (r *Runner) cleanup(proj *project.Project) error {
                if r.project.HasChanges(proj) {
                    r.project.NormalizeAndStage(proj)
                }
                return nil
            }
      tests:
        - name: TestCleanupNormalizesProjectFileWhenChanged
          description: cleanup normalizes and stages the project file when HasChanges returns true
          module: internal/orchestration/run
          body: |
            func TestCleanupNormalizesProjectFileWhenChanged(t *testing.T) {
                projMock := newProjectThatReportsPassingAfterIterations(1)
                projMock.HasChangesFunc = func(_ *project.Project) bool { return true }
                runner := withMocks(withProject(projMock))
                err := runner.RunLocal(failingProject(), anyConfig())
                require.NoError(t, err)
                require.True(t, projMock.normalizeAndStageCalled)
            }
        - name: TestCleanupSkipsNormalizationWhenNoChanges
          description: cleanup skips normalization when HasChanges returns false
          module: internal/orchestration/run
          body: |
            func TestCleanupSkipsNormalizationWhenNoChanges(t *testing.T) {
                projMock := newProjectThatReportsPassingAfterIterations(1)
                projMock.HasChangesFunc = func(_ *project.Project) bool { return false }
                runner := withMocks(withProject(projMock))
                err := runner.RunLocal(failingProject(), anyConfig())
                require.NoError(t, err)
                require.False(t, projMock.normalizeAndStageCalled)
            }
      passing: false
    - slug: update-client-implementations
      description: Implement new interface methods on the real and mock clients for services and project packages
      items:
        - Add `Start(cfg *config.RalphConfig) (*Manager, error)` to `internal/services/client.go` — starts all configured services using `Manager.Start`; returns the manager and any error
        - Add `Stop(svc *Manager)` to `internal/services/client.go` — calls `svc.Stop()`; no-op when svc is nil
        - Add `RemoveLogs(cfg *config.RalphConfig)` to `internal/services/client.go` — removes each service's log file using `services.LogFileName`
        - Add `Start`, `Stop`, and `RemoveLogs` to `internal/services/client_mock.go` with `startCount`, `stopCount`, and `removeLogsCount` int fields; add a `newServicesThatFailToStart` factory whose `Start` returns an error
        - Add `HasChanges(proj *Project) bool` to `internal/project/client.go` — delegates to `git.HasFileChanges(proj.Path)`
        - Add `NormalizeAndStage(proj *Project)` to `internal/project/client.go` — trims excess trailing newlines from proj.Path and calls `git.StageFile`
        - Add `HasChangesFunc func(*Project) bool` and `normalizeAndStageCalled bool` to `internal/project/client_mock.go`; implement `HasChanges` and `NormalizeAndStage` using these fields
      passing: false
    - slug: update-agent-adapter
      description: Update internal/run/agent_client.go to satisfy the new AIClient interface
      items:
        - Rename `Pick` to `RunPicker` on `AgentClient` in `internal/run/agent_client.go`
        - Remove service management from `RunPicker` — it no longer calls `project.PrepareIteration`; instead it creates a lightweight setup (commit log + project content) and calls `project.PickRequirement` directly
        - Rename `Develop` to `RunDeveloper`; it no longer calls `stopServices` since services are stopped by `Runner.runIteration`
        - Remove the `setup` field and `stopServices` helper from `AgentClient`
        - Add `FixServiceStartup(cfg *config.RalphConfig, err error) error` — builds a fix prompt using `ai.BuildFixServicePrompt` and calls `ai.RunAgent`
        - Update `internal/run/local_runner.go` so `NewLocalRunner` passes `NewAgentClient(ctx)` as the `AIClient` argument to `NewRunner`
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
    - slug: update-mock-infrastructure
      description: Update mock_test.go to reflect the AIClient interface and add helpers for the new service and project mock fields
      items:
        - Rename `mockAgentClient` to `mockAIClient` in `internal/orchestration/run/mock_test.go`
        - Rename `pickFunc`/`pickCalls` to `runPickerFunc`/`pickCalls` and `developFunc`/`developCalls` to `runDeveloperFunc`/`developCalls` on `mockAIClient`
        - Add `fixServiceFunc func() error` and `fixServiceCalled bool` to `mockAIClient`; implement `FixServiceStartup` using these fields
        - Add `newAIThatFailsServiceFix` factory that returns a `mockAIClient` whose `FixServiceStartup` returns an error
        - Add `mockServicesClient` struct with `startCount`, `stopCount`, `removeLogsCount` int fields and an optional `startFunc func() error`; add `newServicesThatFailToStart` factory
        - Update `withAI` option to accept `AIClient` instead of `AgentClient`
        - Add `failingProject()`, `passingProject()`, and `anyConfig()` test factories for cleaner test setup
      passing: false
