slug: extra-iterations
title: Replace max iterations with extra iterations (20% default)
feature: specs/features/ralph/run
maxIterations: 10
requirements:
    - slug: config-extra-iterations
      description: Add ExtraIterations field to the config struct with omitempty YAML tag
      scenarios:
        - title: Both flag and config are unset
          items:
            - GIVEN neither `extraIterations` in config nor `--extra-iterations` flag is set
            - WHEN the extra iteration count is resolved
            - THEN the resolved value is nil/unset
            - AND the execution mode applies its default behavior
        - title: Config value used when flag is absent
          items:
            - 'GIVEN `extraIterations: 3` in `.ralph/config.yaml`'
            - AND no `--extra-iterations` flag is passed
            - WHEN the extra iteration count is resolved
            - THEN the resolved value is 3
      code:
        - name: RalphConfig
          description: Extended with ExtraIterations *int field, omitempty yaml tag so nil values are not serialized
          module: internal/config
          body: |-
            type RalphConfig struct {
                ExtraIterations *int `yaml:"extraIterations,omitempty"`
                // ... existing fields unchanged
            }

            // ExtraIterations returns the resolved count from flag or config, or nil when unset.
            func (r *RalphConfig) ExtraIterations() *int {
                return r.ExtraIterations
            }
      tests:
        - name: TestConfigExtraIterationsOmittedWhenNil
          description: validates that marshalling a config with nil ExtraIterations omits the field from YAML output
          module: internal/config
          body: |-
            func TestConfigExtraIterationsOmittedWhenNil(t *testing.T) {
                cfg := &RalphConfig{}
                out, err := yaml.Marshal(cfg)
                require.NoError(t, err)
                assert.NotContains(t, string(out), "extraIterations")
            }
        - name: TestConfigExtraIterationsSerializedWhenSet
          description: validates that marshalling a config with ExtraIterations set includes the field
          module: internal/config
          body: |-
            func TestConfigExtraIterationsSerializedWhenSet(t *testing.T) {
                v := 5
                cfg := &RalphConfig{ExtraIterations: &v}
                out, err := yaml.Marshal(cfg)
                require.NoError(t, err)
                assert.Contains(t, string(out), "extraIterations: 5")
            }
      passing: true
    - slug: cmd-extra-iterations-flag
      description: Add --extra-iterations flag to the run command and wire it into the execution context
      scenarios:
        - title: Flag takes precedence over config
          items:
            - 'GIVEN `extraIterations: 5` in `.ralph/config.yaml`'
            - AND the user passes `--extra-iterations 2`
            - WHEN the extra iteration count is resolved
            - THEN the resolved value is 2
        - title: Service startup skipped
          items:
            - GIVEN `--no-services` is set
            - WHEN `ralph workflow run` starts
            - THEN dependent service startup is skipped before executing the project
      code:
        - name: runCmd
          description: Extended with --extra-iterations flag, passes resolved value into the execution context
          module: internal/cmd
          body: |-
            type runCmd struct {
                ExtraIterations int // 0 means unset
                // ... existing fields
            }

            func (c *runCmd) parse() {
                flag.IntVar(&c.ExtraIterations, "extra-iterations", 0, "Extra iterations beyond requirement count (default: 20%% of requirements)")
                // ... existing flags
            }
      tests:
        - name: TestRunCmdFlagExtraIterations
          description: verifies the --extra-iterations flag is accepted and parsed
          module: internal/cmd
          body: |-
            func TestRunCmdFlagExtraIterations(t *testing.T) {
                cmd := exec.Command("go", "run", "./cmd/ralph", "run", "--help")
                out, err := cmd.CombinedOutput()
                require.NoError(t, err)
                assert.Contains(t, string(out), "--extra-iterations")
            }
      passing: true
    - slug: project-extra-iterations-helper
      description: Add ExtraIterations and ExtraIterationsError helpers to the project client
      code:
        - name: ExtraIterations
          description: returns configured extra iteration count from config, or 20% of requirement count (rounded up) when unset
          module: internal/project
          body: |-
            func (c *Client) ExtraIterations(proj *Project, cfg *config.RalphConfig) int {
                if cfg.ExtraIterations != nil {
                    return *cfg.ExtraIterations
                }
                count := len(proj.Requirements)
                extra := int(math.Ceil(float64(count) * 0.2))
                return extra
            }

            func MaxIterationsError(proj *Project) error {
                failing := 0
                for _, r := range proj.Requirements {
                    if !r.Passing {
                        failing++
                    }
                }
                return fmt.Errorf("iteration limit reached with %d requirement(s) still failing", failing)
            }
      tests:
        - name: TestExtraIterationsDefaultTwentyPercent
          description: validates that unset extra iterations defaults to 20% of requirement count
          module: internal/project
          body: |-
            func TestExtraIterationsDefaultTwentyPercent(t *testing.T) {
                cfg := &config.RalphConfig{}
                proj := &Project{
                    Requirements: make([]Requirement, 10),
                }
                c := &Client{}
                extra := c.ExtraIterations(proj, cfg)
                assert.Equal(t, 2, extra)
            }
        - name: TestExtraIterationsRoundsUp
          description: validates that 20% rounding is applied upward for small requirement counts
          module: internal/project
          body: |-
            func TestExtraIterationsRoundsUp(t *testing.T) {
                cfg := &config.RalphConfig{}
                proj := &Project{
                    Requirements: make([]Requirement, 3),
                }
                c := &Client{}
                extra := c.ExtraIterations(proj, cfg)
                assert.Equal(t, 1, extra)
            }
        - name: TestExtraIterationsUsesConfigValue
          description: validates that a configured extra iterations value is used instead of 20%
          module: internal/project
          body: |-
            func TestExtraIterationsUsesConfigValue(t *testing.T) {
                v := 5
                cfg := &config.RalphConfig{ExtraIterations: &v}
                proj := &Project{
                    Requirements: make([]Requirement, 10),
                }
                c := &Client{}
                extra := c.ExtraIterations(proj, cfg)
                assert.Equal(t, 5, extra)
            }
      passing: true
    - slug: iterate-loop
      description: Update the iterate function to compute the iteration limit from requirement count plus extra iterations
      scenarios:
        - title: Default extra iterations is 20% when unset
          items:
            - GIVEN neither `extraIterations` in config nor `--extra-iterations` flag is set
            - AND the project has 10 requirements
            - WHEN the iteration loop starts
            - THEN the iteration limit is 12 (10 requirements + 20% of 10)
        - title: Default extra iterations rounds up
          items:
            - GIVEN neither `extraIterations` in config nor `--extra-iterations` flag is set
            - AND the project has 3 requirements
            - WHEN the iteration loop starts
            - THEN the iteration limit is 4 (3 requirements + 20% of 3 rounded up from 0.6 to 1)
        - title: Extra iterations exhausted with failures remaining
          items:
            - GIVEN a project with 1 requirement and `--extra-iterations 0` (limit = 1)
            - AND requirements are still failing after iteration 1
            - WHEN the iteration loop finishes
            - THEN an error is returned indicating the iteration limit was reached
            - AND the number of still-failing requirements is included in the error message
        - title: Iteration limit reached with failing requirements — PR skipped
          items:
            - GIVEN the iteration loop exits because the iteration limit was reached
            - AND one or more requirements are still failing
            - WHEN the loop ends
            - THEN PR creation is skipped
            - AND an error is returned
      code:
        - name: iterate
          description: computes iteration limit from requirement count + extra, drives the loop, returns ExtraIterationsError on exhaustion
          module: internal/orchestration/run
          body: |-
            func (r *Runner) iterate(proj *project.Project, cfg *config.RalphConfig) error {
                extra := r.project.ExtraIterations(proj, cfg)
                limit := len(proj.Requirements) + extra
                for i := 0; i < limit; i++ {
                    proj = r.project.Load(proj)
                    if r.project.AllRequirementsPassing(proj) {
                        return nil
                    }
                    if r.git.BlockedFileExists() {
                        return ErrBlocked
                    }
                    if err := r.runIteration(proj, cfg); err != nil {
                        return err
                    }
                    if err := r.commitIteration(proj); err != nil {
                        return err
                    }
                }
                return r.project.ExtraIterationsError(proj)
            }
      tests:
        - name: TestIterateReturnsErrorWhenLimitReached
          description: 1 requirement, extra=0, loop runs exactly 1 iteration then returns error
          module: internal/orchestration/run
          body: |-
            func TestIterateReturnsErrorWhenLimitReached(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatAlwaysReportsFailures()),
                )
                err := runner.RunLocal(input.forProject(project.withFailingRequirements(1)), config.withExtraIterations(0))
                require.Error(t, err)
                require.Len(t, ai.pickCalls(), 1)
            }
        - name: TestIterateRespectsExtraIterations
          description: 3 requirements, extra=2, loop runs 5 total iterations then returns error
          module: internal/orchestration/run
          body: |-
            func TestIterateRespectsExtraIterations(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatAlwaysReportsFailures()),
                )
                err := runner.RunLocal(input.forProject(project.withFailingRequirements(3)), config.withExtraIterations(2))
                require.Error(t, err)
                require.Len(t, ai.pickCalls(), 5)
            }
        - name: TestIterateDefaultsToTwentyPercentExtra
          description: 10 requirements, config.any() (extra unset), loop runs 12 iterations then returns error
          module: internal/orchestration/run
          body: |-
            func TestIterateDefaultsToTwentyPercentExtra(t *testing.T) {
                runner := run.withMocks(
                    run.withProject(project.thatAlwaysReportsFailures()),
                )
                err := runner.RunLocal(input.forProject(project.withFailingRequirements(10)), config.any())
                require.Error(t, err)
                require.Len(t, ai.pickCalls(), 12)
            }
      passing: true
    - slug: workflow-run-extra-iterations
      description: Update workflow-run to pass --extra-iterations through to the run-local behavior
      scenarios:
        - title: Extra iterations
          items:
            - GIVEN `--extra-iterations` is provided
            - WHEN the project loop executes
            - THEN the provided extra iteration count is passed to the run-local behavior
            - AND when `--extra-iterations` is absent, no extra iteration value is passed and run-local applies its default
      passing: true
    - slug: validate-canonical-omitempty
      description: Ensure canonical YAML serialization in ralph validate omits empty/nil fields
      scenarios:
        - title: Empty values omitted from canonical output
          items:
            - GIVEN a validated project with unset/empty fields (e.g., `extraIterations` is nil)
            - WHEN the project is marshalled to canonical YAML
            - THEN fields with empty or nil values are omitted from the output
            - AND no fields are emitted with empty values
      passing: true
    - slug: docs-config-example
      description: Update config docs and example to document extraIterations instead of maxIterations
      items:
        - 'Replace maxIterations with extraIterations in docs/config.md: comment reads ''Extra iterations beyond requirement count (unset = 20% of requirements, rounded up)'''
        - Omit extraIterations from examples/config.example.yaml when unset; keep only a comment explaining how to set it
      passing: true
    - slug: version-bump
      description: Version bump for replacing max iteration config with extra iterations
      items:
        - Apply a semver minor bump to internal/version/VERSION
      passing: true
