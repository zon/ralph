name: refactor-command-and-context
description: Separate domain logic from infrastructure in command handlers, context, and signal handling

requirements:
  - category: command-layer
    description: Move webhook provisioning logic to dedicated internal package
    items:
      - internal/provisioning package exposes BuildWebhookAppConfig, BuildWebhookSecrets, GenerateWebhookSecret, FetchRepoCollaborators, ReadWebhookConfigFromK8s, and RegisterGitHubWebhook
      - Webhook resource name constants (configmap name, secret name, ingress hostname) are defined in internal/provisioning
      - ConfigWebhookConfigCmd and ConfigWebhookSecretCmd in internal/cmd contain only orchestration logic and delegate all domain work to internal/provisioning
      - collaboratorsFetcher package-level variable is removed from internal/cmd
      - Tests for BuildWebhookAppConfig, BuildWebhookSecrets, and GenerateWebhookSecret move to internal/provisioning
    passing: true
  - category: command-layer
    description: Ensure command handlers separate domain logic from infrastructure
    items:
      - list.go and stop.go delegate argo CLI operations to a new internal/argo package
      - merge.go uses internal/git.RevParse instead of exec.Command("git", "rev-parse", "HEAD")
      - merge.go uses internal/github functions instead of direct exec.Command("gh", ...) for PR merge operations
      - workflow.go workspace preparation (clone directory setup, os.Chdir) is extracted from the command handler and delegated to an internal abstraction
      - workflow.go OpenCode auth file setup is extracted from the command handler and delegated to an internal abstraction
      - run.go does not call os.Chdir directly
    passing: false
  - category: context-management
    description: Improve context initialization and internal consistency
    items:
      - internal/context provides NewContextFromEnv() *Context that reads all environment variables for context initialization
      - exec_context.go in internal/cmd delegates to NewContextFromEnv() instead of calling individual setters
      - Context.Validate() returns an error if workflowExecution and local are both true
    passing: true
  - category: cleanup-management
    description: Separate domain logic from implementation details in signal handling
    items:
      - SetupSignalHandlers uses logger instead of fmt.Printf/fmt.Println
      - Manager holds an injectable exitFn func(int) field (defaulting to os.Exit) used by the signal handler
      - The signal handler goroutine (cleanup invocation and exit) is covered by tests
    passing: false
  - category: logging
    description: Consolidate logging usage and replace fmt.Print statements with logger functions where appropriate
    items:
      - Status, progress, and result messages in config_github.go, config_opencode.go, config_pulumi.go, setup_workspace.go, and validate.go use logger.Info, logger.Infof, logger.Success, or logger.Successf instead of fmt.Print
      - Blank fmt.Println() spacing calls are removed
      - The interactive stdin prompt in config_pulumi.go that reads the token from stdin remains as fmt.Print
      - Version output in run.go remains as fmt.Printf
    passing: false
