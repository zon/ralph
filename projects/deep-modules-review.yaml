name: deep-modules-review
description: Address deep module violations found during architecture review

requirements:
  - category: refactoring
    description: "internal/git/file.go: `DetectModifiedProjectFile` (line 26) is project-specific logic that does not belong in the git package. Git should only handle git operations, not project file detection."
    items:
      - Move `DetectModifiedProjectFile` to `internal/project/detect.go` as `project.DetectModifiedFile(projectsDir)`
      - Update any callers to use `project.DetectModifiedFile` instead
    passing: false

  - category: refactoring
    description: "internal/run/execute.go: `CreatePullRequest` (line 202) contains GitHub credential refresh logic (`github.ConfigureGitAuth`) that could be encapsulated in the github package rather than the run package."
    items:
      - Consider adding `github.RefreshAuthIfNeeded(ctx)` in github package to encapsulate the credential refresh logic
      - Simplify `CreatePullRequest` to delegate auth refresh to the github package
    passing: false
