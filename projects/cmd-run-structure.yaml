name: cmd-run-structure
description: Refactor ReviewCmd.Run to separate domain logic from infrastructure

requirements:
  - category: structure
    description: Separate infrastructure concerns from domain logic in ReviewCmd.Run
    items:
      - internal/cmd/review.go:98 - Run function calls infrastructure functions (logger.SetVerbose, os.MkdirAll, config.LoadConfig, fetchRalphProjectDoc, createExecutionContext, git.GetCurrentBranch, submitToArgo, submitPR, printStats) directly; extract these as injected dependencies or adapter calls to separate orchestration from infrastructure
      - internal/cmd/review.go:98 - Run function has mixed error handling and logging; simplify by delegating side effects to a caller or adapter layer
    passing: false
