slug: github-module-cleanup
title: Refactor internal/github to standard interface and testing patterns
maxIterations: 10
requirements:
    - slug: define-gh-interface
      description: Replace exported free-function gh CLI calls with a GHClient interface and GH implementation struct
      items:
        - Define a GHClient interface in internal/github with methods IsReady() bool, FindExistingPR(head string) (string, error), CreatePR(title, body, base, head string) (string, error), GetPRHeadRefOid(pr string) (string, error), and MergePR(pr, repo string) error
        - Implement GHClient as a GH struct whose methods contain the bodies of the current free functions
        - Delete the free functions IsReady, FindExistingPR, CreatePR, GetPRHeadRefOid, MergePR from github.go and the ErrNoCommitsBetweenBranches sentinel; move the sentinel to gh.go alongside the interface
        - Remove the RALPH_MOCK_GH env var bypass from the GH.CreatePR implementation
        - Add a gh GHClient field to Client; update NewClient to accept a GHClient parameter; callers that construct a real Client pass &GH{}
        - Update CreatePullRequest in pr.go to accept a GHClient parameter and delegate gh operations to it instead of calling free functions
        - Find all callers of the deleted free functions outside internal/github and update them to construct or accept a GHClient
      passing: true
    - slug: fix-mock-client
      description: Bring MockClient and add MockGH to comply with the standard function-field mock pattern
      items:
        - Add MockGH to client_mock.go implementing GHClient with one function field per method (IsReadyFn, FindExistingPRFn, CreatePRFn, GetPRHeadRefOidFn, MergePRFn); each method returns a zero-value default when its function field is nil
        - Remove CreatePRCalled and CreatePRReturnedNil from MockClient; keep only CreatePRFunc
        - Update any tests in other packages that referenced CreatePRCalled or CreatePRReturnedNil to assert through other means
      passing: true
    - slug: extract-workflow-context
      description: Move the IsWorkflowExecution auth-refresh decision out of pr.go into Client.CreatePR
      items:
        - In Client.CreatePR, call ConfigureGitAuth before invoking gh when ctx.IsWorkflowExecution() is true
        - Remove the IsWorkflowExecution check and the ConfigureGitAuth call from CreatePullRequest in pr.go
        - Remove the internal/context import from pr.go if it is no longer used after the move
      passing: true
    - slug: fix-pr-tests
      description: Rewrite pr_test.go so the real gh binary is never invoked
      items:
        - Delete skipIfGHNotAvailable from pr_test.go
        - Rewrite each test in pr_test.go to construct a Client with an injected MockGH whose IsReadyFn returns true and CreatePRFn returns a fake URL
        - Remove all RALPH_MOCK_GH env var usage from pr_test.go
      passing: true
    - slug: move-container-workflow-test
      description: Move TestContainerBuildWorkflow to internal/docker where repository CI config tests belong
      items:
        - Move container_workflow_test.go from internal/github to internal/docker; adjust the relative path to the workflow YAML file to match the new package location
        - Delete container_workflow_test.go from internal/github
      passing: false
    - slug: merge-cli-into-repo
      description: Consolidate GetRepo and ParseRemoteURL into repo.go and delete cli.go
      items:
        - Move GetRepo and ParseRemoteURL from cli.go into repo.go
        - Rename cli_test.go to repo_test.go; no test logic needs to change since the functions are unchanged
        - Delete cli.go
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
