name: review-two-phase
description: Enhance ralph review command with two-phase component-scoped reviewing

requirements:
  - category: phase1
    description: Generate a code overview YAML file before reviewing
    items:
      - Phase 1 runs a single AI agent pass that explores the codebase and writes a YAML overview file alongside the project file (e.g. projects/review-YYYY-MM-DD-overview.yaml)
      - The overview file contains a top-level `components` list where each entry has `name`, `path`, and `summary` fields
      - The phase 1 prompt instructs the agent to identify major code components (packages, modules, or logical groupings) — their location in the repo and a one-sentence description of what they do
      - If the overview file cannot be written or parsed, the review falls back to the existing single-phase behaviour so it is never a hard failure
    passing: true

  - category: phase2
    description: Run each review item scoped to each component from the overview
    items:
      - Phase 2 loops over every component from the overview file and every configured review item, running one AI agent per (component, item) pair
      - The per-component prompt tells the agent to focus only on the files under that component's path and evaluate the given review item against that scope
      - The per-component prompt includes the component name, path, and summary so the agent has context without needing to re-explore the whole repo
      - Findings are written to the same project file as today — the scoping is in the prompt, not the output format
    passing: true

  - category: prompts
    description: New and updated prompt templates for both phases
    items:
      - A `buildOverviewPrompt(overviewPath string) string` function builds the phase 1 prompt asking the AI to write the overview YAML to `overviewPath`
      - A `buildComponentPrompt(content, projectPath, projectDoc, reviewName string, component OverviewComponent) string` function builds the phase 2 prompt, scoped to the given component
      - Existing `buildPrompt` is kept as the fallback path
    passing: true

  - category: types
    description: New OverviewComponent type for parsing the overview YAML
    items:
      - An `OverviewComponent` struct with `Name`, `Path`, and `Summary` string fields lives in the `cmd` package (or a small dedicated file)
      - An `Overview` struct with a `Components []OverviewComponent` field is used to unmarshal the overview YAML
      - A `loadOverview(path string) (*Overview, error)` helper reads and unmarshals the file
    passing: true

  - category: tests
    description: Unit tests for new prompt builders and overview loading
    items:
      - TestBuildOverviewPrompt asserts the prompt contains the overview file path
      - TestBuildComponentPrompt asserts the prompt contains the component name, path, summary, review content, and project path
      - TestLoadOverview_Valid asserts a well-formed YAML is parsed into the correct struct
      - TestLoadOverview_Missing asserts an error is returned when the file does not exist
      - All tests follow table-driven style, use t.TempDir() for file I/O, and do not invoke any external tools
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver minor bump to internal/version/VERSION and appVersion in charts/ralph-webhook/Chart.yaml, and a semver patch bump to version in charts/ralph-webhook/Chart.yaml
    passing: true
