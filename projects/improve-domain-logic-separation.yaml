name: improve-domain-logic-separation
description: Refactor to separate domain logic from implementation infrastructure
requirements:
  - category: refactoring
    description: Separate infrastructure from domain logic in run/execute.go Execute function
    items:
      - Move path resolution (filepath.Abs), config loading, and branch detection to caller/setup
      - Extract infrastructure concerns into helper functions clearly marked as infrastructure
      - Ensure Execute function focuses on orchestration domain logic: validate git → run iterations → create PR
  - category: refactoring
    description: Separate infrastructure from domain logic in project.ExecuteDevelopmentIteration
    items:
      - Remove redundant project file loading (caller should pass loaded Project, not path)
      - Extract service startup/shutdown as clearly infrastructure concern
      - Ensure function focuses on domain: generate prompts → run AI agent → cleanup
  - category: refactoring
    description: Extract flag validation from cmd/run.go Run method
    items:
      - Move flag combination validation to a dedicated validator
      - Keep Run method focused on command execution flow
passing: false