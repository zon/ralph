name: optional-before-commands
description: Allow before commands to be marked optional so failures are warned but do not abort ralph

requirements:
  - category: config
    description: Before commands support an optional flag
    items:
      - The Before struct gains an Optional field (bool, yaml:"optional,omitempty")
      - When optional is true and the command exits non-zero, ralph logs a warning and continues instead of returning an error
      - When optional is false (the default), behavior is unchanged — a failing before command aborts the run
    passing: false

  - category: config
    description: docs/config.md documents the optional field
    items:
      - The before section in docs/config.md mentions the optional field and explains its behavior
    passing: false

  - category: testing
    description: Unit tests cover optional before command behavior
    items:
      - A test asserts that a failing optional before command produces a warning log and RunBefore returns nil
      - A test asserts that a failing non-optional before command still returns an error
    passing: false

  - category: versioning
    description: Version bump to 3.2.0
    items:
      - internal/version/VERSION is updated to 3.2.0
      - charts/ralph-webhook/Chart.yaml appVersion is updated to 3.2.0
      - charts/ralph-webhook/Chart.yaml version is patch bumped to 0.2.51
    passing: false
