slug: argo
title: Add ralph list and stop commands with label-filtered workflow management
feature: specs/features/ralph/argo
maxIterations: 10
requirements:
    - slug: argo-orchestration
      description: Create internal/orchestration/argo with ArgoCmd that resolves Kubernetes context and delegates to the argo client for list and stop
      items:
        - Add internal/orchestration/argo to specs/architecture.yaml as an orchestration module
      code:
        - name: ArgoClient
          description: interfaces injected into ArgoCmd for argo operations and context resolution
          module: internal/orchestration/argo
          body: |
            type ArgoClient interface {
                List(ctx K8sContext) error
                Stop(ctx K8sContext, workflowName string) error
            }

            type ContextClient interface {
                Resolve(flagContext, flagNamespace string) (K8sContext, error)
            }
        - name: ArgoCmd
          description: orchestrates ralph list and ralph stop by resolving context then calling the argo client
          module: internal/orchestration/argo
          body: |
            type ArgoCmd struct {
                argo ArgoClient
                ctx  ContextClient
            }

            type ListFlags struct {
                Context   string
                Namespace string
            }

            type StopFlags struct {
                Context      string
                Namespace    string
                WorkflowName string
            }

            func (c *ArgoCmd) List(flags ListFlags) error {
                k8sCtx, err := c.ctx.Resolve(flags.Context, flags.Namespace)
                if err != nil {
                    return err
                }
                return c.argo.List(k8sCtx)
            }

            func (c *ArgoCmd) Stop(flags StopFlags) error {
                k8sCtx, err := c.ctx.Resolve(flags.Context, flags.Namespace)
                if err != nil {
                    return err
                }
                return c.argo.Stop(k8sCtx, flags.WorkflowName)
            }
      tests:
        - name: TestListResolvesContextAndCallsArgo
          description: verifies list resolves context and calls argo.List
          module: internal/orchestration/argo
          body: |
            func TestListResolvesContextAndCallsArgo(t *testing.T) {
                cmd := argo.withMocks()
                err := cmd.List(flags.anyList())
                require.NoError(t, err)
                require.True(t, argoClient.listCalled())
            }
        - name: TestListPropagatesContextResolutionFailure
          description: verifies list returns error and skips argo when context resolution fails
          module: internal/orchestration/argo
          body: |
            func TestListPropagatesContextResolutionFailure(t *testing.T) {
                cmd := argo.withMocks(
                    argo.withContext(ctx.thatFails()),
                )
                err := cmd.List(flags.anyList())
                require.Error(t, err)
                require.False(t, argoClient.listCalled())
            }
        - name: TestStopResolvesContextAndCallsArgo
          description: verifies stop resolves context and calls argo.Stop
          module: internal/orchestration/argo
          body: |
            func TestStopResolvesContextAndCallsArgo(t *testing.T) {
                cmd := argo.withMocks()
                err := cmd.Stop(flags.anyStop())
                require.NoError(t, err)
                require.True(t, argoClient.stopCalled())
            }
        - name: TestStopPropagatesContextResolutionFailure
          description: verifies stop returns error and skips argo when context resolution fails
          module: internal/orchestration/argo
          body: |
            func TestStopPropagatesContextResolutionFailure(t *testing.T) {
                cmd := argo.withMocks(
                    argo.withContext(ctx.thatFails()),
                )
                err := cmd.Stop(flags.anyStop())
                require.Error(t, err)
                require.False(t, argoClient.stopCalled())
            }
      passing: true
    - slug: list-command
      description: Update ralph list to filter by app.kubernetes.io/managed-by=ralph and support --namespace/-n flag
      items:
        - Add a Namespace string field with `help:"Kubernetes namespace to use" short:"n" optional:""` kong tags to ListCmd in internal/cmd/list.go
        - Wire ListCmd.Run to instantiate ArgoCmd from internal/orchestration/argo and call List; the ContextClient adapter wraps resolveKubeContext and the ArgoClient adapter wraps argo.Client.ListWorkflows
        - Update ListWorkflows in internal/argo/argo.go to pass `-l app.kubernetes.io/managed-by=ralph` to the argo list CLI command
        - Update internal/cmd/list_stop_test.go to cover the --namespace/-n flag for list
      scenarios:
        - title: Default list
          items:
            - GIVEN no flags are provided
            - WHEN the user runs `ralph list`
            - THEN ralph calls `argo list` filtered by `app.kubernetes.io/managed-by=ralph`
            - AND scoped to the namespace from the ralph config
        - title: Custom namespace
          items:
            - GIVEN the user passes `--namespace staging` (or `-n staging`)
            - WHEN the user runs `ralph list -n staging`
            - THEN ralph lists ralph-owned workflows in the `staging` namespace
        - title: Custom context
          items:
            - GIVEN the user passes `--context prod-cluster`
            - WHEN the user runs `ralph list --context prod-cluster`
            - THEN ralph lists ralph-owned workflows using the `prod-cluster` Kubernetes context
        - title: Custom context and namespace together
          items:
            - GIVEN the user passes both `--context prod-cluster` and `-n staging`
            - WHEN the user runs `ralph list --context prod-cluster -n staging`
            - THEN ralph lists ralph-owned workflows in the `staging` namespace of the `prod-cluster` context
        - title: Flag overrides config namespace
          items:
            - GIVEN the ralph config specifies namespace `default`
            - AND the user passes `-n staging`
            - WHEN `ralph list` runs
            - THEN the `staging` namespace is used
        - title: Config namespace used when no flag given
          items:
            - GIVEN the ralph config specifies namespace `platform`
            - AND no `--namespace` flag is given
            - WHEN `ralph list` runs
            - THEN the `platform` namespace is used
      passing: true
    - slug: stop-command
      description: Update ralph stop to support --namespace/-n flag and wire to the orchestration module
      items:
        - Add a Namespace string field with `help:"Kubernetes namespace to use" short:"n" optional:""` kong tags to StopCmd in internal/cmd/stop.go
        - Wire StopCmd.Run to instantiate ArgoCmd from internal/orchestration/argo and call Stop; the ContextClient adapter wraps resolveKubeContext and the ArgoClient adapter wraps argo.Client.StopWorkflow
        - Update internal/cmd/list_stop_test.go to cover the --namespace/-n flag for stop
      scenarios:
        - title: Stop by workflow name
          items:
            - GIVEN a workflow name is provided
            - WHEN the user runs `ralph stop <workflow-name>`
            - THEN ralph calls `argo stop` for that workflow
            - AND scoped to the namespace from the ralph config
        - title: Missing workflow name
          items:
            - GIVEN no workflow name is provided
            - WHEN the user runs `ralph stop`
            - THEN an error is returned with usage instructions
        - title: Custom namespace
          items:
            - GIVEN the user passes `--namespace staging` (or `-n staging`)
            - WHEN the user runs `ralph stop -n staging <workflow-name>`
            - THEN ralph stops the workflow in the `staging` namespace
        - title: Custom context
          items:
            - GIVEN the user passes `--context prod-cluster`
            - WHEN the user runs `ralph stop --context prod-cluster <workflow-name>`
            - THEN ralph stops the workflow using the `prod-cluster` Kubernetes context
        - title: Flag overrides config namespace
          items:
            - GIVEN the ralph config specifies namespace `default`
            - AND the user passes `-n staging`
            - WHEN `ralph stop` runs
            - THEN the `staging` namespace is used
        - title: Config namespace used when no flag given
          items:
            - GIVEN the ralph config specifies namespace `platform`
            - AND no `--namespace` flag is given
            - WHEN `ralph stop` runs
            - THEN the `platform` namespace is used
      passing: true
    - slug: workflow-labels
      description: Add app.kubernetes.io/managed-by=ralph to the workflow-level metadata of all Argo Workflow manifests generated by ralph
      items:
        - In internal/workflow/workflow.go, update Render() to add `app.kubernetes.io/managed-by=ralph` to the workflow-level metadata labels map alongside any existing w.Labels values
        - In internal/workflow/merge_workflow.go, update MergeWorkflow.Render() to add `app.kubernetes.io/managed-by=ralph` to the workflow-level metadata labels map
        - Add test assertions in internal/workflow/generate_test.go that the workflow-level metadata labels contain `app.kubernetes.io/managed-by=ralph` for run, command, and merge workflows
      scenarios:
        - title: Label present on run workflow
          items:
            - GIVEN `ralph run` generates a workflow for the project
            - WHEN the workflow YAML is rendered
            - THEN the workflow metadata contains the label `app.kubernetes.io/managed-by=ralph`
        - title: Label present on command workflow
          items:
            - GIVEN a command is provided and the workflow is generated
            - WHEN the workflow YAML is rendered
            - THEN the workflow metadata contains the label `app.kubernetes.io/managed-by=ralph`
        - title: Run Workflow labeled (webhook)
          items:
            - GIVEN a comment event triggers a Run Workflow submission
            - WHEN the workflow YAML is rendered
            - THEN the workflow metadata contains the label `app.kubernetes.io/managed-by=ralph`
        - title: Merge Workflow labeled
          items:
            - GIVEN a review approval triggers a Merge Workflow submission
            - WHEN the workflow YAML is rendered
            - THEN the workflow metadata contains the label `app.kubernetes.io/managed-by=ralph`
      passing: true
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver minor bump to the app version
      passing: false
