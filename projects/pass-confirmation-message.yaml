slug: pass-confirmation-message
title: Print a confirmation message after marking a requirement passing or failing
feature: specs/features/ralph/pass
maxIterations: 10
requirements:
    - slug: pass-orchestration-no-output
      description: Keep internal/orchestration/pass focused on pure load/update/save coordination, with no output or string-construction concerns
      items:
        - internal/orchestration/pass/pass.go must not import or reference internal/output, and must not construct any user-facing strings
        - The exported type in internal/orchestration/pass/pass.go must remain a plain coordination type with a Run-style method that loads the project file via project.LoadProject, updates the requirement via project.UpdateRequirementStatus, and saves it via project.SaveProject, returning the loaded *project.Project (or equivalent) and an error so callers can build a confirmation message
        - Existing tests in internal/orchestration/pass/pass_test.go must continue to pass for the mark-passing, mark-failing, file-not-found, and slug-not-found cases
      passing: true
    - slug: pass-cmd-confirmation-message
      description: Add a cmd/ralph 'pass' command in internal/cmd that wires output and prints a confirmation message after a successful update, mirroring the pattern in internal/cmd/validate.go
      items:
        - Create internal/cmd/pass.go defining a PassCmd struct (kong command) with fields ProjectFile (arg), Slug (arg), and False (--false flag), matching the existing internal/orchestration/pass.PassCmd flag shape
        - PassCmd.Run() in internal/cmd/pass.go must create the execution context and an output.Client via output.NewClient(os.Stdout, os.Stderr, false), call into the internal/orchestration/pass coordination type/function to load, update, and save the project, and on success print a confirmation via ctx.Output().Successf(...) including the requirement slug and the new passing status (passing/failing)
        - On error from the orchestration call, return the error without printing a success message
        - Update internal/cmd/cmd.go to register the new internal/cmd PassCmd (instead of embedding internal/orchestration/pass.PassCmd directly) as the 'Pass' subcommand with help text 'Mark a project requirement as passing or failing'
      scenarios:
        - title: Mark passing
          items:
            - 'GIVEN a project file with a requirement whose slug is ''my-req'' and ''passing: false'''
            - WHEN the user runs 'ralph pass ./projects/my-project.yaml my-req'
            - THEN the requirement's 'passing' field is set to 'true' in the project file
            - AND a confirmation message is printed
        - title: Already passing
          items:
            - 'GIVEN a requirement that already has ''passing: true'''
            - WHEN the user runs 'ralph pass ./projects/my-project.yaml my-req'
            - THEN the 'passing' field remains 'true' in the project file
            - AND a confirmation message is printed
        - title: Mark failing
          items:
            - 'GIVEN a project file with a requirement whose slug is ''my-req'' and ''passing: true'''
            - WHEN the user runs 'ralph pass ./projects/my-project.yaml my-req --false'
            - THEN the requirement's 'passing' field is set to 'false' in the project file
            - AND a confirmation message is printed
      passing: false
    - slug: pass-cmd-tests
      description: Test the new internal/cmd PassCmd confirmation-message behavior
      items:
        - Add tests in internal/cmd (e.g. internal/cmd/pass_test.go) that run PassCmd.Run() against a temporary project file created with t.TempDir() and assert that a confirmation message is written to the output writer for both the mark-passing and mark-failing cases
        - Use github.com/stretchr/testify assert/require for all assertions, following the table-driven and t.TempDir() conventions in docs/testing.md
        - Ensure the existing internal/orchestration/pass/pass_test.go cases (mark passing, mark failing, file not found, slug not found) are preserved or moved as appropriate to continue testing the pure coordination logic without output
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
