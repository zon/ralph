name: review-filter
description: Add --filter flag to ralph review to subset review items by string match

requirements:
  - category: feature
    description: Add --filter flag to ReviewCmd
    items:
      - Add a Filter string field to ReviewCmd with help text "Only run review items whose text, file, or url property contains this string"
      - In runReview(), before shuffling, filter ralphConfig.Review.Items to only those where item.Text, item.File, or item.URL contains the Filter string (case-insensitive substring match); if Filter is empty, include all items
      - Return an error from Run() if --filter is set but no items match after filtering, with a message indicating the filter value that matched nothing
    passing: true

  - category: workflow
    description: Pass --filter through to Argo workflow
    items:
      - Add a Filter string field to the Workflow struct in internal/workflow/workflow.go
      - In GenerateReviewWorkflow(), set Filter from ctx.Filter()
      - Add SetFilter/Filter methods to internal/context/context.go
      - In ReviewCmd.Run(), call ctx.SetFilter(r.Filter) before submitting to Argo
      - In buildMainTemplate(), append "--filter", w.Filter to the review args when w.Filter is non-empty
    passing: true

  - category: tests
    description: Test filter behavior
    items:
      - Add unit tests for the filter logic covering exact match, substring match, case-insensitive match, no-match error, and empty filter (all items pass)
      - Tests must use an isolated repo (not the ralph repo itself)
    passing: true

  - category: version
    description: Bump version
    items:
      - Apply a semver minor bump to internal/version/VERSION and a patch bump to charts/ralph-webhook/Chart.yaml
    passing: true
