name: effective-go-refactoring
description: Refactor Ralph codebase to follow Effective Go idioms and best practices

requirements:
  - category: structure
    description: Align project structure and naming with Go conventions
    items:
      - "Exported names use the package structure to avoid repetition (e.g., `ai.Agent` instead of `ai.AIAgent`)"
      - "Interface names follow the '-er' suffix convention where appropriate (e.g., `Registrar`, `Writer`)"
      - "Getters for unexported fields omit the 'Get' prefix (e.g., `Config.Model()` instead of `Config.GetModel()`)"
    passing: false

  - category: idiomatic-code
    description: Implement idiomatic allocation and control flow
    items:
      - "Struct initialization uses composite literals instead of manual field assignments"
      - "Zero-values for core types are useful or clearly handled by constructors"
      - "Complex nested if-else chains are refactored into guard clauses to minimize indentation"
      - "`defer` is used immediately following resource acquisition (files, locks, network)"
    passing: false

  - category: error-handling
    description: Improve error reporting and context
    items:
      - "All library errors include descriptive context via wrapping (e.g., `fmt.Errorf`)"
      - "Panic is removed from operational code paths and reserved for non-recoverable internal state errors"
      - "Error strings are lowercase and do not end in punctuation, following standard library conventions"
    passing: false

  - category: versioning
    description: Apply version bump for structural improvements
    items:
      - "Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml"
    passing: false
