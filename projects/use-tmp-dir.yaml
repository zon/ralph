name: use-tmp-dir
description: Use ./tmp instead of /tmp for temporary files

requirements:
  - category: conventions
    description: Use ./tmp instead of /tmp for temporary files
    items:
      - Ralph and ralph tests must not write to `/tmp`; use `./tmp` (relative to the working directory) instead
      - The repo's `.gitignore` should include `tmp/` so these directories are not tracked
    passing: false

  - category: version
    description: Version bump
    items:
      - Apply a semver patch bump to `internal/version/VERSION` and `charts/ralph-webhook/Chart.yaml`
    passing: false
