name: deepen-git-module
description: Make internal/git module deeper by providing higher-level operations

requirements:
  - category: refactoring
    description: Analyze current git module interface
    items:
      - Document all current public functions and their git CLI equivalents
      - Identify workflows that callers currently coordinate manually
      - Determine which operations are good candidates for higher-level abstractions
    passing: true

  - category: refactoring
    description: Add higher-level git operations
    items:
      - Create EnsureCleanWorkingTree() that verifies no uncommitted changes
      - Create SyncBranch(branch) that handles fetch, rebase, and push verification
      - Create CommitWithVerification(message) that validates commit was created
      - Create AtomicCommitWithFiles(message, files[]) that stages, verifies, and commits in one call
    passing: true

  - category: refactoring
    description: Update callers to use new deep operations
    items:
      - Update run/execute.go to use new git module operations where applicable
      - Remove duplicated git coordination logic from callers
      - Ensure all existing tests pass after refactoring
    passing: true

  - category: version
    description: Bump version
    items:
      - Apply a semver patch bump to internal/version/VERSION and charts/ralph-webhook/Chart.yaml
    passing: true
