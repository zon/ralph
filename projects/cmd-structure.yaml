name: cmd-structure
description: Refactor cmd package Run functions to separate domain logic from infrastructure

requirements:
  - category: structure
    description: Separate infrastructure concerns from domain logic in CommentCmd.Run
    items:
      - internal/cmd/comment.go:31 - Run function calls infrastructure functions directly (logger.SetVerbose, os.Stat, config.LoadConfig, filepath.Abs, startServicesIfNeeded, ai.RunAgent); extract these as injected dependencies or adapter calls to separate orchestration from infrastructure
      - internal/cmd/comment.go:57-66 - Context setup and service startup is embedded in Run; delegate side effects (logging config, service lifecycle) to a caller or adapter layer
    passing: false
  - category: structure
    description: Separate infrastructure concerns from domain logic in MergeCmd.Run
    items:
      - internal/cmd/merge.go:62-65 - runLocal resolves the ghMerger dependency inline with a nil-check fallback; dependency wiring is infrastructure and should be resolved at construction time, not inside the domain flow function
      - internal/cmd/merge.go:77 - scanAndCleanupProjects calls os.Stat directly to check for the projects directory; filesystem existence checks are infrastructure and should be abstracted behind an injected dependency or adapter
      - internal/cmd/merge.go:129-157 - waitForGitHubHead contains a polling loop with time.Sleep called from within the domain flow; infrastructure retry/polling mechanics should be extracted so the domain function expresses only the intent (wait for GitHub head to sync) without embedding the timing implementation
    passing: false
  - category: structure
    description: Separate infrastructure concerns from domain logic in ArchitectureCmd.Run
    items:
      - internal/cmd/architecture.go:22-51 - Run function calls infrastructure functions directly (logger.SetVerbose, createExecutionContext, ai.BuildArchitecturePrompt, ai.RunAgent, r.validateAndFix, r.commitAndCreatePR); extract these as injected dependencies or adapter calls to separate orchestration from infrastructure
      - internal/cmd/architecture.go:53-92 - validateAndFix embeds AI prompt construction (ai.BuildArchitectureFixPrompt) and AI execution (ai.RunAgent) inside the validation loop; AI invocation is infrastructure and should be abstracted behind a validation adapter
      - internal/cmd/architecture.go:94-138 - commitAndCreatePR performs git operations (git.CheckoutOrCreateBranch, git.StageFile, git.CommitAllAndPush) and GitHub API calls (github.CreatePullRequest) directly; these infrastructure concerns should be delegated to an adapter or caller layer
  - category: structure
    description: Separate infrastructure concerns from domain logic in StopCmd.Run
    items:
      - internal/cmd/stop.go:19 - Run calls config.LoadConfig() directly; configuration loading is infrastructure and should be injected as a dependency
      - internal/cmd/stop.go:24 - resolveKubeContext is an infrastructure function that handles Kubernetes context resolution; this should be abstracted behind an adapter or injected dependency so the domain flow only expresses intent (stop workflow) without embedding setup logic
    passing: false
  - category: structure
    description: Separate infrastructure concerns from domain logic in ConfigGithubCmd.Run
    items:
      - internal/cmd/config_github.go:22-60 - Run function calls infrastructure functions directly (context.Background, config.LoadConfig, resolveKubeContext, c.detectRepo, c.readAndValidatePrivateKey, c.validateCredentials, c.createK8sSecret, logger.*); extract these as injected dependencies or adapter calls to separate orchestration from infrastructure
    passing: false
  - category: structure
    description: Separate infrastructure concerns from domain logic in ConfigOpencodeCmd.Run
    items:
      - internal/cmd/config_opencode.go:20-45 - Run calls printHeader() which logs infrastructure output; logging should be handled outside domain logic
      - internal/cmd/config_opencode.go:20-45 - Run calls config.LoadConfig() which is infrastructure; config should be passed in or resolved before the domain function
      - internal/cmd/config_opencode.go:20-45 - Run calls resolveKubeContext() which resolves Kubernetes context; this infrastructure concern should be handled before the domain function
    passing: false