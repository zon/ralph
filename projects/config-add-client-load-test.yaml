slug: config-add-client-load-test
title: Add direct test coverage for config.Client.Load in internal/config
maxIterations: 10
requirements:
    - slug: test-config-client
      description: |
        Add direct unit test coverage for Client.Load in internal/config/client.go, which currently has zero test coverage anywhere in the repo. Client is a thin wrapper (`type Client struct{}` with `Load() (*RalphConfig, error)`) that delegates to LoadConfig and implements the Loader interface defined in the same file; it is the concrete type wired into production via `&config.Client{}` in internal/cmd/run_adapters.go. This brings the module in line with the established precedent for thin Client wrapper types — internal/git's git.Client has client_test.go with TestGitClientNew constructing the client, asserting it is non-nil, and asserting interface satisfaction (`var _ orchestrationRun.GitClient = client`).
      items:
        - |
          internal/config/client_test.go (new file, package config) gains a compile-time interface assertion that *Client satisfies Loader, e.g. `var _ Loader = (*Client)(nil)`.
        - |
          internal/config/client_test.go gains TestClientLoad (or similarly named), which uses t.TempDir() and t.Chdir to create an isolated directory containing a `.ralph/config.yaml` with known, distinctive content (mirroring the setup used by TestLoadConfig_FromFile and other LoadConfig-family tests in config_test.go), constructs `&Client{}`, calls `.Load()`, and asserts it returns a non-nil *RalphConfig whose fields reflect that known content — proving Load delegates to and returns the same result as LoadConfig, not merely that it returns something non-nil.
        - |
          The test never touches the real ralph repository's .ralph directory or relies on the working directory at test invocation time — all setup happens inside t.TempDir() with t.Chdir, consistent with the isolation patterns already used throughout internal/config's own LoadConfig tests and the documented rule that filesystem-dependent code must be tested against isolated temporary directories.
        - |
          The test uses testify require/assert and follows the structure and naming conventions established elsewhere in the package (e.g. table-driven where appropriate, consistent helper usage with config_test.go).
        - |
          go vet ./internal/config/... and go test ./internal/config/... pass with the new test included.
      passing: true
