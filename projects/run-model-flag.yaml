name: run-model-flag
description: Add --model flag to ralph run to override the model from config

requirements:
  - category: cli
    description: Model flag on ralph run
    items:
      - ralph run accepts a --model flag that overrides the model field from .ralph/config.yaml
      - The flag is optional; when omitted, the model from config is used as before
    passing: true

  - category: context
    description: Model propagation through execution context
    items:
      - The execution context carries the model override
      - AI calls (RunAgent, GenerateChangelog, GeneratePRSummary) use the model from context when set, falling back to config
    passing: true

  - category: workflow
    description: Model flag forwarded to remote workflows
    items:
      - When submitting a remote workflow, the model override is passed as --model to the ralph workflow command
      - The ralph workflow command accepts and applies the same --model flag
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver minor bump to internal/version/VERSION and the appVersion field in charts/ralph-webhook/Chart.yaml
      - Apply a semver patch bump to the version field in charts/ralph-webhook/Chart.yaml
    passing: true
