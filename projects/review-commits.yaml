name: review-commits
description: Enhance ralph review with descriptive commit messages and iteration skipping

requirements:
  - category: git
    description: Implement deterministic commit message prefixes and history-based skipping logic
    items:
      - "Commit messages for review findings must start with a deterministic prefix in the format: '$component-$item'"
      - "$component should be derived from the component name (e.g., 'internal-git')"
      - "$item should be the 0-indexed position of the review item from the configuration"
      - "The review process must search branch commit logs for these prefixes before starting each iteration"
      - "If a matching '$component-$item' prefix is found in history, that specific iteration must be skipped"
    passing: true

  - category: ai
    description: Enhance AI prompts to capture brief review summaries for commit messages
    items:
      - "Update review prompts to instruct the AI agent to provide a brief, one-sentence summary of its recommendations"
      - "The agent must write this summary to a specific temporary file path provided in the prompt"
      - "The final commit message must combine the prefix and the summary: '$component-$item $summary'"
    passing: true

  - category: logic
    description: Refactor internal review execution flow
    items:
      - "Modify internal/cmd/review.go to implement the log checking and skipping logic"
      - "Update the commit logic to read the summary from the agent's output file"
      - "Ensure the system only attempts a commit if the agent actually modified the project file"
    passing: true

  - category: release
    description: Apply version bumps for the new feature
    items:
      - "Apply a semver minor bump to the app version in internal/version/VERSION and charts/ralph-webhook/Chart.yaml"
      - "Apply a semver patch bump to the helm chart version in charts/ralph-webhook/Chart.yaml"
    passing: false
