slug: config-module-compliance
title: 'config module compliance: interface, mock, and cleanup'
maxIterations: 10
requirements:
    - slug: config-loader-interface
      description: Export a Loader interface and MockLoader from internal/config
      items:
        - Add `type Loader interface { Load() (*RalphConfig, error) }` to internal/config/client.go so that *Client satisfies a named interface callers can depend on
        - Create internal/config/config_mock.go with an exported MockLoader struct; it must have a single function field `LoadFn func() (*RalphConfig, error)`; its Load method calls LoadFn when set, otherwise returns Any() and nil
      passing: true
    - slug: consolidate-config-interface
      description: Remove the locally-defined ConfigClient from internal/orchestration/run and replace it with config.Loader
      items:
        - Delete the ConfigClient interface definition from internal/orchestration/run/cmd.go and change the config field type to config.Loader
        - Delete the mockConfigClient struct from internal/orchestration/run/cmd_test.go; replace every construction of *mockConfigClient with *config.MockLoader, mapping LoadFunc to LoadFn
        - The LoadCalled bool field on the old mock has no replacement — remove any assertions that checked it
      passing: false
    - slug: remove-delegate-methods
      description: Remove the two *RalphConfig methods that do nothing but forward to free functions
      items:
        - Delete `(c *RalphConfig) DefaultCommentInstructions()` from internal/config/config.go
        - Delete `(c *RalphConfig) DefaultMergeInstructions()` from internal/config/config.go
        - Search the codebase for callers of these methods; update any found to call the free functions DefaultCommentInstructions() and DefaultMergeInstructions() directly
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
