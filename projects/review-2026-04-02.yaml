name: review-2026-04-02
description: Review of Command Layer and Configuration Management components for deep modules

requirements:
  - category: command-layer
    description: Move webhook provisioning logic to dedicated internal package
    items:
      - Extract config_webhook.go logic into internal/provisioning package
    passing: false
  - category: command-layer
    description: Ensure command handlers separate domain logic from infrastructure
    items:
      - Command handlers should not directly call low-level OS functions (os, filepath, exec); use internal abstractions
      - Command handlers should be concise and focus on orchestrating domain workflows
    passing: false
  - category: configuration
    description: Separate project management logic from configuration loading
    items:
      - Move LoadProject, ValidateProject, SaveProject, CheckCompletion, UpdateRequirementStatus functions to internal/project package
      - Move Project, Requirement structs to internal/project package
      - Ensure config package only handles Ralph configuration loading and validation
      - Update all callers to use the new package
    passing: false
  - category: configuration
    description: Separate domain logic from implementation details in configuration loading
    items:
      - Configuration loading should separate file I/O and YAML parsing from domain logic (defaults, validation)
      - LoadConfig should delegate file I/O to lower-level functions, keeping domain logic orchestration clear
      - Domain logic functions (applyDefaults, ValidateReviewConfig) should remain pure and testable
    passing: false
  - category: ai-integration
    description: Consolidate all opencode CLI interactions through the AI module
    items:
      - Move opencode stats execution from internal/cmd/workflow.go and internal/cmd/review.go to internal/ai package
      - Add a public function like DisplayStats(ctx) that handles stats display
      - Update callers to use the new function
    passing: false
  - category: ai-integration
    description: Separate domain logic from implementation details in AI integration
    items:
      - AI functions should delegate low-level operations (exec, file I/O, template rendering) to dedicated abstractions
      - Move prompt template building to internal/prompt package
      - Introduce AI executor interface to encapsulate opencode CLI interactions
      - Keep domain logic concise and focused on orchestrating AI workflows
    passing: false
  - category: git-operations
    description: Consolidate git operations and eliminate duplication
    items:
      - Add exported function RemoteURL() to internal/git package
      - Update internal/workflow/git.go and internal/workflow/generate.go to use internal/git package functions
      - Remove duplicate git command implementations
    passing: false
  - category: git-operations
    description: Separate git command execution boilerplate from domain logic
    items:
      - Extract common git command execution pattern into a helper function (e.g., runGit) to reduce duplication
      - Ensure domain logic functions delegate low-level git command execution to the helper
    passing: false
  - category: github-integration
    description: Consolidate GitHub URL parsing logic and eliminate duplication
    items:
      - Replace toHTTPSURL calls in internal/workflow/generate.go with github.ParseRemoteURL and github.CloneURL
      - Consider replacing getRemoteURL with github.GetRepo where appropriate
    passing: false
  - category: github-integration
    description: Ensure GitHub integration separates domain logic from infrastructure
    items:
      - GitHub integration functions should not directly call low-level OS functions (exec, http); use internal abstractions
      - GitHub integration functions should be concise and focus on orchestrating GitHub workflows
    passing: false
  - category: kubernetes-integration
    description: Extend Kubernetes integration module to support read operations and eliminate direct kubectl calls
    items:
      - Add GetConfigMap and GetSecret functions to internal/k8s package
      - Replace direct kubectl calls in config_webhook.go with internal/k8s package functions
    passing: false
  - category: webhook-server
    description: Unexport internal types that are not part of the public interface
    items:
      - Make Event and WorkflowResult types internal (lowercase)
    passing: false
  - category: webhook-server
    description: Separate domain logic from implementation details in HTTP handler
    items:
      - Move logging statements to a decorator or middleware
      - Encapsulate goroutine submission behind an async executor interface
      - Ensure HTTP handler contains only domain logic calls, delegating implementation details to lower-level functions
    passing: false
  - category: workflow-generation
    description: Improve encapsulation of Workflow and MergeWorkflow structs
    items:
      - Make fields private and provide getters for needed fields (Namespace, KubeContext)
      - Ensure factory functions set internal fields via options pattern
    passing: false
  - category: project-execution
    description: Consolidate duplicate commit/push and PR creation logic in review.go with project execution module
    items:
      - Refactor commitProjectFile to use project.CommitChanges or a shared helper function
      - Refactor submitPR to use project.createPullRequest (make it public) or a shared helper
      - Consider generalizing iteration loop pattern to eliminate duplication between runReview and RunIterationLoop
      - Ensure project.Execute commits changes in merge conflict resolution mode, eliminating duplicate commit logic in workflow.go
    passing: false
  - category: project-execution
    description: Separate domain logic from implementation details in project execution component
    items:
      - Domain logic functions in internal/project package should not directly call low-level OS functions (os, filepath, exec); use internal abstractions
      - External command execution (argo, git, gh) should be encapsulated in dedicated packages, not called directly from orchestration logic
      - File system operations should be delegated to a file utility layer, not performed directly in domain logic
    passing: false
  - category: notification-system
    description: Separate domain logic from implementation details in notification system usage
    items:
      - Extract project name extraction logic (strings.TrimSuffix(filepath.Base(...))) into a shared helper function
      - Ensure domain logic functions delegate low-level file path manipulation to the shared helper
      - Update all callers (internal/project/execute.go, internal/cmd/run.go, internal/webhook/events.go) to use the helper
    passing: false
  - category: logging
    description: Consolidate logging usage and replace fmt.Print statements with logger functions where appropriate
    items:
      - Replace fmt.Print statements in command handlers with logger.Info, logger.Success, logger.Warning, or logger.Error where appropriate, keeping user prompts separate
    passing: false
  - category: context-management
    description: Improve context module depth by grouping related fields and narrowing public interface
    items:
      - Group related fields (e.g., execution settings, repository settings) into substructures to reduce surface area
      - Add validation method to ensure internal consistency (e.g., local vs follow)
      - Consider moving environment variable initialization into context package via factory function
    passing: false
  - category: context-management
    description: Separate domain logic from implementation details in context management
    items:
      - Extract notification rule (ShouldNotify) to pure function
      - Extract repository parsing logic (SetRepo) to pure function
      - Ensure context methods delegate to pure functions
    passing: false
  - category: cleanup-management
    description: Separate domain logic from implementation details in signal handling
    items:
      - Signal handlers should not directly call low-level OS functions (os/signal, fmt, os.Exit); use internal abstractions
      - Signal handling should delegate low-level OS operations to dedicated abstractions
      - Signal handling function should contain only domain logic calls, delegating implementation details to lower-level functions
    passing: false
  - category: docker-utilities
    description: Implement Docker utilities as a deep module with a simple public interface
    items:
      - Extract Docker image building and pushing logic into internal/docker package
      - Provide a simple public interface for building and pushing images
      - Update scripts and workflows to use the new package
    passing: false
  - category: prompt-management
    description: Refactor prompt module to eliminate duplication and ensure consistent error handling
    items:
      - Extract common prompt building steps (load config, read project file, get commit log, base branch) into private helper functions
      - Ensure all prompt building functions return errors for template failures
      - Update callers to handle errors appropriately
    passing: false
  - category: prompt-management
    description: Separate domain logic from implementation details in prompt construction
    items:
      - Extract template parsing and execution to a private helper function
      - Remove logging statements from prompt building functions
      - Ensure prompt building functions only orchestrate domain steps (gather configuration, project content, git history, select template, render via helper)
    passing: false
  - category: requirement-management
    description: Align requirement management component with its purpose
    items:
      - Move iteration execution (Execute function) from internal/requirement to internal/project package
      - Update all callers to use the new location
      - Consider renaming internal/requirement package to reflect its purpose (or remove if empty)
    passing: false
