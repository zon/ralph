name: review-command
description: Add ralph review command that runs AI-powered code reviews from config prompts

requirements:
  - category: config
    description: Add review prompts to ralph config
    items:
      - RalphConfig gains a Review field of type ReviewConfig (a single struct, not a list)
      - ReviewConfig has an optional Model string and a required Items list of ReviewItem structs
      - "ReviewItem has exactly one of: Text (inline string content), File (path relative to repo root, read at runtime), or URL (HTTP URL fetched at runtime, expects plain text response)"
      - Validation returns an error if a ReviewItem has none or more than one of Text, File, URL set
      - |
        Example .ralph/config.yaml review section:
        review:
          model: google/gemini-2.5-pro
          items:
          - text: camel case vars
          - file: docs/standards/deep-modules.md
          - url: https://raw.githubusercontent.com/zon/code/refs/heads/main/README.md
    passing: true

  - category: command
    description: Add ralph review subcommand
    items:
      - "ralph review command is registered in cmd.go alongside run, merge, and other subcommands"
      - "ralph review accepts an optional --project flag for the output project file path; defaults to projects/review.yaml"

      - "ralph review accepts an optional --model flag to override the AI model, taking precedence over ReviewConfig.Model and the main ralph model"
      - "ralph review accepts a --local flag (defaults to false) to run on the local machine instead of submitting to Argo Workflows"
    passing: true

  - category: prompt
    description: Build and execute a review prompt for each ReviewConfig entry
    items:
      - Each ReviewItem is a separate iteration; its content is loaded (text inline, file read from disk, url fetched via HTTP) into .ConfigContent
      - For each ReviewItem, a prompt is rendered from a template and passed to ai.RunAgent sequentially; all iterations target the same output project file so findings accumulate
      - "The model per iteration is resolved in order of precedence: --model flag, ReviewConfig.Model, main ralph model"
      - "Template fields: .ConfigContent (content of this item), .Project (absolute path to output project YAML), .RalphProjectDoc (content of docs/projects.md fetched from https://raw.githubusercontent.com/zon/ralph/refs/heads/main/docs/projects.md at runtime)"
      - "Prompt preamble: you are a software architect reviewing source code. does the code meet these standards?"
      - "Prompt epilogue: instructs the agent to create or edit the ralph project at .Project with any issues found, and includes .RalphProjectDoc as authoring instructions"
    passing: true

  - category: version
    description: Version bump
    items:
      - Apply a semver minor bump to internal/version/VERSION and appVersion in charts/ralph-webhook/Chart.yaml
      - Apply a semver patch bump to the version field in charts/ralph-webhook/Chart.yaml
    passing: false
