name: domain-functions-review
description: Fix domain function standards violations found during code review

requirements:
  - category: domain-functions.yaml
    description: Add missing webhook service major feature to domain-functions.yaml
    items:
    - "domain-functions.yaml: The webhook service (`ralph-webhook`) is a major user-facing feature — it receives GitHub webhook events, validates them, filters by user/repo rules, and dispatches Argo workflows — but is entirely absent from domain-functions.yaml. Add a new `webhook service` feature entry with the key domain functions: `Server.handleWebhook` (internal/webhook/server.go), `githubPayload.IsAcceptable` (internal/webhook/payload.go), `githubPayload.ToEvent` (internal/webhook/payload.go), and `Event.ToWorkflow` (internal/webhook/events.go)"
    passing: true

  - category: domain-functions.yaml
    description: Remove reportNewlyPassingRequirements from domain-functions.yaml
    items:
      - "domain-functions.yaml: `reportNewlyPassingRequirements` in `internal/run/iteration.go` is listed as a domain function but it is a simple logging helper that iterates requirements and logs which ones newly pass. It does not encode domain rules or summarize a feature. Remove it from the `ralph run` feature entry in domain-functions.yaml"
    passing: true

  - category: iteration
    description: Extract implementation details from runSingleIteration
    items:
      - "`internal/run/iteration.go`: `runSingleIteration` (lines 150-216) mixes domain logic with file I/O implementation details — it directly calls `os.Stat(\"report.md\")`, checks `os.IsNotExist(reportErr)`, reads commit messages from the filesystem, and manually constructs `git.AuthConfig` structs. Extract the commit workflow (lines 160-196) into a dedicated function (e.g., `commitIterationChanges`) that hides the report.md detection, changelog generation, file reading, and auth config assembly behind a single call"
    passing: false

  - category: review
    description: Extract implementation details from ReviewCmd.runReview
    items:
      - "`internal/cmd/review.go`: `ReviewCmd.runReview` (lines 178-248) contains implementation details mixed with domain logic — it builds temp file paths with `git.TmpPath`, calls `os.Remove(summaryPath)`, and manually assembles `git.AuthConfig` structs for commit/push. Extract the per-item commit logic (lines 233-244) into a helper function that hides the summary file path management, auth config construction, and cleanup behind a single call"
    passing: false

  - category: workflow
    description: Extract raw git shell commands from WorkflowCmd.fetchBaseBranch
    items:
      - "`internal/cmd/workflow.go`: `WorkflowCmd.fetchBaseBranch` (lines 150-159) directly calls `exec.Command(\"git\", \"fetch\", ...)` bypassing the `internal/git` package. Move this logic into the `internal/git` package (e.g., `git.FetchBranch`) and call that from the domain function instead"
    passing: true

  - category: workflow
    description: Deduplicate setup boilerplate in WorkflowCmd.runProject and resolveConflictsWithAI
    items:
      - "`internal/cmd/workflow.go`: `WorkflowCmd.runProject` (lines 261-307) and `WorkflowCmd.resolveConflictsWithAI` (lines 194-259) share nearly identical boilerplate — both load config, resolve max iterations, set context flags, load the project, get the current branch, build an `ExecutionSetup` struct, and call `run.Execute`. Extract the shared setup into a helper (e.g., `WorkflowCmd.prepareAndExecute`) that accepts only the differing parameters (like the instructions file) and hides the repeated infrastructure assembly"
    passing: false

  - category: comment
    description: Extract service lifecycle management from CommentCmd.Run
    items:
      - "`internal/cmd/comment.go`: `CommentCmd.Run` (lines 31-84) contains inline service manager lifecycle code (lines 64-72) — creating a `services.NewManager()`, conditionally starting services, registering cleanup, and deferring stop. This infrastructure concern appears in the middle of the domain flow. Extract it into a helper (e.g., `startServicesIfNeeded`) that returns a cleanup function, keeping `CommentCmd.Run` focused on the domain sequence: derive project file, load project, load config, render instructions, run agent"
    passing: true

  - category: version
    description: Apply version bump
    items:
      - Apply a semver patch bump to `internal/version/VERSION` and `charts/ralph-webhook/Chart.yaml`
    passing: true
