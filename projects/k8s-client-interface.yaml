slug: k8s-client-interface
title: Bring internal/k8s up to implementation module standard
maxIterations: 10
requirements:
    - slug: client-interface
      description: Replace exported free functions with a Client interface and unexported struct
      items:
        - Define a Client interface in internal/k8s with GetCurrentContext, CreateOrUpdateConfigMap, and CreateOrUpdateSecret methods matching the current free-function signatures
        - Implement the interface on an unexported client struct; each method delegates to the existing unexported helpers (runKubectl, buildSecretArgs, etc.)
        - Add a NewClient() Client constructor that returns &client{}
        - Add a compile-time assertion var _ Client = (*client)(nil)
        - Delete the exported free functions GetCurrentContext, CreateOrUpdateConfigMap, and CreateOrUpdateSecret
      passing: false
    - slug: client-mock
      description: Add a MockClient in client_mock.go so callers can inject a test double
      items:
        - Create internal/k8s/client_mock.go with a MockClient struct that satisfies Client
        - Use function fields (GetCurrentContextFunc, CreateOrUpdateConfigMapFunc, CreateOrUpdateSecretFunc) so individual behaviors can be overridden per test case; each method calls the function field when non-nil and returns a zero value otherwise
        - Add a compile-time assertion var _ Client = (*MockClient)(nil)
      passing: false
    - slug: fix-provisioning-callers
      description: Update internal/provisioning/webhook.go to accept k8s.Client instead of calling deleted free functions
      items:
        - Add a k8s.Client parameter to WriteWebhookConfigMap, WriteWebhookSecrets, and GetKubeContext in internal/provisioning/webhook.go
        - Each function must call the corresponding method on the client parameter instead of the now-deleted k8s free function
      passing: false
    - slug: fix-cmd-callers
      description: Update internal/cmd to construct k8s.NewClient() and thread it through to provisioning and direct k8s calls
      items:
        - Add a k8s.Client parameter to resolveKubeContext in internal/cmd/kube_context.go; replace the k8s.GetCurrentContext call with a method call on the client parameter
        - Add a k8s.Client parameter to createK8sSecret in ConfigGithubCmd, ConfigOpencodeCmd, and ConfigPulumiCmd; replace each k8s.CreateOrUpdateSecret call with a method call on the client parameter
        - In ConfigGithubCmd.Run, ConfigOpencodeCmd.Run, and ConfigPulumiCmd.Run construct k8s.NewClient() and pass it to both resolveKubeContext and createK8sSecret
        - In ConfigWebhookConfigCmd.Run and ConfigWebhookSecretCmd.Run construct k8s.NewClient() and pass it to provisioning.GetKubeContext, provisioning.WriteWebhookConfigMap, and provisioning.WriteWebhookSecrets
      passing: false
    - slug: remove-comments
      description: Remove all what-comments from internal/k8s source files
      items:
        - Remove every comment in kubectl.go, context.go, configmaps.go, and secrets.go that describes what a function, method, struct, or constant does — doc comments on functions and types, and inline comments such as "// Generate the configmap YAML" and "// Apply the secret"
        - Retain any comment that explains a non-obvious why, hidden constraint, or workaround — there are none in the current files, so all comments should be removed
      passing: false
    - slug: remove-vacuous-test
      description: Delete TestSecretNames from secrets_test.go
      items:
        - Remove the TestSecretNames test function from internal/k8s/secrets_test.go; it asserts that string constants equal their own literal values and provides no defensive value
      passing: false
    - slug: version-bump
      description: Version bump
      items:
        - Apply a semver patch bump to the app version
      passing: false
