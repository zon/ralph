modules:
  - path: internal/setup
    description: Orchestration module for ralph features that create configuration or set up a repository to work with ralph. Owns commands such as `set skills` (and future setup-oriented commands) that fetch, install, link, or configure ralph assets in the target repository.
    orchestration: true

  - path: internal/skills
    description: Implementation module for skill discovery, fetching, link rewriting, installation, and stale-skill removal. Provides helpers consumed by the `setup` orchestration module to install ralph skills into a target repository.
