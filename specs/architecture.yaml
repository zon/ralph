categories:
  - slug: entry
    description: Main packages that wire real dependencies and start the application.
    signatures:
      - main function
      - dependency wiring

  - slug: orchestration
    description: Domain logic modules that define and coordinate core business processes.
    orchestration: true
    signatures:
      - domain logic
      - domain logic integration tests

  - slug: implementation
    description: Real dependency implementations and mocks that back the domain interfaces.
    signatures:
      - real dependency implementations
      - mocks
      - unit tests

  - slug: pure
    description: Stateless modules containing only value objects and pure functions with no side effects.
    signatures:
      - value objects
      - pure functions
      - unit tests

  - slug: lifecycle
    description: Modules that manage process-level concerns such as startup, shutdown, and signal handling. Stateful but infrastructural; not part of the domain.
    signatures:
      - signal handling
      - process shutdown
      - startup initialization

  - slug: pipeline
    description: Modules that direct in-process flow — routing I/O streams and carrying runtime state across the application.
    signatures:
      - I/O routing
      - runtime state
      - unit tests

modules:
  - path: cmd/ralph
    description: CLI entrypoint that wires up command parsing and dispatches to subcommand handlers.
    category: entry
  - path: cmd/ralph-webhook
    description: Service entrypoint that loads configuration and starts the webhook HTTP server.
    category: entry
  - path: internal/cmd
    description: Command structs that parse flags, wire real dependencies into the run orchestration, and drive local and remote execution paths.
    category: entry
  - path: internal/orchestration/run
    description: Orchestrates the full run command from input validation through local and remote execution dispatch.
    category: orchestration
  - path: internal/orchestration/workspace
    description: Bootstraps the container environment for all workflow subcommands — GitHub auth, AI credentials, git identity, repo clone, branch checkout, and symlinks.
    category: orchestration
  - path: internal/orchestration/workflowrun
    description: Orchestrates the workflow run subcommand — workspace setup, base branch sync, optional debug mode setup, and project execution.
    category: orchestration
  - path: internal/orchestration/comment
    description: Orchestrates the workflow comment subcommand — workspace setup, AI agent invocation with a rendered comment prompt, commit, and PR reply.
    category: orchestration
  - path: internal/orchestration/merge
    description: Orchestrates the workflow merge subcommand — workspace setup, completed project cleanup, GitHub head sync, and PR merge.
    category: orchestration
  - path: internal/project
    description: Loads and validates project YAML files and tracks requirement completion across iterations.
    category: orchestration
  - path: internal/orchestration/validate
    description: Orchestrates a bounded fix loop that repairs invalid project YAML files using an AI agent.
    category: orchestration
  - path: internal/orchestration/setup
    description: Coordinates the full skill setup lifecycle for a repository.
    category: orchestration
  - path: internal/orchestration/setconfig
    description: Orchestrates the ralph CLI set-config subcommand — resolving the Kubernetes context and configuring GitHub and OpenCode credentials.
    category: orchestration
  - path: internal/orchestration/webhooksetconfig
    description: Orchestrates the ralph-webhook set-config subcommand — building and writing service configuration, generating and writing secrets, and registering webhooks.
    category: orchestration
  - path: internal/orchestration/workflowtoken
    description: Orchestrates generating a scoped GitHub workflow token for a repository and configuring git to authenticate with it.
    category: orchestration
  - path: internal/webhook
    description: HTTP server that receives GitHub webhook events and dispatches corresponding workflow runs.
    category: orchestration
  - path: internal/workflow
    description: Generates and submits workflow manifests for run and merge operations.
    category: implementation
  - path: internal/provisioning
    description: Provisions webhook configuration and secrets into a Kubernetes cluster.
    category: orchestration
  - path: internal/skills
    description: Manages the full lifecycle of ralph skills within a repository.
    category: orchestration
  - path: internal/architecture
    description: Defines and persists the architecture YAML schema for module documentation and review.
    category: orchestration
  - path: internal/services
    description: Manages the lifecycle of before-commands and long-running services declared in project configuration.
    category: orchestration
  - path: internal/orchestration/argo
    description: Orchestrates argo workflow list and stop commands by resolving Kubernetes context and delegating to the argo client.
    category: orchestration
  - path: internal/orchestration/command
    description: Orchestrates both the client-side command submission (Argo workflow) and the container-side command execution (workspace setup + exec).
    category: orchestration
  - path: internal/orchestration/pass
    description: Orchestrates marking a project requirement as passing or failing by loading, updating, and saving the project YAML.
    category: orchestration
  - path: internal/ai
    description: Runs AI prompts against embedded instruction templates to generate ralph artifacts.
    category: implementation
  - path: internal/opencode
    description: Thin wrapper around the opencode CLI for invoking AI models.
    category: implementation
  - path: internal/argo
    description: Thin wrapper around the argo CLI for workflow management.
    category: implementation
  - path: internal/k8s
    description: Thin wrapper around kubectl for managing Kubernetes resources.
    category: implementation
  - path: internal/git
    description: Thin wrapper around the git CLI for repository operations.
    category: implementation
  - path: internal/workspace
    description: Filesystem helpers for preparing the container workspace — credential placement, repo checkout, and directory changes.
    category: implementation
  - path: internal/github
    description: Wrapper around the gh CLI for GitHub API operations and authentication.
    category: implementation
  - path: internal/config
    description: Loads and parses the ralph configuration file.
    category: implementation
  - path: internal/webhookconfig
    description: Loads and validates the ralph-webhook service configuration and secrets.
    category: implementation
  - path: internal/context
    description: Carries runtime execution settings across the application.
    category: pipeline
  - path: internal/cleanup
    description: Registers shutdown callbacks and handles OS signal-based graceful termination.
    category: lifecycle
  - path: internal/output
    description: Routes debug, info, warn, error, and success messages to configurable output and error streams with ANSI color.
    category: pipeline
  - path: internal/notify
    description: Desktop notification helper for success and error events.
    category: implementation
  - path: internal/version
    description: Exposes the current application version string.
    category: pure
  - path: internal/docker
    description: Test-only package that validates the repository Containerfile, image push script, and container build CI workflow.
    category: implementation
  - path: internal/testutil
    description: Shared test helpers and factories used across the test suite.
    category: implementation
