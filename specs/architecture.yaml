modules:
  - path: cmd/ralph
    description: CLI entrypoint that wires up command parsing and dispatches to subcommand handlers.
    orchestration: true
  - path: cmd/ralph-webhook
    description: Service entrypoint that loads configuration and starts the webhook HTTP server.
    orchestration: true
  - path: internal/cmd
    description: Subcommand definitions that compose internal packages to fulfil each CLI action.
    orchestration: true
  - path: internal/run
    description: Drives the local execution path for ralph run, sequencing environment setup, the AI loop, and PR creation.
    orchestration: true
  - path: internal/project
    description: Loads and validates project YAML files and tracks requirement completion across iterations.
    orchestration: true
  - path: internal/validate
    description: Orchestrates a bounded fix loop that repairs invalid project YAML files using an AI agent.
    orchestration: true
  - path: internal/webhook
    description: HTTP server that receives GitHub webhook events and dispatches corresponding Argo workflows.
    orchestration: true
  - path: internal/workflow
    description: Generates and submits Argo Workflow manifests for run and merge operations.
    orchestration: true
  - path: internal/provisioning
    description: Provisions webhook configuration and secrets into a Kubernetes cluster.
    orchestration: true
  - path: internal/setup
    description: Sequences skill discovery, fetching, pruning, and installation for repository setup.
    orchestration: true
  - path: internal/skills
    description: Manages ralph skill lifecycle including discovery, fetching, rewriting, pruning, and installation.
  - path: internal/ai
    description: Runs AI prompts against embedded instruction templates to generate ralph artifacts.
  - path: internal/opencode
    description: Thin wrapper around the opencode CLI for invoking AI models.
  - path: internal/architecture
    description: Defines and persists the architecture YAML schema for module documentation and review.
  - path: internal/review
    description: Expands review iterations by reading architecture files and partitioning work into units.
  - path: internal/argo
    description: Thin wrapper around the argo CLI for workflow management.
  - path: internal/k8s
    description: Thin wrapper around kubectl for managing Kubernetes resources.
  - path: internal/git
    description: Thin wrapper around the git CLI for repository operations.
  - path: internal/github
    description: Wrapper around the gh CLI for GitHub API operations and authentication.
  - path: internal/config
    description: Loads and parses the ralph configuration schema including service and instruction settings.
  - path: internal/webhookconfig
    description: Loads and validates the ralph-webhook service configuration and secrets.
  - path: internal/context
    description: Carries runtime execution settings between the command layer and the run engine.
  - path: internal/services
    description: Manages the lifecycle of before-commands and long-running services declared in project configuration.
  - path: internal/workspace
    description: Prepares the in-container workspace for agent execution.
  - path: internal/cleanup
    description: Registers shutdown callbacks and handles OS signal-based graceful termination.
  - path: internal/logger
    description: Structured logger with leveled output used across the application.
  - path: internal/notify
    description: Desktop notification helper for success and error events.
  - path: internal/version
    description: Exposes the current application version string.
  - path: internal/docker
    description: Test-only package that validates the repository Containerfile.
  - path: internal/testutil
    description: Shared test helpers and factories used across the test suite.
